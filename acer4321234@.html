<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbotube - Master Admin</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* design same as previous but with modal for reason */
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { border-bottom: 2px solid #FFD700; padding-bottom: 15px; margin-bottom: 25px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size: 26px; color: #FFD700; font-weight: 900; letter-spacing: 2px; }
        .tab-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 12px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-right: 5px; }
        .tab-btn.active { background: #FFD700; color: #000; font-weight: bold; }
        .section { display: none; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .section.active { display: block; }

        .video-item { display: grid; grid-template-columns: 80px 1fr 180px; gap: 15px; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .vid-thumb { width: 80px; height: 100px; object-fit: cover; border-radius: 6px; background: #000; }
        
        .action-btn { border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .btn-illegal { background: #FF0050; color: white; }
        .btn-boost { background: #00f2ea; color: black; }

        /* REASON MODAL */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; }
        .modal-box { background:#222; padding:25px; border-radius:15px; border:1px solid #FFD700; width:90%; max-width:400px; }
        textarea { width:100%; height:100px; background:#000; color:white; border:1px solid #444; padding:10px; border-radius:8px; margin:10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title">VERBO<span style="color:white;">TUBE</span> ADMIN</div>
            <div id="status" style="color:#FFD700;">LIVE ACCESS</div>
        </div>

        <div id="adminPanel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('videos', this)">Moderation</button>
                <button class="tab-btn" onclick="switchTab('users', this)">Users</button>
            </div>

            <div id="videos" class="section active">
                <h3>Video Control</h3>
                <div id="videoModerationList">Loading clips...</div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-box">
            <h3 style="color:#FFD700;">Reason for Deletion</h3>
            <p style="font-size:12px; color:#aaa;">This will be sent to the user as a notification.</p>
            <textarea id="deleteReason" placeholder="E.g. Illegal content, Harassment, Tharki content..."></textarea>
            <div style="display:flex; gap:10px;">
                <button class="action-btn" onclick="confirmDelete()" style="background:#FF0050; flex:1; color:white;">SEND & DELETE</button>
                <button class="action-btn" onclick="closeModal()" style="background:#444; flex:1; color:white;">CANCEL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, remove, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentDeleteKey = null;
        let currentTargetUid = null;

        onAuthStateChanged(auth, user => { if(user) loadAllVideos(); });

        function loadAllVideos() {
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                const list = document.getElementById('videoModerationList');
                list.innerHTML = "";
                if(!snap.exists()) return;

                snap.forEach(child => {
                    const v = child.val();
                    const isRec = v.recommended === true;
                    const div = document.createElement('div');
                    div.className = "video-item";
                    div.innerHTML = `
                        <video class="vid-thumb" src="${v.videoUrl}" muted></video>
                        <div class="vid-info">
                            <b>${v.uploader}</b>
                            <span>${v.caption || ''}</span>
                        </div>
                        <div class="btn-group">
                            <button class="action-btn btn-boost" onclick="window.toggleRecommend('${child.key}', ${isRec})">${isRec ? 'UNBOOST' : 'BOOST'}</button>
                            <button class="action-btn btn-illegal" onclick="window.askDeleteReason('${child.key}', '${v.uid}')">DELETE</button>
                        </div>`;
                    list.appendChild(div);
                });
            });
        }

        // ASK FOR REASON MODAL
        window.askDeleteReason = (key, uid) => {
            currentDeleteKey = key;
            currentTargetUid = uid;
            document.getElementById('deleteModal').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('deleteModal').style.display = 'none'; };

        // CONFIRM DELETE & SEND NOTIFICATION
        window.confirmDelete = async () => {
            const reason = document.getElementById('deleteReason').value.trim();
            if(!reason) return alert("Bhai, reason toh likho!");

            const chatId = [auth.currentUser.uid, currentTargetUid].sort().join("_");
            
            // 1. User ko Inbox mein Notification bhejna
            await push(ref(db, `chats/${chatId}`), {
                text: `⚠️ MODERATION NOTICE: Your video has been deleted. Reason: ${reason}`,
                sender: auth.currentUser.uid,
                time: Date.now(),
                type: 'system_alert'
            });

            // 2. Video Database se delete karna
            await remove(ref(db, `gameplay_clips/${currentDeleteKey}`));
            
            alert("Video deleted and user notified!");
            closeModal();
            document.getElementById('deleteReason').value = "";
        };

        window.toggleRecommend = async (key, status) => {
            await update(ref(db, `gameplay_clips/${key}`), { recommended: !status });
        };

        window.switchTab = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
