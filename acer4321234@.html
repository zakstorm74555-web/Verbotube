<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaVideo - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #111; color: white; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size: 24px; color: #ff0055; font-weight: bold; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #ff0055; color: white; border-color: #ff0055; font-weight: bold; }
        
        .section { display: none; background: #1a1a1a; padding: 20px; border: 1px solid #333; }
        .section.active { display: block; }

        /* USER LIST STYLE */
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
        .user-info { display: flex; gap: 10px; align-items: center; }
        .u-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #444; }
        .badge-display { background: #ff0055; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        /* CONTROLS */
        input, select { background: #000; border: 1px solid #444; color: white; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .action-btn { background: #00C2FF; border: none; color: black; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: monospace; }
        .btn-red { background: #ff0055; color: white; }
        .btn-del { background: #333; color: #ff4444; border: 1px solid #555; margin-left: 5px; }
        
        /* SEARCH BAR */
        #userSearch { margin-bottom: 20px; border-bottom: 2px solid #00C2FF; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title">ADMIN // CONTROL</div>
            <div id="status" style="color:gray;">Checking...</div>
        </div>

        <div id="loginWarning" style="text-align:center; margin-top:50px; display:none;">
            <h2>ACCESS DENIED</h2>
            <button onclick="login()" style="padding:10px 20px; cursor:pointer;">Login Admin</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users')">Users & Badges</button>
                <button class="tab-btn" onclick="switchTab('ads')">Ads Manager</button>
            </div>

            <div id="users" class="section active">
                <h3>Manage Users</h3>
                <input type="text" id="userSearch" placeholder="Search User via Name..." onkeyup="filterUsers()">
                <div id="userList">Loading users...</div>
            </div>

            <div id="ads" class="section">
                <h3>Create Ad</h3>
                <input type="file" id="adFile" accept="video/*">
                <input type="text" id="adCaption" placeholder="Caption (Top Text)">
                <input type="text" id="adBtnText" placeholder="Button Text (e.g. SHOP NOW)">
                <input type="text" id="adLink" placeholder="Link URL (https://...)">
                <input type="number" id="adTime" placeholder="Duration (Hours)" value="24">
                
                <div id="progress" style="width:0%; height:5px; background:red; margin-bottom:10px;"></div>
                <button class="action-btn btn-red" style="width:100%;" onclick="postAd()">LAUNCH AD</button>
                
                <h4 style="margin-top:20px;">Active Ads</h4>
                <div id="activeAdsList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33", measurementId: "G-QNFHZ1CDLY" };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        // ADMIN EMAIL & CLOUDINARY
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";
        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let allUsers = [];
        let listenerAttached = false; // DUPLICATE FIX FLAG

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL) {
                document.getElementById('status').innerText = "COMMANDER ACTIVE";
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('loginWarning').style.display = "none";
                
                // Sirf tab load karo agar pehle se load nahi hua (Duplicate Fix)
                if(!listenerAttached) {
                    loadUsers();
                    loadAds();
                    listenerAttached = true;
                }
            } else {
                document.getElementById('status').innerText = "Access Denied";
                document.getElementById('loginWarning').style.display = "block";
                document.getElementById('adminPanel').style.display = "none";
            }
        });

        // --- USER & BADGE MANAGER ---
        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = ""; // Clear list completely before adding new items
                
                if(!snap.exists()) {
                    list.innerHTML = "<p>No users found.</p>";
                    return;
                }
                
                allUsers = [];
                
                snap.forEach(child => {
                    const u = child.val();
                    const uid = child.key;
                    
                    // Badge Display Logic
                    let badgeHtml = u.customBadge ? `<span class="badge-display">${u.customBadge}</span>` : '';
                    
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerHTML = `
                        <div class="user-info">
                            <img src="${u.photo || 'https://via.placeholder.com/40'}" class="u-pic">
                            <div>
                                <div><b>${u.username}</b> ${badgeHtml}</div>
                                <div style="font-size:11px; color:#777;">${u.email}</div>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <input type="text" id="badge-${uid}" placeholder="Badge Name" style="width:100px; margin:0; padding:8px;">
                            <button class="action-btn" onclick="giveBadge('${uid}')">SET</button>
                            <button class="action-btn btn-del" onclick="removeBadge('${uid}')">REMOVE</button>
                        </div>
                    `;
                    list.appendChild(div);
                    allUsers.push({ name: u.username.toLowerCase(), el: div });
                });
            });
        }

        // Give Badge Function
        window.giveBadge = (uid) => {
            const text = document.getElementById(`badge-${uid}`).value;
            if(!text) return alert("Write badge name first!");
            update(ref(db, `users/${uid}`), { customBadge: text });
            alert("Badge Given!");
        };

        // Remove Badge Function (New)
        window.removeBadge = (uid) => {
            if(confirm("Are you sure you want to remove the badge?")) {
                update(ref(db, `users/${uid}`), { customBadge: null });
                alert("Badge Removed.");
            }
        };

        window.filterUsers = () => {
            const q = document.getElementById('userSearch').value.toLowerCase();
            allUsers.forEach(u => {
                u.el.style.display = u.name.includes(q) ? "flex" : "none";
            });
        };

        // --- AD MANAGER ---
        window.postAd = () => {
            const file = document.getElementById('adFile').files[0];
            if(!file) return alert("Select Video File");
            
            const btn = event.target;
            btn.innerText = "Uploading...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
            
            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('progress').style.width = (e.loaded/e.total)*100+"%";
            xhr.onload = async () => {
                const url = JSON.parse(xhr.responseText).secure_url;
                await push(ref(db, 'ads'), {
                    videoUrl: url,
                    caption: document.getElementById('adCaption').value,
                    btnText: document.getElementById('adBtnText').value || "Visit",
                    link: document.getElementById('adLink').value,
                    expiry: Date.now() + (document.getElementById('adTime').value * 3600000),
                    timestamp: Date.now()
                });
                alert("Ad Launched!");
                location.reload();
            };
            xhr.send(fd);
        };

        function loadAds() {
            onValue(ref(db, 'ads'), snap => {
                const div = document.getElementById('activeAdsList');
                div.innerHTML = "";
                if(!snap.exists()) return;
                snap.forEach(c => {
                    if(Date.now() > c.val().expiry) {
                        remove(ref(db, `ads/${c.key}`));
                    } else {
                        div.innerHTML += `
                            <div class="user-item">
                                <div>${c.val().caption}</div>
                                <button class="action-btn btn-del" onclick="deleteAd('${c.key}')">STOP AD</button>
                            </div>`;
                    }
                });
            });
        }
        window.deleteAd = (k) => remove(ref(db, `ads/${k}`));

        window.switchTab = (t) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
