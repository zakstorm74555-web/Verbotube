<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaVideo - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size: 24px; color: #8a2be2; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #8a2be2; color: white; border-color: #8a2be2; font-weight: bold; }
        .section { display: none; background: #1a1a1a; padding: 20px; border: 1px solid #333; }
        .section.active { display: block; }
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
        .user-info { display: flex; gap: 10px; align-items: center; }
        .u-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #444; }
        input, select { background: #000; border: 1px solid #444; color: white; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .action-btn { background: #8a2be2; border: none; color: white; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-del { background: #333; color: #ff4444; border: 1px solid #555; margin-left: 5px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index: 2000; }
        .modal-box { background:#222; padding:20px; width:90%; max-width: 400px; border-radius: 10px; border: 1px solid #8a2be2; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title">PARA<span style="color:white;">VIDEO</span> ADMIN</div>
            <div id="status" style="color:gray;">Checking...</div>
        </div>

        <div id="loginWarning" style="text-align:center; margin-top:50px; display:none;">
            <h2>ACCESS DENIED</h2>
            <button onclick="login()" class="action-btn">Login Admin</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users', this)">Users & Badges</button>
                <button class="tab-btn" onclick="switchTab('ads', this)">Ads Manager</button>
                <button class="tab-btn" onclick="switchTab('settings', this)">Site Settings</button>
            </div>

            <div id="users" class="section active">
                <h3>Manage Users</h3>
                <input type="text" id="userSearch" placeholder="Search..." onkeyup="filterUsers()">
                <div id="userList">Loading users...</div>
            </div>

            <div id="ads" class="section">
                <h3>Create Ad</h3>
                <label>Sponsored By (Select User):</label>
                <select id="adSponsor"><option value="admin">ParaVideo Team (Default)</option></select>
                <input type="file" id="adFile" accept="video/*">
                <input type="text" id="adCaption" placeholder="Ad Caption">
                <input type="text" id="adBtnText" placeholder="Button Text">
                <input type="text" id="adLink" placeholder="Link URL">
                <input type="number" id="adTime" placeholder="24" value="24">
                <div id="progress" style="width:0%; height:5px; background:#8a2be2; margin-bottom:10px;"></div>
                <button class="action-btn" style="width:100%;" onclick="postAd()">LAUNCH AD</button>
                <h4 style="margin-top:20px;">Active Ads</h4>
                <div id="activeAdsList"></div>
            </div>

            <div id="settings" class="section">
                <h3>Site Settings</h3>
                <label>Admin/Team Profile Picture:</label>
                <input type="file" id="settingProfile" accept="image/*">
                <button class="action-btn" onclick="uploadSetting('profile')">Update Profile Pic</button>
                <img id="previewProfile" style="width:50px; height:50px; border-radius:50%; margin-top:5px; border:1px solid white; display:block;">

                <hr style="border-color:#333; margin:20px 0;">

                <label>Site Favicon (Browser Icon):</label>
                <input type="file" id="settingFavicon" accept="image/*">
                <button class="action-btn" onclick="uploadSetting('favicon')">Update Favicon</button>
                <img id="previewFavicon" style="width:32px; height:32px; margin-top:5px; display:block;">
            </div>
        </div>
    </div>

    <div id="badgeModal" class="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeBadgeModal()">&times;</span>
            <h3>Set Badge</h3>
            <input type="hidden" id="targetUid">
            <select id="badgeType"><option value="text">Text Badge</option></select>
            <input type="text" id="badgeText" maxlength="10" placeholder="Text Label">
            <input type="color" id="badgeColor" value="#8a2be2" style="height:40px;">
            <button onclick="saveBadge()" class="action-btn" style="width:100%; margin-top:10px;">SAVE BADGE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";
        const CLOUD_NAME = "dusj0vpsi"; const UPLOAD_PRESET = "paravideo";

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL) {
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('loginWarning').style.display = "none";
                loadUsersAndSponsors();
                loadAds();
                loadSettings(); // NEW
            } else {
                document.getElementById('status').innerText = "Access Denied";
                document.getElementById('loginWarning').style.display = "block";
                document.getElementById('adminPanel').style.display = "none";
            }
        });

        // --- NEW: SETTINGS LOGIC ---
        window.uploadSetting = (type) => {
            const fileInput = document.getElementById(type === 'profile' ? 'settingProfile' : 'settingFavicon');
            const file = fileInput.files[0];
            if(!file) return alert("Select Image!");

            const btn = event.target; btn.disabled = true; btn.innerText = "Uploading...";
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);

            fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd })
            .then(res => res.json())
            .then(data => {
                const updates = {};
                if(type === 'profile') updates.defaultProfile = data.secure_url;
                if(type === 'favicon') updates.favicon = data.secure_url;
                
                update(ref(db, 'site_settings'), updates).then(() => {
                    alert("Updated!");
                    btn.disabled = false; btn.innerText = "Update";
                });
            });
        };

        function loadSettings() {
            onValue(ref(db, 'site_settings'), snap => {
                if(snap.exists()) {
                    const v = snap.val();
                    if(v.defaultProfile) document.getElementById('previewProfile').src = v.defaultProfile;
                    if(v.favicon) document.getElementById('previewFavicon').src = v.favicon;
                }
            });
        }

        // ... (Keep existing Users/Ads functions: postAd, deleteAd, loadUsersAndSponsors, etc.) ...
        // Note: For brevity, I assumed you kept the previous functions. 
        // Ensure switchTab works:
        window.switchTab = (t, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            btn.classList.add('active');
        }
        
        // Re-adding postAd/deleteAd/loadAds for completeness if you replaced the whole file:
        window.postAd = () => {
            const file = document.getElementById('adFile').files[0];
            const sponsorUid = document.getElementById('adSponsor').value;
            if(!file) return alert("Select Video");
            const btn = event.target; btn.disabled = true; btn.innerText = "Uploading...";
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('progress').style.width = (e.loaded/e.total)*100+"%";
            xhr.onload = async () => {
                const url = JSON.parse(xhr.responseText).secure_url;
                await push(ref(db, 'admin_ads'), {
                    uid: sponsorUid,
                    videoUrl: url,
                    caption: document.getElementById('adCaption').value,
                    btnText: document.getElementById('adBtnText').value || "Visit",
                    link: document.getElementById('adLink').value,
                    expiry: Date.now() + (document.getElementById('adTime').value * 3600000)
                });
                alert("Ad Launched!"); location.reload();
            };
            xhr.send(fd);
        };
        window.deleteAd = async (key) => { if(confirm("Stop Ad?")) await remove(ref(db, `admin_ads/${key}`)); };
        function loadAds() {
            onValue(ref(db, 'admin_ads'), snap => {
                const div = document.getElementById('activeAdsList'); div.innerHTML = "";
                if(!snap.exists()) { div.innerHTML = "<p>No active ads.</p>"; return; }
                snap.forEach(c => div.innerHTML += `<div class="user-item"><div>${c.val().caption || "Ad"}</div><button class="action-btn btn-del" onclick="window.deleteAd('${c.key}')">STOP</button></div>`);
            });
        }
        function loadUsersAndSponsors() {
             onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('userList');
                const sponsorSelect = document.getElementById('adSponsor');
                list.innerHTML = "";
                sponsorSelect.innerHTML = '<option value="admin">ParaVideo Team (Default)</option>';
                if(!snap.exists()) return;
                snap.forEach(child => {
                    const u = child.val();
                    const option = document.createElement('option');
                    option.value = child.key;
                    option.innerText = u.username;
                    sponsorSelect.appendChild(option);
                    list.innerHTML += `<div class="user-item"><div class="user-info"><img src="${u.photo||''}" class="u-pic"><div><b>${u.username}</b></div></div></div>`;
                });
            });
        }
    </script>
</body>
</html>
