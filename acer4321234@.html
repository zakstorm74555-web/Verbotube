<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaVideo - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center; }
        .title { font-size: 24px; color: #8a2be2; font-weight: bold; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #8a2be2; color: white; border-color: #8a2be2; font-weight: bold; }
        
        .section { display: none; background: #1a1a1a; padding: 20px; border: 1px solid #333; }
        .section.active { display: block; }

        /* USER LIST STYLE */
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
        .user-info { display: flex; gap: 10px; align-items: center; }
        .u-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #444; }
        
        /* --- BADGE UI FIX --- */
        .badge-preview { 
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 10px; color: white; font-weight: bold;
            margin-left: 8px; border: 1px solid #fff;
        }
        /* Image Badge: Circle & Fixed Size */
        .badge-img { width: 20px; height: 20px; border-radius: 50%; overflow: hidden; padding: 0; }
        .badge-img img { width: 100%; height: 100%; object-fit: cover; }
        /* Text Badge: Pill Shape & Auto Width */
        .badge-txt { width: auto; height: auto; padding: 2px 8px; border-radius: 10px; }

        /* CONTROLS */
        input, select { background: #000; border: 1px solid #444; color: white; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .action-btn { background: #8a2be2; border: none; color: white; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-del { background: #333; color: #ff4444; border: 1px solid #555; margin-left: 5px; }
        
        /* MODAL & CROPPER */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index: 2000; }
        .modal-box { background:#222; padding:20px; width:90%; max-width: 400px; border-radius: 10px; border: 1px solid #8a2be2; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
        .img-container { max-height: 300px; margin-bottom: 10px; overflow: hidden; }
        #image-to-crop { max-width: 100%; }
        
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title">PARA<span style="color:white;">VIDEO</span> ADMIN</div>
            <div id="status" style="color:gray;">Checking...</div>
        </div>

        <div id="loginWarning" style="text-align:center; margin-top:50px; display:none;">
            <h2>ACCESS DENIED</h2>
            <button onclick="login()" class="action-btn">Login Admin</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users', this)">Users & Badges</button>
                <button class="tab-btn" onclick="switchTab('ads', this)">Ads Manager</button>
            </div>

            <div id="users" class="section active">
                <h3>Manage Users</h3>
                <input type="text" id="userSearch" placeholder="Search User via Name..." onkeyup="filterUsers()" style="border-color: #8a2be2;">
                <div id="userList">Loading users...</div>
            </div>

            <div id="ads" class="section">
                <h3>Create Ad</h3>
                
                <label>Sponsored By (Select User):</label>
                <select id="adSponsor">
                    <option value="admin">ParaVideo Team (Default)</option>
                </select>

                <label>Video File:</label>
                <input type="file" id="adFile" accept="video/*">
                
                <label>Caption:</label>
                <input type="text" id="adCaption" placeholder="Ad Caption">
                
                <label>Button Text:</label>
                <input type="text" id="adBtnText" placeholder="Button Text (e.g. SHOP NOW)">
                
                <label>Target Link:</label>
                <input type="text" id="adLink" placeholder="Link URL (https://...)">
                
                <label>Duration (Hours):</label>
                <input type="number" id="adTime" placeholder="24" value="24">
                
                <div id="progress" style="width:0%; height:5px; background:#8a2be2; margin-bottom:10px;"></div>
                <button class="action-btn" style="width:100%;" onclick="postAd()">LAUNCH AD</button>
                
                <h4 style="margin-top:20px;">Active Ads</h4>
                <div id="activeAdsList"></div>
            </div>
        </div>
    </div>

    <div id="badgeModal" class="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeBadgeModal()">&times;</span>
            <h3 style="margin-top:0; color:#8a2be2;">Set Badge</h3>
            <input type="hidden" id="targetUid">
            
            <label>Badge Type:</label>
            <select id="badgeType" onchange="toggleBadgeInputs()">
                <option value="text">Text Badge</option>
                <option value="image">Image Badge</option>
            </select>

            <div id="textInputs">
                <label>Text (e.g. 'V', 'PRO'):</label>
                <input type="text" id="badgeText" maxlength="10" placeholder="Text Label">
            </div>

            <div id="imageInputs" style="display:none;">
                <label>Upload Image:</label>
                <input type="file" id="badgeFile" accept="image/*" onchange="loadImageForCropping(event)">
                <div class="img-container">
                    <img id="image-to-crop" src="">
                </div>
            </div>

            <label>Badge Color (BG / Border):</label>
            <input type="color" id="badgeColor" value="#8a2be2" style="height:40px; padding:2px;">

            <button id="saveBadgeBtn" onclick="saveBadge()" class="action-btn" style="width:100%; margin-top:15px;">SAVE BADGE</button>
            <div id="uploadProgress" style="display:none; color:#8a2be2; text-align:center; margin-top:10px;">Uploading...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33", measurementId: "G-QNFHZ1CDLY" };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";
        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let allUsers = [];
        let cropper;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL) {
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('loginWarning').style.display = "none";
                loadUsersAndSponsors();
                loadAds();
            } else {
                document.getElementById('status').innerText = "Access Denied";
                document.getElementById('loginWarning').style.display = "block";
                document.getElementById('adminPanel').style.display = "none";
            }
        });

        // --- USER & SPONSOR MANAGER ---
        function loadUsersAndSponsors() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('userList');
                const sponsorSelect = document.getElementById('adSponsor');
                
                list.innerHTML = "";
                sponsorSelect.innerHTML = '<option value="admin">ParaVideo Team (Default)</option>';
                
                if(!snap.exists()) { list.innerHTML = "<p>No users found.</p>"; return; }
                
                allUsers = [];
                snap.forEach(child => {
                    const u = child.val();
                    const uid = child.key;
                    
                    // --- BADGE UI LOGIC ---
                    let badgeHtml = '';
                    if(u.customBadge) {
                        if(typeof u.customBadge === 'object') {
                            if(u.customBadge.image) {
                                // Image Badge: Circle
                                badgeHtml = `<span class="badge-preview badge-img" style="border-color:${u.customBadge.color}"><img src="${u.customBadge.image}"></span>`;
                            } else {
                                // Text Badge: Pill
                                badgeHtml = `<span class="badge-preview badge-txt" style="background:${u.customBadge.color}">${u.customBadge.text}</span>`;
                            }
                        } else {
                            badgeHtml = `<span class="badge-preview badge-txt" style="background:#ff0055">${u.customBadge}</span>`;
                        }
                    }
                    
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerHTML = `
                        <div class="user-info">
                            <img src="${u.photo || 'https://via.placeholder.com/40'}" class="u-pic">
                            <div>
                                <div><b>${u.username}</b> ${badgeHtml}</div>
                                <div style="font-size:11px; color:#777;">${u.email}</div>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <button class="action-btn" onclick="openBadgeModal('${uid}')">BADGE</button>
                            <button class="action-btn btn-del" onclick="removeBadge('${uid}')">X</button>
                        </div>
                    `;
                    list.appendChild(div);
                    allUsers.push({ name: u.username.toLowerCase(), el: div });

                    const option = document.createElement('option');
                    option.value = uid;
                    option.innerText = `${u.username} (${u.email})`;
                    sponsorSelect.appendChild(option);
                });
            });
        }

        window.filterUsers = () => {
            const q = document.getElementById('userSearch').value.toLowerCase();
            allUsers.forEach(u => u.el.style.display = u.name.includes(q) ? "flex" : "none");
        };

        window.removeBadge = (uid) => {
            if(confirm("Remove Badge?")) update(ref(db, `users/${uid}`), { customBadge: null });
        };

        // --- BADGE SYSTEM ---
        window.openBadgeModal = (uid) => {
            document.getElementById('targetUid').value = uid;
            document.getElementById('badgeModal').style.display = 'flex';
            document.getElementById('badgeType').value = 'text';
            toggleBadgeInputs();
            resetCropper();
        };
        window.closeBadgeModal = () => document.getElementById('badgeModal').style.display = 'none';

        window.toggleBadgeInputs = () => {
            const type = document.getElementById('badgeType').value;
            document.getElementById('textInputs').style.display = type === 'text' ? 'block' : 'none';
            document.getElementById('imageInputs').style.display = type === 'image' ? 'block' : 'none';
        };

        window.loadImageForCropping = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const image = document.getElementById('image-to-crop');
                    image.src = e.target.result;
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(image, { aspectRatio: 1, viewMode: 1 });
                };
                reader.readAsDataURL(file);
            }
        };

        function resetCropper() {
            if(cropper) cropper.destroy();
            document.getElementById('image-to-crop').src = "";
            document.getElementById('badgeFile').value = "";
            document.getElementById('badgeText').value = "";
            document.getElementById('badgeColor').value = "#8a2be2";
            document.getElementById('uploadProgress').style.display = 'none';
            document.getElementById('saveBadgeBtn').disabled = false;
        }

        window.saveBadge = async () => {
            const uid = document.getElementById('targetUid').value;
            const type = document.getElementById('badgeType').value;
            const color = document.getElementById('badgeColor').value;
            const btn = document.getElementById('saveBadgeBtn');
            let badgeData = { color: color };

            if (type === 'text') {
                const text = document.getElementById('badgeText').value;
                if (!text) return alert("Enter Text!");
                badgeData.text = text;
                update(ref(db, `users/${uid}`), { customBadge: badgeData });
                closeBadgeModal();
            } else {
                if (!cropper) return alert("Crop Image First!");
                btn.disabled = true;
                document.getElementById('uploadProgress').style.display = 'block';
                cropper.getCroppedCanvas({ width: 100, height: 100 }).toBlob(async (blob) => {
                    const fd = new FormData(); fd.append('file', blob); fd.append('upload_preset', UPLOAD_PRESET);
                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                        const data = await res.json();
                        badgeData.image = data.secure_url;
                        update(ref(db, `users/${uid}`), { customBadge: badgeData });
                        closeBadgeModal();
                    } catch (e) { alert("Upload Failed"); btn.disabled = false; }
                });
            }
        };

        // --- ADS MANAGER (Global Delete Function) ---
        window.postAd = () => {
            const file = document.getElementById('adFile').files[0];
            const sponsorUid = document.getElementById('adSponsor').value;
            
            if(!file) return alert("Select Video");
            const btn = event.target; btn.disabled = true; btn.innerText = "Uploading...";
            
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('progress').style.width = (e.loaded/e.total)*100+"%";
            
            xhr.onload = async () => {
                const url = JSON.parse(xhr.responseText).secure_url;
                // Saving to 'admin_ads' node to sync with index.html
                await push(ref(db, 'admin_ads'), {
                    uid: sponsorUid,
                    videoUrl: url,
                    caption: document.getElementById('adCaption').value,
                    imageUrl: url.replace(/\.[^/.]+$/, ".jpg"), // Use thumbnail for preview
                    btnText: document.getElementById('adBtnText').value || "Visit",
                    link: document.getElementById('adLink').value,
                    expiry: Date.now() + (document.getElementById('adTime').value * 3600000)
                });
                alert("Ad Launched!"); location.reload();
            };
            xhr.send(fd);
        };

        // Make delete function global so onclick can find it
        window.deleteAd = async (key) => {
            if(confirm("Stop this Ad?")) {
                await remove(ref(db, `admin_ads/${key}`));
            }
        };

        function loadAds() {
            // Listening to 'admin_ads' now
            onValue(ref(db, 'admin_ads'), snap => {
                const div = document.getElementById('activeAdsList'); div.innerHTML = "";
                if(!snap.exists()) { div.innerHTML = "<p style='color:#777'>No active ads.</p>"; return; }
                
                snap.forEach(c => {
                    // Auto delete if expired
                    if(Date.now() > c.val().expiry) {
                        remove(ref(db, `admin_ads/${c.key}`));
                    } else {
                        // Using window.deleteAd(key)
                        div.innerHTML += `
                            <div class="user-item">
                                <div>${c.val().caption || "No Caption"}</div>
                                <button class="action-btn btn-del" onclick="window.deleteAd('${c.key}')">STOP</button>
                            </div>`;
                    }
                });
            });
        }

        window.switchTab = (t, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
