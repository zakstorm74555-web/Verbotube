<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VERBOTUBE THEME --- */
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .header { 
            padding: 15px; background: #111; border-bottom: 1px solid #333; 
            display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 10;
        }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        /* Gold Title */
        h2 { margin: 0; font-size: 18px; color: #FFD700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        
        .user-list { padding: 10px; }
        
        .user-card { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; 
        }
        .user-card:active { background: #111; }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        
        /* Gold Border for Profile Pic */
        .profile-pic { 
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover; 
            border: 2px solid #FFD700; 
        }
        
        .names { display: flex; flex-direction: column; }
        .username { font-weight: bold; font-size: 16px; }
        .status { font-size: 12px; color: #aaa; }
        
        /* Yellow-Red Gradient Button */
        .chat-btn { 
            background: linear-gradient(135deg, #FFD700, #FF0000); 
            color: black; 
            border: none; padding: 8px 15px; border-radius: 20px; 
            font-weight: bold; font-size: 12px; 
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index'"><i class="fas fa-arrow-left"></i></button>
        <h2>Find Friends</h2>
    </div>

    <div class="user-list" id="list">
        <p style="text-align:center; color:#555; margin-top:50px;">Loading...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) loadFollowing(user.uid);
            // ✅ CLEAN URL: Redirects to 'login' not 'index.html' or 'login.html'
            else window.location.href = 'login';
        });

        function loadFollowing(myUid) {
            const userRef = ref(db, 'users'); 
            
            onValue(userRef, (snap) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                
                if(!snap.exists()) { list.innerHTML = "<p style='text-align:center'>No users found.</p>"; return; }

                snap.forEach(child => {
                    const u = child.val();
                    if(child.key !== auth.currentUser.uid) { 
                        const div = document.createElement('div');
                        div.className = "user-card";
                        div.innerHTML = `
                            <div class="user-info">
                                <img src="${u.photo || 'icon.png'}" class="profile-pic">
                                <div class="names">
                                    <span class="username">${u.username || 'User'}</span>
                                    <span class="status">Tap to chat</span>
                                </div>
                            </div>
                            <button class="chat-btn"><i class="fas fa-comment"></i> Chat</button>
                        `;
                        // ✅ CLEAN URL: chat.html -> chat
                        div.onclick = () => {
                            window.location.href = `chat?uid=${child.key}&name=${u.username || 'User'}`;
                        };
                        list.appendChild(div);
                    }
                });
            });
        }
    </script>
</body>
</html>
