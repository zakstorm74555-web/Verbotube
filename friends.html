<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Friends - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100svh; overflow-x: hidden; }
        
        /* Glassmorphism Header */
        .header { padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 0.5px solid #222; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        h2 { margin: 0; font-size: 17px; font-weight: 700; flex: 1; text-align: center; margin-right: 20px; color: #FFD700; }

        .section-title { padding: 20px 15px 10px; font-size: 13px; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; border-bottom: 1px solid #111; }
        
        .user-list { padding-bottom: 80px; }
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 0.5px solid #111; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2.5px solid #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        
        .username { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .full-name { font-size: 12px; color: #888; }
        
        .actions { display: flex; gap: 8px; }
        .btn-follow { background: #FF0050; color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-following { background: #222; color: #888; border: 1px solid #333; padding: 8px 15px; border-radius: 4px; font-weight: 600; font-size: 13px; }
        .chat-btn { background: #FFD700; color: #000; border: none; width: 35px; height: 35px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 10px rgba(255,215,0,0.3); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index'"><i class="fas fa-chevron-left"></i></button>
        <h2>Community</h2>
        <i class="fas fa-search" style="color: #FFD700;" onclick="window.location.href='search'"></i>
    </div>

    <div id="friends-section" style="display:none;">
        <div class="section-title">Your Friends</div>
        <div class="user-list" id="friends-list"></div>
    </div>

    <div class="section-title">Suggested For You</div>
    <div class="user-list" id="suggested-list">
        <p style="text-align:center; color:#444; margin-top:30px;">Loading Verbotube users...</p>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home" style="color:#888;" onclick="window.location.href='index'"></i>
        <i class="fas fa-user-friends" style="color:#fff;"></i>
        <div style="width:45px; height:30px; background:linear-gradient(to right, #00f2ea, #ff0050); border-radius:10px; display:flex; justify-content:center; align-items:center;" onclick="window.location.href='upload'">
            <div style="background:white; width:36px; height:100%; border-radius:8px; display:flex; justify-content:center; align-items:center;"><i class="fas fa-plus" style="color:#000;"></i></div>
        </div>
        <i class="fas fa-comment-alt" style="color:#888;" onclick="window.location.href='friends'"></i>
        <i class="fas fa-user" style="color:#888;" onclick="window.location.href='profile'"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null;

        // NO LOGIN, NO ENTRY LOGIC
        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                loadSystem();
            } else {
                window.location.href = 'login'; 
            }
        });

        window.toggleFollow = async (uid) => {
            const myUid = currentUser.uid;
            const fRef = ref(db, `following/${myUid}/${uid}`);
            const snap = await get(fRef);
            if(snap.exists()) {
                await remove(fRef);
                await remove(ref(db, `followers/${uid}/${myUid}`));
            } else {
                await set(fRef, true);
                await set(ref(db, `followers/${uid}/${myUid}`), true);
            }
        };

        function loadSystem() {
            onValue(ref(db, 'users'), async (snap) => {
                const fList = document.getElementById('friends-list');
                const sList = document.getElementById('suggested-list');
                fList.innerHTML = "";
                sList.innerHTML = "";
                let hasFriends = false;

                if(!snap.exists()) return;

                for (const [uid, u] of Object.entries(snap.val())) {
                    if (uid === currentUser.uid) continue;

                    const fSnap = await get(ref(db, `following/${currentUser.uid}/${uid}`));
                    const isFollowing = fSnap.exists();

                    const div = document.createElement('div');
                    div.className = "user-card";
                    div.innerHTML = `
                        <div class="user-info" onclick="window.location.href='profile?uid=${uid}'">
                            <img src="${u.photo || 'icon.png'}" class="profile-pic">
                            <div class="names">
                                <span class="username">${u.username || 'User'} <i class="fas fa-check-circle" style="color:#20d5ec; font-size:12px;"></i></span>
                                <span class="full-name">@${u.username || 'user'}</span>
                            </div>
                        </div>
                        <div class="actions">
                            ${isFollowing ? 
                                `<button class="chat-btn" onclick="window.location.href='chat?uid=${uid}&name=${u.username}'"><i class="fas fa-comment-dots"></i></button>
                                 <button class="btn-following" onclick="toggleFollow('${uid}')">Following</button>` : 
                                `<button class="btn-follow" onclick="toggleFollow('${uid}')">Follow</button>`
                            }
                        </div>`;

                    if(isFollowing) {
                        fList.appendChild(div);
                        hasFriends = true;
                    } else {
                        sList.appendChild(div);
                    }
                }
                document.getElementById('friends-section').style.display = hasFriends ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
