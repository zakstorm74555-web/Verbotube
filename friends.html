<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Community - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100svh; overflow-x: hidden; }
        
        /* Glassmorphism Header */
        .header { padding: 18px; background: rgba(0,0,0,0.9); border-bottom: 0.5px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); }
        .back-btn { background: none; border: none; color: #FFD700; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .back-btn:active { transform: scale(0.8); }
        h2 { margin: 0; font-size: 16px; font-weight: 800; flex: 1; text-align: center; text-transform: uppercase; letter-spacing: 2px; color: #FFD700; }

        .section-title { padding: 25px 15px 10px; font-size: 11px; color: #FFD700; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; opacity: 0.8; }
        
        .user-list { padding-bottom: 90px; }
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 0.5px solid #0a0a0a; background: #000; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { display: flex; align-items: center; gap: 15px; flex: 1; cursor: pointer; }
        .profile-pic { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        
        .username { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px; color: #fff; }
        .full-name { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; }
        
        .actions { display: flex; gap: 10px; align-items: center; }
        .btn-follow { background: #FFD700; color: #000; border: none; padding: 10px 22px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(255,215,0,0.2); }
        .btn-following { background: transparent; color: #FFD700; border: 1.5px solid #FFD700; padding: 9px 18px; border-radius: 8px; font-weight: 700; font-size: 12px; }
        .chat-btn { background: #111; color: #FFD700; border: 1px solid #FFD700; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        .chat-btn:active { transform: scale(0.9); background: #FFD700; color: #000; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); border-top: 0.5px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-icon { color: #444; font-size: 22px; transition: 0.3s; }
        .nav-icon.active { color: #FFD700; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index'"><i class="fas fa-arrow-left"></i></button>
        <h2>The Collective</h2>
        <i class="fas fa-search" style="color: #FFD700; font-size: 18px;" onclick="window.location.href='search'"></i>
    </div>

    <div id="friends-section" style="display:none;">
        <div class="section-title"><i class="fas fa-star" style="margin-right: 5px;"></i> Mutual Friends</div>
        <div class="user-list" id="friends-list"></div>
    </div>

    <div class="section-title"><i class="fas fa-bolt" style="margin-right: 5px;"></i> Recommended Pilots</div>
    <div class="user-list" id="suggested-list">
        <p style="text-align:center; color:#222; margin-top:40px; font-weight: 700;">Scanning Verbotube Network...</p>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="window.location.href='index'"></i>
        <i class="fas fa-user-friends nav-icon active"></i>
        <div style="width:46px; height:32px; background:linear-gradient(to right, #00f2ea, #ff0050); border-radius:10px; display:flex; justify-content:center; align-items:center;" onclick="window.location.href='upload'">
            <div style="background:white; width:38px; height:100%; border-radius:8px; display:flex; justify-content:center; align-items:center;"><i class="fas fa-plus" style="color:#000; font-size: 14px;"></i></div>
        </div>
        <i class="fas fa-comment-alt nav-icon" onclick="window.location.href='friends'"></i>
        <i class="fas fa-user nav-icon" onclick="window.location.href='profile'"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                loadSystem();
            } else {
                window.location.href = 'login'; 
            }
        });

        window.toggleFollow = async (uid) => {
            const myUid = currentUser.uid;
            const fRef = ref(db, `following/${myUid}/${uid}`);
            const snap = await get(fRef);
            if(snap.exists()) {
                await remove(fRef);
                await remove(ref(db, `followers/${uid}/${myUid}`));
            } else {
                await set(fRef, true);
                await set(ref(db, `followers/${uid}/${myUid}`), true);
            }
        };

        async function loadSystem() {
            onValue(ref(db, 'users'), async (snap) => {
                const fList = document.getElementById('friends-list');
                const sList = document.getElementById('suggested-list');
                fList.innerHTML = "";
                sList.innerHTML = "";
                let hasMutualFriends = false;

                if(!snap.exists()) return;

                const users = snap.val();
                for (const [uid, u] of Object.entries(users)) {
                    if (uid === currentUser.uid) continue;

                    // Blackblaze Optimized: Data checks
                    const amIFollowing = await get(ref(db, `following/${currentUser.uid}/${uid}`));
                    const areTheyFollowingMe = await get(ref(db, `following/${uid}/${currentUser.uid}`));
                    
                    const isMutual = amIFollowing.exists() && areTheyFollowingMe.exists();
                    const isFollowing = amIFollowing.exists();

                    const div = document.createElement('div');
                    div.className = "user-card";
                    div.innerHTML = `
                        <div class="user-info" onclick="window.location.href='profile?uid=${uid}'">
                            <img src="${u.photo || 'icon.png'}" class="profile-pic" onerror="this.src='icon.png'">
                            <div class="names">
                                <span class="username">${u.username || 'Gamer'} ${u.email === 'elitegamer859650@gmail.com' ? '<i class="fas fa-check-circle" style="color:#FFD700; font-size:12px;"></i>' : ''}</span>
                                <span class="full-name">@${(u.username || 'user').toLowerCase()}</span>
                            </div>
                        </div>
                        <div class="actions">
                            ${isFollowing ? 
                                `${isMutual ? `<button class="chat-btn" onclick="window.location.href='chat?uid=${uid}&name=${u.username}'"><i class="fas fa-comment-dots"></i></button>` : ''}
                                 <button class="btn-following" onclick="toggleFollow('${uid}')">Following</button>` : 
                                `<button class="btn-follow" onclick="toggleFollow('${uid}')">Follow</button>`
                            }
                        </div>`;

                    if(isMutual) {
                        fList.appendChild(div);
                        hasMutualFriends = true;
                    } else {
                        sList.appendChild(div);
                    }
                }
                document.getElementById('friends-section').style.display = hasMutualFriends ? 'block' : 'none';
                if(sList.innerHTML === "") sList.innerHTML = "<p style='text-align:center; color:#222; padding:20px;'>No new pilots found.</p>";
            });
        }
    </script>
</body>
</html>
