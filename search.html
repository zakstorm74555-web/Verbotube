<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .search-bar { width: 100%; padding: 10px; background: #222; border: none; color: white; border-radius: 20px; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 15px; }
        .vid-thumb { width: 100%; aspect-ratio: 9/16; background: #111; object-fit: cover; border-radius: 5px; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }
        .u-pic { width: 40px; height: 40px; border-radius: 50%; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <input type="text" class="search-bar" id="search" placeholder="Search Users or Videos..." onkeyup="doSearch()">
    
    <div id="results">
        <h4 style="color:#777;">Trending Videos</h4>
        <div class="grid" id="vidGrid">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33", measurementId: "G-QNFHZ1CDLY" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // LOAD POPULAR VIDEOS INITIALLY
        onValue(ref(db, 'gameplay_clips'), snap => {
            const grid = document.getElementById('vidGrid'); grid.innerHTML = "";
            if(snap.exists()) {
                let vids = Object.values(snap.val());
                // Simple Sort by Time (Newest First) as Proxy for now. Real logic needs view counts in DB.
                vids.sort((a,b) => b.timestamp - a.timestamp); 
                vids.forEach(v => {
                    grid.innerHTML += `<video src="${v.videoUrl}" class="vid-thumb" onclick="window.location.href='index.html'"></video>`;
                });
            }
        });

        window.doSearch = () => {
            const q = document.getElementById('search').value.toLowerCase();
            const res = document.getElementById('results');
            
            if(q.length < 2) return;

            // Search Users
            onValue(ref(db, 'users'), snap => {
                res.innerHTML = "<h4>Users</h4>";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.username.toLowerCase().includes(q)) {
                        res.innerHTML += `<div class="user-item" onclick="window.location.href='profile.html?uid=${c.key}'">
                            <img src="${u.photo}" class="u-pic">
                            <div>${u.username}</div>
                        </div>`;
                    }
                });
            }, {onlyOnce: true});
        }
    </script>
</body>
</html>
