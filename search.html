 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- VERBOTUBE THEME --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .back-btn { color: #FFD700; text-decoration: none; font-size: 24px; }
        
        /* Search Bar */
        .search-container { 
            flex: 1; position: relative; 
            background: #111; border-radius: 25px; border: 1px solid #333; 
            display: flex; align-items: center; padding: 0 15px; 
        }
        .search-bar { 
            width: 100%; padding: 12px; background: transparent; border: none; 
            color: white; outline: none; font-size: 16px; 
        }
        .search-icon { color: #888; }
        .search-container:focus-within { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* Section Titles */
        h4 { color: #FFD700; margin: 25px 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* --- PRO USER CARD (With Follow Btn) --- */
        .user-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #111; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #222; transition: 0.2s;
        }
        .user-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .u-pic { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; }
        .u-info div:first-child { font-weight: bold; font-size: 15px; }
        .u-info div:last-child { color: #888; font-size: 12px; }

        /* Follow Button Styles */
        .f-btn { padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; min-width: 80px; }
        .btn-follow { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; }
        .btn-following { background: #000; color: #FFD700; border: 1px solid #FFD700; }

        /* --- TIKTOK STYLE VIDEO GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .vid-card { 
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 10px; overflow: hidden; cursor: pointer; 
            border: 1px solid #222;
        }
        .vid-card video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay Gradient */
        .vid-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 10px; pointer-events: none;
        }
        .vid-caption { font-size: 12px; color: white; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 2px black; }
        .vid-user { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; }
        .vid-user img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #FFD700; }

    </style>
</head>
<body>

    <div class="header">
        <a href="index" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-bar" id="search" placeholder="Search Users (e.g. 𝕸𝖔𝖍𝖘𝖎𝖓)..." onkeyup="doSearch()">
        </div>
    </div>
    
    <div id="results">
        <p style="color:#555; text-align: center; margin-top: 50px;">Type to search...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null;
        let myFollowing = new Set(); 

        onAuthStateChanged(auth, user => {
            if(user) {
                myUid = user.uid;
                loadMyFollowing();
                loadTrending(); 
            } else {
                window.location.href = 'login';
            }
        });

        function loadMyFollowing() {
            onValue(ref(db, `following/${myUid}`), snap => {
                myFollowing.clear();
                if(snap.exists()) {
                    Object.keys(snap.val()).forEach(key => myFollowing.add(key));
                }
            });
        }

        // ✅ FIX: CHANGED NFD TO NFKC (HANDLES FANCY FONTS)
        function cleanText(str) {
            if(!str) return "";
            // NFKC normalizes compatibility characters (Like 𝕸 -> M)
            return str.normalize("NFKC")
                      .toLowerCase()
                      .replace(/[^a-z0-9]/g, ""); 
        }

        function loadTrending() {
            onValue(ref(db, 'gameplay_clips'), snap => {
                const res = document.getElementById('results');
                res.innerHTML = "<h4>Trending Now</h4><div class='grid' id='trendGrid'></div>";
                const grid = document.getElementById('trendGrid');
                
                if(snap.exists()) {
                    let vids = Object.entries(snap.val()).map(([key, val]) => ({ key, ...val }));
                    vids.sort((a,b) => b.timestamp - a.timestamp);
                    
                    vids.slice(0, 6).forEach(v => { 
                        renderVideoCard(v, grid);
                    });
                }
            }, {onlyOnce: true});
        }

        function renderVideoCard(v, container) {
            let userPic = "icon.png";
            
            // Create Elements First
            const div = document.createElement('div');
            div.className = 'vid-card';
            div.innerHTML = `
                <video src="${v.videoUrl}" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                <div class="vid-overlay">
                    <div class="vid-caption">${v.caption || 'No Caption'}</div>
                    <div class="vid-user">
                        <img src="icon.png" id="v-pic-${v.key}">
                        <span>${v.uploader}</span>
                    </div>
                </div>
            `;
            div.onclick = () => window.location.href = `index?video=${v.key}`;
            container.appendChild(div);

            // Fetch User Pic Async
            get(ref(db, `users/${v.uid}`)).then(uSnap => {
                if(uSnap.exists()) {
                    const u = uSnap.val();
                    if(u.photo) document.getElementById(`v-pic-${v.key}`).src = u.photo;
                }
            });
        }

        window.doSearch = () => {
            const rawQ = document.getElementById('search').value;
            const q = cleanText(rawQ); 
            const res = document.getElementById('results');
            
            if(rawQ.length === 0) { loadTrending(); return; }
            if(rawQ.length < 2) return;

            res.innerHTML = ""; 

            // --- SEARCH USERS ---
            onValue(ref(db, 'users'), snap => {
                let userHTML = "";
                let foundUser = false;
                
                snap.forEach(c => {
                    const u = c.val();
                    // Clean Database Name
                    const uNameClean = cleanText(u.username);
                    
                    // ✅ MATCH LOGIC: Clean vs Clean OR Original vs Original (Contains)
                    if(uNameClean.includes(q) || (u.username && u.username.toLowerCase().includes(rawQ.toLowerCase()))) {
                        foundUser = true;
                        const isFollowing = myFollowing.has(c.key);
                        const isMe = (c.key === myUid);
                        
                        let btnHtml = "";
                        if(!isMe) {
                            btnHtml = isFollowing 
                                ? `<button class="f-btn btn-following" onclick="toggleFollow('${c.key}', this)">Following</button>`
                                : `<button class="f-btn btn-follow" onclick="toggleFollow('${c.key}', this)">Follow</button>`;
                        }

                        userHTML += `
                            <div class="user-item">
                                <div class="user-left" onclick="window.location.href='profile?uid=${c.key}'">
                                    <img src="${u.photo || 'icon.png'}" class="u-pic">
                                    <div class="u-info">
                                        <div>${u.username}</div>
                                        <div>View Profile</div>
                                    </div>
                                </div>
                                ${btnHtml}
                            </div>
                        `;
                    }
                });

                if(foundUser) res.innerHTML += `<h4>Users</h4><div>${userHTML}</div>`;
            }, {onlyOnce: true});

            // --- SEARCH VIDEOS ---
            onValue(ref(db, 'gameplay_clips'), snap => {
                const vidContainer = document.createElement('div');
                vidContainer.className = 'grid';
                let foundVideo = false;

                snap.forEach(c => {
                    const v = c.val();
                    const vCapClean = cleanText(v.caption);
                    
                    if(v.caption && (vCapClean.includes(q) || v.caption.toLowerCase().includes(rawQ.toLowerCase()))) {
                        foundVideo = true;
                        renderVideoCard({ key: c.key, ...v }, vidContainer);
                    }
                });

                if(foundVideo) {
                    const title = document.createElement('h4'); title.innerText = "Videos";
                    res.appendChild(title);
                    res.appendChild(vidContainer);
                } else if (!res.innerHTML.includes("Users")) {
                    res.innerHTML = "<p style='color:#555; text-align:center; margin-top:20px;'>No results found.</p>";
                }
            }, {onlyOnce: true});
        }

        window.toggleFollow = async (targetUid, btn) => {
            if(!myUid) return;
            const isFollowing = btn.classList.contains('btn-following');
            
            if(isFollowing) {
                btn.className = "f-btn btn-follow";
                btn.innerText = "Follow";
                myFollowing.delete(targetUid);
                await remove(ref(db, `followers/${targetUid}/${myUid}`));
                await remove(ref(db, `following/${myUid}/${targetUid}`));
            } else {
                btn.className = "f-btn btn-following";
                btn.innerText = "Following";
                myFollowing.add(targetUid);
                await set(ref(db, `followers/${targetUid}/${myUid}`), true);
                await set(ref(db, `following/${myUid}/${targetUid}`), true);
            }
        };

    </script>
</body>
</html>
