<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Search - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- VERBOTUBE PREMIUM THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: white; margin: 0; padding: 15px; padding-bottom: 80px; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; position: sticky; top: 0; background: #000; z-index: 100; padding: 5px 0; }
        .back-btn { color: #FFD700; text-decoration: none; font-size: 22px; transition: 0.3s; }
        .back-btn:active { transform: scale(0.8); }
        
        .search-container { 
            flex: 1; position: relative; 
            background: #111; border-radius: 25px; border: 1px solid #222; 
            display: flex; align-items: center; padding: 0 15px; transition: 0.3s;
        }
        .search-bar { 
            width: 100%; padding: 12px; background: transparent; border: none; 
            color: white; outline: none; font-size: 16px; 
        }
        .search-icon { color: #FFD700; font-size: 14px; }
        .search-container:focus-within { border-color: #FFD700; box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }

        h4 { color: #FFD700; margin: 30px 0 15px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        h4::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, #333, transparent); }
        
        /* USER CARD POLISH */
        .user-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #0a0a0a; border-radius: 15px;
            margin-bottom: 12px; border: 1px solid #1a1a1a; transition: 0.3s;
        }
        .user-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .u-pic { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .u-info div:first-child { font-weight: 800; font-size: 15px; color: #fff; }
        .u-info div:last-child { color: #555; font-size: 11px; text-transform: uppercase; font-weight: 700; }

        .f-btn { padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 800; cursor: pointer; border: none; min-width: 90px; transition: 0.3s; text-transform: uppercase; }
        .btn-follow { background: #FFD700; color: black; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2); }
        .btn-following { background: transparent; color: #FFD700; border: 1.5px solid #FFD700; }

        /* VIDEO GRID (BLACKBLAZE OPTIMIZED) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .vid-card { 
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 12px; overflow: hidden; cursor: pointer; 
            border: 1px solid #1a1a1a; background: #0a0a0a; transition: 0.3s;
        }
        .vid-card:active { transform: scale(0.97); }
        .vid-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .vid-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 12px; pointer-events: none;
        }
        .vid-caption { font-size: 12px; color: #fff; margin-bottom: 8px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 0 1px 3px #000; }
        .vid-user { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #FFD700; font-weight: 700; }
        .vid-user img { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #FFD700; object-fit: cover; }
        
        .empty-state { text-align: center; margin-top: 60px; color: #333; }
        .empty-state i { font-size: 40px; margin-bottom: 15px; display: block; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-bar" id="search" placeholder="Search Gamers or Clips..." onkeyup="doSearch()">
        </div>
    </div>
    
    <div id="results">
        <div class="empty-state">
            <i class="fas fa-broadcast-tower"></i>
            <p>Scanning Verbo Transmissions...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null;
        let myFollowing = new Set(); 

        onAuthStateChanged(auth, user => {
            if(user) {
                myUid = user.uid;
                loadMyFollowing();
                loadTrending(); 
            } else { window.location.href = 'login'; }
        });

        function loadMyFollowing() {
            onValue(ref(db, `following/${myUid}`), snap => {
                myFollowing.clear();
                if(snap.exists()) Object.keys(snap.val()).forEach(key => myFollowing.add(key));
            });
        }

        function cleanText(str) {
            if(!str) return "";
            return str.normalize("NFKC").toLowerCase().replace(/[^a-z0-9]/g, ""); 
        }

        function loadTrending() {
            onValue(ref(db, 'gameplay_clips'), snap => {
                const res = document.getElementById('results');
                res.innerHTML = "<h4><i class='fas fa-fire'></i> Trending Gameplay</h4><div class='grid' id='trendGrid'></div>";
                const grid = document.getElementById('trendGrid');
                
                if(snap.exists()) {
                    let vids = Object.entries(snap.val()).map(([key, val]) => ({ key, ...val }));
                    vids.sort((a,b) => b.timestamp - a.timestamp);
                    vids.slice(0, 10).forEach(v => renderVideoCard(v, grid));
                } else {
                    res.innerHTML = "<p style='color:#555; text-align:center;'>No clips detected on the network.</p>";
                }
            }, {onlyOnce: true});
        }

        function renderVideoCard(v, container) {
            const div = document.createElement('div');
            div.className = 'vid-card';
            // Blackblaze optimized loading with thumbnail seek
            div.innerHTML = `
                <video src="${v.videoUrl}#t=0.1" muted onmouseover="this.play()" onmouseout="this.pause()" playsinline loop></video>
                <div class="vid-overlay">
                    <div class="vid-caption">${v.caption || 'Gameplay Moment'}</div>
                    <div class="vid-user">
                        <img src="icon.png" id="v-pic-${v.key}">
                        <span>@${v.uploader}</span>
                    </div>
                </div>
            `;
            div.onclick = () => window.location.href = `index?v=${v.key}`;
            container.appendChild(div);

            // Sync Profile Pictures
            get(ref(db, `users/${v.uid}`)).then(uSnap => {
                if(uSnap.exists()) {
                    const u = uSnap.val();
                    if(u.photo) document.getElementById(`v-pic-${v.key}`).src = u.photo;
                }
            });
        }

        window.doSearch = () => {
            const rawQ = document.getElementById('search').value;
            const q = cleanText(rawQ); 
            const res = document.getElementById('results');
            
            if(rawQ.length === 0) { loadTrending(); return; }
            if(rawQ.length < 2) return;

            res.innerHTML = ""; 

            // USER SEARCH LOGIC
            onValue(ref(db, 'users'), snap => {
                let userHTML = "";
                let foundUser = false;
                snap.forEach(c => {
                    const u = c.val();
                    const uNameClean = cleanText(u.username);
                    if(uNameClean.includes(q) || (u.username && u.username.toLowerCase().includes(rawQ.toLowerCase()))) {
                        foundUser = true;
                        const isFollowing = myFollowing.has(c.key);
                        const isMe = (c.key === myUid);
                        let btnHtml = isMe ? "" : `<button class="f-btn ${isFollowing ? 'btn-following' : 'btn-follow'}" onclick="toggleFollow('${c.key}', this)">${isFollowing ? 'Following' : 'Follow'}</button>`;

                        userHTML += `
                            <div class="user-item">
                                <div class="user-left" onclick="window.location.href='profile?uid=${c.key}'">
                                    <img src="${u.photo || 'icon.png'}" class="u-pic">
                                    <div class="u-info">
                                        <div>${u.username}</div>
                                        <div>Gamer Profile</div>
                                    </div>
                                </div>
                                ${btnHtml}
                            </div>
                        `;
                    }
                });
                if(foundUser) res.innerHTML += "<h4><i class='fas fa-user-circle'></i> Players Found</h4><div>" + userHTML + "</div>";
            }, {onlyOnce: true});

            // VIDEO SEARCH LOGIC (BLACKBLAZE SYNCED)
            onValue(ref(db, 'gameplay_clips'), snap => {
                const vidContainer = document.createElement('div');
                vidContainer.className = 'grid';
                let foundVideo = false;
                snap.forEach(c => {
                    const v = c.val();
                    const vCapClean = cleanText(v.caption);
                    if(vCapClean.includes(q) || (v.caption && v.caption.toLowerCase().includes(rawQ.toLowerCase()))) {
                        foundVideo = true;
                        renderVideoCard({ key: c.key, ...v }, vidContainer);
                    }
                });
                if(foundVideo) {
                    const title = document.createElement('h4'); 
                    title.innerHTML = "<i class='fas fa-video'></i> Clipped Moments";
                    res.appendChild(title);
                    res.appendChild(vidContainer);
                }
            }, {onlyOnce: true});
        };

        window.toggleFollow = async (targetUid, btn) => {
            const isFollowing = btn.classList.contains('btn-following');
            if(isFollowing) {
                btn.className = "f-btn btn-follow"; btn.innerText = "Follow";
                myFollowing.delete(targetUid);
                await remove(ref(db, `followers/${targetUid}/${myUid}`));
                await remove(ref(db, `following/${myUid}/${targetUid}`));
            } else {
                btn.className = "f-btn btn-following"; btn.innerText = "Following";
                myFollowing.add(targetUid);
                await set(ref(db, `followers/${targetUid}/${myUid}`), true);
                await set(ref(db, `following/${myUid}/${targetUid}`), true);
            }
        };
    </script>
</body>
</html>
