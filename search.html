<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - Verbotube</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- VERBOTUBE THEME --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .back-btn { color: #FFD700; text-decoration: none; font-size: 24px; }
        
        /* Search Bar */
        .search-container { 
            flex: 1; position: relative; 
            background: #111; border-radius: 25px; border: 1px solid #333; 
            display: flex; align-items: center; padding: 0 15px; 
        }
        .search-bar { 
            width: 100%; padding: 12px; background: transparent; border: none; 
            color: white; outline: none; font-size: 16px; 
        }
        .search-icon { color: #888; }
        .search-container:focus-within { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* Section Titles */
        h4 { color: #FFD700; margin: 25px 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* --- PRO USER CARD (With Follow Btn) --- */
        .user-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #111; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #222; transition: 0.2s;
        }
        .user-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .u-pic { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; }
        .u-info div:first-child { font-weight: bold; font-size: 15px; }
        .u-info div:last-child { color: #888; font-size: 12px; }

        /* Follow Button Styles */
        .f-btn { padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; min-width: 80px; }
        .btn-follow { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; }
        .btn-following { background: #000; color: #FFD700; border: 1px solid #FFD700; }

        /* --- TIKTOK STYLE VIDEO GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .vid-card { 
            position: relative; width: 100%; aspect-ratio: 9/16; 
            border-radius: 10px; overflow: hidden; cursor: pointer; 
            border: 1px solid #222;
        }
        .vid-card video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay Gradient */
        .vid-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 10px; pointer-events: none;
        }
        .vid-caption { font-size: 12px; color: white; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 2px black; }
        .vid-user { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; }
        .vid-user img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #FFD700; }

    </style>
</head>
