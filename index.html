<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Verbotube - Home</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; height: 100svh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        
        #app-frame { width: 100%; height: 100%; max-width: 480px; background: #000; position: relative; overflow: hidden; }
        
        /* --- HEADER --- */
        header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: env(safe-area-inset-top) 15px 25px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .tab-group { display: flex; gap: 20px; margin: 0 auto; }
        .tab-btn { font-weight: 700; font-size: 17px; cursor: pointer; color: rgba(255,255,255,0.6); }
        .tab-btn.active { color: #FFD700; border-bottom: 3px solid #FFD700; padding-bottom: 4px; }

        /* --- FEED --- */
        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { width: 100%; height: 100svh; position: relative; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- SIDEBAR --- */
        .sidebar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 40; }
        .sidebar-pic { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #FFD700; background: #333; }
        .action-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn i { font-size: 32px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        .action-btn span { font-size: 12px; font-weight: 600; margin-top: 4px; }
        .music-disc { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle, #333 20%, #111 100%); border: 8px solid rgba(255,255,255,0.2); animation: discSpin 5s linear infinite; }
        @keyframes discSpin { 100% { transform: rotate(360deg); } }

        /* --- INFO --- */
        .video-info { position: absolute; bottom: 100px; left: 15px; width: 75%; z-index: 30; pointer-events: none; }
        .username { font-weight: 800; font-size: 17px; color: #FFD700; margin-bottom: 5px; pointer-events: auto; }
        .caption { font-size: 14px; color: #f1f1f1; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* --- PROGRESS BAR --- */
        .prog-container { position: absolute; bottom: 65px; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 100; }
        .prog-bar { height: 100%; background: #FFD700; width: 0%; transition: 0.1s; }

        /* --- NAV --- */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: rgba(255,255,255,0.6); display: flex; flex-direction: column; align-items: center; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        /* --- HEART POP --- */
        .dt-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #FF0050; z-index: 200; pointer-events: none; opacity: 0; }
        .heart-active { animation: heartPop 0.8s forwards; }
        @keyframes heartPop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.2; opacity: 1; } 100% { scale: 1.5; opacity: 0; } }
    </style>
</head>
<body>

<div id="app-frame">
    <header>
        <div class="tab-group">
            <div class="tab-btn">Following</div>
            <div class="tab-btn active">For You</div>
        </div>
    </header>

    <div class="feed-container" id="feed">
        <div class="video-card" onclick="handleVideoClick(this)">
            <video src="video1.mp4" loop playsinline></video>
            <div class="dt-heart"><i class="fas fa-heart"></i></div>
            
            <div class="sidebar">
                <div class="sidebar-pic"></div>
                <button class="action-btn" onclick="toggleLike(this)"><i class="fas fa-heart"></i><span>1.2M</span></button>
                <button class="action-btn"><i class="fas fa-comment"></i><span>45K</span></button>
                <button class="action-btn"><i class="fas fa-share"></i><span>10K</span></button>
                <div class="music-disc"></div>
            </div>

            <div class="video-info">
                <div class="username">@paradox_studio</div>
                <div class="caption">Verbotube is finally live! No more offline nodes. 🚀 #verbotube #ghost</div>
            </div>
        </div>
    </div>

    <div class="prog-container"><div class="prog-bar" id="pBar"></div></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="discover.html" class="nav-item"><i class="fas fa-search"></i>Discover</a>
        <a href="upload.html" class="nav-item"><i class="fas fa-plus-square" style="font-size:30px; color:#fff;"></i></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-envelope"></i>Inbox</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Me</a>
    </nav>
</div>

<script>
    const feed = document.getElementById('feed');
    let lastTap = 0;

    function handleVideoClick(card) {
        const video = card.querySelector('video');
        const heart = card.querySelector('.dt-heart');
        const now = Date.now();
        const DOUBLE_PRESS_DELAY = 300;

        if (now - lastTap < DOUBLE_PRESS_DELAY) {
            heart.classList.add('heart-active');
            setTimeout(() => heart.classList.remove('heart-active'), 800);
            // Optional: Auto-like the button too
            const likeBtn = card.querySelector('.fa-heart');
            likeBtn.style.color = '#FF0050';
        } else {
            if (video.paused) video.play();
            else video.pause();
        }
        lastTap = now;
    }

    function toggleLike(btn) {
        const icon = btn.querySelector('i');
        icon.style.color = icon.style.color === 'rgb(255, 0, 80)' ? '#fff' : '#FF0050';
    }

    feed.addEventListener('scroll', () => {
        const cards = document.querySelectorAll('.video-card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const video = card.querySelector('video');
            if (rect.top >= -50 && rect.top < window.innerHeight / 2) {
                video.play();
                video.ontimeupdate = () => {
                    const prog = (video.currentTime / video.duration) * 100;
                    document.getElementById('pBar').style.width = prog + '%';
                };
            } else {
                video.pause();
            }
        });
    });
</script>

</body>
</html>
