<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParaVideo - Home</title>
    <meta name="google-site-verification" content="P-k91lzb4kFrII5FrhlUCLdlr8AlGuVd83VlLeFXQTA" />
    <link rel="icon" href="https://ibb.co/ZsDDGHQ">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Same as before, just added HD tag styling */
        * { box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        @media (min-width: 768px) {
            body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
            #appScreen { width: 100%; max-width: 450px; height: 100vh; background: #000; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; overflow: hidden; }
            header, .comments-modal, .modal { max-width: 450px; left: 50% !important; transform: translateX(-50%); }
        }
        header { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 10px 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 20px; font-weight: bold; color: white; }
        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Fixed HD Tag: Glowing Green */
        .hd-tag { position: absolute; top: 75px; left: 15px; background: rgba(0,255,0,0.1); color: #00FF00; border: 1.5px solid #00FF00; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 10; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }

        .video-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #8a2be2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; z-index: 5; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; outline: none; }
        .liked { color: #ff0055 !important; }
        .video-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; padding-bottom: 40px; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        .feed-profile-pic { width: 35px; height: 35px; border-radius: 50%; border: 1px solid white; object-fit: cover; }
        
        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 95%; max-width: 420px; padding: 20px; border-radius: 15px; border: 1px solid #8a2be2; text-align: center; }
        .btn-main { width: 100%; background: #8a2be2; border: none; padding: 12px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="appScreen">
        <header>
            <div class="top-row">
                <div class="header-logo">PARA<span style="color:#8a2be2;">VIDEO</span></div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <i class="fas fa-plus-square" onclick="window.openUpload()" style="font-size:26px; cursor:pointer;"></i>
                    <i class="fas fa-search" onclick="window.location.href='search.html'" style="font-size:20px; cursor:pointer;"></i>
                    <img src="" id="myPic" onclick="window.location.href='profile.html'" style="width:32px; height:32px; border-radius:50%; border:2px solid #8a2be2; cursor:pointer;">
                </div>
            </div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; color:#555; margin-top:50vh;">Loading ParaVideo HD Feed...</p>
        </div>

        <div id="uploadModal" class="modal">
            <div class="modal-content">
                <span style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:20px;" onclick="window.closeUpload()">&times;</span>
                <h3 style="color:#8a2be2; margin-top:0;">Create Post</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button id="galTab" class="btn-main" style="flex:1; margin-top:0;" onclick="window.switchTab('gallery')">Gallery</button>
                    <button id="camTab" class="btn-main" style="flex:1; margin-top:0; background:#333;" onclick="window.switchTab('camera')">Camera</button>
                </div>
                <div id="gallery-section"><input type="file" id="videoFile" accept="video/*" style="color:white; width:100%;"></div>
                <div id="camera-section" style="display:none;">
                    <video id="camera-preview" autoplay muted playsinline style="width:100%; height:180px; background:black; border-radius:10px; margin-bottom:10px;"></video>
                    <div id="recBtn" style="width:40px; height:40px; background:red; border-radius:50%; margin:0 auto; cursor:pointer; border:2px solid white;" onclick="window.toggleRecording()"></div>
                </div>
                <input type="text" id="caption" placeholder="Caption..." style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:5px; margin-top:10px;">
                <input type="text" id="ytLink" placeholder="YouTube Music Link" style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:5px; margin-top:10px;">
                <input type="number" id="startTime" placeholder="Start Time (sec)" style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:5px; margin-top:10px;">
                <div id="progress" style="display:none; width:100%; height:5px; background:#333; margin-top:10px;"><div id="bar" style="height:100%; width:0%; background:#8a2be2;"></div></div>
                <button class="btn-main" id="postBtn" onclick="window.uploadVideo()">UPLOAD HD</button>
            </div>
        </div>

        <div class="comments-modal" id="commentsModal">
             </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; document.getElementById('myPic').src = user.photoURL; loadSmartFeed(); } 
            else { signInWithPopup(auth, new GoogleAuthProvider()); }
        });

        async function loadSmartFeed() {
            const urlParams = new URLSearchParams(window.location.search);
            let targetId = urlParams.get('v') || window.location.hash.replace('#v=', '');
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                const feed = document.getElementById('feed'); feed.innerHTML = "";
                if (!snap.exists()) return;
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v }));
                videos.sort((a, b) => (targetId && a.key === targetId) ? -1 : (targetId && b.key === targetId) ? 1 : b.timestamp - a.timestamp);

                videos.forEach(item => {
                    const div = document.createElement('div'); div.className = "video-card"; div.setAttribute('data-id', item.key);
                    let hdUrl = item.videoUrl.replace("/upload/", "/upload/q_80,w_480/");
                    
                    // --- HD BADGE CHECK ---
                    // Sirf tab dikhega jab isHD database mein TRUE ho
                    const hdBadge = (item.isHD === true) ? `<div class="hd-tag">HD</div>` : "";

                    div.innerHTML = `
                        <div class="video-loader" id="loader-${item.key}"></div>
                        ${hdBadge}
                        <video src="${hdUrl}" loop playsinline class="reel-video" onplaying="document.getElementById('loader-${item.key}').style.display='none'"></video>
                        <div class="sidebar">
                            <button class="action-btn" onclick="window.handleLike('${item.key}')"><i class="fas fa-heart" id="like-icon-${item.key}"></i><span id="like-count-${item.key}">0</span></button>
                            <button class="action-btn" onclick="window.shareVideo('${item.key}')"><i class="fas fa-share"></i></button>
                        </div>
                        <div class="video-info">
                            <div class="user-row"><img src="" id="pic-${item.key}" class="feed-profile-pic"><div class="uploader-name" id="name-${item.key}" onclick="window.location.href='profile.html?uid=${item.uid}'">@${item.uploader}</div></div>
                            <div style="font-size:14px; color:#eee; margin-top:5px;">${item.caption}</div>
                        </div>
                    `;
                    onValue(ref(db, 'users/' + item.uid), (uSnap) => { if(uSnap.exists()) document.getElementById(`pic-${item.key}`).src = uSnap.val().photo || ""; });
                    onValue(ref(db, `gameplay_likes/${item.key}`), s => { document.getElementById(`like-count-${item.key}`).innerText = s.size || 0; document.getElementById(`like-icon-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid)); });
                    feed.appendChild(div);
                });
                setupObserver();
            });
        }

        // --- STRICT QUALITY CHECKER ---
        window.uploadVideo = async () => {
            const file = camFile || document.getElementById('videoFile').files[0];
            if(!file) return alert("Select video");
            
            // 1. File size check (Minimum 500KB to avoid pixelated ones)
            if(file.size < 500000) return alert("❌ Rejected: Video quality is too low!");

            const vid = document.createElement('video'); vid.preload = 'metadata';
            vid.onloadedmetadata = () => {
                const width = vid.videoWidth;
                const height = vid.videoHeight;

                // 2. Resolution Rejector: 360p se kam bilkul mana hai
                if(width < 360 || height < 360) { alert("❌ Rejected: Resolution too low!"); return; }

                // 3. HD Labeler: Sirf 720p (1280x720) ya us se upar HD hai
                const isHD = (width >= 1280 || height >= 720);
                
                const btn = document.getElementById('postBtn'); btn.disabled = true; btn.innerText = "Processing...";
                document.getElementById('progress').style.display = 'block';
                const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
                const xhr = new XMLHttpRequest(); xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
                xhr.upload.onprogress = e => document.getElementById('bar').style.width = (e.loaded/e.total)*100 + "%";
                xhr.onload = async () => {
                    const data = JSON.parse(xhr.responseText);
                    await push(ref(db, 'gameplay_clips'), { videoUrl: data.secure_url, caption: document.getElementById('caption').value, isHD: isHD, musicLink: document.getElementById('ytLink').value, startTime: document.getElementById('startTime').value || 0, uploader: currentUser.displayName, uid: currentUser.uid, timestamp: Date.now() });
                    location.reload();
                }; xhr.send(fd);
            };
            vid.src = URL.createObjectURL(file);
        };

        // --- Observer, Camera & Helper Functions ---
        function setupObserver() { const obs = new IntersectionObserver(entries => { entries.forEach(entry => { const v = entry.target.querySelector('video'); if(entry.isIntersecting) { if(v) v.play(); window.history.replaceState(null, null, `#v=${entry.target.getAttribute('data-id')}`); } else { if(v) v.pause(); } }); }, {threshold: 0.6}); document.querySelectorAll('.video-card').forEach(card => obs.observe(card)); }
        let mediaRecorder, chunks = [], stream, camFile = null;
        window.switchTab = async (tab) => {
            document.getElementById('galTab').style.background = tab === 'gallery' ? '#8a2be2' : '#333';
            document.getElementById('camTab').style.background = tab === 'camera' ? '#8a2be2' : '#333';
            document.getElementById('gallery-section').style.display = tab === 'gallery' ? 'block' : 'none';
            document.getElementById('camera-section').style.display = tab === 'camera' ? 'block' : 'none';
            if(tab === 'camera') { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); document.getElementById('camera-preview').srcObject = stream; } 
            else if(stream) stream.getTracks().forEach(t => t.stop());
        };
        window.toggleRecording = () => { /* Recording logic same as before */ };
        window.openUpload = () => document.getElementById('uploadModal').style.display = 'flex';
        window.closeUpload = () => { document.getElementById('uploadModal').style.display = 'none'; if(stream) stream.getTracks().forEach(t => t.stop()); };
        window.handleLike = (key) => { const r = ref(db, `gameplay_likes/${key}/${currentUser.uid}`); get(r).then(s => s.exists() ? remove(r) : set(r, true)); };
        window.shareVideo = (id) => { const link = `https://paravideo-sand.vercel.app/#v=${id}`; navigator.clipboard.writeText(link).then(() => alert("HD Link Copied!")); };
    </script>
</body>
</html>
