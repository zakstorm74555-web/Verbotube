<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF Shorts - Pakistan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLES (No Changes Here) --- */
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        header { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            padding: 10px 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; 
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; border: none;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: white; text-decoration: none; font-size: 18px; text-shadow: 1px 1px 2px black; }
        .upload-icon { color: #ff0055; font-size: 26px; cursor: pointer; text-shadow: 1px 1px 2px black; }
        
        .search-box { width: 100%; position: relative; }
        .search-box input { 
            width: 100%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); padding: 8px 35px 8px 15px; 
            border-radius: 20px; color: white; outline: none; font-size: 14px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .search-box i { position: absolute; right: 15px; top: 10px; color: #eee; }

        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; border-bottom: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }

        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; text-shadow: 1px 1px 3px black; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 13px; margin-top: 5px; font-weight: bold; }
        .liked { color: #ff0055 !important; }
        
        .video-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; box-sizing: border-box; pointer-events: none; padding-bottom: 40px; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; margin-bottom: 8px; }
        .uploader-name { font-weight: bold; color: white; font-size: 17px; text-shadow: 1px 1px 2px black; cursor: pointer; }
        
        .follow-btn { background: transparent; border: 1px solid white; color: white; font-size: 11px; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .following { background: white; color: black; border: none; }
        .video-caption { font-size: 14px; color: #ddd; text-shadow: 1px 1px 2px black; line-height: 1.4; }

        .modal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 300; justify-content: center; align-items: flex-end; }
        .modal-content { background: #1a1a1a; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; max-height: 80vh; display: flex; flex-direction: column; animation: slideUp 0.3s ease; position: relative; margin: 0 auto; }
        @keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }

        .profile-pic-large { width: 80px; height: 80px; border-radius: 50%; border: 2px solid orange; margin: 0 auto 10px; display:block; object-fit: cover; }
        .profile-name-large { font-size: 22px; font-weight: bold; color: white; text-align: center; }
        .profile-stats { display: flex; justify-content: space-around; background: #222; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .stat-box { text-align: center; } .stat-num { font-size: 18px; font-weight: bold; } .stat-label { font-size: 12px; color: #777; }

        #commentsList { flex: 1; overflow-y: auto; padding-bottom: 10px; margin-top: 10px; }
        .comment-item { display: flex; gap: 10px; font-size: 13px; margin-bottom: 12px; }
        .comment-user { font-weight: bold; color: #aaa; min-width: 60px; }
        .comment-input-area { display: flex; gap: 10px; border-top: 1px solid #333; padding-top: 15px; }
        #commentInput { flex: 1; background: #333; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }

        .upload-center { align-self: center; border-radius: 15px; background: #111; border: 1px solid #333; }
        .file-box { border: 2px dashed #ff0055; padding: 30px; border-radius: 10px; margin: 20px 0; cursor: pointer; text-align: center; color: #aaa; }
        #progressContainer { display: none; width: 100%; background: #333; height: 8px; margin-top: 15px; border-radius: 5px; }
        #progressBar { height: 100%; background: #ff0055; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

    <header>
        <div class="top-row">
            <a href="/home" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <span style="font-weight:bold; letter-spacing:1px; color:white;">FF SHORTS <span style="color:#ff0055;">PK</span></span>
            <div class="upload-icon" onclick="openUploadModal()"><i class="fas fa-plus-square"></i></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterVideos()">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <div class="feed-container" id="feed">
        <p style="text-align:center; color:#555; margin-top:50vh;">Loading Videos...</p>
    </div>

    <div id="profileModal" class="modal" style="align-items: center;">
        <div class="modal-content upload-center">
            <span style="position:absolute; top:15px; right:20px; font-size:24px; cursor:pointer;" onclick="closeProfile()">&times;</span>
            <img src="" id="pModalPic" class="profile-pic-large">
            <div id="pModalName" class="profile-name-large">...</div>
            <div id="pModalBio" style="text-align:center; color:#aaa; font-size:13px; margin-bottom:10px;">...</div>
            <div style="text-align:center;">
                <button id="pModalFollowBtn" class="follow-btn">Follow</button>
            </div>
            <div class="profile-stats">
                <div class="stat-box"><span class="stat-num" id="pFollowers">0</span><span class="stat-label">Followers</span></div>
                <div class="stat-box"><span class="stat-num" id="pVideos">0</span><span class="stat-label">Videos</span></div>
            </div>
        </div>
    </div>

    <div id="commentModal" class="modal">
        <div class="modal-content">
            <div style="text-align:center; font-weight:bold; position:relative;">Comments <span style="position:absolute; right:0; cursor:pointer; font-size:20px;" onclick="closeComments()">&times;</span></div>
            <div id="commentsList"></div>
            <div class="comment-input-area"><input type="text" id="commentInput" placeholder="Add a comment..."><button onclick="postComment()" style="color:#ff0055; background:none; border:none; font-weight:bold; cursor:pointer;">Post</button></div>
        </div>
    </div>
    
    <div id="uploadModal" class="modal" style="align-items: center;">
        <div class="modal-content upload-center">
            <span style="position:absolute; top:15px; right:20px; font-size:24px; cursor:pointer;" onclick="closeUploadModal()">&times;</span>
            <h2 style="color:#ff0055; text-align:center; margin-top:0;">Upload Clip</h2>
            <input type="text" id="vTitle" placeholder="Video Caption..." style="width:100%; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:5px; margin-bottom:10px; box-sizing:border-box;">
            <label for="videoFile" class="file-box" id="fileLabel"><i class="fas fa-video fa-2x"></i><br><br>Tap to Select</label>
            <input type="file" id="videoFile" accept="video/*" style="display:none" onchange="checkVideo(this)">
            <div id="progressContainer"><div id="progressBar"></div></div>
            <p id="statusText" style="text-align:center; font-size:12px; color:orange; margin-top:10px;"></p>
            <button id="uploadBtn" onclick="uploadVideo()" style="width:100%; background:#ff0055; border:none; padding:12px; border-radius:25px; color:white; font-weight:bold; margin-top:10px; display:none;">POST NOW</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // IDs
        const CLOUD_NAME = "dusj0vpsi";
        const UPLOAD_PRESET = "ffpkvideos"; 
        
        const firebaseConfig = { apiKey: "AIzaSyDCyVCpFFlFyfY2EMuZQl9BRryf_LxBYXE", authDomain: "ff-comunity-pk.firebaseapp.com", databaseURL: "https://ff-comunity-pk-default-rtdb.firebaseio.com", projectId: "ff-comunity-pk", storageBucket: "ff-comunity-pk.firebasestorage.app", messagingSenderId: "74176981792", appId: "1:74176981792:web:69307b10580f45d46c0545" };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let selectedFile = null;
        let currentVideoIdForComments = null;
        let allVideosData = []; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                if (!snap.exists() || !snap.val().email) {
                    set(userRef, { username: user.displayName, photo: user.photoURL, email: user.email, bio: "Hi there!", uid: user.uid });
                }
                loadSmartFeed();
            }
        });

        async function loadSmartFeed() {
            const feed = document.getElementById('feed');
            let followedUsers = [];
            if(currentUser) {
                const followsSnap = await get(ref(db, `follows/${currentUser.uid}`));
                if(followsSnap.exists()) followedUsers = Object.keys(followsSnap.val());
            }

            onValue(ref(db, 'gameplay_clips'), (snapshot) => {
                feed.innerHTML = "";
                const data = snapshot.val();
                if (!data) { feed.innerHTML = "<p style='text-align:center; margin-top:50vh; color:#555;'>No videos yet.</p>"; return; }

                let videos = Object.entries(data).map(([key, val]) => ({ key, ...val }));
                videos.sort((a, b) => b.timestamp - a.timestamp);
                allVideosData = videos;
                renderVideos(videos);
            });
        }

        function renderVideos(videoList) {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            videoList.forEach((vid) => {
                const div = document.createElement('div');
                div.className = "video-card";
                
                const isOwner = (vid.email === 'mohsinilyas991@gmail.com');
                const badgeHtml = isOwner ? `<span style="display:inline-flex; align-items:center; gap:3px; margin-left:5px;"><i class="fas fa-check-circle" style="color:#00C2FF; font-size:14px;"></i> <span style="font-size:11px; background:#333; padding:2px 6px; border-radius:10px; color:#ddd;">1.2k Fans</span></span>` : '';

                div.innerHTML = `
                    <video src="${vid.videoUrl}" loop playsinline class="reel-video" data-key="${vid.key}"></video>
                    <div class="sidebar">
                        <button class="action-btn" onclick="handleLike('${vid.key}')"><i class="fas fa-heart" id="like-icon-${vid.key}"></i><span id="like-count-${vid.key}">0</span></button>
                        <button class="action-btn" onclick="openComments('${vid.key}')"><i class="fas fa-comment-dots"></i><span id="comment-count-${vid.key}">0</span></button>
                        
                        <button class="action-btn" onclick="shareVideo('${vid.caption || 'FF Shorts Video'}', '${vid.videoUrl}')">
                            <i class="fas fa-share"></i>
                            <span>Share</span>
                        </button>
                    </div>
                    <div class="video-info">
                        <div class="user-row">
                            <div class="uploader-name" onclick="openProfile('${vid.uid}')">@${vid.uploader}</div>
                            ${badgeHtml}
                            <button class="follow-btn js-follow-${vid.uid}" onclick="toggleFollow('${vid.uid}')">Follow</button>
                        </div>
                        <div class="video-caption">${vid.caption}</div>
                    </div>
                `;
                feed.appendChild(div);
                checkLikeStatus(vid.key); updateCounts(vid.key); checkFollowStatus(vid.uid);
                onValue(ref(db, `gameplay_views/${vid.key}`), (snap) => { 
                    // View count sidebar mein nahi dikhana chahte to ye line hata do, lekin logic chal raha hai
                });
            });
            setupObserver();
        }

        // --- SHARE LOGIC ---
        window.shareVideo = async (title, url) => {
            if (navigator.share) {
                // Mobile - Native Share (WhatsApp, etc.)
                try {
                    await navigator.share({
                        title: 'Watch on FF Shorts!',
                        text: `Check out this video: ${title}`,
                        url: url
                    });
                } catch (err) {
                    console.log('Share closed');
                }
            } else {
                // PC - Copy to Clipboard
                navigator.clipboard.writeText(url).then(() => {
                    alert("Link copied to clipboard! Share it anywhere.");
                }).catch(err => {
                    alert("Could not copy link :(");
                });
            }
        };

        // --- FOLLOWER HACK ---
        window.openProfile = async (targetUid) => {
            const modal = document.getElementById('profileModal');
            modal.style.display = "flex";
            const snap = await get(ref(db, `users/${targetUid}`));
            if(snap.exists()) {
                const uData = snap.val();
                document.getElementById('pModalName').innerText = uData.username || "Unknown";
                document.getElementById('pModalPic').src = uData.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('pModalBio').innerText = uData.bio || "No bio yet.";

                const followersSnap = await get(ref(db, `followers/${targetUid}`));
                let realCount = followersSnap.exists() ? followersSnap.size : 0;
                let displayCount = realCount; 

                if (uData.email === 'mohsinilyas991@gmail.com') {
                    displayCount = realCount + 1200;
                    if (displayCount === 1200) displayCount = "1.2k";
                }
                
                document.getElementById('pFollowers').innerText = displayCount;
                document.getElementById('pVideos').innerText = allVideosData.filter(v => v.uid === targetUid).length;
                
                const fBtn = document.getElementById('pModalFollowBtn');
                fBtn.className = `follow-btn js-follow-${targetUid}`; 
                fBtn.setAttribute('onclick', `toggleFollow('${targetUid}')`);
                checkFollowStatus(targetUid);
            }
        };

        // --- FOLLOW LOGIC ---
        window.toggleFollow = async (targetUid) => {
            if (targetUid === currentUser.uid) return;
            const followRef = ref(db, `follows/${currentUser.uid}/${targetUid}`);
            const followerRef = ref(db, `followers/${targetUid}/${currentUser.uid}`);
            const snap = await get(followRef);
            
            if (snap.exists()) { 
                await remove(followRef); await remove(followerRef); 
            } else { 
                await set(followRef, true); await set(followerRef, true); 
            }
            checkFollowStatus(targetUid);
            
            // Live Update Hack for Admin Profile
            const userSnap = await get(ref(db, `users/${targetUid}`));
            if(userSnap.exists() && userSnap.val().email === 'mohsinilyas991@gmail.com') {
                let currentText = document.getElementById('pFollowers').innerText;
                if (!snap.exists()) { // Adding Follow
                    if (currentText === "1.2k") document.getElementById('pFollowers').innerText = "1201";
                    else document.getElementById('pFollowers').innerText = parseInt(currentText) + 1;
                } else { // Removing Follow
                     let num = parseInt(currentText);
                     if (num === 1201) document.getElementById('pFollowers').innerText = "1.2k";
                     else document.getElementById('pFollowers').innerText = num - 1;
                }
            } else {
                let num = parseInt(document.getElementById('pFollowers').innerText);
                if (!snap.exists()) num++; else num--;
                document.getElementById('pFollowers').innerText = num;
            }
        };

        function checkFollowStatus(targetUid) {
            if (targetUid === currentUser.uid) { document.querySelectorAll(`.js-follow-${targetUid}`).forEach(btn => btn.style.display = 'none'); return; }
            onValue(ref(db, `follows/${currentUser.uid}/${targetUid}`), (snap) => {
                document.querySelectorAll(`.js-follow-${targetUid}`).forEach(btn => {
                    if (snap.exists()) { btn.innerText = "Following"; btn.classList.add('following'); } 
                    else { btn.innerText = "Follow"; btn.classList.remove('following'); }
                });
            });
        }

        // --- UTILS ---
        function setupObserver() {
            const videos = document.querySelectorAll('.reel-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) { video.play().catch(e=>{}); } 
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            videos.forEach(video => { observer.observe(video); video.onclick = () => { if(video.paused) video.play(); else video.pause(); }; });
        }

        window.filterVideos = () => { const query = document.getElementById('searchInput').value.toLowerCase(); const filtered = allVideosData.filter(v => v.caption.toLowerCase().includes(query) || v.uploader.toLowerCase().includes(query)); renderVideos(filtered); }
        window.handleLike = (vidKey) => { const likeRef = ref(db, `gameplay_likes/${vidKey}/${currentUser.uid}`); get(likeRef).then((snap) => snap.exists() ? remove(likeRef) : set(likeRef, true)); }
        function checkLikeStatus(vidKey) { onValue(ref(db, `gameplay_likes/${vidKey}`), (snap) => { document.getElementById(`like-count-${vidKey}`).innerText = snap.size; const icon = document.getElementById(`like-icon-${vidKey}`); if(snap.hasChild(currentUser.uid)) icon.classList.add('liked'); else icon.classList.remove('liked'); }); }
        function updateCounts(vidKey) { onValue(ref(db, `gameplay_comments/${vidKey}`), (snap) => document.getElementById(`comment-count-${vidKey}`).innerText = snap.size); }
        window.openComments = (vidKey) => { currentVideoIdForComments = vidKey; document.getElementById('commentModal').style.display = 'flex'; onValue(ref(db, `gameplay_comments/${vidKey}`), (snap) => { const list = document.getElementById('commentsList'); list.innerHTML = ""; if (!snap.exists()) { list.innerHTML = "<p style='text-align:center; color:#555'>No comments.</p>"; return; } snap.forEach((child) => { const c = child.val(); list.innerHTML += `<div class="comment-item"><div class="comment-user">${c.username}:</div><div class="comment-text">${c.text}</div></div>`; }); list.scrollTop = list.scrollHeight; }); }
        window.postComment = () => { const txt = document.getElementById('commentInput').value; if (txt && currentVideoIdForComments) { get(ref(db, `users/${currentUser.uid}`)).then((snap) => { push(ref(db, `gameplay_comments/${currentVideoIdForComments}`), { username: snap.exists() ? snap.val().username : "User", text: txt, uid: currentUser.uid, time: Date.now() }); document.getElementById('commentInput').value = ""; }); } };
        window.closeComments = () => document.getElementById('commentModal').style.display = 'none';
        window.closeProfile = () => document.getElementById('profileModal').style.display = "none";
        window.openUploadModal = () => { document.getElementById('uploadModal').style.display = 'flex'; document.getElementById('statusText').innerText = ""; document.getElementById('progressBar').style.width = "0%"; document.getElementById('progressContainer').style.display = "none"; document.getElementById('uploadBtn').style.display = "none"; document.getElementById('uploadBtn').disabled = false; };
        window.closeUploadModal = () => document.getElementById('uploadModal').style.display = 'none';

        window.checkVideo = function(input) {
            const file = input.files[0];
            const status = document.getElementById('statusText');
            if (file) {
                if (file.size > 40 * 1024 * 1024) { alert("File > 40MB"); input.value = ""; return; }
                const video = document.createElement('video'); video.preload = 'metadata';
                video.onloadedmetadata = function() { window.URL.revokeObjectURL(video.src); if (video.duration > 61) { alert("Max 60s"); input.value = ""; document.getElementById('uploadBtn').style.display = 'none'; } else { selectedFile = file; document.getElementById('uploadBtn').style.display = 'block'; document.getElementById('fileLabel').innerHTML = `Selected!`; status.innerText = "Ready!"; status.style.color = "lime"; } }
                video.src = URL.createObjectURL(file);
            }
        }
        window.uploadVideo = async function() {
            const title = document.getElementById('vTitle').value; if (!selectedFile || !title) return;
            const btn = document.getElementById('uploadBtn'); const pBar = document.getElementById('progressBar');
            btn.disabled = true; btn.innerText = "Uploading..."; document.getElementById('progressContainer').style.display = 'block';
            const formData = new FormData(); formData.append("file", selectedFile); formData.append("upload_preset", UPLOAD_PRESET);
            try {
                const xhr = new XMLHttpRequest(); xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
                xhr.upload.onprogress = (e) => { if(e.lengthComputable) pBar.style.width = Math.floor((e.loaded/e.total)*100) + '%'; };
                xhr.onload = async () => {
                    if (xhr.status === 200) {
                        const videoUrl = JSON.parse(xhr.responseText).secure_url;
                        let uName = currentUser.displayName; const snap = await get(ref(db, 'users/' + currentUser.uid)); if(snap.exists()) uName = snap.val().username;
                        await push(ref(db, 'gameplay_clips'), { videoUrl: videoUrl, caption: title, uploader: uName, uid: currentUser.uid, email: currentUser.email, timestamp: Date.now() });
                        alert("Uploaded!"); window.closeUploadModal(); location.reload();
                    } else { alert("Cloudinary Error"); btn.disabled = false; }
                }; xhr.send(formData);
            } catch (error) { alert("Error"); btn.disabled = false; }
        }
    </script>
</body>
</html>
