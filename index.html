<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Verbotube - Gold Home</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* design same as previous */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100svh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        #app-frame { width: 100%; height: 100%; max-width: 480px; background: #000; position: relative; overflow: hidden; }
        header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: env(safe-area-inset-top) 15px 25px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .tab-btn { font-weight: 700; font-size: 17px; cursor: pointer; color: rgba(255,255,255,0.6); }
        .tab-btn.active { color: #FFD700; border-bottom: 3px solid #FFD700; padding-bottom: 4px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { width: 100%; height: 100svh; position: relative; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .sidebar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 40; }
        .sidebar-pic { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .action-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn i { font-size: 32px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        .liked { color: #FF0050 !important; }
        .video-info { position: absolute; bottom: 100px; left: 15px; width: 75%; z-index: 30; pointer-events: none; }
        .username { font-weight: 800; font-size: 17px; color: #FFD700; margin-bottom: 5px; pointer-events: auto; }
        .caption { font-size: 14px; color: #f1f1f1; margin-bottom: 10px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .prog-container { position: absolute; bottom: calc(65px + env(safe-area-inset-bottom)); left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); z-index: 100; }
        .prog-bar { height: 100%; background: #FFD700; width: 0%; box-shadow: 0 0 10px #FFD700; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: calc(65px + env(safe-area-inset-bottom)); background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .share-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: #111; z-index: 2000; border-radius: 20px 20px 0 0; padding: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-top: 2px solid #FFD700; }
        .share-friends-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .friend-card { min-width: 70px; text-align: center; cursor: pointer; }
        .friend-card img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #FFD700; margin-bottom: 5px; }
        .dt-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #fff; z-index: 200; pointer-events: none; }
        .dt-heart.active { animation: heartPop 0.8s forwards; }
        @keyframes heartPop { 0% { scale: 0; opacity: 1; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1.6; opacity: 0; } }
    </style>
</head>
<body>
    <div id="app-frame">
        <header>
            <button onclick="window.location.href='download.html'" style="background:#FFD700; border:none; padding:6px 15px; border-radius:6px; font-weight:bold;">GET APP</button>
            <div style="display:flex; gap:20px;">
                <span class="tab-btn active">For You</span>
                <span class="tab-btn" onclick="window.location.href='friends'">Following</span>
            </div>
            <i class="fas fa-search" style="font-size:22px; color:#fff;" onclick="window.location.href='search'"></i>
        </header>

        <div class="feed-container" id="feed"></div>
        <div class="prog-container"><div class="prog-bar" id="prog-master"></div></div>

        <div class="share-sheet" id="ss">
            <div style="font-size: 16px; font-weight: bold; color: #FFD700; margin-bottom: 15px; text-align: center;">Share with Friends</div>
            <div class="share-friends-list" id="share-friends-list"></div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; text-align:center; padding-top:15px; border-top:1px solid #222;">
                <div onclick="shareToApp('whatsapp')"><i class="fab fa-whatsapp" style="font-size:24px; color:#25D366;"></i><br><span style="font-size:10px;">WhatsApp</span></div>
                <div onclick="copyInternalLink()"><i class="fas fa-link" style="font-size:24px; color:#aaa;"></i><br><span style="font-size:10px;">Link</span></div>
                <div onclick="window.open(curV, '_blank')"><i class="fas fa-download" style="font-size:24px; color:#FFD700;"></i><br><span style="font-size:10px;">Save</span></div>
            </div>
            <button onclick="closeSS()" style="width:100%; margin-top:15px; background:#222; color:#fff; border:none; padding:12px; border-radius:10px;">Cancel</button>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home" style="color:#FFD700; font-size:24px;"></i>
            <i class="fas fa-user-friends" style="color:#888; font-size:24px;" onclick="window.location.href='friends'"></i>
            <div style="width:45px; height:30px; background:linear-gradient(to right, #00f2ea, #ff0050); border-radius:10px; display:flex; justify-content:center; align-items:center;" onclick="window.location.href='upload'">
                <div style="background:#fff; width:36px; height:100%; border-radius:8px; display:flex; justify-content:center; align-items:center;"><i class="fas fa-plus" style="color:#000;"></i></div>
            </div>
            <i class="fas fa-comment-alt" style="color:#888; font-size:24px;" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user" style="color:#888; font-size:24px;" onclick="window.location.href='profile'"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, remove, get, push, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null; window.curV = ""; window.curID = "";

        // 🟢 FIX 1: AUTO PERMISSION REQUEST
        async function requestAppPermissions() {
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") console.log("Notification permission granted.");
            }
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic access granted.");
            } catch (err) { console.log("Mic access denied."); }
        }

        onAuthStateChanged(auth, user => { 
            if(user) { 
                currentUser = user; 
                loadVideos(); 
                loadFriendsForShare();
                requestAppPermissions(); // Enter karte hi permissions
                listenForModeration(); // Live Delete listener
            } else { window.location.href='login'; } 
        });

        // 🟢 FIX 2: LIVE NOTIFICATION & AUTO-RELOAD
        function listenForModeration() {
            onValue(ref(db, 'chats'), (snap) => {
                if(!snap.exists()) return;
                snap.forEach(chat => {
                    if(chat.key.includes(currentUser.uid)) {
                        onValue(ref(db, `chats/${chat.key}`), (msgSnap) => {
                            const lastMsg = Object.values(msgSnap.val() || {}).pop();
                            if(lastMsg && lastMsg.type === 'system_alert' && (Date.now() - lastMsg.time < 5000)) {
                                if (Notification.permission === "granted") {
                                    new Notification("Verbotube Moderation", { body: lastMsg.text, icon: 'icon.png' });
                                }
                            }
                        });
                    }
                });
            });
        }

        function loadVideos() {
            const feed = document.getElementById('feed');
            // 🟢 FIX 3: LIVE VIDEO DELETION ON SCREEN
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if(!snap.exists()) return;
                
                let allData = Object.entries(snap.val()).map(([k,v]) => ({key:k, ...v}));
                // Recommended logic: Priority to boosted videos
                let recommended = allData.filter(v => v.recommended).sort((a,b) => b.timestamp - a.timestamp);
                let normal = allData.filter(v => !v.recommended).sort((a,b) => b.timestamp - a.timestamp);
                let data = [...recommended, ...normal];

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    card.id = `card-${item.key}`;
                    card.innerHTML = `
                        <video src="${item.videoUrl}" playsinline loop id="vid-${item.key}"></video>
                        <div class="dt-heart" id="pop-${item.key}"><i class="fas fa-heart"></i></div>
                        <div class="video-info">
                            <div class="username" onclick="window.location.href='profile?uid=${item.uid}'">@${item.uploader}</div>
                            <div class="caption">${item.caption || ''}</div>
                        </div>
                        <div class="sidebar">
                            <img src="icon.png" class="sidebar-pic" id="upic-${item.key}" onclick="window.location.href='profile?uid=${item.uid}'">
                            <div class="action-btn" onclick="handleLike('${item.key}')"><i class="fas fa-heart" id="hrt-${item.key}"></i><span id="lcnt-${item.key}">0</span></div>
                            <div class="action-btn" onclick="openSS('${item.videoUrl}', '${item.key}')"><i class="fas fa-share"></i><span>Share</span></div>
                        </div>`;

                    card.onclick = (e) => {
                        const v = card.querySelector('video');
                        v.paused ? v.play() : v.pause();
                    };
                    feed.appendChild(card);
                    fetchStats(item);
                });
                setupObserver();
            });
        }

        // Previous stats and share functions remain same
        function fetchStats(item) {
            onValue(ref(db, 'users/'+item.uid), s => { if(s.exists()){ document.getElementById(`upic-${item.key}`).src = s.val().photo || 'icon.png'; }});
            onValue(ref(db, `gameplay_likes/${item.key}`), s => { document.getElementById(`lcnt-${item.key}`).innerText = s.size || 0; });
        }

        window.openSS = (u, id) => { window.curV = u; window.curID = id; document.getElementById('ss').style.bottom = "0"; };
        window.closeSS = () => document.getElementById('ss').style.bottom = "-100%";

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(en => {
                    const v = en.target.querySelector('video');
                    const vidID = en.target.id.replace('card-', '');
                    if(en.isIntersecting) { 
                        v.play(); 
                        history.replaceState(null, null, `?v=${vidID}`); 
                        en.target.setAttribute('active','true');
                    } else { v.pause(); en.target.setAttribute('active','false'); }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
