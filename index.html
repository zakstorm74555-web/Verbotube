<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Verbotube - Watch, Create & Share Viral Moments</title>
    <meta name="description" content="Verbotube is the ultimate platform for gaming clips and viral moments.">
    <link rel="icon" type="image/png" href="icon.png?v=17">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        #app-frame { width: 100%; height: 100%; max-width: 450px; background: #000; position: relative; overflow: hidden; }
        
        header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .header-tabs { display: flex; gap: 15px; font-size: 17px; font-weight: bold; color: #888; margin-left: auto; margin-right: auto; }
        .tab-btn.active { color: #FFD700; border-bottom: 2px solid #FFD700; padding-bottom: 5px; } 
        
        .get-app-btn { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; }

        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { width: 100%; height: 100%; position: relative; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 4px solid rgba(255, 215, 0, 0.3); border-top: 4px solid #FFD700; border-radius: 50%; width: 40px; height: 40px; animation: spin-load 1s linear infinite; display: none; z-index: 10; }
        @keyframes spin-load { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Sidebar Spacing Fix */
        .sidebar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 30; }
        .profile-pic-container { position: relative; margin-bottom: 5px; cursor: pointer; }
        .sidebar-pic { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #FFD700; }
        .follow-plus { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: #FFD700; color: #000; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid #000; }
        .followed { display: none; }
        
        .action-btn { background: none; border: none; color: white; font-size: 30px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn span { font-size: 12px; margin-top: 4px; font-weight: 600; }
        .liked { color: #FF0000 !important; }

        .video-info { position: absolute; bottom: 70px; left: 15px; width: 75%; z-index: 20; pointer-events: none; }
        .username { font-weight: bold; font-size: 17px; margin-bottom: 8px; color: #FFD700; pointer-events: auto; }
        .caption { font-size: 14px; color: #eee; margin-bottom: 10px; }
        
        .music-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #FFD700; margin-top: 5px; }

        /* Remix Music Disc Animation */
        .music-disc-btn { width: 48px; height: 48px; border-radius: 50%; background: #222; border: 8px solid #333; animation: spin 4s linear infinite; background-size: cover; cursor: pointer; margin-top: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .prog-container { position: absolute; bottom: 62px; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.2); cursor: pointer; z-index: 100; }
        .prog-bar { height: 100%; background: #FFD700; width: 0%; pointer-events: none; }

        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; color: rgba(255,215,0,0.4); opacity: 0; pointer-events: none; z-index: 15; }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="app-frame">
        <header>
            <button class="get-app-btn" onclick="window.location.href='download.html'">Get App</button>
            <div class="header-tabs">
                <span class="tab-btn active">For You</span>
                <span onclick="window.location.href='friends'">Following</span>
            </div>
            <i class="fas fa-search" style="color:#fff; font-size:20px;" onclick="window.location.href='search'"></i>
        </header>

        <div class="feed-container" id="feed"></div>

        <div class="bottom-nav">
            <i class="fas fa-home" style="color:#FFD700; font-size:22px;"></i>
            <i class="fas fa-user-friends" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <div style="width:45px; height:30px; background:linear-gradient(135deg,#FFD700,#FF0000); border-radius:8px; display:flex; justify-content:center; align-items:center; border: 2px solid #fff;" onclick="window.location.href='upload'">
                <i class="fas fa-plus" style="color:#000; font-size:16px;"></i>
            </div>
            <i class="fas fa-comment-alt" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user" style="color:#888; font-size:22px;" onclick="window.location.href='profile'"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => { if (user) { currentUser = user; loadVideos(); } else { window.location.href = 'login'; } });

        function loadVideos() {
            const feed = document.getElementById('feed');
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if (!snap.exists()) return;
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })).sort((a, b) => b.timestamp - a.timestamp);

                videos.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    const hasRemix = (item.remixUrl && item.remixUrl !== "");

                    div.innerHTML = `
                        <div class="loading-spinner" id="loader-${item.key}"></div>
                        <video src="${item.videoUrl}" playsinline loop id="vid-${item.key}" ${hasRemix ? 'muted' : ''}></video>
                        ${hasRemix ? `<audio src="${item.remixUrl}" id="aud-${item.key}" loop></audio>` : ''}
                        
                        <div class="prog-container" onclick="seek(event, '${item.key}')">
                            <div class="prog-bar" id="pb-${item.key}"></div>
                        </div>

                        <div class="play-icon" id="play-icon-${item.key}"><i class="fas fa-play"></i></div>
                        
                        <div class="video-info">
                            <div class="username" id="name-${item.key}" onclick="window.location.href='profile?uid=${item.uid}'">${item.uploader || 'user'}</div>
                            <div class="caption">${item.caption || ''}</div>
                            <div class="music-info"><i class="fas fa-music"></i> <span>${hasRemix ? 'Verbotube Remix' : 'Original sound - ' + item.uploader}</span></div>
                        </div>

                        <div class="sidebar">
                            <div class="profile-pic-container" onclick="handleFollow('${item.uid}', '${item.key}')">
                                <img src="icon.png" class="sidebar-pic" id="pic-${item.key}">
                                <div class="follow-plus" id="follow-${item.key}"><i class="fas fa-plus"></i></div>
                            </div>
                            <div class="action-btn" onclick="handleLike('${item.key}')"><i class="fas fa-heart" id="heart-${item.key}"></i><span id="lcnt-${item.key}">0</span></div>
                            <div class="action-btn" onclick="toggleInput('${item.key}')"><i class="fas fa-comment-dots"></i><span id="ccnt-${item.key}">0</span></div>
                            <div class="action-btn" onclick="navigator.share({url:'${item.videoUrl}'})"><i class="fas fa-share"></i><span>Share</span></div>
                            <div class="music-disc-btn" id="disc-${item.key}" onclick="window.location.href='upload?sound=${encodeURIComponent(item.remixUrl || item.videoUrl)}'"></div>
                        </div>
                    `;

                    const v = div.querySelector('video'), a = div.querySelector('audio'), pIcon = div.querySelector('.play-icon'), ldr = div.querySelector('.loading-spinner');
                    
                    v.onwaiting = () => { ldr.style.display = 'block'; if(a) a.pause(); };
                    v.onplaying = () => { ldr.style.display = 'none'; if(a) a.play(); };

                    div.addEventListener('click', (e) => {
                        if(e.target.closest('.sidebar') || e.target.closest('.prog-container')) return;
                        if(v.paused) { v.play(); if(a) a.play(); pIcon.style.opacity = 0; } 
                        else { v.pause(); if(a) a.pause(); pIcon.style.opacity = 1; }
                    });

                    v.ontimeupdate = () => {
                        const bar = document.getElementById(`pb-${item.key}`);
                        if(bar) bar.style.width = (v.currentTime / v.duration) * 100 + "%";
                    };

                    feed.appendChild(div);
                    loadSidebarData(item);
                });
                setupObserver();
            });
        }

        window.handleFollow = (targetUid, k) => {
            if(!currentUser) return;
            const r = ref(db, `following/${currentUser.uid}/${targetUid}`);
            get(r).then(s => { if(s.exists()) remove(r); else set(r, true); });
        };

        function loadSidebarData(item) {
            onValue(ref(db, 'users/' + item.uid), u => { if(u.exists()){ 
                const d = u.val();
                document.getElementById(`pic-${item.key}`).src = d.photo || "icon.png";
                document.getElementById(`disc-${item.key}`).style.backgroundImage = `url('${d.photo || "icon.png"}')`;
                document.getElementById(`name-${item.key}`).innerText = d.username || item.uploader;
            }});
            if(currentUser) {
                onValue(ref(db, `following/${currentUser.uid}/${item.uid}`), s => {
                    const f = document.getElementById(`follow-${item.key}`);
                    if(s.exists()) f.classList.add('followed'); else f.classList.remove('followed');
                });
            }
            onValue(ref(db, `gameplay_likes/${item.key}`), s => {
                document.getElementById(`lcnt-${item.key}`).innerText = s.size || 0;
                if(currentUser) document.getElementById(`heart-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid));
            });
            onValue(ref(db, `gameplay_clips/${item.key}/comments`), s => {
                document.getElementById(`ccnt-${item.key}`).innerText = s.size || 0;
            });
        }

        window.seek = (e, k) => {
            const v = document.getElementById(`vid-${k}`), a = document.getElementById(`aud-${k}`);
            const rect = e.currentTarget.getBoundingClientRect();
            const time = ((e.clientX - rect.left) / rect.width) * v.duration;
            v.currentTime = time; if(a) a.currentTime = time;
        };

        window.handleLike = (k) => { const r = ref(db, `gameplay_likes/${k}/${currentUser.uid}`); get(r).then(s => s.exists() ? remove(r) : set(r, true)); };

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(en => {
                    const v = en.target.querySelector('video'), a = en.target.querySelector('audio'), pIcon = en.target.querySelector('.play-icon');
                    if (en.isIntersecting) { v.play().catch(()=>{}); if(a) a.play().catch(()=>{}); pIcon.style.opacity = 0; } 
                    else { v.pause(); if(a) a.pause(); pIcon.style.opacity = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-card').forEach(x => obs.observe(x));
        }
    </script>
</body>
</html>
