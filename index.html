<style>
    /* HD Badge Style */
    .hd-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.6);
        color: #00FF00; /* Green HD Text */
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
        border: 1px solid #00FF00;
        z-index: 10;
        pointer-events: none;
        display: none; /* Sirf HD videos par dikhega */
    }
</style>

<script type="module">
    // ... (Firebase initialization same as before)

    async function loadSmartFeed() {
        // ... (Sorting logic same as before)
        
        videos.forEach(item => {
            const div = document.createElement('div');
            div.className = "video-card";
            div.setAttribute('data-id', item.key);
            
            // HD Check: Agar video ki width 720p se zyada hai (Cloudinary meta data se check ho sakta hai)
            // Filhal hum size ya caption se "HD" detect kar sakte hain ya user input se
            const isHD = item.quality === 'hd' || item.isHD === true;

            div.innerHTML = `
                <div class="video-loader" id="loader-${item.key}"></div>
                <div class="hd-badge" id="hd-${item.key}" style="${isHD ? 'display:block;' : ''}">HD</div>
                <video src="${item.videoUrl.replace("/upload/", "/upload/q_80,w_720/")}" loop playsinline class="reel-video" onplaying="document.getElementById('loader-${item.key}').style.display='none'"></video>
                <div class="sidebar">
                    <button class="action-btn" onclick="window.handleLike('${item.key}')"><i class="fas fa-heart" id="like-icon-${item.key}"></i><span id="like-count-${item.key}">0</span></button>
                    <button class="action-btn" onclick="window.openComments('${item.key}')"><i class="fas fa-comment-dots"></i></button>
                    <button class="action-btn" onclick="window.shareVideo('${item.key}')"><i class="fas fa-share"></i></button>
                </div>
                <div class="video-info">
                    <div class="user-row">
                        <img src="" id="pic-${item.key}" class="feed-profile-pic">
                        <div class="uploader-name" id="name-${item.key}" onclick="window.location.href='profile.html?uid=${item.uid}'">@${item.uploader}</div>
                    </div>
                    <div style="font-size:14px; color:#eee; margin-top:5px;">${item.caption}</div>
                </div>
            `;
            // ... (Rest of the loop)
        });
    }

    // --- QUALITY CHECKER (Reject dhundla videos) ---
    window.uploadVideo = async () => {
        const fileInput = document.getElementById('videoFile');
        const file = selectedFile || fileInput.files[0];
        if(!file) return alert("Select video first");

        // 1. Size Check: Agar video bohot choti hai (e.g. less than 500KB), to wo dhundli hogi
        if (file.size < 512000) { 
            return alert("⚠️ Video rejected! Ye video bohot dhundli hai. Meharbani karke achi quality wali video upload karein.");
        }

        // 2. Resolution Check (Advanced)
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadedmetadata = async function() {
            window.URL.revokeObjectURL(video.src);
            const width = video.videoWidth;
            const height = video.videoHeight;

            // Reject if less than 360p
            if (width < 360 || height < 360) {
                alert("⚠️ Resolution too low! ParaVideo par dhundli videos allow nahi hain.");
                location.reload();
                return;
            }

            // Mark as HD if 720p+
            const isHD = (width >= 1280 || height >= 720);

            // Continue Upload
            const btn = document.getElementById('postBtn');
            btn.disabled = true; btn.innerText = "Uploading Clear Video...";
            document.getElementById('progress').style.display = 'block';

            const fd = new FormData();
            fd.append("file", file);
            fd.append("upload_preset", UPLOAD_PRESET);
            
            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('bar').style.width = (e.loaded/e.total)*100 + "%";
            
            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: data.secure_url,
                        caption: document.getElementById('caption').value,
                        isHD: isHD, // Database mein save kar rahe hain
                        uploader: currentUser.displayName,
                        uid: currentUser.uid,
                        timestamp: Date.now()
                    });
                    location.reload();
                }
            };
            xhr.send(fd);
        };
        video.src = URL.createObjectURL(file);
    };
</script>
