<html lang="en">
<head>

    <meta name="google-site-verification" content="P-k91lzb4kFrII5FrhlUCLdlr8AlGuVd83VlLeFXQTA" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- STAR MAGIC THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; 
            transform: translateZ(0);
        }

        @media (min-width: 768px) {
            body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
            #appScreen { width: 100%; max-width: 450px; height: 100vh; background: #000; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; overflow: hidden; }
            .bottom-nav { max-width: 450px; left: 50% !important; transform: translateX(-50%); }
        }

        /* HEADER */
        header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            display: flex; justify-content: space-between; align-items: center; pointer-events: auto;
        }
        .header-tabs { display: flex; gap: 20px; font-size: 16px; font-weight: bold; color: #aaa; text-shadow: 1px 1px 2px black; }
        .tab-btn { cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: #FFD700; border-bottom: 2px solid #FFD700; padding-bottom: 3px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .search-icon { font-size: 20px; cursor: pointer; color: white; }
        .auth-btn-header { font-size: 12px; background: #222; padding: 5px 12px; border-radius: 20px; border: 1px solid #FFD700; color: #FFD700; cursor: pointer; display: none; }

        /* FEED */
        .feed-container { 
            width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scroll-behavior: auto; -webkit-overflow-scrolling: touch; 
            padding-bottom: 60px; 
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .video-card { 
            background: #000; width: 100%; height: 100vh; position: relative; 
            scroll-snap-align: start; display: flex; align-items: center; justify-content: center; overflow: hidden; 
            will-change: transform; 
        }
        
        video { width: 100%; height: 100%; object-fit: contain; background: #000; transform: translateZ(0); }
        
        /* ✅ LOADING SPINNER (New) */
        .loader-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 15; display: none; /* Hidden by default */
            pointer-events: none;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #FFD700; /* Gold Color */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* FILTERS */
        .f-normal { filter: none; }
        .f-vivid { filter: contrast(1.1) saturate(1.2); }
        .f-mono { filter: grayscale(1); }
        .f-dramatic { filter: contrast(1.2) brightness(0.9); }

        /* SEEK BAR */
        .seek-container {
            position: absolute; bottom: 62px; left: 0; width: 100%; z-index: 50; padding: 0 10px;
        }
        .video-seeker {
            width: 100%; -webkit-appearance: none; height: 3px; background: rgba(255,255,255,0.3);
            border-radius: 5px; outline: none; cursor: pointer;
        }
        .video-seeker::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
            background: #FFD700; cursor: pointer; box-shadow: 0 0 5px #FFD700;
        }

        /* SIDEBAR */
        .sidebar { 
            position: absolute; right: 10px; bottom: 170px; 
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
            z-index: 30; text-shadow: 1px 1px 2px black; 
        }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 12px; margin-top: 5px; font-weight: 600; }
        .liked { color: #FF0000 !important; animation: pop 0.3s ease; text-shadow: 0 0 10px rgba(255, 0, 0, 0.6); }
        @keyframes pop { 50% { transform: scale(1.2); } }

        /* INFO */
        .video-info { 
            position: absolute; bottom: 70px; left: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 20px; padding-bottom: 25px; z-index: 20; pointer-events: none; 
        }
        .video-info * { pointer-events: auto; }
        .username { font-weight: bold; font-size: 17px; margin-bottom: 5px; cursor: pointer; text-shadow: 1px 1px 2px black; }
        .caption { font-size: 15px; color: #eee; margin-bottom: 10px; max-width: 75%; line-height: 1.2; text-shadow: 1px 1px 2px black; }
        .music-marquee { display: flex; align-items: center; gap: 10px; font-size: 14px; overflow: hidden; white-space: nowrap; width: 60%; }
        .music-icon-anim { animation: pulse 2s infinite; color: #FFD700; }
        .marquee-track { display: inline-block; animation: marquee 6s linear infinite; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* DISC */
        .disc-area { position: absolute; bottom: 85px; right: 10px; width: 50px; height: 50px; z-index: 35; }
        .disc-bg { 
            width: 100%; height: 100%; border-radius: 50%; background: #111; 
            border: 8px solid #333; display: flex; justify-content: center; align-items: center; 
            animation: spin 5s linear infinite; will-change: transform;
            background-image: url('icon.png'); background-size: cover;
        }
        .playing .disc-bg { animation-play-state: running; }
        .paused .disc-bg { animation-play-state: paused; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* PLAY ICON */
        .touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .play-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 60px; opacity: 0.8; color: #FFD700; 
            pointer-events: none; transition: 0.2s; text-shadow: 0 0 10px rgba(0,0,0,0.5); 
        }

        /* SHARE SHEET */
        .share-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #111; z-index: 2000;
            border-radius: 20px 20px 0 0; padding: 20px; transition: 0.3s; border-top: 2px solid #FFD700;
        }
        .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
        .share-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; cursor: pointer; }
        .share-icon-box { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .s-whatsapp { background: #25D366; }
        .s-copy { background: #333; border: 1px solid #555; }
        .s-download { background: #FFD700; color: black; }
        .close-share { margin-top: 20px; width: 100%; padding: 12px; background: #222; border: none; color: white; border-radius: 10px; font-weight: bold; }

        /* BOTTOM NAV */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: #000; border-top: 1px solid #222; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-item { color: #888; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.6); }
        .add-btn-nav { 
            width: 45px; height: 30px; 
            background: linear-gradient(135deg, #FFD700, #FF0000); 
            border-radius: 8px; display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); 
        }
        .add-btn-nav i { color: black; font-size: 16px; }

    </style>
</head>
<body>

    <div id="appScreen">
        <header>
            <div class="header-tabs">
                <span class="tab-btn active" id="tabForYou" onclick="switchFeed('foryou')">For You</span>
                <span class="tab-btn" id="tabFollowing" onclick="switchFeed('following')">Following</span>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="search-icon" onclick="window.location.href='search'"><i class="fas fa-search"></i></div>
                <div id="authBtn" class="auth-btn-header" onclick="goToLogin()">Login</div>
            </div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; color:#555; margin-top:50vh;">Loading...</p>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home nav-item active"></i>
            <i class="fas fa-user-friends nav-item" onclick="window.location.href='friends'"></i>
            <div class="add-btn-nav" onclick="checkLoginAndUpload()"><i class="fas fa-plus"></i></div>
            <i class="fas fa-inbox nav-item" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user nav-item" onclick="window.location.href='profile'"></i>
        </div>

        <div class="share-sheet" id="shareSheet">
            <h3 style="margin:0; text-align:center; color:#FFD700;">Share to</h3>
            <div class="share-grid">
                <div class="share-item" onclick="shareToWhatsapp()">
                    <div class="share-icon-box s-whatsapp"><i class="fab fa-whatsapp"></i></div>
                    <span>WhatsApp</span>
                </div>
                <div class="share-item" onclick="copyLink()">
                    <div class="share-icon-box s-copy"><i class="fas fa-link"></i></div>
                    <span>Copy Link</span>
                </div>
                <div class="share-item" onclick="downloadVideo()">
                    <div class="share-icon-box s-download"><i class="fas fa-download"></i></div>
                    <span>Save</span>
                </div>
            </div>
            <button class="close-share" onclick="closeShare()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CLOUDINARY CONFIG
        const cl = cloudinary.Cloudinary.new({ cloud_name: 'dusj0vpsi' }); 
        console.log("Cloudinary Connected:", 'dusj0vpsi');

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTab = 'foryou';
        let currentShareUrl = "";
        
        // --- STRICT LOGIN CHECK ---
        onAuthStateChanged(auth, user => {
            if (user) { 
                currentUser = user; 
                loadVideos(); 
            } else {
                window.location.href = 'login';
            }
        });

        // --- NAVIGATION & LINKS ---
        window.goToLogin = () => { window.location.href = 'login'; };
        window.checkLoginAndUpload = () => { currentUser ? window.location.href = 'upload' : window.location.href = 'login'; };

        window.switchFeed = (type) => {
            activeTab = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type === 'foryou' ? 'tabForYou' : 'tabFollowing').classList.add('active');
            loadVideos();
        };

        function loadVideos() {
            const feed = document.getElementById('feed');
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if (!snap.exists()) { feed.innerHTML = "<p style='text-align:center; padding-top:50vh; color:#555;'>No videos found.</p>"; return; }
                
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v }));
                videos.sort((a, b) => b.timestamp - a.timestamp);

                videos.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    div.setAttribute('data-id', item.key);

                    let videoUrl = item.videoUrl;
                    if(item.isHD) videoUrl = videoUrl.replace("/upload/", "/upload/q_80,w_720/"); 
                    
                    const filterClass = item.filter ? `f-${item.filter}` : '';
                    const isRemix = item.remixUrl ? true : false; 
                    
                    div.innerHTML = `
                        <div class="loader-overlay"><div class="spinner"></div></div>

                        <video src="${videoUrl}" class="${filterClass}" playsinline preload="metadata" ${isRemix ? 'muted' : ''}></video>
                        ${isRemix ? `<audio src="${item.remixUrl}"></audio>` : ''}
                        
                        <div class="touch-layer" onclick="togglePlay(this)"></div>
                        <div class="play-icon"><i class="fas fa-play"></i></div>

                        <div class="sidebar">
                            <div class="action-btn" onclick="window.location.href='profile?uid=${item.uid}'">
                                <img src="icon.png" id="pic-${item.key}" style="width:45px; height:45px; border-radius:50%; border:2px solid white;">
                            </div>
                            <button class="action-btn" onclick="handleLike('${item.key}')">
                                <i class="fas fa-heart" id="like-icon-${item.key}"></i>
                                <span id="like-count-${item.key}">0</span>
                            </button>
                            <button class="action-btn" onclick="openShare('${item.videoUrl}')">
                                <i class="fas fa-share"></i>
                                <span>Share</span>
                            </button>
                            <button class="action-btn" onclick="useSound('${item.remixUrl || item.videoUrl}')">
                                <i class="fas fa-compact-disc"></i>
                                <span>Remix</span>
                            </button>
                        </div>

                        <div class="video-info">
                            <div class="username" id="name-${item.key}">...</div>
                            <div class="caption">${item.caption}</div>
                            <div class="music-marquee">
                                <i class="fas fa-music music-icon-anim"></i> 
                                <span class="marquee-track">${item.caption ? item.caption : 'Original Sound'} - ${item.uploader}</span>
                            </div>
                        </div>

                        <div class="seek-container">
                            <input type="range" class="video-seeker" min="0" max="100" value="0" step="0.1" oninput="handleSeek(this)">
                        </div>

                        <div class="disc-area"><div class="disc-bg" id="disc-bg-${item.key}"></div></div>
                    `;

                    // --- VIDEO & AUDIO SYNC LOGIC (REMIX FIX) ---
                    const video = div.querySelector('video');
                    const audio = div.querySelector('audio');
                    const seeker = div.querySelector('.video-seeker');
                    const icon = div.querySelector('.play-icon');
                    const loader = div.querySelector('.loader-overlay');

                    // Function: Show/Hide Loader
                    const handleBuffer = (isLoading) => {
                        if(isLoading) {
                            loader.style.display = 'block';
                            icon.style.opacity = 0; // Hide play icon while loading
                        } else {
                            loader.style.display = 'none';
                        }
                    };

                    // 1. SYNC WAITING EVENTS (Agar ek ruke to dusra bhi ruke)
                    if(audio) {
                        // If Audio Buffers -> Pause Video
                        audio.addEventListener('waiting', () => { video.pause(); handleBuffer(true); });
                        // If Video Buffers -> Pause Audio
                        video.addEventListener('waiting', () => { audio.pause(); handleBuffer(true); });
                        
                        // When Ready -> Resume Both
                        audio.addEventListener('playing', () => { if(video.readyState >= 3) { video.play(); handleBuffer(false); } });
                        video.addEventListener('playing', () => { if(audio.readyState >= 3) { audio.play(); handleBuffer(false); } });
                    } else {
                        // Normal Video Buffering
                        video.addEventListener('waiting', () => handleBuffer(true));
                        video.addEventListener('playing', () => handleBuffer(false));
                    }

                    // 2. SEEK BAR UPDATE & SYNC
                    video.addEventListener('timeupdate', () => {
                        const val = (video.currentTime / video.duration) * 100;
                        seeker.value = val || 0;
                        if(audio && Math.abs(audio.currentTime - video.currentTime) > 0.3) audio.currentTime = video.currentTime;
                    });

                    // 3. STOP ON END (No Loop)
                    video.addEventListener('ended', () => {
                        video.pause(); video.currentTime = 0;
                        if(audio) { audio.pause(); audio.currentTime = 0; }
                        icon.style.opacity = 0.8;
                        div.classList.remove('playing');
                        seeker.value = 0;
                        handleBuffer(false);
                    });

                    onValue(ref(db, 'users/' + item.uid), uSnap => {
                        const u = uSnap.val() || {};
                        const pic = u.photo || "icon.png";
                        document.getElementById(`pic-${item.key}`).src = pic;
                        document.getElementById(`name-${item.key}`).innerText = `${u.username || item.uploader}`;
                        document.getElementById(`disc-bg-${item.key}`).style.backgroundImage = `url('${pic}')`;
                    });

                    onValue(ref(db, `gameplay_likes/${item.key}`), s => {
                        document.getElementById(`like-count-${item.key}`).innerText = s.size || 0;
                        if(currentUser) {
                            document.getElementById(`like-icon-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid));
                        }
                    });

                    feed.appendChild(div);
                });
                setupObserver();
            });
        }

        window.togglePlay = (layer) => {
            const card = layer.parentElement;
            const video = card.querySelector('video');
            const audio = card.querySelector('audio');
            const icon = card.querySelector('.play-icon');

            if (!video.paused) {
                video.pause();
                if(audio) audio.pause();
                icon.style.opacity = 0.8;
                card.classList.remove('playing');
            } else {
                video.play();
                if(audio) { video.muted = true; audio.play(); } 
                icon.style.opacity = 0;
                card.classList.add('playing');
            }
        };

        window.handleSeek = (slider) => {
            const card = slider.closest('.video-card');
            const video = card.querySelector('video');
            const audio = card.querySelector('audio');
            const time = (slider.value / 100) * video.duration;
            video.currentTime = time;
            if(audio) audio.currentTime = time;
        };

        window.handleLike = (key) => {
            const r = ref(db, `gameplay_likes/${key}/${currentUser.uid}`);
            get(r).then(s => s.exists() ? remove(r) : set(r, true));
        };
        
        window.useSound = (url) => window.location.href = `upload?sound=${encodeURIComponent(url)}`;

        window.openShare = (url) => {
            currentShareUrl = url;
            document.getElementById('shareSheet').style.bottom = "0";
        };
        window.closeShare = () => document.getElementById('shareSheet').style.bottom = "-100%";

        window.shareToWhatsapp = () => window.open(`whatsapp://send?text=Check out this video on Star Magic! ${currentShareUrl}`);
        window.copyLink = () => navigator.clipboard.writeText(currentShareUrl).then(() => alert("Link Copied!"));
        window.downloadVideo = async () => {
            alert("Downloading...");
            try {
                const res = await fetch(currentShareUrl);
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = 'starmagic_video.mp4';
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url);
            } catch(e) { window.open(currentShareUrl, '_blank'); }
        };

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const card = entry.target;
                    const video = card.querySelector('video');
                    const audio = card.querySelector('audio');
                    const icon = card.querySelector('.play-icon');
                    
                    if (entry.isIntersecting) {
                        // User interaction needed for autoplay usually
                        // We try to play, if buffering, spinner will show
                        if(audio) { 
                            video.pause(); 
                            icon.style.opacity = 0.8; 
                        } else { 
                            video.play().catch(()=>{}); 
                            icon.style.opacity = 0; 
                        }
                    } else {
                        video.pause();
                        if(audio) audio.pause();
                        icon.style.opacity = 0.8;
                        card.classList.remove('playing');
                    }
                });
            }, { threshold: 0.6 }); 
            document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
