<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Variables - Premium Verbotube Theme */
        :root {
            --bg-color: #f8f9fa;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
            --card-bg: #ffffff;
            --card-hover: #f1f1f1;
            --accent: #FFD700;
            --accent-hover: #e6c200;
            --danger: #ff0000;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --text-main: #f1f1f1;
            --text-muted: #aaaaaa;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-bg: #0f0f0f;
            --card-hover: #1f1f1f;
            --accent: #FFD700;
            --accent-hover: #cca800;
            --danger: #ff4444;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif; 
            height: 100svh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- TOP HEADER --- */
        .top-header {
            width: 100%; height: 65px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 22px; cursor: pointer; letter-spacing: -0.5px; }
        .logo-area img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .search-bar { display: flex; align-items: center; width: 45%; max-width: 650px; background: var(--card-hover); border: 1px solid var(--glass-border); border-radius: 40px; overflow: hidden; transition: 0.3s; }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .search-bar input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: var(--text-main); font-size: 16px; }
        .search-bar button { background: rgba(128,128,128,0.1); border: none; padding: 12px 24px; color: var(--text-main); cursor: pointer; border-left: 1px solid var(--glass-border); transition: 0.2s; }
        .search-bar button:hover { background: rgba(128,128,128,0.2); }

        .header-actions { display: flex; align-items: center; gap: 24px; }
        .header-icon { font-size: 20px; color: var(--text-main); cursor: pointer; transition: transform 0.2s, color 0.2s; }
        .header-icon:hover { color: var(--accent); transform: scale(1.1); }
        .profile-pic { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .profile-pic:hover { border-color: var(--accent); transform: scale(1.05); }

        /* --- MAIN LAYOUT --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar (PC) */
        .vb-nav {
            width: 250px; height: 100%;
            background: var(--bg-color);
            display: flex; flex-direction: column; padding: 20px 12px;
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .nav-item {
            display: flex; align-items: center; gap: 18px;
            padding: 14px 16px; border-radius: 12px;
            color: var(--text-main); font-size: 15px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; margin-bottom: 4px;
        }
        .nav-item:hover { background: var(--card-hover); transform: translateX(4px); }
        .nav-item.active { background: rgba(128,128,128,0.15); font-weight: 700; color: var(--text-main); }
        .nav-item.active i { color: var(--accent); filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4)); }
        .nav-item i { font-size: 22px; width: 28px; text-align: center; }

        .nav-divider { height: 1px; background: var(--glass-border); margin: 16px 0; }

        /* Main Content Area */
        .vb-content { flex: 1; height: 100%; position: relative; overflow: hidden; background: var(--bg-color); }

        .page-view { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 24px; padding-bottom: 120px; animation: fadeIn 0.4s ease; scroll-behavior: smooth; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Filter Chips */
        .filter-chips { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; position: sticky; top: 0; background: var(--bg-color); z-index: 10; padding-top: 5px; }
        .filter-chips::-webkit-scrollbar { display: none; }
        .chip { background: var(--card-hover); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 10px; color: var(--text-main); font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s ease; font-size: 14px; }
        .chip:hover { background: rgba(128,128,128,0.2); transform: translateY(-2px); }
        .chip.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        /* --- VIDEO GRID --- */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 10px; }
        
        .video-card { cursor: pointer; display: flex; flex-direction: column; gap: 14px; border-radius: 16px; transition: 0.3s ease; padding-bottom: 10px; }
        .video-card:hover { transform: translateY(-4px); }
        
        .thumbnail-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
        .thumbnail-container video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .video-card:hover .thumbnail-container video { transform: scale(1.05); }
        
        .duration-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.85); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; backdrop-filter: blur(4px); pointer-events: none; }

        .video-info { display: flex; gap: 14px; align-items: flex-start; padding: 0 4px; }
        .channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; object-fit: cover; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .video-text { display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 16px; font-weight: 700; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { font-size: 14px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .video-stats { font-size: 13px; color: var(--text-muted); }

        /* Loading Spinner */
        .loading-state { width: 100%; padding: 50px; text-align: center; color: var(--text-muted); font-weight: bold; grid-column: 1 / -1; }
        .fa-spin { color: var(--accent); font-size: 24px; margin-bottom: 10px; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .search-bar { display: none; }
            .top-header { padding: 0 16px; height: 60px; }
            .header-actions { gap: 16px; }
            
            .vb-nav {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
                flex-direction: row; justify-content: space-around; align-items: center;
                padding: 0 10px; border-right: none; border-top: 1px solid var(--glass-border);
                z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(20px); overflow-y: hidden;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .nav-item { flex-direction: column; gap: 4px; padding: 8px; margin: 0; border-radius: 8px; width: 60px; }
            .nav-item span { font-size: 11px; font-weight: 500; }
            .nav-item i { font-size: 22px; }
            .nav-item:hover { background: transparent; transform: none; }
            .nav-item.active { background: transparent; color: var(--text-main); transform: scale(1.05); }
            .nav-divider { display: none; }
            
            .page-view { padding: 16px; padding-bottom: 90px; }
            .video-grid { grid-template-columns: 1fr; gap: 24px; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-area" onclick="window.location.reload()">
            <img src="icon.png" alt="Logo">
            <span>Verbotube</span>
        </div>

        <div class="search-bar">
            <input type="text" id="mainSearchInput" placeholder="Search Verbotube...">
            <button id="mainSearchBtn"><i class="fas fa-search"></i></button>
        </div>

        <div class="header-actions">
            <i class="fas fa-search header-icon" style="display: none;" id="mobileSearchIcon" onclick="window.location.href='search.html'"></i>
            <i class="fas fa-video header-icon" onclick="window.location.href='upload.html'" title="Create"></i>
            <i class="fas fa-bell header-icon"></i>
            <img src="icon.png" class="profile-pic" id="myProfilePic" onclick="window.location.href='profile.html'" alt="Profile">
        </div>
    </header>

    <div class="app-body">
        <nav class="vb-nav">
            <div class="nav-item active" onclick="switchView('home', this)">
                <i class="fas fa-home"></i> <span>Home</span>
            </div>
            <div class="nav-item" onclick="switchView('shorts', this)">
                <i class="fas fa-bolt"></i> <span>Shorts</span>
            </div>
            <div class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user-circle"></i> <span>Profile</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-item" onclick="switchView('history', this)">
                <i class="fas fa-history"></i> <span>History</span>
            </div>
            <div class="nav-item" onclick="switchView('settings', this)">
                <i class="fas fa-cog"></i> <span>Settings</span>
            </div>
        </nav>

        <main class="vb-content">
            
            <div id="view-home" class="page-view active">
                <div class="filter-chips">
                    <button class="chip active">All</button>
                    <button class="chip">Gaming</button>
                    <button class="chip">Phonk</button>
                    <button class="chip">Web Development</button>
                    <button class="chip">Live</button>
                </div>

                <div class="video-grid" id="realtime-videos">
                    <div class="loading-state">
                        <i class="fas fa-circle-notch fa-spin"></i><br>
                        Loading Transmissions...
                    </div>
                </div>
            </div>

            <div id="view-shorts" class="page-view">
                <h2 style="margin-bottom: 20px;">Shorts Library</h2>
                <p style="color: var(--text-muted);">Shorts functionality will be linked to short-player.html.</p>
            </div>

            <div id="view-history" class="page-view">
                <h2 style="margin-bottom: 20px; display: flex; justify-content: space-between;">
                    History
                    <i class="fas fa-trash-alt" style="font-size: 18px; color: var(--danger); cursor: pointer;" title="Clear All"></i>
                </h2>
                <p style="color: var(--text-muted);">Your watch history will sync here.</p>
            </div>

            <div id="view-settings" class="page-view">
                <h2 style="margin-bottom: 30px;">Settings</h2>
                <div style="background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight:600; font-size:16px;"><i class="fas fa-moon" style="width: 30px;"></i> Dark Theme</span>
                        <div class="vb-toggle" id="themeToggleBtn" onclick="toggleTheme()" style="width: 50px; height: 26px; background: var(--text-muted); border-radius: 15px; position: relative; cursor: pointer; transition: 0.3s;">
                            <div class="toggle-circle" style="position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s;"></div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", 
            authDomain: "paravideo-1ac3b.firebaseapp.com", 
            databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", 
            projectId: "paravideo-1ac3b", 
            storageBucket: "paravideo-1ac3b.firebasestorage.app", 
            appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Update Profile Pic if logged in
        onAuthStateChanged(auth, user => {
            if(user) {
                get(ref(db, 'users/' + user.uid)).then(snap => {
                    if(snap.exists() && snap.val().photo) {
                        document.getElementById('myProfilePic').src = snap.val().photo;
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        // Search Connection Logic
        const executeSearch = () => {
            let q = document.getElementById('mainSearchInput').value.trim();
            if(q !== "") {
                window.location.href = 'search.html?q=' + encodeURIComponent(q);
            }
        };
        document.getElementById('mainSearchBtn').onclick = executeSearch;
        document.getElementById('mainSearchInput').onkeypress = (e) => {
            if(e.key === 'Enter') executeSearch();
        };

        // Realtime Video Fetching
        onValue(ref(db, 'gameplay_clips'), (snap) => {
            const videoGrid = document.getElementById('realtime-videos');
            videoGrid.innerHTML = "";

            if(!snap.exists()) {
                videoGrid.innerHTML = "<div class='loading-state'>No clips found on network.</div>";
                return;
            }

            let data = Object.entries(snap.val()).map(([k,v]) => ({key:k, ...v}));
            data.sort((a,b) => b.timestamp - a.timestamp); // Newest first

            data.forEach((item) => {
                let userHTML = `<div class="channel-name">${item.uploader || 'User'}</div>`;
                if(item.email === 'elitegamer859650@gmail.com') {
                    userHTML = `<div class="channel-name">${item.uploader} <i class="fas fa-check-circle" style="font-size:12px; color:var(--accent);"></i></div>`;
                }

                let card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => window.location.href = `video-player.html?v=${item.key}`;
                
                // Using video tag directly for auto-play on hover
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <video src="${item.videoUrl}#t=0.1" muted onmouseover="this.play()" onmouseout="this.pause()" playsinline loop></video>
                        <div class="duration-badge">HD</div>
                    </div>
                    <div class="video-info">
                        <img src="icon.png" class="channel-avatar" id="avatar-${item.key}" onclick="event.stopPropagation(); window.location.href='profile.html?uid=${item.uid}'">
                        <div class="video-text">
                            <h3 class="video-title">${item.caption || 'Verbotube Transmission'}</h3>
                            ${userHTML}
                            <div class="video-stats">Verbotube Network</div>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);

                // Fetch Uploader Profile Pic Realtime
                if(item.uid) {
                    get(ref(db, 'users/' + item.uid)).then(uSnap => {
                        if(uSnap.exists() && uSnap.val().photo) {
                            document.getElementById(`avatar-${item.key}`).src = uSnap.val().photo;
                        }
                    });
                }
            });
        });

        // Standard UI Scripts (Mobile Search, Tabs, Theme)
        if (window.innerWidth <= 768) { document.getElementById('mobileSearchIcon').style.display = 'block'; }

        window.switchView = (viewId, navElement) => {
            document.querySelectorAll('.page-view').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.vb-nav .nav-item').forEach(nav => nav.classList.remove('active'));
            if(navElement) navElement.classList.add('active');
        };

        let currentTheme = localStorage.getItem('verbo-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateToggleUI();

        window.toggleTheme = () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('verbo-theme', currentTheme);
            updateToggleUI();
        };

        function updateToggleUI() {
            const toggle = document.getElementById('themeToggleBtn');
            const circle = toggle.querySelector('.toggle-circle');
            if(currentTheme === 'dark') {
                toggle.style.background = 'var(--accent)';
                circle.style.transform = 'translateX(24px)';
            } else {
                toggle.style.background = 'var(--text-muted)';
                circle.style.transform = 'translateX(0)';
            }
        }
    </script>
</body>
</html>
