<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verbotube - home</title>
    
    <link rel="icon" type="image/png" href="icon.png?v=10">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cloudinary-core/2.13.0/cloudinary-core-shrinkwrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #111; color: white; margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #app-frame {
            width: 100%; height: 100%; max-width: 450px; 
            background: #000; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333;
        }

        header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .header-tabs { display: flex; gap: 20px; font-weight: bold; color: #aaa; }
        .tab-btn.active { color: #FFD700; border-bottom: 2px solid #FFD700; }
        .install-btn { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 20px; cursor: pointer; display: none; }

        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { background: #000; width: 100%; height: 100%; position: relative; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .sidebar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 30; text-shadow: 1px 1px 2px black; }
        .action-btn { background: none; border: none; color: white; font-size: 26px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 10px; margin-top: 5px; font-weight: 600; }
        .liked { color: #FF0000 !important; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: #FFD700; opacity: 0; pointer-events: none; z-index: 15; }
        .touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        /* 🔥 USER ID / NAME STYLING 🔥 */
        .video-info { position: absolute; bottom: 20px; left: 0; width: 75%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; z-index: 20; pointer-events: none; padding-bottom: 75px; }
        .username { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #FFD700; pointer-events: auto; }
        .caption { font-size: 14px; margin-bottom: 5px; color: #eee; }

        .music-marquee { display: flex; align-items: center; gap: 10px; font-size: 13px; overflow: hidden; white-space: nowrap; margin-top: 5px; }
        .marquee-track { display: inline-block; animation: marquee 6s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .sponsored-tag { position: absolute; top: 70px; left: 15px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #fff; font-weight: bold; z-index: 50; border: 1px solid rgba(255,255,255,0.3); }
        .ad-cta-strip { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: #1a1a1a; border-top: 1px solid #333; z-index: 40; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .ad-cta-btn { background: #3897f0; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; text-decoration: none; }

        .fun-menu { position: absolute; right: 60px; bottom: 200px; display: none; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 30px; border: 1px solid #FFD700; z-index: 200; }
        .draw-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; touch-action: none; }
        .draw-layer.active { pointer-events: auto; background: rgba(0,0,0,0.3); }
        .palette { position: absolute; top: 50%; right: 60px; transform: translateY(-50%); display: none; flex-direction: column; gap: 15px; background: #222; padding: 15px; border-radius: 20px; z-index: 201; border: 1px solid #FFD700; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; }
        .send-art-btn { background: #FFD700; color: black; border: none; padding: 10px; border-radius: 50%; font-size: 16px; cursor: pointer; }

        .bubble-container { position: absolute; bottom: 150px; left: 10px; display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; z-index: 150; width: 50px; }
        .voice-bubble { width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid #fff; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: pointer; }
        .voice-bubble img { width: 100%; height: 100%; object-fit: cover; }
        .text-comments-area { position: absolute; bottom: 160px; left: 60px; width: 60%; display: flex; flex-direction: column; gap: 5px; pointer-events: none; z-index: 140; }
        .text-bubble { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; font-size: 12px; color: white; }

        .share-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: #111; z-index: 2000; border-radius: 20px 20px 0 0; padding: 20px; transition: 0.3s; border-top: 2px solid #FFD700; }
        .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
        .share-icon-box { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; margin: auto; }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .disc-area { position: absolute; bottom: 90px; right: 10px; width: 45px; height: 45px; z-index: 25; }
        .disc-bg { width: 100%; height: 100%; border-radius: 50%; background: #111; border: 6px solid #222; animation: spin 5s linear infinite; background-size: cover; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .reaction-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .flying-obj { position: absolute; font-size: 40px; z-index: 101; animation: throw 0.6s forwards; }
        .splat-obj { position: absolute; font-size: 60px; z-index: 100; animation: fade 3s forwards; }
        @keyframes throw { 0% { transform: scale(0.2); opacity: 0; } 100% { transform: scale(1.5) rotate(720deg); opacity: 1; } }
        @keyframes fade { 0% { transform: scale(1.5); } 10% { transform: scale(1); } 100% { opacity: 0; transform: translateY(100px); } }

        .comment-input-bar { position: absolute; bottom: 60px; left: 0; width: 100%; background: #111; padding: 10px; display: none; z-index: 300; border-top: 1px solid #333; }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>

    <div id="app-frame">
        <header>
            <div class="header-tabs">
                <span class="tab-btn active" onclick="switchFeed()">For You</span>
                <span class="tab-btn" onclick="window.location.href='friends'">Following</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="installBtn" class="install-btn" onclick="window.location.href='download.html'"><i class="fas fa-download"></i> APP</div>
                <i class="fas fa-search" style="color:white; font-size:20px;" onclick="window.location.href='search'"></i>
            </div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; margin-top:50%;">Loading...</p>
        </div>

        <div class="share-sheet" id="shareSheet">
            <h3 style="margin:0; text-align:center; color:#FFD700;">Share & Save</h3>
            <div class="share-grid">
                <div onclick="shareToWhatsapp()" style="cursor:pointer; color:white;">
                    <div class="share-icon-box" style="background:#25D366;"><i class="fab fa-whatsapp"></i></div>
                    <span style="font-size:12px;">WhatsApp</span>
                </div>
                <div onclick="copyLink()" style="cursor:pointer; color:white;">
                    <div class="share-icon-box" style="background:#333;"><i class="fas fa-link"></i></div>
                    <span style="font-size:12px;">Link</span>
                </div>
                <div onclick="downloadVideo()" style="cursor:pointer; color:white;">
                    <div class="share-icon-box" style="background:#FFD700; color:black;"><i class="fas fa-download"></i></div>
                    <span style="font-size:12px;">Save</span>
                </div>
            </div>
            <button onclick="closeShare()" style="margin-top:20px; width:100%; padding:10px; background:#222; border:none; color:white; border-radius:10px;">Cancel</button>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home" style="color:#FFD700; font-size:22px;"></i>
            <i class="fas fa-user-friends" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <div style="width:40px; height:25px; background:linear-gradient(135deg,#FFD700,#FF0000); border-radius:5px; display:flex; justify-content:center; align-items:center;" onclick="checkLoginAndUpload()">
                <i class="fas fa-plus" style="color:black; font-size:14px;"></i>
            </div>
            <i class="fas fa-inbox" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user" style="color:#888; font-size:22px;" onclick="window.location.href='profile'"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, push, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi";
        let currentUser = null, currentShareUrl = "", ads = [];

        onAuthStateChanged(auth, user => { if (user) { currentUser = user; loadVideos(); } else { window.location.href = 'login'; } });

        window.checkLoginAndUpload = () => { window.location.href = currentUser ? 'upload' : 'login'; };
        window.switchFeed = () => loadVideos();

        function loadVideos() {
            const feed = document.getElementById('feed');
            
            // 🔥 REAL-TIME ADS LISTENER
            onValue(ref(db, 'ads'), (adSnap) => {
                ads = adSnap.exists() ? Object.values(adSnap.val()) : [];
            });

            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if (!snap.exists()) { feed.innerHTML = "<p style='color:#555; margin-top:50%; text-align:center;'>No clips yet.</p>"; return; }
                
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })).sort((a, b) => b.timestamp - a.timestamp);
                let finalList = [], adIndex = 0;

                videos.forEach((v, i) => {
                    finalList.push(v);
                    if ((i + 1) % 3 === 0 && ads.length > 0) {
                        let ad = ads[adIndex % ads.length];
                        if(ad && ad.videoUrl) finalList.push({ ...ad, isAd: true, key: 'ad_' + i + '_' + Date.now() });
                        adIndex++;
                    }
                });

                finalList.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    div.setAttribute('data-id', item.key);
                    if(item.isAd) div.classList.add('is-ad');

                    let videoUrl = item.videoUrl;
                    if(item.isHD && !videoUrl.includes("q_auto")) videoUrl = videoUrl.replace("/upload/", "/upload/q_auto,w_720/");
                    const hasRemix = (item.remixUrl && item.remixUrl !== "");

                    div.innerHTML = `
                        <div class="reaction-container" id="react-area-${item.key}"></div>
                        <canvas id="canvas-${item.key}" class="draw-layer"></canvas>
                        ${item.isAd ? `<div class="sponsored-tag">Sponsored</div><div class="ad-cta-strip"><span>${item.caption.substring(0,20)}...</span><a href="${item.ctaLink}" target="_blank" class="ad-cta-btn">${item.ctaText}</a></div>` : ''}
                        
                        <div class="text-comments-area" id="text-bubbles-${item.key}"></div>
                        <div class="bubble-container" id="voice-bubbles-${item.key}"></div>

                        <video src="${videoUrl}" playsinline loop id="vid-${item.key}" ${hasRemix ? 'muted' : ''}></video>
                        ${hasRemix ? `<audio src="${item.remixUrl}" id="aud-${item.key}"></audio>` : ''}

                        <div class="touch-layer" onclick="togglePlay(this)"></div>
                        <div class="play-icon"><i class="fas fa-play"></i></div>

                        <div class="comment-input-bar" id="input-bar-${item.key}">
                            <input type="text" class="comment-input" id="input-${item.key}" placeholder="Comment...">
                            <i class="fas fa-paper-plane" style="color:#FFD700; margin-left:10px;" onclick="sendTextComment('${item.key}')"></i>
                        </div>

                        ${!item.isAd ? `
                        <div id="fun-menu-${item.key}" class="fun-menu">
                            <div class="fun-item" onclick="throwReaction('${item.key}','tomato')">🍅</div>
                            <div class="fun-item" onclick="throwReaction('${item.key}','egg')">🥚</div>
                            <div class="fun-item" onclick="toggleDrawing('${item.key}')">🖍️</div>
                        </div>
                        <div id="palette-${item.key}" class="palette">
                            <div class="color-dot" style="background:red;" onclick="setPenColor('${item.key}','red')"></div>
                            <div class="color-dot" style="background:#FFD700;" onclick="setPenColor('${item.key}','#FFD700')"></div>
                            <div class="color-dot" style="background:white;" onclick="setPenColor('${item.key}','white')"></div>
                            <button class="send-art-btn" onclick="sendArt('${item.key}')"><i class="fas fa-check"></i></button>
                        </div>
                        <div class="sidebar">
                            <img src="icon.png" id="pic-${item.key}" style="width:40px; height:40px; border-radius:50%; border:2px solid white; cursor:pointer;" onclick="window.location.href='profile?uid=${item.uid}'">
                            <div class="action-btn" onclick="handleLike('${item.key}')"><i class="fas fa-heart" id="like-icon-${item.key}"></i><span id="like-count-${item.key}">0</span></div>
                            <div class="action-btn" onclick="toggleInputBar('${item.key}')"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
                            <div class="action-btn" onmousedown="startVoice(this,'${item.key}')" onmouseup="stopVoice(this,'${item.key}')" ontouchstart="startVoice(this,'${item.key}')" ontouchend="stopVoice(this,'${item.key}')"><i class="fas fa-microphone"></i><span>Voice</span></div>
                            <div class="action-btn" onclick="useSound('${item.remixUrl || item.videoUrl}')"><i class="fas fa-compact-disc"></i><span>Remix</span></div>
                            <div class="action-btn" onclick="toggleFunMenu('${item.key}')"><i class="fas fa-laugh-squint" style="color:#FFD700;"></i><span>Masti</span></div>
                            <div class="action-btn" onclick="openShare('${videoUrl}')"><i class="fas fa-share"></i><span>Share</span></div>
                        </div>
                        ` : ''}

                        <div class="video-info">
                            <div class="username" id="name-${item.key}" onclick="window.location.href='profile?uid=${item.uid}'">@${item.uploader || 'user'}</div>
                            <div class="caption">${item.caption || ''}</div>
                            ${!item.isAd ? `<div class="music-marquee"><i class="fas fa-music" style="color:#FFD700;"></i><span class="marquee-track">${item.caption || 'Original Sound'} - ${item.uploader}</span></div>` : ''}
                        </div>
                        ${!item.isAd ? `<div class="disc-area"><div class="disc-bg" id="disc-bg-${item.key}"></div></div>` : ''}
                    `;

                    // Listeners for Video Card
                    if(!item.isAd) {
                        onValue(ref(db, 'users/' + item.uid), u => { if(u.exists()) { 
                            const val = u.val();
                            const p = val.photo || "icon.png"; 
                            document.getElementById(`pic-${item.key}`).src = p; 
                            document.getElementById(`disc-bg-${item.key}`).style.backgroundImage = `url('${p}')`; 
                            document.getElementById(`name-${item.key}`).innerText = "@"+ (val.username || item.uploader);
                        }});
                        onValue(ref(db, `gameplay_likes/${item.key}`), s => { document.getElementById(`like-count-${item.key}`).innerText = s.size || 0; if(currentUser) document.getElementById(`like-icon-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid)); });
                        onValue(ref(db, `gameplay_clips/${item.key}/reactions`), r => { if(r.exists() && !div.dataset.bf) { div.dataset.bf="t"; const val=r.val(); if(val.tomato) triggerBarrage(item.key,'tomato',val.tomato); if(val.egg) triggerBarrage(item.key,'egg',val.egg); } });
                        loadTextBubbles(item.key); loadVoiceBubbles(item.key);
                        if(currentUser && currentUser.uid === item.uid) listenForArt(item.key);
                    }
                    if(hasRemix) { const v=div.querySelector('video'), a=div.querySelector('audio'); a.onended=()=>{ v.currentTime=0; a.currentTime=0; v.play(); a.play(); }; v.onended=()=>v.play(); }

                    feed.appendChild(div);
                });
                setupObserver();
            });
        }

        window.togglePlay = (l) => { const v=l.parentElement.querySelector('video'), a=l.parentElement.querySelector('audio'), i=l.parentElement.querySelector('.play-icon'); if(v.paused){ v.play().catch(()=>{}); if(a)a.play().catch(()=>{}); i.style.opacity=0; } else { v.pause(); if(a)a.pause(); i.style.opacity=0.8; } };
        window.handleLike = (k) => { const r=ref(db,`gameplay_likes/${k}/${currentUser.uid}`); get(r).then(s=>s.exists()?remove(r):set(r,true)); };
        window.toggleFunMenu = (k) => { const m=document.getElementById(`fun-menu-${k}`); const v=m.style.display==='flex'; document.querySelectorAll('.fun-menu').forEach(x=>x.style.display='none'); if(!v) m.style.display='flex'; };
        window.toggleInputBar = (k) => { const b=document.getElementById(`input-bar-${k}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.openShare = (u) => { currentShareUrl=u; document.getElementById('shareSheet').style.bottom="0"; };
        window.closeShare = () => { document.getElementById('shareSheet').style.bottom="-100%"; };
        window.shareToWhatsapp = () => window.open(`whatsapp://send?text=Watch this! ${currentShareUrl}`);
        window.copyLink = () => navigator.clipboard.writeText(currentShareUrl).then(()=>alert("Copied!"));
        window.downloadVideo = async () => { try { const r=await fetch(currentShareUrl), b=await r.blob(), u=URL.createObjectURL(b), a=document.createElement('a'); a.href=u; a.download='video.mp4'; a.click(); } catch(e){ window.open(currentShareUrl,'_blank'); } };
        window.sendTextComment = async (k) => { const i=document.getElementById(`input-${k}`); if(!i.value.trim()) return; const u=await get(ref(db,'users/'+currentUser.uid)); await push(ref(db,`gameplay_clips/${k}/comments`),{text:i.value,username:u.val().username||"User"}); i.value=""; toggleInputBar(k); };
        function loadTextBubbles(k) { onValue(ref(db,`gameplay_clips/${k}/comments`), s=>{ const c=document.getElementById(`text-bubbles-${k}`); c.innerHTML=""; if(s.exists()) Object.values(s.val()).slice(-3).forEach(v=>{ const d=document.createElement('div'); d.className="text-bubble"; d.innerHTML=`<b>${v.username}:</b> ${v.text}`; c.appendChild(d); }); }); }
        window.useSound = (u) => window.location.href=`upload?sound=${encodeURIComponent(u)}`;
        window.throwReaction = (k,t) => { const r=ref(db,`gameplay_clips/${k}/reactions/${t}`); runTransaction(r,c=>(c||0)+1); fireProj(k,t); };
        function fireProj(k,t) { const c=document.getElementById(`react-area-${k}`), e=t==='tomato'?'🍅':'🥚', f=document.createElement('div'); f.innerText=e; f.className='flying-obj'; f.style.left=(Math.random()<0.5?-20:120)+'%'; f.style.top='50%'; const a=f.animate([{transform:'scale(0.5)'},{left:(Math.random()*60+20)+'%',top:(Math.random()*60+20)+'%',transform:'scale(1.5) rotate(720deg)'}],500); c.appendChild(f); a.onfinish=()=>{ f.remove(); const s=document.createElement('div'); s.className='splat-obj'; s.innerText=e; s.style.left=(Math.random()*60+20)+'%'; s.style.top=(Math.random()*60+20)+'%'; c.appendChild(s); setTimeout(()=>s.remove(),3000); }; }
        function triggerBarrage(k,t,n) { let i=0, m=Math.min(n,30), x=setInterval(()=>{ if(i++>=m)clearInterval(x); fireProj(k,t); },150); }
        
        let strokes=[], currentColor="red", drawing=false;
        window.toggleDrawing = (k) => { const c=document.getElementById(`canvas-${k}`), v=document.getElementById(`vid-${k}`), p=document.getElementById(`palette-${k}`); if(c.classList.contains('active')){ c.classList.remove('active'); p.style.display='none'; v.play(); document.getElementById(`fun-menu-${k}`).style.display='none'; } else { c.classList.add('active'); p.style.display='flex'; v.pause(); setupCanvas(c); } };
        window.setPenColor = (k,c) => { currentColor=c; setupCanvas(document.getElementById(`canvas-${k}`)); };
        window.sendArt = (k) => { if(!strokes.length)return; push(ref(db,`gameplay_clips/${k}/graffiti`),{strokes,author:currentUser.uid}); alert("Sent!"); strokes=[]; const c=document.getElementById(`canvas-${k}`); c.getContext('2d').clearRect(0,0,c.width,c.height); c.classList.remove('active'); document.getElementById(`palette-${k}`).style.display='none'; document.getElementById(`fun-menu-${k}`).style.display='none'; document.getElementById(`vid-${k}`).play(); };
        function setupCanvas(c) { c.width=c.offsetWidth; c.height=c.offsetHeight; const x=c.getContext('2d'); x.lineCap="round"; x.lineWidth=5; x.strokeStyle=currentColor; const s=(e)=>{ drawing=true; x.beginPath(); strokes.push({color:currentColor,points:[]}); d(e); }; const f=()=>{drawing=false;}; const d=(e)=>{ if(!drawing)return; const r=c.getBoundingClientRect(), px=(e.clientX||e.touches[0].clientX)-r.left, py=(e.clientY||e.touches[0].clientY)-r.top; x.lineTo(px,py); x.stroke(); x.beginPath(); x.moveTo(px,py); strokes[strokes.length-1].points.push({x:Math.round(px),y:Math.round(py)}); }; c.ontouchstart=s; c.onmousedown=s; c.ontouchend=f; c.onmouseup=f; c.ontouchmove=d; c.onmousemove=d; }
        function listenForArt(k) { onValue(ref(db,`gameplay_clips/${k}/graffiti`), s=>{ if(s.exists()){ const c=document.getElementById(`canvas-${k}`), x=c.getContext('2d'); x.lineCap="round"; x.lineWidth=5; s.forEach(ch=>{ const a=ch.val(); if(a.strokes) a.strokes.forEach(st=>{ x.beginPath(); x.strokeStyle=st.color; if(st.points.length){ x.moveTo(st.points[0].x, st.points[0].y); st.points.forEach(p=>x.lineTo(p.x,p.y)); x.stroke(); } }); }); } }); }

        let vRec=null, vChks=[]; window.startVoice=async(b,k)=>{ try{ const s=await navigator.mediaDevices.getUserMedia({audio:true}); vRec=new MediaRecorder(s); vChks=[]; vRec.ondataavailable=e=>vChks.push(e.data); vRec.start(); b.style.color="#ff4444"; }catch(e){alert("Mic Needed");} }; window.stopVoice=async(b,k)=>{ if(!vRec)return; vRec.stop(); b.style.color="white"; vRec.onstop=async()=>{ const bl=new Blob(vChks,{type:'audio/webm'}), fd=new FormData(); fd.append("file",bl); fd.append("upload_preset","paravideo"); const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{method:'POST',body:fd}), d=await r.json(), u=await get(ref(db,'users/'+currentUser.uid)); await push(ref(db,`gameplay_clips/${k}/voice_bubbles`),{audioUrl:d.secure_url,photo:u.val().photo||"icon.png"}); }; };
        function loadVoiceBubbles(k) { onValue(ref(db,`gameplay_clips/${k}/voice_bubbles`), s=>{ const c=document.getElementById(`voice-bubbles-${k}`); c.innerHTML=""; if(s.exists()) Object.values(s.val()).forEach(v=>{ const d=document.createElement('div'); d.className="voice-bubble"; d.innerHTML=`<img src="${v.photo}">`; d.onclick=()=>{ const a=new Audio(v.audioUrl); a.play(); }; c.appendChild(d); }); }); }

        function setupObserver() { const obs=new IntersectionObserver(e=>{ e.forEach(en=>{ const v=en.target.querySelector('video'), a=en.target.querySelector('audio'), i=en.target.querySelector('.play-icon'); if(en.isIntersecting){ v.play().catch(()=>{}); if(a)a.play().catch(()=>{}); i.style.opacity=0; } else { v.pause(); if(a)a.pause(); i.style.opacity=0.8; } }); },{threshold:0.6}); document.querySelectorAll('.video-card').forEach(x=>obs.observe(x)); }
        if(!window.matchMedia('(display-mode: standalone)').matches) document.getElementById('installBtn').style.display='block';
    </script>
</body>
