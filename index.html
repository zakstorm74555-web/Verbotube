<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verbotube - Home</title>
    <link rel="icon" type="image/png" href="icon.png?v=13">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #111; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #app-frame { width: 100%; height: 100%; max-width: 450px; background: #000; position: relative; overflow: hidden; }
        
        header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; }
        .tab-btn.active { color: #FFD700; border-bottom: 2px solid #FFD700; font-weight: bold; }
        
        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .video-card { background: #000; width: 100%; height: 100%; position: relative; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Sidebar Spacing Fix - Ab button ek dusre par nahi charhein ge */
        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 30; }
        .action-btn { background: none; border: none; color: white; font-size: 26px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn span { font-size: 10px; margin-top: 5px; font-weight: 600; }
        .liked { color: #FF0000 !important; }

        .video-info { position: absolute; bottom: 85px; left: 15px; width: 75%; z-index: 20; pointer-events: none; }
        .username { font-weight: bold; font-size: 16px; color: #FFD700; margin-bottom: 5px; }
        
        /* Progress Bar Styling */
        .prog-container { position: absolute; bottom: 60px; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.2); cursor: pointer; z-index: 1001; }
        .prog-bar { height: 100%; background: #FFD700; width: 0%; pointer-events: none; }

        .disc-area { position: absolute; bottom: 120px; right: 10px; width: 45px; height: 45px; z-index: 25; transform: translateY(70px); }
        .disc-bg { width: 100%; height: 100%; border-radius: 50%; background: #111; border: 4px solid #222; animation: spin 5s linear infinite; background-size: cover; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: #FFD700; opacity: 0; pointer-events: none; z-index: 15; }
        .comments-overlay { position: absolute; bottom: 170px; left: 15px; max-height: 100px; overflow-y: auto; width: 60%; z-index: 40; pointer-events: none; }
        .comment-item { background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 8px; font-size: 12px; margin-bottom: 4px; }
        .comment-input-bar { position: absolute; bottom: 65px; left: 0; width: 100%; background: #111; padding: 10px; display: none; z-index: 2000; border-top: 1px solid #333; }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>
    <div id="app-frame">
        <header>
            <div style="display:flex; gap:20px; color:#aaa;">
                <span class="tab-btn active">For You</span>
                <span class="tab-btn" onclick="window.location.href='friends'">Following</span>
            </div>
            <i class="fas fa-search" style="color:white; font-size:20px;" onclick="window.location.href='search'"></i>
        </header>

        <div class="feed-container" id="feed"></div>

        <div class="bottom-nav" style="position:absolute; bottom:0; width:100%; height:60px; background:#000; display:flex; justify-content:space-around; align-items:center; z-index:1000; border-top:1px solid #222;">
            <i class="fas fa-home" style="color:#FFD700; font-size:22px;"></i>
            <i class="fas fa-user-friends" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <div style="width:40px; height:25px; background:linear-gradient(135deg,#FFD700,#FF0000); border-radius:5px; display:flex; justify-content:center; align-items:center;" onclick="window.location.href='upload'"><i class="fas fa-plus" style="color:black; font-size:14px;"></i></div>
            <i class="fas fa-inbox" style="color:#888; font-size:22px;" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user" style="color:#888; font-size:22px;" onclick="window.location.href='profile'"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => { if (user) { currentUser = user; loadVideos(); } else { window.location.href = 'login'; } });

        function loadVideos() {
            const feed = document.getElementById('feed');
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if (!snap.exists()) return;
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })).sort((a, b) => b.timestamp - a.timestamp);

                videos.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    const hasRemix = (item.remixUrl && item.remixUrl !== "");

                    div.innerHTML = `
                        <video src="${item.videoUrl}" playsinline loop id="vid-${item.key}" ${hasRemix ? 'muted' : ''}></video>
                        ${hasRemix ? `<audio src="${item.remixUrl}" id="aud-${item.key}"></audio>` : ''}
                        
                        <div class="prog-container" onclick="seek(event, '${item.key}')">
                            <div class="prog-bar" id="pb-${item.key}"></div>
                        </div>

                        <div class="play-icon" id="play-${item.key}"><i class="fas fa-play"></i></div>
                        <div class="comments-overlay" id="comments-${item.key}"></div>
                        
                        <div class="video-info">
                            <div class="username" id="name-${item.key}">${item.uploader || 'user'}</div>
                            <div class="caption">${item.caption || ''}</div>
                        </div>

                        <div class="sidebar">
                            <img src="icon.png" id="pic-${item.key}" style="width:45px; height:45px; border-radius:50%; border:2px solid white; cursor:pointer;" onclick="window.location.href='profile?uid=${item.uid}'">
                            <div class="action-btn" onclick="handleLike('${item.key}')"><i class="fas fa-heart" id="heart-${item.key}"></i><span id="lcnt-${item.key}">0</span></div>
                            <div class="action-btn" onclick="toggleInput('${item.key}')"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
                            <div class="action-btn" onclick="window.location.href='upload?sound=${encodeURIComponent(item.remixUrl || item.videoUrl)}'"><i class="fas fa-compact-disc"></i><span>Remix</span></div>
                            <div class="action-btn" onclick="navigator.share({url:'${item.videoUrl}'})"><i class="fas fa-share"></i><span>Share</span></div>
                        </div>

                        <div class="disc-area"><div class="disc-bg" id="disc-${item.key}"></div></div>

                        <div class="comment-input-bar" id="bar-${item.key}">
                            <input type="text" class="comment-input" id="in-${item.key}" placeholder="Add comment...">
                            <i class="fas fa-paper-plane" style="color:#FFD700; margin-left:10px;" onclick="sendComment('${item.key}')"></i>
                        </div>
                    `;

                    const v = div.querySelector('video'), a = div.querySelector('audio'), pIcon = div.querySelector('.play-icon');
                    
                    // Toggle Play Logic
                    div.onclick = (e) => {
                        if(e.target.closest('.sidebar') || e.target.closest('.prog-container') || e.target.closest('.comment-input-bar')) return;
                        if(v.paused) { v.play(); if(a) a.play(); pIcon.style.opacity = 0; }
                        else { v.pause(); if(a) a.pause(); pIcon.style.opacity = 0.8; }
                    };

                    // Progress Update Logic
                    v.ontimeupdate = () => {
                        const bar = document.getElementById(`pb-${item.key}`);
                        if(bar) bar.style.width = (v.currentTime / v.duration) * 100 + "%";
                    };

                    if(hasRemix) {
                        v.onwaiting = () => { if(a) a.pause(); };
                        v.onplaying = () => { if(a) a.play(); };
                    }

                    feed.appendChild(div);
                    loadSidebarData(item);
                });
                setupObserver();
            });
        }

        window.seek = (e, k) => {
            const v = document.getElementById(`vid-${k}`), a = document.getElementById(`aud-${k}`);
            const rect = e.currentTarget.getBoundingClientRect();
            const time = ((e.clientX - rect.left) / rect.width) * v.duration;
            v.currentTime = time; if(a) a.currentTime = time;
        };

        function loadSidebarData(item) {
            onValue(ref(db, 'users/' + item.uid), u => { if(u.exists()){ 
                const d = u.val();
                document.getElementById(`pic-${item.key}`).src = d.photo || "icon.png";
                document.getElementById(`disc-${item.key}`).style.backgroundImage = `url('${d.photo || "icon.png"}')`;
                document.getElementById(`name-${item.key}`).innerText = d.username || item.uploader;
            }});
            onValue(ref(db, `gameplay_likes/${item.key}`), s => {
                document.getElementById(`lcnt-${item.key}`).innerText = s.size || 0;
                if(currentUser) document.getElementById(`heart-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid));
            });
            onValue(ref(db, `gameplay_clips/${item.key}/comments`), s => {
                const box = document.getElementById(`comments-${item.key}`); box.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(c => {
                    const d = document.createElement('div'); d.className="comment-item";
                    d.innerHTML = `<b>${c.username}:</b> ${c.text}`; box.appendChild(d);
                });
            });
        }

        window.handleLike = (k) => { const r = ref(db, `gameplay_likes/${k}/${currentUser.uid}`); get(r).then(s => s.exists() ? remove(r) : set(r, true)); };
        window.toggleInput = (k) => { const b = document.getElementById(`bar-${k}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.sendComment = async (k) => {
            const i = document.getElementById(`in-${k}`); if(!i.value.trim()) return;
            const u = await get(ref(db, 'users/'+currentUser.uid));
            await push(ref(db, `gameplay_clips/${k}/comments`), {text: i.value, username: u.val().username || "User"});
            i.value = ""; toggleInput(k);
        };

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(en => {
                    const v = en.target.querySelector('video'), a = en.target.querySelector('audio'), pIcon = en.target.querySelector('.play-icon');
                    if (en.isIntersecting) { v.play().catch(()=>{}); if(a) a.play().catch(()=>{}); pIcon.style.opacity = 0; }
                    else { v.pause(); if(a) a.pause(); pIcon.style.opacity = 0.8; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-card').forEach(x => obs.observe(x));
        }
    </script>
</body>
</html>
