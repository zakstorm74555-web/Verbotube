<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Verbotube - Gold Home</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* design same as previous master version */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100svh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        #app-frame { width: 100%; height: 100%; max-width: 480px; background: #000; position: relative; overflow: hidden; }
        header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: env(safe-area-inset-top) 15px 25px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .tab-btn { font-weight: 700; font-size: 17px; cursor: pointer; color: rgba(255,255,255,0.6); }
        .tab-btn.active { color: #FFD700; border-bottom: 3px solid #FFD700; padding-bottom: 4px; }
        .feed-container { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { width: 100%; height: 100svh; position: relative; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 4px solid rgba(255, 215, 0, 0.1); border-top: 4px solid #FFD700; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; display: none; z-index: 50; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .sidebar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 40; }
        .sidebar-pic { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #FFD700; }
        .action-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn i { font-size: 32px; }
        .liked { color: #FF0050 !important; }
        .video-info { position: absolute; bottom: 100px; left: 15px; width: 75%; z-index: 30; pointer-events: none; }
        .username { font-weight: 800; font-size: 17px; color: #FFD700; margin-bottom: 5px; pointer-events: auto; }
        .caption { font-size: 14px; color: #f1f1f1; margin-bottom: 10px; }
        .music-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #FFD700; }
        .prog-container { position: absolute; bottom: calc(65px + env(safe-area-inset-bottom)); left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); z-index: 100; }
        .prog-bar { height: 100%; background: #FFD700; width: 0%; box-shadow: 0 0 10px #FFD700; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: calc(65px + env(safe-area-inset-bottom)); background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .share-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: #111; z-index: 2000; border-radius: 20px 20px 0 0; padding: 20px; transition: 0.4s; border-top: 2px solid #FFD700; }
        .comment-bar { position: absolute; bottom: 65px; left: 0; width: 100%; background: #111; padding: 12px; display: none; z-index: 2005; border-top: 1px solid #333; }
        .dt-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: #fff; z-index: 200; pointer-events: none; }
        .dt-heart.active { animation: heartPop 0.8s forwards; }
        @keyframes heartPop { 0% { scale: 0; opacity: 1; } 50% { scale: 1.3; opacity: 1; } 100% { scale: 1.6; opacity: 0; } }
    </style>
</head>
<body>
    <div id="app-frame">
        <header>
            <button onclick="window.location.href='download.html'" style="background:#FFD700; border:none; padding:6px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">GET APP</button>
            <div style="display:flex; gap:20px;"><span class="tab-btn active">For You</span><span class="tab-btn" onclick="window.location.href='friends'">Following</span></div>
            <i class="fas fa-search" style="font-size:22px; color:#fff;" onclick="window.location.href='search'"></i>
        </header>

        <div class="feed-container" id="feed"></div>
        <div class="prog-container"><div class="prog-bar" id="prog-master"></div></div>

        <div class="share-sheet" id="ss">
            <div style="font-size: 16px; font-weight: bold; color: #FFD700; margin-bottom: 15px; text-align: center;">Share with Friends</div>
            <div id="share-friends-list" style="display:flex; gap:15px; overflow-x:auto; padding-bottom:15px;"></div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; text-align:center; padding-top:15px; border-top:1px solid #222;">
                <div onclick="shareToApp('whatsapp')"><i class="fab fa-whatsapp" style="color:#25D366; font-size:24px;"></i><br><span style="font-size:10px;">WhatsApp</span></div>
                <div onclick="copyLink()"><i class="fas fa-link" style="color:#aaa; font-size:24px;"></i><br><span style="font-size:10px;">Copy Link</span></div>
                <div onclick="window.open(curV, '_blank')"><i class="fas fa-download" style="color:#FFD700; font-size:24px;"></i><br><span style="font-size:10px;">Save</span></div>
            </div>
            <button onclick="closeSS()" style="width:100%; margin-top:15px; background:#222; color:#fff; border:none; padding:12px; border-radius:10px;">Cancel</button>
        </div>

        <div class="comment-bar" id="commentBar">
            <input type="text" style="flex:1; padding:10px; border-radius:20px; background:#222; color:#fff; border:none;" id="cIn" placeholder="Add comment...">
            <i class="fas fa-paper-plane" id="sendC" style="color:#FFD700; margin-left:10px; font-size:20px;"></i>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home" style="color:#FFD700; font-size:24px;"></i>
            <i class="fas fa-user-friends" style="color:#888; font-size:24px;" onclick="window.location.href='friends'"></i>
            <div style="width:45px; height:30px; background:linear-gradient(to right, #00f2ea, #ff0050); border-radius:10px; display:flex; justify-content:center; align-items:center;" onclick="window.location.href='upload'">
                <div style="background:#fff; width:36px; height:100%; border-radius:8px; display:flex; justify-content:center; align-items:center;"><i class="fas fa-plus" style="color:#000; font-size:16px;"></i></div>
            </div>
            <i class="fas fa-comment-alt" style="color:#888; font-size:24px;" onclick="window.location.href='friends'"></i>
            <i class="fas fa-user" style="color:#888; font-size:24px;" onclick="window.location.href='profile'"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, remove, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null; window.curV = ""; window.curID = ""; let activeK = "";

        // BAN CHECK & CLEANUP
        onAuthStateChanged(auth, async user => { 
            if(user) { 
                const banSnap = await get(ref(db, `banned_users/${user.uid}`));
                if(banSnap.exists()) {
                    alert("Account Banned.");
                    signOut(auth).then(()=> window.location.href='login');
                    return;
                }
                currentUser = user; loadVideos(); loadFriends(); 
            } else { window.location.href='login'; } 
        });

        function loadVideos() {
            const feed = document.getElementById('feed');
            // Listen to Banned Users first
            onValue(ref(db, 'banned_users'), (banSnap) => {
                const bannedList = banSnap.exists() ? Object.keys(banSnap.val()) : [];
                
                onValue(ref(db, 'gameplay_clips'), (snap) => {
                    feed.innerHTML = "";
                    if(!snap.exists()) return;
                    
                    let data = Object.entries(snap.val()).map(([k,v]) => ({key:k, ...v}));
                    
                    // 🟢 FILTER: Remove banned user videos & Auto-Delete logic
                    data.forEach(item => {
                        if(bannedList.includes(item.uid)) {
                            remove(ref(db, `gameplay_clips/${item.key}`)); // Auto-delete from DB
                            return; // Don't show in feed
                        }
                    });

                    // Re-fetch clean data for display
                    let cleanData = data.filter(v => !bannedList.includes(v.uid));
                    let sorted = [...cleanData.filter(v => v.recommended), ...cleanData.filter(v => !v.recommended).sort((a,b)=> b.timestamp - a.timestamp)];

                    sorted.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "video-card"; card.id = `card-${item.key}`;
                        card.innerHTML = `
                            <div class="loading-spinner" id="ldr-${item.key}"></div>
                            <video src="${item.videoUrl}" playsinline loop id="vid-${item.key}"></video>
                            <div class="dt-heart" id="pop-${item.key}"><i class="fas fa-heart"></i></div>
                            <div class="video-info">
                                <div class="username" onclick="window.location.href='profile?uid=${item.uid}'">@${item.uploader}</div>
                                <div class="caption">${item.caption || ''}</div>
                            </div>
                            <div class="sidebar">
                                <img src="icon.png" class="sidebar-pic" id="upic-${item.key}" onclick="window.location.href='profile?uid=${item.uid}'">
                                <div class="action-btn" onclick="handleLike('${item.key}')"><i class="fas fa-heart" id="hrt-${item.key}"></i><span id="lcnt-${item.key}">0</span></div>
                                <div class="action-btn" onclick="openComments('${item.key}')"><i class="fas fa-comment-dots"></i><span id="ccnt-${item.key}">0</span></div>
                                <div class="action-btn" onclick="openSS('${item.videoUrl}', '${item.key}')"><i class="fas fa-share"></i><span>Share</span></div>
                            </div>`;

                        const v = card.querySelector('video'), ldr = card.querySelector('.loading-spinner');
                        card.onclick = () => v.paused ? v.play() : v.pause();
                        v.onwaiting = () => ldr.style.display = "block";
                        v.onplaying = () => ldr.style.display = "none";
                        v.ontimeupdate = () => { if(card.getAttribute('active')==='true') document.getElementById('prog-master').style.width = (v.currentTime/v.duration)*100+"%"; };
                        feed.appendChild(card);
                        fetchStats(item);
                    });
                    setupObserver();
                });
            });
        }

        // Stats and observer logic remains same for full functionality
        function fetchStats(item) {
            onValue(ref(db, 'users/'+item.uid), s => { if(s.exists()){ document.getElementById(`upic-${item.key}`).src = s.val().photo || 'icon.png'; }});
            onValue(ref(db, `gameplay_likes/${item.key}`), s => { 
                document.getElementById(`lcnt-${item.key}`).innerText = s.size || 0;
                if(s.hasChild(currentUser.uid)) document.getElementById(`hrt-${item.key}`).classList.add('liked');
            });
        }
        
        window.handleLike = (k, f=false) => {
            const r = ref(db, `gameplay_likes/${k}/${currentUser.uid}`);
            get(r).then(s => s.exists() && !f ? remove(r) : set(r, true));
        };

        window.openSS = (u, id) => { window.curV = u; window.curID = id; document.getElementById('ss').style.bottom = "0"; };
        window.closeSS = () => document.getElementById('ss').style.bottom = "-100%";

        function loadFriends() {
            onValue(ref(db, 'users'), snap => {
                const list = document.getElementById('share-friends-list'); list.innerHTML = "";
                snap.forEach(child => {
                    if(child.key !== currentUser.uid) {
                        const div = document.createElement('div'); div.innerHTML = `<img src="${child.val().photo || 'icon.png'}" style="width:45px; height:45px; border-radius:50%; border:2px solid #FFD700;"><br><span style="font-size:9px;">${child.val().username}</span>`;
                        div.onclick = () => window.location.href = `chat?uid=${child.key}&name=${child.val().username}&share=${encodeURIComponent(window.location.origin+'/index?v='+window.curID)}`;
                        list.appendChild(div);
                    }
                });
            });
        }

        function setupObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(en => {
                    const v = en.target.querySelector('video');
                    if(en.isIntersecting) { 
                        en.target.setAttribute('active','true'); v.play();
                        history.replaceState(null, null, `?v=${en.target.id.replace('card-','')}`);
                    } else { en.target.setAttribute('active','false'); v.pause(); }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
