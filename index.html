<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParaVideo - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .app-name { font-size: 40px; font-weight: bold; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        .login-btn { background: white; color: black; padding: 12px 30px; border-radius: 30px; font-weight: bold; margin-top: 20px; cursor: pointer; border:none; }
        header { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 10px 15px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.15); border: none; padding: 10px 40px 10px 15px; border-radius: 20px; color: white; outline: none; }
        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; text-shadow: 1px 1px 2px black; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 13px; margin-top: 5px; font-weight: bold; }
        .video-info { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px 20px 40px 20px; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; margin-bottom: 8px; }
        .follow-btn { background: transparent; border: 1px solid white; color: white; font-size: 11px; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .following { background: white; color: black; border: none; }
        /* Modals, Upload etc hidden for brevity but functionality exists in JS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid #8a2be2; text-align: center; }
    </style>
</head>
<body>
    <div id="loginScreen"><div class="app-name">PARA<span style="color:#8a2be2;">VIDEO</span></div><button class="login-btn" id="loginBtn">Login with Google</button></div>
    <div id="appScreen" style="display:none;">
        <header>
            <div class="top-row">
                <div style="font-weight:bold; font-size:20px;">PARA<span style="color:#8a2be2;">VIDEO</span></div>
                <div style="display:flex; gap:20px; align-items:center;">
                    <i class="fas fa-plus-square" style="font-size:26px; cursor:pointer;" onclick="document.getElementById('uploadModal').style.display='flex'"></i>
                    <img src="" id="myPic" onclick="window.location.href='profile.html'" style="width:32px; height:32px; border-radius:50%; border:2px solid #8a2be2;">
                </div>
            </div>
            <div class="search-box"><input type="text" placeholder="Search..." onclick="window.location.href='search.html'"></div>
        </header>
        <div class="feed-container" id="feed"><p style="text-align:center;margin-top:50vh;color:#555;">Loading...</p></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span onclick="document.getElementById('uploadModal').style.display='none'" style="position:absolute;top:15px;right:20px;font-size:24px;cursor:pointer;">&times;</span>
            <h3 style="color:#8a2be2;">Upload</h3>
            <input type="file" id="videoFile" accept="video/*" style="margin-bottom:10px;">
            <input type="text" id="caption" placeholder="Caption" style="width:100%;padding:10px;margin-bottom:10px;background:#222;border:none;color:white;">
            <input type="text" id="ytLink" placeholder="Music Link (Optional)" style="width:100%;padding:10px;margin-bottom:10px;background:#222;border:none;color:white;">
            <div id="bar" style="height:5px;width:0%;background:#8a2be2;margin-bottom:10px;"></div>
            <button onclick="uploadVideo()" style="width:100%;padding:10px;background:#8a2be2;border:none;font-weight:bold;">POST</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33", measurementId: "G-QNFHZ1CDLY" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi"; const UPLOAD_PRESET = "paravideo";
        let currentUser = null;

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user; document.getElementById('loginScreen').style.display='none'; document.getElementById('appScreen').style.display='block'; document.getElementById('myPic').src = user.photoURL;
                const snap = await get(ref(db, 'users/'+user.uid));
                if(!snap.exists()) set(ref(db, 'users/'+user.uid), { username: user.displayName, email: user.email, photo: user.photoURL, uid: user.uid, lowercaseName: user.displayName.toLowerCase() });
                loadSmartFeed();
            }
        });

        function loadSmartFeed() {
            get(ref(db, 'ads')).then(adSnap => {
                let ads = []; if(adSnap.exists()) adSnap.forEach(c => { if(Date.now() < c.val().expiry) ads.push({type:'ad', ...c.val()}); else remove(ref(db, `ads/${c.key}`)); });
                
                onValue(ref(db, 'gameplay_clips'), (snap) => {
                    const feed = document.getElementById('feed'); feed.innerHTML = "";
                    let videos = snap.exists() ? Object.entries(snap.val()).map(([k,v]) => ({key:k, type:'video', ...v})) : [];
                    
                    // Shuffle & Mix
                    let content = videos.sort(() => Math.random() - 0.5);
                    let adIdx = 0;
                    if(ads.length > 0) for(let i=3; i<content.length; i+=5) { content.splice(i, 0, ads[adIdx % ads.length]); adIdx++; }

                    content.forEach(item => {
                        const div = document.createElement('div'); div.className = "video-card";
                        if(item.type === 'ad') {
                            div.innerHTML = `<video src="${item.videoUrl}" loop playsinline></video><div class="video-info" style="padding-bottom:60px;"><span style="background:#ff0055;padding:5px;border-radius:5px;font-size:12px;">Sponsored</span><br><b>${item.caption}</b><br><button onclick="window.open('${item.link}')" style="width:100%;margin-top:10px;padding:10px;border-radius:20px;border:none;font-weight:bold;">${item.btnText}</button></div>`;
                        } else {
                            const music = item.musicLink ? `<div style="font-size:12px;margin-top:5px;cursor:pointer;" onclick="window.open('${item.musicLink}')"><i class="fas fa-music"></i> Sound</div>` : '';
                            div.innerHTML = `<video src="${item.videoUrl}" loop playsinline data-key="${item.key}"></video>
                            <div class="sidebar">
                                <button class="action-btn"><i class="fas fa-heart"></i><span>0</span></button>
                                <button class="action-btn"><i class="fas fa-share"></i><span>Share</span></button>
                            </div>
                            <div class="video-info">
                                <div class="user-row"><b id="u-${item.key}" onclick="window.location.href='profile.html?uid=${item.uid}'">@${item.uploader}</b> <button class="follow-btn js-fol-${item.uid}" onclick="toggleFollow('${item.uid}')">Follow</button></div>
                                <div>${item.caption}</div>${music}
                            </div>`;
                            
                            // Live Username & Badge Fetch
                            onValue(ref(db, 'users/'+item.uid), uSnap => {
                                if(uSnap.exists()) {
                                    const u = uSnap.val();
                                    let badge = u.email === 'elitegamer859650@gmail.com' ? '<i class="fas fa-check-circle" style="color:#00C2FF"></i>' : '';
                                    if(u.customBadge) badge += ` <span style="background:#ff0055;font-size:10px;padding:2px 5px;border-radius:3px;">${u.customBadge}</span>`;
                                    document.getElementById(`u-${item.key}`).innerHTML = `@${u.username} ${badge}`;
                                }
                            });
                            checkFollow(item.uid);
                        }
                        feed.appendChild(div);
                    });
                    const obs = new IntersectionObserver(es => es.forEach(e => e.isIntersecting ? e.target.play() : e.target.pause()), {threshold:0.6});
                    document.querySelectorAll('video').forEach(v => { obs.observe(v); v.onclick=()=>v.paused?v.play():v.pause(); });
                });
            });
        }

        window.uploadVideo = () => {
            const f = document.getElementById('videoFile').files[0]; if(!f) return alert("File?");
            const fd = new FormData(); fd.append("file", f); fd.append("upload_preset", UPLOAD_PRESET);
            const xhr = new XMLHttpRequest(); xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('bar').style.width = (e.loaded/e.total)*100+"%";
            xhr.onload = async () => {
                if(xhr.status===200) {
                    await push(ref(db, 'gameplay_clips'), { videoUrl: JSON.parse(xhr.responseText).secure_url, caption: document.getElementById('caption').value, musicLink: document.getElementById('ytLink').value, uploader: currentUser.displayName, uid: currentUser.uid, email: currentUser.email, timestamp: Date.now() });
                    alert("Done"); location.reload();
                } else alert("Error");
            }; xhr.send(fd);
        };

        window.toggleFollow = async (uid) => {
            if(uid === currentUser.uid) return;
            const r = ref(db, `follows/${currentUser.uid}/${uid}`); const rf = ref(db, `followers/${uid}/${currentUser.uid}`);
            const s = await get(r); if(s.exists()) { remove(r); remove(rf); } else { set(r, true); set(rf, true); }
        };
        function checkFollow(uid) {
            if(uid===currentUser.uid) { document.querySelectorAll(`.js-fol-${uid}`).forEach(b=>b.style.display='none'); return; }
            onValue(ref(db, `follows/${currentUser.uid}/${uid}`), s => {
                document.querySelectorAll(`.js-fol-${uid}`).forEach(b => { b.innerText = s.exists() ? "Following" : "Follow"; b.style.background = s.exists() ? "white" : "transparent"; b.style.color = s.exists() ? "black" : "white"; });
            });
        }
    </script>
</body>
</html>
