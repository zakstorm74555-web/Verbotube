<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>ParaVideo - Pakistan's Gaming Short Video Platform</title>
    <meta name="description" content="ParaVideo is the #1 platform in Pakistan to watch and share gameplay shorts. Join the gaming community, upload clips, and go viral!">
    <meta name="keywords" content="ParaVideo, Gaming Shorts Pakistan, Free Fire Clips, PUBG Shorts, Gameplay Video App, Para Video">
    <meta name="author" content="ParaVideo Team">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="ParaVideo - Watch Gaming Shorts">
    <meta property="og:description" content="The best gameplay clips from Pakistan's top gamers. Watch now on ParaVideo!">
    <meta property="og:image" content="https://ibb.co/ZsDDGHQ">
    <meta property="og:url" content="https://paravideo-sand.vercel.app/">

    <link rel="icon" href="https://ibb.co/ZsDDGHQ">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        @media (min-width: 768px) {
            body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
            #appScreen { width: 100%; max-width: 450px; height: 100vh; background: #000; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; overflow: hidden; }
            header { max-width: 450px; left: 50% !important; transform: translateX(-50%); }
        }

        header { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 10px 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 20px; font-weight: bold; color: white; }
        
        .search-box { width: 100%; position: relative; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 10px 40px 10px 15px; border-radius: 20px; color: white; outline: none; }
        .search-box i { position: absolute; right: 15px; top: 12px; color: #ddd; }

        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* --- LOADING SPINNER --- */
        .video-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #8a2be2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; z-index: 5; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        
        .video-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; padding-bottom: 40px; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        .feed-profile-pic { width: 35px; height: 35px; border-radius: 50%; border: 1px solid white; object-fit: cover; }
        .uploader-name { font-weight: bold; color: white; font-size: 17px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .badge-circle { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; border: 1px solid white; margin-left: 5px; }
        .badge-text { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="appScreen">
        <header>
            <div class="top-row">
                <div class="header-logo">PARA<span style="color:#8a2be2;">VIDEO</span></div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <i class="fas fa-search" onclick="window.location.href='search.html'" style="font-size:20px; cursor:pointer;"></i>
                    <img src="" id="myPic" onclick="window.location.href='profile.html'" style="width:32px; height:32px; border-radius:50%; border:2px solid #8a2be2; cursor:pointer;">
                </div>
            </div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; color:#555; margin-top:50vh;">Loading ParaVideo...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('myPic').src = user.photoURL;
                loadSmartFeed();
            } else {
                signInWithPopup(auth, new GoogleAuthProvider());
            }
        });

        async function loadSmartFeed() {
            const urlParams = new URLSearchParams(window.location.search);
            let targetId = urlParams.get('v') || window.location.hash.replace('#v=', '');

            onValue(ref(db, 'gameplay_clips'), (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                if (!snap.exists()) return;

                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v }));
                
                if(targetId) {
                    videos.sort((a, b) => (a.key === targetId) ? -1 : (b.key === targetId) ? 1 : b.timestamp - a.timestamp);
                } else {
                    videos.sort((a, b) => b.timestamp - a.timestamp);
                }

                videos.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    div.setAttribute('data-id', item.key);

                    // --- CLOUDINARY SPEED OPTIMIZATION ---
                    let fastUrl = item.videoUrl.replace("/upload/", "/upload/q_auto,f_auto,w_450/");

                    div.innerHTML = `
                        <div class="video-loader" id="loader-${item.key}"></div>
                        <video src="${fastUrl}" loop playsinline class="reel-video" 
                               onplaying="document.getElementById('loader-${item.key}').style.display='none'"></video>
                        <div class="sidebar">
                            <button class="action-btn" onclick="window.handleLike('${item.key}')"><i class="fas fa-heart" id="like-icon-${item.key}"></i></button>
                            <button class="action-btn" onclick="window.shareVideo('${item.key}')"><i class="fas fa-share"></i></button>
                        </div>
                        <div class="video-info">
                            <div class="user-row">
                                <img src="" id="pic-${item.key}" class="feed-profile-pic">
                                <div class="uploader-name" id="name-${item.key}" onclick="window.location.href='profile.html?uid=${item.uid}'">@${item.uploader}</div>
                            </div>
                            <div style="font-size:14px; color:#eee; margin-top:5px;">${item.caption}</div>
                        </div>
                    `;

                    onValue(ref(db, 'users/' + item.uid), (uSnap) => {
                        if(uSnap.exists()) {
                            const u = uSnap.val();
                            document.getElementById(`pic-${item.key}`).src = u.photo || "";
                            let bHtml = (u.email === 'elitegamer859650@gmail.com') ? '<i class="fas fa-check-circle" style="color:#00C2FF; margin-left:5px;"></i>' : '';
                            if(u.customBadge) {
                                if(typeof u.customBadge === 'object' && u.customBadge.image) bHtml += `<img src="${u.customBadge.image}" class="badge-circle">`;
                                else bHtml += `<span class="badge-text" style="background:${u.customBadge.color || '#ff0055'}">${u.customBadge.text || u.customBadge}</span>`;
                            }
                            document.getElementById(`name-${item.key}`).innerHTML = `@${u.username} ${bHtml}`;
                        }
                    });

                    feed.appendChild(div);
                });
                setupObserver();
            });
        }

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        const video = entry.target.querySelector('video');
                        const videoId = entry.target.getAttribute('data-id');
                        video.play();
                        window.history.replaceState(null, null, `#v=${videoId}`);
                    } else {
                        entry.target.querySelector('video').pause();
                    }
                });
            }, {threshold: 0.7});
            document.querySelectorAll('.video-card').forEach(card => obs.observe(card));
        }

        window.shareVideo = (id) => {
            const link = `https://paravideo-sand.vercel.app/#v=${id}`;
            if(navigator.share) { navigator.share({ title: 'ParaVideo', url: link }); } 
            else { navigator.clipboard.writeText(link).then(() => alert("Link Copied!")); }
        };
    </script>
</body>
</html>
