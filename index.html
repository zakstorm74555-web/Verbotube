<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParaVideo</title>
    
    <link rel="icon" id="fav1" href="https://ibb.co/ZsDDGHQ" sizes="32x32">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL PERFORMANCE --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; 
            transform: translateZ(0);
        }

        @media (min-width: 768px) {
            body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
            #appScreen { width: 100%; max-width: 450px; height: 100vh; background: #000; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; overflow: hidden; }
            .bottom-nav { max-width: 450px; left: 50% !important; transform: translateX(-50%); }
        }

        /* --- HEADER (Fixed & Center Aligned) --- */
        header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            display: flex; justify-content: center; align-items: center; pointer-events: auto; /* Buttons need clicks */
        }
        
        .header-tabs { display: flex; gap: 20px; font-size: 16px; font-weight: bold; color: #aaa; text-shadow: 1px 1px 2px black; }
        .tab-btn { cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: white; border-bottom: 2px solid white; padding-bottom: 3px; }
        
        .search-icon { position: absolute; right: 15px; top: 15px; font-size: 20px; cursor: pointer; color: white; }

        /* --- FEED --- */
        .feed-container { 
            width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scroll-behavior: auto; -webkit-overflow-scrolling: touch; 
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .video-card { 
            background: #000; width: 100%; height: 100vh; position: relative; 
            scroll-snap-align: start; display: flex; align-items: center; justify-content: center; overflow: hidden; 
            will-change: transform; 
        }
        
        video { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Landscape videos won't crop */
            background: #000; 
            transform: translateZ(0); 
        }
        
        /* FILTERS */
        .f-normal { filter: none; }
        .f-vivid { filter: contrast(1.1) saturate(1.2); }
        .f-mono { filter: grayscale(1); }
        .f-dramatic { filter: contrast(1.2) brightness(0.9); }

        /* --- SIDEBAR (Moved UP to fix overlap) --- */
        .sidebar { 
            position: absolute; right: 10px; 
            bottom: 160px; /* Increased from 100px so Share button is visible above text */
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
            z-index: 30; text-shadow: 1px 1px 2px black; 
        }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 12px; margin-top: 5px; font-weight: 600; }
        .liked { color: #FE2C55 !important; animation: pop 0.3s ease; }
        @keyframes pop { 50% { transform: scale(1.2); } }

        /* --- VIDEO INFO --- */
        .video-info { 
            position: absolute; 
            bottom: 60px; 
            left: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 20px; padding-bottom: 20px; 
            z-index: 20; pointer-events: none; 
        }
        .video-info * { pointer-events: auto; }
        .username { font-weight: bold; font-size: 17px; margin-bottom: 5px; cursor: pointer; text-shadow: 1px 1px 2px black; }
        .caption { font-size: 15px; color: #eee; margin-bottom: 10px; max-width: 75%; line-height: 1.2; text-shadow: 1px 1px 2px black; }
        
        /* MARQUEE */
        .music-marquee { display: flex; align-items: center; gap: 10px; font-size: 14px; overflow: hidden; white-space: nowrap; width: 60%; }
        .music-icon-anim { animation: pulse 2s infinite; }
        .marquee-track { display: inline-block; animation: marquee 6s linear infinite; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- SPINNING DISC --- */
        .disc-area { position: absolute; bottom: 80px; right: 10px; width: 50px; height: 50px; z-index: 35; }
        .disc-bg { 
            width: 100%; height: 100%; border-radius: 50%; background: #111; 
            border: 8px solid #222; display: flex; justify-content: center; align-items: center; 
            animation: spin 5s linear infinite; will-change: transform;
            background-image: url('https://ibb.co/ZsDDGHQ'); background-size: cover;
        }
        .playing .disc-bg { animation-play-state: running; }
        .paused .disc-bg { animation-play-state: paused; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- BOTTOM NAV --- */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: #000; border-top: 1px solid #222; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 100; 
        }
        .nav-item { color: #888; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #8a2be2; text-shadow: 0 0 10px #8a2be2; }
        .add-btn-nav { width: 45px; height: 30px; background: #8a2be2; border-radius: 8px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        .add-btn-nav i { color: white; font-size: 16px; }

        /* --- PLAY ICON --- */
        .touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; opacity: 0; pointer-events: none; transition: 0.2s; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

    </style>
</head>
<body>

    <div id="appScreen">
        
        <header>
            <div class="header-tabs">
                <span class="tab-btn" id="tabFollowing" onclick="switchFeed('following')">Following</span>
                <span class="tab-btn active" id="tabForYou" onclick="switchFeed('foryou')">For You</span>
            </div>
            <div class="search-icon" onclick="window.location.href='search.html'"><i class="fas fa-search"></i></div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; color:#555; margin-top:50vh;">Loading...</p>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home nav-item active"></i>
            <i class="fas fa-user-friends nav-item" onclick="window.location.href='friends.html'"></i>
            <div class="add-btn-nav" onclick="window.location.href='upload.html'">
                <i class="fas fa-plus"></i>
            </div>
            <i class="fas fa-inbox nav-item" onclick="window.location.href='friends.html'"></i>
            <i class="fas fa-user nav-item" onclick="window.location.href='profile.html'"></i>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTab = 'foryou';
        let followingList = [];

        onAuthStateChanged(auth, user => {
            if (user) { 
                currentUser = user; 
                loadFollowingList().then(() => loadVideos());
            }
        });

        // 1. Get List of People I Follow
        async function loadFollowingList() {
            // Assuming structure: users/myUID/following/otherUID = true
            // If you used a different structure, adjust this.
            // But based on friends.html logic, we might need to check how you implemented 'Follow'.
            // For now, I'll assume a standard 'following' node inside user profile.
            const fRef = ref(db, `users/${currentUser.uid}/following`);
            const snap = await get(fRef);
            if(snap.exists()) {
                followingList = Object.keys(snap.val());
            } else {
                followingList = [];
            }
        }

        // 2. Switch Tabs UI
        window.switchFeed = (type) => {
            activeTab = type;
            document.getElementById('tabFollowing').className = type === 'following' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabForYou').className = type === 'foryou' ? 'tab-btn active' : 'tab-btn';
            
            // Reload with Filter
            const feed = document.getElementById('feed');
            feed.innerHTML = "<p style='text-align:center; color:#555; margin-top:50vh;'>Loading...</p>";
            loadVideos();
        };

        // 3. Load Videos with Filter Logic
        function loadVideos() {
            const feed = document.getElementById('feed');
            
            onValue(ref(db, 'gameplay_clips'), (snap) => {
                feed.innerHTML = "";
                if (!snap.exists()) { feed.innerHTML = "<p style='text-align:center; padding-top:50vh; color:#555;'>No videos found.</p>"; return; }
                
                let videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v }));
                
                // --- FILTER LOGIC ---
                if(activeTab === 'following') {
                    // Filter: Only show videos from users in my following list
                    videos = videos.filter(v => followingList.includes(v.uid));
                    
                    if(videos.length === 0) {
                        feed.innerHTML = `
                            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#777;">
                                <i class="fas fa-user-plus" style="font-size:40px; margin-bottom:15px;"></i>
                                <p>Follow people to see their videos here!</p>
                                <button onclick="window.switchFeed('foryou')" style="background:#8a2be2; color:white; border:none; padding:10px 20px; border-radius:20px; margin-top:10px;">Go to For You</button>
                            </div>
                        `;
                        return;
                    }
                }

                // Sort Newest First
                videos.sort((a, b) => b.timestamp - a.timestamp);

                videos.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";
                    div.setAttribute('data-id', item.key);

                    let videoUrl = item.videoUrl;
                    if(item.isHD) videoUrl = videoUrl.replace("/upload/", "/upload/q_80,w_720/"); 
                    
                    const filterClass = item.filter ? `f-${item.filter}` : '';
                    const isRemix = item.remixUrl ? true : false; 
                    
                    div.innerHTML = `
                        <video src="${videoUrl}" class="${filterClass}" loop playsinline preload="metadata"></video>
                        ${isRemix ? `<audio src="${item.remixUrl}" loop></audio>` : ''}
                        
                        <div class="touch-layer" onclick="togglePlay(this)"></div>
                        <div class="play-icon"><i class="fas fa-play"></i></div>

                        <div class="sidebar">
                            <div class="action-btn" onclick="window.location.href='profile.html?uid=${item.uid}'">
                                <img src="https://via.placeholder.com/40" id="pic-${item.key}" style="width:45px; height:45px; border-radius:50%; border:2px solid white;">
                            </div>
                            <button class="action-btn" onclick="handleLike('${item.key}')">
                                <i class="fas fa-heart" id="like-icon-${item.key}"></i>
                                <span id="like-count-${item.key}">0</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-comment-dots"></i>
                                <span>0</span>
                            </button>
                            <button class="action-btn" onclick="useSound('${item.remixUrl || item.videoUrl}')">
                                <i class="fas fa-compact-disc"></i>
                                <span>Remix</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-share"></i>
                                <span>Share</span>
                            </button>
                        </div>

                        <div class="video-info">
                            <div class="username" id="name-${item.key}">...</div>
                            <div class="caption">${item.caption}</div>
                            <div class="music-marquee">
                                <i class="fas fa-music music-icon-anim"></i> 
                                <span class="marquee-track">${item.caption ? item.caption : 'Original Sound'} - ${item.uploader} &nbsp;&nbsp;&nbsp;&nbsp; ${item.caption ? item.caption : 'Original Sound'}</span>
                            </div>
                        </div>

                        <div class="disc-area" id="disc-anim-${item.key}">
                            <div class="disc-bg" id="disc-bg-${item.key}"></div>
                        </div>
                    `;

                    onValue(ref(db, 'users/' + item.uid), uSnap => {
                        const u = uSnap.val() || {};
                        const pic = u.photo || "https://ibb.co/ZsDDGHQ";
                        document.getElementById(`pic-${item.key}`).src = pic;
                        document.getElementById(`name-${item.key}`).innerText = `${u.username || item.uploader}`;
                        document.getElementById(`disc-bg-${item.key}`).style.backgroundImage = `url('${pic}')`;
                    });

                    onValue(ref(db, `gameplay_likes/${item.key}`), s => {
                        document.getElementById(`like-count-${item.key}`).innerText = s.size || 0;
                        document.getElementById(`like-icon-${item.key}`).classList.toggle('liked', s.hasChild(currentUser.uid));
                    });

                    feed.appendChild(div);
                });

                setupObserver();
            });
        }

        window.togglePlay = (layer) => {
            const card = layer.parentElement;
            const video = card.querySelector('video');
            const audio = card.querySelector('audio');
            const icon = card.querySelector('.play-icon');
            const discAnim = card.querySelector('.disc-bg');

            if (video.paused) {
                video.play();
                if(audio) { video.muted = true; audio.play(); } 
                icon.style.opacity = 0;
                card.classList.add('playing');
                card.classList.remove('paused');
            } else {
                video.pause();
                if(audio) audio.pause();
                icon.style.opacity = 0.8;
                card.classList.add('paused');
                card.classList.remove('playing');
            }
        };

        window.handleLike = (key) => {
            const r = ref(db, `gameplay_likes/${key}/${currentUser.uid}`);
            get(r).then(s => s.exists() ? remove(r) : set(r, true));
        };
        
        window.useSound = (url) => {
            window.location.href = `upload.html?sound=${encodeURIComponent(url)}`;
        };

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const card = entry.target;
                    const video = card.querySelector('video');
                    const audio = card.querySelector('audio');
                    
                    if (entry.isIntersecting) {
                        video.play().catch(()=>{});
                        if(audio) { video.muted = true; audio.play().catch(()=>{}); }
                        card.classList.add('playing');
                    } else {
                        video.pause();
                        video.currentTime = 0;
                        if(audio) { audio.pause(); audio.currentTime = 0; }
                        card.classList.remove('playing');
                    }
                });
            }, { threshold: 0.6 }); 
            document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
