<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParaVideo - Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CORE STYLES --- */
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* HEADER */
        header { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            padding: 10px 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; 
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; border: none;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .app-name { font-weight:bold; letter-spacing:1px; color:white; font-size: 20px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        .upload-icon { color: #fff; font-size: 26px; cursor: pointer; text-shadow: 1px 1px 2px black; }
        
        /* SEARCH BAR */
        .search-box { width: 100%; position: relative; }
        .search-box input { 
            width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 10px 40px 10px 15px; 
            border-radius: 20px; color: white; outline: none; font-size: 14px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .search-box i { position: absolute; right: 15px; top: 12px; color: #ddd; }

        /* SCREENS */
        .screen { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; background: #000; display: none; overflow-y: auto; padding-top: 100px; padding-bottom: 50px; box-sizing: border-box; }
        #feedScreen { display: block; padding-top: 0; overflow: hidden; } 

        /* FEED */
        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; border-bottom: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }

        /* SIDEBAR ACTIONS */
        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; text-shadow: 1px 1px 3px black; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 13px; margin-top: 5px; font-weight: bold; }
        .liked { color: #ff0055 !important; }

        /* VIDEO INFO */
        .video-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; box-sizing: border-box; pointer-events: none; padding-bottom: 40px; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; margin-bottom: 8px; }
        .uploader-name { font-weight: bold; color: white; font-size: 17px; text-shadow: 1px 1px 2px black; cursor: pointer; }
        .follow-btn { background: transparent; border: 1px solid white; color: white; font-size: 11px; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .following { background: white; color: black; border: none; }
        
        /* SEARCH RESULTS */
        .search-result-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #222; }
        .s-user-pic { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .s-user-info { flex: 1; }
        .s-user-name { font-weight: bold; font-size: 16px; color: white; }

        /* MODALS */
        .modal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; justify-content: center; align-items: flex-end; }
        .modal-content { background: #1a1a1a; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp 0.3s ease; position: relative; margin: 0 auto; overflow-y: auto; }
        @keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }

        .profile-pic-large { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #8a2be2; margin: 0 auto 10px; display:block; object-fit: cover; }
        .stats-row { display: flex; justify-content: space-around; background: #222; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .stat-box { text-align: center; } 
        
        /* MONETIZATION & UPLOAD */
        .monetization-card { background: linear-gradient(45deg, #222, #333); padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #444; }
        .money-text { color: #00ff00; font-weight: bold; font-size: 18px; }
        input[type="text"] { width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { width: 100%; background: #8a2be2; border: none; padding: 12px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }

        /* LOGIN */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-btn { background: white; color: black; padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="app-name" style="font-size: 40px;">PARA<span style="color:#8a2be2;">VIDEO</span></div>
        <p style="color:#aaa;">Share Your Moments</p>
        <button class="login-btn" id="loginBtn"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <div id="appScreen" style="display:none;">
        <header>
            <div class="top-row">
                <div class="app-name">PARA <span style="color:#8a2be2;">VIDEO</span></div>
                <div class="upload-icon" onclick="openUploadModal()"><i class="fas fa-plus-square"></i></div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search Users or Videos..." onclick="openSearchScreen()">
                <i class="fas fa-search"></i>
            </div>
        </header>

        <div id="feedScreen" class="screen">
            <div class="feed-container" id="feed">
                <p style="text-align:center; color:#555; margin-top:50vh;">Loading Feed...</p>
            </div>
        </div>

        <div id="searchScreen" class="screen" style="background:#000;">
            <div style="position:fixed; top:70px; left:0; width:100%; background:#000; padding:10px; z-index:50; border-bottom:1px solid #222;">
                <button onclick="closeSearchScreen()" style="color:white; background:none; border:none; font-size:16px;"><i class="fas fa-arrow-left"></i> Back</button>
                <input type="text" id="realSearchInput" placeholder="Type username..." onkeyup="performSearch()" style="width:80%; float:right; background:#222; border:none; padding:8px; border-radius:15px; color:white;">
            </div>
            <div id="searchResults" style="margin-top:20px;">
                <p style="text-align:center; color:#555; margin-top: 20px;">Find content & creators...</p>
            </div>
        </div>

        <div id="profileModal" class="modal" style="align-items: center;">
            <div class="modal-content">
                <span class="close-btn" onclick="closeProfile()">&times;</span>
                <img src="" id="pModalPic" class="profile-pic-large">
                <div id="pModalName" style="font-size: 22px; font-weight: bold; text-align: center;">...</div>
                <div id="pModalBio" style="text-align:center; color:#aaa; font-size:13px; margin-bottom:10px;">...</div>

                <button id="editProfileBtn" class="btn-primary" style="background:#333; display:none;" onclick="openEditProfile()">Edit Profile</button>
                <button id="pModalFollowBtn" class="follow-btn" style="margin: 0 auto; display:block; margin-top:10px;">Follow</button>

                <div class="stats-row">
                    <div class="stat-box"><span style="font-size:18px; font-weight:bold;" id="pFollowers">0</span><br><span style="font-size:12px; color:#777;">Followers</span></div>
                    <div class="stat-box"><span style="font-size:18px; font-weight:bold;" id="pVideos">0</span><br><span style="font-size:12px; color:#777;">Videos</span></div>
                </div>

                <div class="monetization-card" id="monetizationSection" style="display:none;">
                    </div>

                <h4 style="margin-bottom:10px;">Videos</h4>
                <div id="profileVideosGrid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;"></div>
            </div>
        </div>

        <div id="editProfileModal" class="modal" style="align-items:center; z-index: 400;">
            <div class="modal-content" style="height:auto;">
                <span class="close-btn" onclick="document.getElementById('editProfileModal').style.display='none'">&times;</span>
                <h3>Edit Profile</h3>
                <label>Username</label>
                <input type="text" id="editUsername" placeholder="Enter new username">
                <label>Bio</label>
                <input type="text" id="editBio" placeholder="Tell about yourself">
                <button class="btn-primary" onclick="saveProfileChanges()">SAVE CHANGES</button>
            </div>
        </div>

        <div id="uploadModal" class="modal" style="align-items: center;"><div class="modal-content"><span class="close-btn" onclick="document.getElementById('uploadModal').style.display='none'">&times;</span><h2>Upload</h2><input type="text" id="vTitle" placeholder="Caption..."><input type="file" id="videoFile" accept="video/*" onchange="checkVideo(this)"><div id="progressBar" style="height:5px; background:#8a2be2; width:0%"></div><p id="statusText"></p><button id="uploadBtn" class="btn-primary" onclick="uploadVideo()">POST</button></div></div>

        <div id="commentModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="document.getElementById('commentModal').style.display='none'">&times;</span><h3>Comments</h3><div id="commentsList" style="flex:1; overflow-y:auto;"></div><div style="display:flex; gap:10px;"><input type="text" id="commentInput"><button onclick="postComment()" style="color:#8a2be2; background:none; border:none;">Post</button></div></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, remove, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const CLOUD_NAME = "dusj0vpsi";
        const UPLOAD_PRESET = "paravideo"; // Using general preset
        const firebaseConfig = { apiKey: "AIzaSyDCyVCpFFlFyfY2EMuZQl9BRryf_LxBYXE", authDomain: "ff-comunity-pk.firebaseapp.com", databaseURL: "https://ff-comunity-pk-default-rtdb.firebaseio.com", projectId: "ff-comunity-pk", storageBucket: "ff-comunity-pk.firebasestorage.app", messagingSenderId: "74176981792", appId: "1:74176981792:web:69307b10580f45d46c0545" };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUser = null;
        let allVideosData = [];
        let selectedFile = null;
        let currentVideoId = null;

        // --- LOGIN ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('myPic').src = user.photoURL;
                
                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                if (!snap.exists()) {
                    set(userRef, { username: user.displayName, email: user.email, photo: user.photoURL, bio: "Hi!", uid: user.uid, lowercaseName: user.displayName.toLowerCase() });
                }
                loadFeed();
            }
        });

        // --- 1. FEED & VIDEOS ---
        function loadFeed() {
            onValue(ref(db, 'videos'), (snap) => { // Ref changed to 'videos' for general content
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                if(!snap.exists()) { feed.innerHTML = "<p style='text-align:center;margin-top:50vh'>No Videos</p>"; return; }
                
                let videos = Object.entries(snap.val()).map(([k,v]) => ({key:k, ...v}));
                videos.sort((a,b) => b.timestamp - a.timestamp);
                allVideosData = videos;

                videos.forEach(vid => {
                    const isOwner = (vid.email === 'mohsinilyas991@gmail.com');
                    const badge = isOwner ? '<i class="fas fa-check-circle" style="color:#00C2FF; font-size:12px; margin-left:4px;"></i>' : '';
                    
                    const div = document.createElement('div');
                    div.className = "video-card";
                    div.innerHTML = `
                        <video src="${vid.videoUrl}" loop playsinline class="reel-video" data-key="${vid.key}"></video>
                        <div class="sidebar">
                            <button class="action-btn" onclick="likeVideo('${vid.key}')"><i class="fas fa-heart" id="l-icon-${vid.key}"></i><span id="l-cnt-${vid.key}">0</span></button>
                            <button class="action-btn" onclick="openComments('${vid.key}')"><i class="fas fa-comment-dots"></i><span id="c-cnt-${vid.key}">0</span></button>
                            <button class="action-btn" onclick="shareVideo('${vid.caption || 'Video'}', '${vid.videoUrl}')"><i class="fas fa-share"></i><span>Share</span></button>
                        </div>
                        <div class="video-info">
                            <div class="user-row">
                                <div class="uploader-name" onclick="openProfile('${vid.uid}')">@${vid.uploader} ${badge}</div>
                                <button class="follow-btn js-fol-${vid.uid}" onclick="toggleFollow('${vid.uid}')">Follow</button>
                            </div>
                            <div style="font-size:14px; color:#ddd;">${vid.caption}</div>
                        </div>
                    `;
                    feed.appendChild(div);
                    checkLike(vid.key); updateCommentsCount(vid.key); checkFollow(vid.uid);
                    
                    // Count views silently
                    onValue(ref(db, `gameplay_views/${vid.key}`), (s)=>{}); 
                });
                setupObserver();
            });
        }

        // --- 2. SEARCH SYSTEM ---
        window.openSearchScreen = () => { document.getElementById('searchScreen').style.display = 'block'; document.getElementById('feedScreen').style.display = 'none'; }
        window.closeSearchScreen = () => { document.getElementById('searchScreen').style.display = 'none'; document.getElementById('feedScreen').style.display = 'block'; }
        
        window.performSearch = async () => {
            const txt = document.getElementById('realSearchInput').value.toLowerCase();
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = "";

            if(txt.length < 2) return;

            onValue(ref(db, 'users'), (snap) => {
                if(snap.exists()) {
                    resDiv.innerHTML = "<h4 style='color:#777; margin-left:10px;'>Users</h4>";
                    const users = Object.values(snap.val());
                    const matches = users.filter(u => u.username.toLowerCase().includes(txt));
                    
                    matches.forEach(u => {
                        const div = document.createElement('div');
                        div.className = "search-result-item";
                        div.innerHTML = `
                            <img src="${u.photo || 'https://via.placeholder.com/50'}" class="s-user-pic" onclick="openProfile('${u.uid}')">
                            <div class="s-user-info" onclick="openProfile('${u.uid}')">
                                <div class="s-user-name">${u.username}</div>
                            </div>
                            <button class="follow-btn js-fol-${u.uid}" onclick="toggleFollow('${u.uid}')">Follow</button>
                        `;
                        resDiv.appendChild(div);
                        checkFollow(u.uid);
                    });
                }
            }, {onlyOnce: true});
        }

        // --- 3. PROFILE & MONETIZATION (VIRAL LOOP) ---
        window.openProfile = async (uid) => {
            const modal = document.getElementById('profileModal');
            modal.style.display = "flex";
            
            const snap = await get(ref(db, 'users/' + uid));
            if(!snap.exists()) return;
            const uData = snap.val();

            document.getElementById('pModalName').innerText = uData.username;
            document.getElementById('pModalBio').innerText = uData.bio;
            document.getElementById('pModalPic').src = uData.photo || "https://via.placeholder.com/80";

            // Followers + Admin Hack
            const fSnap = await get(ref(db, 'followers/' + uid));
            let fCount = fSnap.exists() ? fSnap.size : 0;
            if (uData.email === 'mohsinilyas991@gmail.com') fCount = fCount + 125400; 
            document.getElementById('pFollowers').innerText = formatNumber(fCount);

            // Videos & Total Views
            const vGrid = document.getElementById('profileVideosGrid');
            vGrid.innerHTML = "";
            const myVids = allVideosData.filter(v => v.uid === uid);
            document.getElementById('pVideos').innerText = myVids.length;
            
            let totalViews = 0;
            for (let video of myVids) {
                const vEl = document.createElement('video');
                vEl.src = video.videoUrl;
                vEl.style.width = "100%"; vEl.style.height = "120px"; vEl.style.objectFit = "cover";
                vGrid.appendChild(vEl);
                const viewSnap = await get(ref(db, `gameplay_views/${video.key}`));
                if(viewSnap.exists()) totalViews += viewSnap.size;
            }
            if (uData.email === 'mohsinilyas991@gmail.com') totalViews = totalViews + 1500000;

            // MONETIZATION LOGIC
            const editBtn = document.getElementById('editProfileBtn');
            const moneySec = document.getElementById('monetizationSection');
            const folBtn = document.getElementById('pModalFollowBtn');

            if(currentUser.uid === uid) {
                editBtn.style.display = 'block';
                moneySec.style.display = 'block'; 
                folBtn.style.display = 'none';

                const targetFollowers = 100000; 
                const targetViews = 1000000;    
                let fPercent = (fCount / targetFollowers) * 100; if(fPercent > 100) fPercent = 100;
                let vPercent = (totalViews / targetViews) * 100; if(vPercent > 100) vPercent = 100;
                const isEligible = (fCount >= targetFollowers && totalViews >= targetViews);

                moneySec.innerHTML = `
                    <div style="border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0; color:#ffd700; font-size:16px;"><i class="fas fa-crown"></i> Partner Program</h3>
                        <span style="font-size:10px; background:${isEligible ? '#00ff00' : '#444'}; padding:3px 8px; border-radius:4px; color:${isEligible ? 'black' : '#aaa'}; font-weight:bold;">${isEligible ? 'ACTIVE ✅' : 'NOT ELIGIBLE ❌'}</span>
                    </div>
                    <div style="margin-top:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px; color:white; font-weight:bold;"><span>Followers</span><span>${formatNumber(fCount)} / 100k</span></div>
                        <div style="background:#333; height:8px; border-radius:4px; margin-top:5px;"><div style="width: ${fPercent}%; background: ${fPercent >= 100 ? '#00ff00' : '#ff0055'}; height:100%; border-radius:4px;"></div></div>
                    </div>
                    <div style="margin-top:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px; color:white; font-weight:bold;"><span>Total Views</span><span>${formatNumber(totalViews)} / 1M</span></div>
                        <div style="background:#333; height:8px; border-radius:4px; margin-top:5px;"><div style="width: ${vPercent}%; background: ${vPercent >= 100 ? '#00ff00' : '#00C2FF'}; height:100%; border-radius:4px;"></div></div>
                    </div>
                    <div style="margin-top:20px; text-align:center; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; border:1px solid #444;">
                        <div style="font-size:12px; color:#ccc;">Estimated Earnings</div>
                        <div class="money-text" style="color:${isEligible ? '#00ff00' : '#777'}; font-size:28px; font-family:monospace; margin:5px 0;">${isEligible ? '$1,450.00' : '$0.00'}</div>
                        <button style="width:100%; background:${isEligible ? '#00C2FF' : '#333'}; border:none; color:white; padding:10px; border-radius:25px; font-weight:bold;" ${isEligible ? '' : 'disabled'}>${isEligible ? 'WITHDRAW FUNDS' : 'LOCKED 🔒'}</button>
                    </div>
                `;
            } else {
                editBtn.style.display = 'none';
                moneySec.style.display = 'none';
                folBtn.style.display = 'block';
                folBtn.className = `follow-btn js-fol-${uid}`;
                folBtn.setAttribute('onclick', `toggleFollow('${uid}')`);
                checkFollow(uid);
            }
        };
        window.closeProfile = () => document.getElementById('profileModal').style.display = 'none';

        // --- 4. SHARE LOGIC ---
        window.shareVideo = async (title, url) => {
            if (navigator.share) {
                try { await navigator.share({ title: 'ParaVideo', text: title, url: url }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(url).then(() => alert("Link copied!"));
            }
        };

        // --- 5. EDIT PROFILE ---
        window.openEditProfile = () => {
            document.getElementById('editProfileModal').style.display = 'flex';
            document.getElementById('editUsername').value = document.getElementById('pModalName').innerText;
            document.getElementById('editBio').value = document.getElementById('pModalBio').innerText;
        }
        window.saveProfileChanges = async () => {
            const newName = document.getElementById('editUsername').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            await update(ref(db, 'users/' + currentUser.uid), { username: newName, bio: newBio, lowercaseName: newName.toLowerCase() });
            alert("Profile Updated!"); document.getElementById('editProfileModal').style.display = 'none'; openProfile(currentUser.uid);
        }

        // --- 6. STANDARD UTILS (Like, Follow, Upload) ---
        window.toggleFollow = async (uid) => {
            if(uid === currentUser.uid) return;
            const r1 = ref(db, `follows/${currentUser.uid}/${uid}`); const r2 = ref(db, `followers/${uid}/${currentUser.uid}`);
            const s = await get(r1); if(s.exists()) { await remove(r1); await remove(r2); } else { await set(r1, true); await set(r2, true); }
            checkFollow(uid);
        }
        function checkFollow(uid) {
            if(uid === currentUser.uid) { document.querySelectorAll(`.js-fol-${uid}`).forEach(b=>b.style.display='none'); return; }
            onValue(ref(db, `follows/${currentUser.uid}/${uid}`), s => {
                document.querySelectorAll(`.js-fol-${uid}`).forEach(b => {
                    b.innerText = s.exists() ? "Following" : "Follow";
                    s.exists() ? b.classList.add('following') : b.classList.remove('following');
                })
            })
        }
        window.likeVideo = (k) => { const r = ref(db, `gameplay_likes/${k}/${currentUser.uid}`); get(r).then(s => s.exists() ? remove(r) : set(r,true)); }
        function checkLike(k) { onValue(ref(db, `gameplay_likes/${k}`), s => { document.getElementById(`l-cnt-${k}`).innerText = s.size; document.getElementById(`l-icon-${k}`).classList.toggle('liked', s.hasChild(currentUser.uid)); }) }
        window.openComments = (k) => { currentVideoId = k; document.getElementById('commentModal').style.display='flex'; onValue(ref(db,`gameplay_comments/${k}`), s=>{ const l=document.getElementById('commentsList'); l.innerHTML=""; s.forEach(c=>{ l.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;"><b>${c.val().u}</b>: ${c.val().t}</div>`; }); }) }
        window.postComment = () => { const t = document.getElementById('commentInput').value; if(t) push(ref(db,`gameplay_comments/${currentVideoId}`), {u:currentUser.displayName, t:t}); document.getElementById('commentInput').value=""; }
        function updateCommentsCount(k) { onValue(ref(db,`gameplay_comments/${k}`), s=>document.getElementById(`c-cnt-${k}`).innerText = s.size); }
        window.openUploadModal = () => document.getElementById('uploadModal').style.display='flex';
        window.checkVideo = (i) => { if(i.files[0]) selectedFile = i.files[0]; }
        window.uploadVideo = () => {
            if(!selectedFile) return;
            const fd = new FormData(); fd.append("file", selectedFile); fd.append("upload_preset", UPLOAD_PRESET);
            const xhr = new XMLHttpRequest(); xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('progressBar').style.width = (e.loaded/e.total)*100 + "%";
            xhr.onload = async () => {
                const url = JSON.parse(xhr.responseText).secure_url;
                await push(ref(db, 'videos'), { videoUrl: url, caption: document.getElementById('vTitle').value, uploader: currentUser.displayName, uid: currentUser.uid, email: currentUser.email, timestamp: Date.now() });
                alert("Uploaded!"); location.reload();
            };
            xhr.send(fd);
        }
        function setupObserver() {
            const obs = new IntersectionObserver(e => e.forEach(en => { if(en.isIntersecting) { en.target.play(); countView(en.target.getAttribute('data-key')); } else { en.target.pause(); } }), {threshold:0.6});
            document.querySelectorAll('video').forEach(v => { obs.observe(v); v.onclick=()=>v.paused?v.play():v.pause(); });
        }
        async function countView(k) { if(k && currentUser) { const r = ref(db, `gameplay_views/${k}/${currentUser.uid}`); const s = await get(r); if(!s.exists()) set(r, true); } }
        function formatNumber(num) { if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M'; if (num >= 1000) return (num / 1000).toFixed(1) + 'k'; return num; }
    </script>
</body>
</html>
