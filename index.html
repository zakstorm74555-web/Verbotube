<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParaVideo - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- THEME & RESET --- */
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        /* --- DESKTOP VIEW FIX --- */
        @media (min-width: 768px) {
            body {
                background: #111;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-image: radial-gradient(circle, #222 1px, transparent 1px);
                background-size: 20px 20px;
            }
            #appScreen, #loginScreen {
                width: 100%;
                max-width: 450px;
                height: 100vh;
                background: #000;
                position: relative;
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
                border-left: 1px solid #333;
                border-right: 1px solid #333;
                overflow: hidden;
            }
            header, .modal, .comments-modal {
                max-width: 450px;
                left: 50% !important;
                transform: translateX(-50%);
            }
            ::-webkit-scrollbar { width: 0px; }
        }

        /* --- MOBILE STYLES --- */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .app-name { font-size: 40px; font-weight: bold; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        .login-btn { background: white; color: black; padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }

        header { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            padding: 10px 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; 
            display: flex; flex-direction: column; gap: 10px; border: none;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 20px; font-weight: bold; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .upload-icon { color: #fff; font-size: 26px; cursor: pointer; text-shadow: 1px 1px 2px black; }
        
        .search-box { width: 100%; position: relative; }
        .search-box input { 
            width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 10px 40px 10px 15px; 
            border-radius: 20px; color: white; outline: none; font-size: 14px; backdrop-filter: blur(5px);
        }
        .search-box i { position: absolute; right: 15px; top: 12px; color: #ddd; }

        .feed-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { background: #000; width: 100%; height: 100vh; position: relative; scroll-snap-align: start; border-bottom: 1px solid #111; }
        
        /* HD VIDEO CSS FIX */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
            /* Enhances sharpness on screens */
            image-rendering: -webkit-optimize-contrast; 
        }

        .sidebar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; text-shadow: 1px 1px 2px black; }
        .action-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-btn span { font-size: 13px; margin-top: 5px; font-weight: bold; }
        .liked { color: #ff0055 !important; }

        .video-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; padding-bottom: 40px; pointer-events: none; }
        .user-row { display: flex; align-items: center; gap: 10px; pointer-events: auto; margin-bottom: 8px; }
        .uploader-name { font-weight: bold; color: white; font-size: 17px; cursor: pointer; }
        .follow-btn { background: transparent; border: 1px solid white; color: white; font-size: 11px; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .following { background: white; color: black; border: none; }
        
        .ad-badge { background: #ff0055; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; display: inline-block; margin-bottom: 5px; box-shadow: 0 0 10px #ff0055; }
        .ad-btn { background: white; color: black; border: none; padding: 12px 20px; width: 100%; border-radius: 30px; font-weight: bold; margin-top: 10px; cursor: pointer; pointer-events: auto; text-transform: uppercase; }

        .music-bar { font-size: 13px; color: #fff; display: flex; align-items: center; gap: 8px; margin-top: 8px; pointer-events: auto; cursor: pointer; opacity: 0.9; }
        .music-spin { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid #8a2be2; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }

        .comments-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh; background: #111; z-index: 500; border-radius: 20px 20px 0 0; transition: bottom 0.3s ease-in-out; display: flex; flex-direction: column; border-top: 1px solid #333; }
        .comments-modal.active { bottom: 0; }
        .comments-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment-input-area { padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; background: #000; }
        .comment-input-area input { flex: 1; background: #222; border: none; padding: 12px; color: white; border-radius: 20px; outline: none; }

        .tab-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .active-tab { background: #8a2be2; color: white; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .upload-submit { width: 100%; background: #8a2be2; border: none; padding: 12px; border-radius: 25px; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="app-name">PARA<span style="color:#8a2be2;">VIDEO</span></div>
        <p style="color:#aaa;">Short Video Platform</p>
        <button class="login-btn" id="loginBtn"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <div id="appScreen" style="display:none;">
        <header>
            <div class="top-row">
                <div class="header-logo">PARA<span style="color:#8a2be2;">VIDEO</span></div>
                <div style="display:flex; gap:20px; align-items:center;">
                    <i class="fas fa-plus-square upload-icon" onclick="openUploadModal()"></i>
                    <img src="" id="myPic" onclick="goToMyProfile()" style="width:32px; height:32px; border-radius:50%; border:2px solid #8a2be2; cursor:pointer;">
                </div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search Users..." onclick="window.location.href='search.html'">
                <i class="fas fa-search"></i>
            </div>
        </header>

        <div class="feed-container" id="feed">
            <p style="text-align:center; color:#555; margin-top:50vh;">Loading Videos...</p>
        </div>
        
        <div class="comments-modal" id="commentsModal">
            <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; font-weight:bold;">
                <span>Comments</span>
                <i class="fas fa-times" onclick="closeComments()" style="cursor:pointer; font-size: 20px;"></i>
            </div>
            <div class="comments-list" id="commentsList"></div>
            <div class="comment-input-area">
                <input type="text" id="commentInput" placeholder="Add a comment...">
                <button onclick="postComment()" style="color:#8a2be2; background:none; border:none; font-weight:bold;">Post</button>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeUpload()">&times;</span>
            <h3 style="color:#8a2be2; margin-top:0;">Create Video</h3>
            <div class="tab-btns">
                <button class="tab-btn active-tab" onclick="switchTab('gallery', this)">Gallery</button>
                <button class="tab-btn" onclick="switchTab('camera', this)">Camera</button>
            </div>
            <div id="gallery-section">
                <input type="file" id="videoFile" accept="video/*" onchange="fileSelected(this)" style="padding: 20px; border: 2px dashed #555; width:100%; box-sizing:border-box;">
            </div>
            <div id="camera-section" style="display:none;">
                <video id="camera-preview" autoplay muted playsinline style="width:100%; height:200px; background:black; display:none;"></video>
                <div id="recBtn" style="width:50px; height:50px; background:red; border-radius:50%; margin:10px auto; cursor:pointer; border:3px solid white; display:none;" onclick="toggleRecording()"></div>
                <p id="rec-status" style="color:red; display:none;">Recording...</p>
            </div>
            <h4 style="text-align:left; margin:20px 0 5px;">Details</h4>
            <input type="text" id="caption" placeholder="Write a caption...">
            <input type="text" id="ytLink" placeholder="YouTube Music Link (Optional)">
            <input type="number" id="startTime" placeholder="Music Start Time (sec)">
            <div id="progress" style="display:none; width:100%; height:5px; background:#333; margin-top:10px;"><div id="bar" style="height:100%; width:0%; background:#8a2be2;"></div></div>
            <button class="upload-submit" id="postBtn" onclick="uploadVideo()">POST VIDEO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc",
            authDomain: "paravideo-1ac3b.firebaseapp.com",
            databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com",
            projectId: "paravideo-1ac3b",
            storageBucket: "paravideo-1ac3b.firebasestorage.app",
            messagingSenderId: "384549024202",
            appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33",
            measurementId: "G-QNFHZ1CDLY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let currentUser = null;
        let selectedFile = null;
        let currentVideoKeyForComments = null;

        document.getElementById('loginBtn').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch((error) => alert("Login Failed: " + error.message));
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('myPic').src = user.photoURL;
                
                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                if (!snap.exists()) {
                    set(userRef, { 
                        username: user.displayName, 
                        email: user.email, 
                        photo: user.photoURL, 
                        bio: "Hi there!", 
                        uid: user.uid,
                        lowercaseName: user.displayName.toLowerCase()
                    });
                }
                loadSmartFeed();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        // --- NEW OPTIMIZED VIDEO URL ---
        function getHdUrl(originalUrl) {
            // w_1080: 1080p Width
            // q_auto: Automatic Quality (Smart compression)
            // f_auto: Automatic Format (Best for browser)
            // This combination gives HD quality WITHOUT buffering
            return originalUrl.replace("/upload/", "/upload/w_1080,q_auto,f_auto/");
        }

        async function loadSmartFeed() {
            const adSnap = await get(ref(db, 'ads'));
            let activeAds = [];
            
            if(adSnap.exists()) {
                adSnap.forEach(c => {
                    if(Date.now() < c.val().expiry) {
                        activeAds.push({ type: 'ad', key: c.key, ...c.val() });
                    } else {
                        remove(ref(db, `ads/${c.key}`));
                    }
                });
            }

            onValue(ref(db, 'gameplay_clips'), (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                let videos = [];
                
                if (snap.exists()) {
                    videos = Object.entries(snap.val()).map(([k, v]) => ({ key: k, type: 'video', ...v }));
                    videos.sort(() => Math.random() - 0.5);
                }

                const fullFeed = [...activeAds, ...videos];

                if(fullFeed.length === 0) {
                    feed.innerHTML = "<p style='text-align:center;color:#555;margin-top:50vh'>No content available.</p>";
                    return;
                }

                fullFeed.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "video-card";

                    // --- APPLY HD FIX ---
                    const finalVideoUrl = getHdUrl(item.videoUrl);

                    if (item.type === 'ad') {
                        div.innerHTML = `
                            <video src="${finalVideoUrl}" loop playsinline class="reel-video"></video>
                            <div class="video-info" style="padding-bottom:60px;">
                                <div class="ad-badge">SPONSORED</div>
                                <div style="font-size:18px; font-weight:bold; margin-bottom:5px;">${item.caption}</div>
                                <button onclick="window.open('${item.link}', '_blank')" class="ad-btn">
                                    ${item.btnText} <i class="fas fa-external-link-alt"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        const isOwner = (item.email === 'elitegamer859650@gmail.com');
                        const badge = isOwner ? '<i class="fas fa-check-circle" style="color:#00C2FF; font-size:12px; margin-left:5px;"></i>' : '';
                        const musicHtml = item.musicLink ? `<div class="music-bar" onclick="window.open('${item.musicLink}&t=${item.startTime || 0}s', '_blank')"><i class="fas fa-compact-disc music-spin"></i> Sound</div>` : '';

                        div.innerHTML = `
                            <video src="${finalVideoUrl}" loop playsinline class="reel-video" data-key="${item.key}"></video>
                            <div class="sidebar">
                                <button class="action-btn" onclick="window.handleLike('${item.key}')"><i class="fas fa-heart" id="like-icon-${item.key}"></i><span id="like-count-${item.key}">0</span></button>
                                <button class="action-btn" onclick="window.openComments('${item.key}')"><i class="fas fa-comment-dots"></i><span id="comment-count-${item.key}">0</span></button>
                                <button class="action-btn" onclick="window.shareVideo('${item.caption || 'ParaVideo'}', '${item.videoUrl}')"><i class="fas fa-share"></i><span>Share</span></button>
                            </div>
                            <div class="video-info">
                                <div class="user-row">
                                    <div class="uploader-name" id="name-${item.key}" onclick="window.location.href='profile.html?uid=${item.uid}'">@${item.uploader} ${badge}</div>
                                    <button class="follow-btn js-follow-${item.uid}" onclick="window.toggleFollow('${item.uid}')">Follow</button>
                                </div>
                                <div style="font-size:14px; color:#eee;">${item.caption}</div>
                                ${musicHtml}
                            </div>
                        `;
                        
                        onValue(ref(db, 'users/' + item.uid), (uSnap) => {
                            if(uSnap.exists()) {
                                const u = uSnap.val();
                                let liveBadge = u.email === 'elitegamer859650@gmail.com' ? '<i class="fas fa-check-circle" style="color:#00C2FF;"></i>' : '';
                                if(u.customBadge) liveBadge += ` <span style="background:#ff0055; font-size:10px; padding:2px 5px; border-radius:3px; margin-left:5px;">${u.customBadge}</span>`;
                                document.getElementById(`name-${item.key}`).innerHTML = `@${u.username} ${liveBadge}`;
                            }
                        });

                        checkLikeStatus(item.key); updateCommentCount(item.key); checkFollowStatus(item.uid);
                    }
                    feed.appendChild(div);
                });
                setupObserver();
            });
        }

        // --- INTERACTIONS ---
        window.handleLike = (key) => { const r = ref(db, `gameplay_likes/${key}/${currentUser.uid}`); get(r).then(s => s.exists() ? remove(r) : set(r, true)); };
        window.openComments = (key) => { currentVideoKeyForComments = key; document.getElementById('commentsModal').classList.add('active'); const list = document.getElementById('commentsList'); list.innerHTML = "Loading..."; onValue(ref(db, `gameplay_comments/${key}`), (snap) => { list.innerHTML = ""; if(!snap.exists()) { list.innerHTML = "<p style='text-align:center; color:#555'>No comments.</p>"; return; } snap.forEach(c => { const val = c.val(); list.innerHTML += `<div style="margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;"><b style="color:#ddd">${val.u || 'User'}:</b> <span style="color:#fff">${val.t}</span></div>`; }); }); };
        window.postComment = () => { const t = document.getElementById('commentInput').value; if(t && currentVideoKeyForComments) { push(ref(db, `gameplay_comments/${currentVideoKeyForComments}`), { u: currentUser.displayName, t: t, uid: currentUser.uid, time: Date.now() }); document.getElementById('commentInput').value = ""; } };
        window.shareVideo = (title, url) => { if (navigator.share) { navigator.share({ title: 'ParaVideo', text: title, url: url }).catch(console.error); } else { navigator.clipboard.writeText(url).then(() => alert("Link copied!")); } };
        
        // --- CORRECT ROOT PATH FOLLOW LOGIC ---
        window.toggleFollow = async (uid) => { 
            if(uid === currentUser.uid) return; 
            const r1 = ref(db, `followers/${uid}/${currentUser.uid}`); // Add me to THEIR followers list
            const r2 = ref(db, `following/${currentUser.uid}/${uid}`); // Add them to MY following list
            
            const s = await get(r1); 
            if(s.exists()) { 
                await remove(r1); await remove(r2); 
            } else { 
                await set(r1, true); await set(r2, true); 
            } 
        };
        
        function checkLikeStatus(key) { onValue(ref(db, `gameplay_likes/${key}`), s => { document.getElementById(`like-count-${key}`).innerText = s.size; document.getElementById(`like-icon-${key}`).style.color = s.hasChild(currentUser.uid) ? '#ff0055' : 'white'; }); }
        function updateCommentCount(key) { onValue(ref(db, `gameplay_comments/${key}`), s => document.getElementById(`comment-count-${key}`).innerText = s.size); }
        
        // --- FOLLOW STATUS CHECK WITH ROOT PATH ---
        function checkFollowStatus(uid) { 
            if(uid === currentUser.uid) { document.querySelectorAll(`.js-follow-${uid}`).forEach(b => b.style.display='none'); return; } 
            
            // Check ROOT followers
            onValue(ref(db, `followers/${uid}/${currentUser.uid}`), s => { 
                document.querySelectorAll(`.js-follow-${uid}`).forEach(b => { 
                    b.innerText = s.exists() ? "Following" : "Follow"; 
                    b.classList.toggle('following', s.exists()); 
                }); 
            }); 
        }
        
        window.openUploadModal = () => document.getElementById('uploadModal').style.display = 'flex';
        window.closeUpload = () => { document.getElementById('uploadModal').style.display = 'none'; stopCamera(); };
        window.closeComments = () => document.getElementById('commentsModal').classList.remove('active');
        window.goToMyProfile = () => window.location.href = `profile.html?uid=${currentUser.uid}`;
        
        window.switchTab = (tab, btn) => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); btn.classList.add('active-tab'); if (tab === 'gallery') { document.getElementById('gallery-section').style.display = 'block'; document.getElementById('camera-section').style.display = 'none'; stopCamera(); } else { document.getElementById('gallery-section').style.display = 'none'; document.getElementById('camera-section').style.display = 'block'; startCamera(); } };
        window.fileSelected = (input) => { if(input.files[0]) selectedFile = input.files[0]; };

        let mediaRecorder, chunks = [], stream;
        async function startCamera() { try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); const vid = document.getElementById('camera-preview'); vid.srcObject = stream; vid.style.display = 'block'; document.getElementById('recBtn').style.display = 'block'; mediaRecorder = new MediaRecorder(stream); mediaRecorder.ondataavailable = e => chunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(chunks, { type: 'video/webm' }); selectedFile = new File([blob], "rec.webm", { type: 'video/webm' }); document.getElementById('rec-status').innerText = "Recorded!"; chunks = []; }; } catch (e) { alert("Camera Error"); } }
        function stopCamera() { if(stream) stream.getTracks().forEach(t => t.stop()); }
        window.toggleRecording = () => { const btn = document.getElementById('recBtn'); if(mediaRecorder.state === "inactive") { mediaRecorder.start(); btn.style.borderRadius = "10px"; document.getElementById('rec-status').style.display='block'; } else { mediaRecorder.stop(); btn.style.borderRadius = "50%"; stopCamera(); document.getElementById('rec-status').style.display='none'; } };

        window.uploadVideo = async () => {
            if(!selectedFile) return alert("Select video first");
            const btn = document.getElementById('postBtn'); btn.disabled = true; btn.innerText = "Uploading...";
            
            let uName = currentUser.displayName;
            try { const uSnap = await get(ref(db, 'users/' + currentUser.uid + '/username')); if(uSnap.exists()) uName = uSnap.val(); } catch(e){}

            const fd = new FormData(); fd.append("file", selectedFile); fd.append("upload_preset", UPLOAD_PRESET);
            const xhr = new XMLHttpRequest(); xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = e => document.getElementById('bar').style.width = (e.loaded/e.total)*100 + "%";
            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const url = JSON.parse(xhr.responseText).secure_url;
                    await push(ref(db, 'gameplay_clips'), { videoUrl: url, caption: document.getElementById('caption').value, musicLink: document.getElementById('ytLink').value, startTime: document.getElementById('startTime').value, uploader: uName, uid: currentUser.uid, email: currentUser.email, timestamp: Date.now() });
                    alert("Uploaded!"); location.reload();
                } else { alert("Upload Failed: " + xhr.statusText); btn.disabled = false; btn.innerText = "POST VIDEO"; }
            };
            xhr.send(fd);
        };

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) { entry.target.play(); } else { entry.target.pause(); }
                });
            }, {threshold: 0.6});
            document.querySelectorAll('video').forEach(v => {
                obs.observe(v);
                v.onclick = () => v.paused ? v.play() : v.pause();
            });
        }
    </script>
</body>
</html>
