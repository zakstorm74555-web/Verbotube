<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Shorts App</title>
    <style>
        /* 1. DEVICE ADJUSTMENT (Responsiveness) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: sans-serif; overflow: hidden; }

        /* Container jo scroll snap karega (TikTok jaisa feel) */
        .app-container {
            height: 100vh; /* Puri screen height */
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Ye magic line hai snap ke liye */
        }

        /* Har Video ka section */
        .video-wrapper {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* Har video start par rukegi */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }

        /* Video Styling - Puri screen cover karegi */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Video kat ke adjust hogi, stretch nahi hogi */
        }

        /* Right Side Icons (Like, Comment) */
        .sidebar {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .icon-btn {
            color: white;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
        }
        
        .icon-btn span { font-size: 30px; display: block; margin-bottom: 5px; }

        /* 2. COMMENT SYSTEM (Pop-up/Modal) */
        .comments-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; /* Aadhi screen */
            background: white;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%); /* Pehle chupa hua hoga */
            transition: transform 0.3s ease-in-out;
            z-index: 20;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .comments-sheet.active {
            transform: translateY(0); /* Upar aa jayega */
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            color: #333;
        }
        
        .single-comment { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        .comment-input-area { display: flex; gap: 10px; }
        
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; }
        button { padding: 10px 20px; background: #ff0050; color: white; border: none; border-radius: 20px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="app-container" id="scrollContainer">
        
        <div class="video-wrapper">
            <video class="short-video" src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted playsinline></video>
            
            <div class="sidebar">
                <div class="icon-btn"><span>❤️</span> 1.2k</div>
                <div class="icon-btn" onclick="toggleComments(1)"><span>💬</span> Comments</div>
                <div class="icon-btn"><span>↪️</span> Share</div>
            </div>

            <div class="comments-sheet" id="comment-sheet-1">
                <div class="comment-header">
                    <span>Comments</span>
                    <span onclick="toggleComments(1)">✖️</span>
                </div>
                <div class="comments-list" id="list-1">
                    <div class="single-comment"><b>Ali:</b> Nice video bhai!</div>
                </div>
                <div class="comment-input-area">
                    <input type="text" id="input-1" placeholder="Add a comment...">
                    <button onclick="addComment(1)">Post</button>
                </div>
            </div>
        </div>

        <div class="video-wrapper">
            <video class="short-video" src="https://www.w3schools.com/html/movie.mp4" loop muted playsinline></video>
            
            <div class="sidebar">
                <div class="icon-btn"><span>❤️</span> 850</div>
                <div class="icon-btn" onclick="toggleComments(2)"><span>💬</span> Comments</div>
            </div>

            <div class="comments-sheet" id="comment-sheet-2">
                <div class="comment-header"><span>Comments</span><span onclick="toggleComments(2)">✖️</span></div>
                <div class="comments-list" id="list-2"></div>
                <div class="comment-input-area">
                    <input type="text" id="input-2" placeholder="Bhai ke liye comment...">
                    <button onclick="addComment(2)">Post</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 1. AUTOPLAY & SCROLL LOGIC ---
        const videos = document.querySelectorAll('.short-video');

        // Ye system check karega ke kaunsi video screen par hai
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                
                if (entry.isIntersecting) {
                    // Video screen par aayi -> Play karo
                    video.currentTime = 0; // Shuru se start kare
                    video.play();
                } else {
                    // Video screen se gayi -> Pause karo
                    video.pause();
                }
            });
        }, { threshold: 0.6 }); // Jab 60% video dikhe tabhi play ho

        // Har video par observer lagao
        videos.forEach(video => {
            observer.observe(video);
            
            // Mobile par tap karne se Sound On/Off ho
            video.addEventListener('click', () => {
                video.muted = !video.muted;
                alert(video.muted ? "Muted" : "Sound On");
            });
        });


        // --- 2. COMMENTS LOGIC ---
        function toggleComments(id) {
            const sheet = document.getElementById(`comment-sheet-${id}`);
            sheet.classList.toggle('active');
        }

        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const list = document.getElementById(`list-${id}`);
            const text = input.value;

            if (text.trim() !== "") {
                const newDiv = document.createElement("div");
                newDiv.className = "single-comment";
                newDiv.innerHTML = `<b>You:</b> ${text}`;
                list.appendChild(newDiv);
                input.value = ""; // Clear input
            }
        }
    </script>
</body>
</html>
