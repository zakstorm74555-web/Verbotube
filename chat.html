<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inbox - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100svh; overflow: hidden; }
        
        #chat-wrapper { display: flex; width: 200%; height: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-section { width: 50%; height: 100%; display: flex; flex-direction: column; }

        .chat-header { background: rgba(10,10,10,0.95); padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #1a1a1a; backdrop-filter: blur(15px); z-index: 10; }
        .back-btn { color: #FFD700; background: none; border: none; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .chat-title { font-weight: 800; font-size: 16px; flex: 1; color: #FFD700; text-transform: uppercase; letter-spacing: 2px; }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; background: #000; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 18px; border-bottom: 0.5px solid #0a0a0a; transition: 0.2s; }
        .chat-item:active { background: #0a0a0a; }
        .chat-item img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; }
        .chat-info { flex: 1; }
        .chat-info .name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
        .chat-info .last-msg { font-size: 12px; color: #555; font-weight: 600; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at bottom, #0a0a0a, #000); scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #FFD700; color: #000; border-bottom-right-radius: 4px; font-weight: 600; box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2); }
        .msg-other { align-self: flex-start; background: #111; color: #fff; border-bottom-left-radius: 4px; border: 0.5px solid #222; }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 6px; text-align: right; }

        .video-shared { width: 240px; border-radius: 15px; overflow: hidden; background: #000; border: 2.5px solid #FFD700; margin-top: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .video-shared video { width: 100%; display: block; max-height: 320px; }
        
        .audio-msg { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
        audio { height: 35px; width: 180px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }

        .input-area { padding: 15px; background: #000; display: flex; align-items: center; gap: 12px; border-top: 0.5px solid #1a1a1a; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #msgInput { flex: 1; background: #111; border: 1.5px solid #222; padding: 12px 20px; border-radius: 30px; color: white; outline: none; font-size: 15px; transition: 0.3s; }
        #msgInput:focus { border-color: #FFD700; }
        
        .icon-btn { background: none; border: none; color: #FFD700; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.8); }
        .recording { color: #FF0000 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .send-btn { width: 48px; height: 48px; background: #FFD700; border-radius: 50%; border: none; color: black; display: flex; justify-content: center; align-items: center; font-size: 18px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
    </style>
</head>
<body>

    <div id="chat-wrapper">
        <!-- Section 1: Chat List -->
        <div class="page-section" id="list-section">
            <div class="chat-header">
                <button class="back-btn" onclick="window.location.href='index'"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-title">Transmissions</div>
            </div>
            <div class="chat-list" id="active-chats"></div>
        </div>

        <!-- Section 2: Chat Room -->
        <div class="page-section" id="room-section">
            <div class="chat-header">
                <button class="back-btn" onclick="toggleView('list')"><i class="fas fa-chevron-left"></i></button>
                <div class="chat-title" id="chatTitle">Pilot Name</div>
            </div>
            <div class="chat-area" id="messages"></div>
            <div class="input-area">
                <button class="icon-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="msgInput" placeholder="Enter message...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Blackblaze Bridged Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let myUid = null, otherUid = null, isFirstLoad = true;
        let mediaRecorder, audioChunks = [];

        onAuthStateChanged(auth, user => {
            if(user) { 
                myUid = user.uid;
                loadChatHistory();
                checkShareLink();
            } else { window.location.href = 'login'; }
        });

        // --- BLACKBLAZE SYNCED VOICE RECORDER ---
        const micBtn = document.getElementById('micBtn');
        micBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    audioChunks = [];
                    micBtn.classList.add('recording');
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                        micBtn.classList.remove('recording');
                        
                        // Upload Audio to Blackblaze
                        const chatId = [myUid, otherUid].sort().join("_");
                        const audioPath = `voice_notes/${chatId}/${Date.now()}.mp3`;
                        const storageRef = sRef(storage, audioPath);
                        
                        try {
                            const snap = await uploadBytes(storageRef, blob);
                            const url = await getDownloadURL(snap.ref);
                            push(ref(db, `chats/${chatId}`), { text: url, sender: myUid, time: Date.now(), type: 'audio' });
                        } catch (e) { alert("B2 Audio Sync Failed!"); }
                    };
                } catch (e) { alert("Microphone access denied!"); }
            } else {
                mediaRecorder.stop();
            }
        };

        window.toggleView = (v) => { document.getElementById('chat-wrapper').style.transform = v === 'list' ? 'translateX(0)' : 'translateX(-50%)'; };

        async function openDirectChat(uid, name) {
            otherUid = uid;
            document.getElementById('chatTitle').innerText = name || "Pilot";
            toggleView('room');
            loadMessages();
        }

        function loadMessages() {
            const chatId = [myUid, otherUid].sort().join("_");
            onValue(ref(db, `chats/${chatId}`), (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                snap.forEach(child => {
                    const msg = child.val();
                    const isMe = msg.sender === myUid;
                    const time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    
                    let content = "";
                    if (msg.type === 'video') {
                        content = `<div class="video-shared"><video src="${msg.text}" controls></video></div>`;
                    } else if (msg.type === 'audio') {
                        content = `<div class="audio-msg"><audio src="${msg.text}" controls></audio></div>`;
                    } else {
                        content = msg.text;
                    }

                    div.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${content}<div class="msg-time">${time}</div></div>`;
                    if(!isFirstLoad && !isMe) document.getElementById('notifySound').play();
                });
                div.scrollTop = div.scrollHeight;
                isFirstLoad = false;
            });
        }

        function loadChatHistory() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('active-chats');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if(child.key !== myUid) {
                        const div = document.createElement('div');
                        div.className = "chat-item";
                        div.innerHTML = `
                            <img src="${u.photo || 'icon.png'}">
                            <div class="chat-info">
                                <div class="name">${u.username} ${u.email === 'elitegamer859650@gmail.com' ? '⭐' : ''}</div>
                                <div class="last-msg">Tap to start transmission</div>
                            </div>`;
                        div.onclick = () => openDirectChat(child.key, u.username);
                        list.appendChild(div);
                    }
                });
            });
        }

        async function checkShareLink() {
            const p = new URLSearchParams(window.location.search);
            const shareUrl = p.get('share');
            const targetUid = p.get('uid');
            const targetName = p.get('name');

            if(shareUrl && targetUid) {
                otherUid = targetUid;
                const chatId = [myUid, otherUid].sort().join("_");
                await push(ref(db, `chats/${chatId}`), { text: shareUrl, sender: myUid, time: Date.now(), type: 'video' });
                openDirectChat(targetUid, targetName);
                window.history.replaceState({}, '', window.location.pathname + `?uid=${targetUid}&name=${targetName}`);
            } else if(targetUid) {
                openDirectChat(targetUid, targetName);
            }
        }

        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !otherUid) return;
            const chatId = [myUid, otherUid].sort().join("_");
            push(ref(db, `chats/${chatId}`), { text: input.value, sender: myUid, time: Date.now(), type: 'text' });
            input.value = "";
        };
    </script>
</body>
</html>
