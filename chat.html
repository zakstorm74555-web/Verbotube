<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* HEADER */
        .chat-header { background: #111; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
        .back-btn { color: white; background: none; border: none; font-size: 20px; cursor: pointer; }
        .chat-title { font-weight: bold; font-size: 16px; flex: 1; }
        
        /* MESSAGES AREA */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; }
        
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: #8a2be2; color: white; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: #333; color: white; border-bottom-left-radius: 2px; }
        
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.7); text-align: right; margin-top: 5px; }

        /* INPUT AREA */
        .input-area { padding: 10px; background: #111; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { width: 45px; height: 45px; background: #8a2be2; border-radius: 50%; border: none; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-title" id="chatTitle">User</div>
        <i class="fas fa-video" style="color:#8a2be2;"></i>
    </div>

    <div class="chat-area" id="messages">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null;
        const params = new URLSearchParams(window.location.search);
        const otherUid = params.get('uid');
        const otherName = params.get('name');
        
        document.getElementById('chatTitle').innerText = otherName || "Chat";

        onAuthStateChanged(auth, user => {
            if(user) { myUid = user.uid; loadMessages(); }
            else window.location.href = 'index.html';
        });

        // Unique Chat ID (Alphabetical Order)
        function getChatId() {
            return [myUid, otherUid].sort().join("_");
        }

        function loadMessages() {
            const chatId = getChatId();
            const chatRef = ref(db, `chats/${chatId}`);
            
            onValue(chatRef, (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                if(snap.exists()) {
                    snap.forEach(child => {
                        const msg = child.val();
                        const isMe = msg.sender === myUid;
                        
                        const bubble = document.createElement('div');
                        bubble.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
                        bubble.innerHTML = `${msg.text} <div class="msg-time">${new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
                        div.appendChild(bubble);
                    });
                    div.scrollTop = div.scrollHeight; // Auto scroll to bottom
                }
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            const chatId = getChatId();
            push(ref(db, `chats/${chatId}`), {
                text: text,
                sender: myUid,
                time: Date.now()
            });
            input.value = "";
        };
    </script>
</body>
</html>
