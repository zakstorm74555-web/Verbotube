<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VERBOTUBE THEME --- */
        * { box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* HEADER */
        .chat-header { 
            background: #111; padding: 15px; display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid #333; 
        }
        .back-btn { color: #FFD700; background: none; border: none; font-size: 22px; cursor: pointer; } 
        .chat-title { font-weight: bold; font-size: 18px; flex: 1; text-transform: capitalize; color: white; }
        
        /* MESSAGES AREA */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; 
            background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; 
        }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; }
        
        /* VERBOTUBE COLORS */
        .msg-me { 
            align-self: flex-end; 
            background: #FFD700; /* Gold */
            color: black; 
            border-bottom-right-radius: 4px; 
            font-weight: 500;
        }
        .msg-other { 
            align-self: flex-start; 
            background: #333; 
            color: white; 
            border-bottom-left-radius: 4px; 
        }
        
        .msg-time { font-size: 10px; opacity: 0.7; text-align: right; margin-top: 5px; }

        /* INPUT AREA */
        .input-area { 
            padding: 10px; background: #111; display: flex; align-items: center; gap: 10px; 
            border-top: 1px solid #333; 
        }
        input { 
            flex: 1; background: #222; border: none; padding: 15px; border-radius: 30px; 
            color: white; outline: none; font-size: 16px; 
        }
        
        /* Send Button Gradient */
        .send-btn { 
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #FFD700, #FF0000); 
            border-radius: 50%; border: none; color: black; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            font-size: 20px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); 
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-title" id="chatTitle">User</div>
    </div>

    <div class="chat-area" id="messages">
        <p style="text-align:center; color:#555; margin-top:50px;">Loading chat...</p>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null;
        let isFirstLoad = true;
        let lastMsgCount = 0;

        const params = new URLSearchParams(window.location.search);
        const otherUid = params.get('uid');
        const otherName = params.get('name');
        
        document.getElementById('chatTitle').innerText = otherName || "Chat User";

        if ("Notification" in window) {
            Notification.requestPermission();
        }

        onAuthStateChanged(auth, user => {
            if(user) { 
                myUid = user.uid;
                if(!otherUid) {
                    window.history.back();
                } else {
                    loadMessages();
                }
            } else {
                // ✅ CLEAN URL: Redirect to login
                window.location.href = 'login';
            }
        });

        function getChatId() {
            if (!myUid || !otherUid) return null;
            return [myUid, otherUid].sort().join("_");
        }

        function loadMessages() {
            const chatId = getChatId();
            if(!chatId) return;

            const chatRef = ref(db, `chats/${chatId}`);
            
            onValue(chatRef, (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                
                if(snap.exists()) {
                    let messages = [];
                    snap.forEach(child => { messages.push(child.val()); });

                    messages.forEach(msg => {
                        const isMe = msg.sender === myUid;
                        const bubble = document.createElement('div');
                        bubble.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
                        const date = new Date(msg.time);
                        const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        bubble.innerHTML = `${msg.text} <div class="msg-time">${timeStr}</div>`;
                        div.appendChild(bubble);
                    });

                    setTimeout(() => div.scrollTop = div.scrollHeight, 50);

                    // Notifications Logic
                    if (!isFirstLoad && messages.length > lastMsgCount) {
                        const lastMsg = messages[messages.length - 1];
                        if (lastMsg.sender !== myUid) {
                            sendNotification(lastMsg.text);
                        }
                    }
                    lastMsgCount = messages.length;
                    isFirstLoad = false;

                } else {
                    div.innerHTML = "<p style='text-align:center; color:#555; margin-top:20px;'>No messages yet.</p>";
                }
            });
        }

        function sendNotification(text) {
            const audio = document.getElementById('notifySound');
            audio.play().catch(e => console.log("Sound blocked"));

            if (Notification.permission === "granted") {
                new Notification(`Message from ${otherName || 'User'}`, {
                    body: text,
                    icon: "icon.png" // ✅ LOCAL ICON
                });
            }
        }

        window.sendMessage = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            const chatId = getChatId();
            if(!chatId) return alert("Connection Error");

            push(ref(db, `chats/${chatId}`), {
                text: text,
                sender: myUid,
                time: Date.now()
            });
            input.value = "";
            input.focus();
        };

        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

    </script>
</body>
</html>
