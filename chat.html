<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100svh; overflow: hidden; }
        
        #chat-wrapper { display: flex; width: 200%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-section { width: 50%; height: 100%; display: flex; flex-direction: column; }

        .chat-header { background: rgba(17,17,17,0.95); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #333; backdrop-filter: blur(10px); }
        .back-btn { color: #FFD700; background: none; border: none; font-size: 22px; cursor: pointer; }
        .chat-title { font-weight: 800; font-size: 18px; flex: 1; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 0.5px solid #111; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #FFD700; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #000; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; position: relative; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: #FFD700; color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg-other { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 4px; border: 0.5px solid #333; }
        .msg-time { font-size: 9px; opacity: 0.6; margin-top: 5px; text-align: right; }

        .video-shared { width: 220px; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #FFD700; margin-top: 5px; }
        .video-shared video { width: 100%; display: block; max-height: 300px; }
        
        /* Audio Message Style */
        .audio-msg { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        audio { height: 30px; width: 100%; filter: invert(1); }

        .input-area { padding: 15px; background: #111; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid #333; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: #222; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 15px; }
        
        .icon-btn { background: none; border: none; color: #FFD700; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.8); }
        .recording { color: #FF0000 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .send-btn { width: 45px; height: 45px; background: linear-gradient(135deg, #FFD700, #FF0000); border-radius: 50%; border: none; color: black; display: flex; justify-content: center; align-items: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="chat-wrapper">
        <div class="page-section" id="list-section">
            <div class="chat-header">
                <button class="back-btn" onclick="window.location.href='index'"><i class="fas fa-chevron-left"></i></button>
                <div class="chat-title">Inbox</div>
            </div>
            <div class="chat-list" id="active-chats"></div>
        </div>

        <div class="page-section" id="room-section">
            <div class="chat-header">
                <button class="back-btn" onclick="toggleView('list')"><i class="fas fa-chevron-left"></i></button>
                <div class="chat-title" id="chatTitle">User</div>
            </div>
            <div class="chat-area" id="messages"></div>
            <div class="input-area">
                <button class="icon-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="msgInput" placeholder="Message...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null, otherUid = null, isFirstLoad = true;
        let mediaRecorder, audioChunks = [];

        onAuthStateChanged(auth, user => {
            if(user) { 
                myUid = user.uid;
                loadChatHistory();
                checkShareLink();
                if ("Notification" in window) Notification.requestPermission();
            } else { window.location.href = 'login'; }
        });

        // 1. AUTO-SEND SHARED VIDEO LOGIC
        async function checkShareLink() {
            const p = new URLSearchParams(window.location.search);
            const shareUrl = p.get('share');
            const targetUid = p.get('uid');
            const targetName = p.get('name');

            if(shareUrl && targetUid) {
                otherUid = targetUid;
                const chatId = [myUid, otherUid].sort().join("_");
                // Auto send shared video message
                await push(ref(db, `chats/${chatId}`), {
                    text: shareUrl,
                    sender: myUid,
                    time: Date.now(),
                    type: 'video'
                });
                openDirectChat(targetUid, targetName);
                // Remove share from URL to avoid resending on refresh
                window.history.replaceState({}, document.title, window.location.pathname + `?uid=${targetUid}&name=${targetName}`);
            } else if(targetUid) {
                openDirectChat(targetUid, targetName);
            }
        }

        // 2. NOTIFICATION LOGIC
        function showNotification(name, text) {
            if (Notification.permission === "granted" && !document.hasFocus()) {
                new Notification(`New Message from ${name}`, { body: text, icon: 'icon.png' });
                document.getElementById('notifySound').play();
            }
        }

        // 3. MIC / VOICE RECORDING LOGIC
        const micBtn = document.getElementById('micBtn');
        micBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];
                micBtn.classList.add('recording');
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    // NOTE: Idher Cloudinary upload logic aayegi voice clips ke liye
                    alert("Voice recording feature requires Cloudinary setup for audio. Currently saving as text logic.");
                    micBtn.classList.remove('recording');
                };
            } else {
                mediaRecorder.stop();
            }
        };

        window.toggleView = (v) => { document.getElementById('chat-wrapper').style.transform = v === 'list' ? 'translateX(0)' : 'translateX(-50%)'; };

        function openDirectChat(uid, name) {
            otherUid = uid;
            document.getElementById('chatTitle').innerText = name || "User";
            toggleView('room');
            loadMessages();
        }

        function loadMessages() {
            const chatId = [myUid, otherUid].sort().join("_");
            onValue(ref(db, `chats/${chatId}`), (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                snap.forEach(child => {
                    const msg = child.val();
                    const isMe = msg.sender === myUid;
                    const isVideo = msg.text.includes('.mp4') || msg.text.includes('firebasestorage');
                    const time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    
                    let content = isVideo ? `<div class="video-shared"><video src="${msg.text}" controls></video></div>` : msg.text;
                    div.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${content}<div class="msg-time">${time}</div></div>`;
                    
                    if(!isFirstLoad && !isMe) showNotification(document.getElementById('chatTitle').innerText, msg.text);
                });
                div.scrollTop = div.scrollHeight;
                isFirstLoad = false;
            });
        }

        function loadChatHistory() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('active-chats');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if(child.key !== myUid) {
                        const div = document.createElement('div');
                        div.className = "chat-item";
                        div.innerHTML = `<img src="${u.photo || 'icon.png'}"><div style="flex:1;"><div style="font-weight:bold;">${u.username}</div><div style="font-size:12px;color:#666;">Start conversation</div></div>`;
                        div.onclick = () => openDirectChat(child.key, u.username);
                        list.appendChild(div);
                    }
                });
            });
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !otherUid) return;
            const chatId = [myUid, otherUid].sort().join("_");
            push(ref(db, `chats/${chatId}`), { text: input.value, sender: myUid, time: Date.now() });
            input.value = "";
        }
    </script>
</body>
</html>
