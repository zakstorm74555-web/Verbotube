<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- GOLD CHAT THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100svh; overflow: hidden; }
        
        /* Layout Fix */
        #chat-wrapper { display: flex; width: 200%; height: 100%; transition: transform 0.3s ease; }
        .page-section { width: 50%; height: 100%; display: flex; flex-direction: column; }

        /* Header Gold Detailing */
        .chat-header { background: rgba(17,17,17,0.95); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #333; backdrop-filter: blur(10px); }
        .back-btn { color: #FFD700; background: none; border: none; font-size: 22px; cursor: pointer; }
        .chat-title { font-weight: 800; font-size: 18px; flex: 1; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; }

        /* Chat List Area */
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 0.5px solid #111; cursor: pointer; }
        .chat-item:active { background: #111; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #FFD700; }
        .chat-item-info { flex: 1; }
        .chat-item-name { font-weight: bold; font-size: 16px; margin-bottom: 3px; }
        .chat-item-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Messages Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #FFD700; color: #000; border-bottom-right-radius: 4px; font-weight: 500; box-shadow: 0 4px 10px rgba(255,215,0,0.2); }
        .msg-other { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 4px; border: 0.5px solid #333; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        /* VIDEO SHARE DETAILING */
        .video-shared { width: 200px; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #FFD700; margin-top: 5px; }
        .video-shared video { width: 100%; display: block; }
        .video-tag { background: #FFD700; color: #000; font-size: 10px; font-weight: 800; padding: 2px 8px; text-align: center; text-transform: uppercase; }

        /* Input Area Fix */
        .input-area { padding: 15px; background: #111; display: flex; align-items: center; gap: 12px; border-top: 0.5px solid #333; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: #222; border: 1px solid #333; padding: 12px 20px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        input:focus { border-color: #FFD700; }
        .send-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #FFD700, #FF0000); border-radius: 50%; border: none; color: black; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
    </style>
</head>
<body>

    <div id="chat-wrapper">
        <div class="page-section" id="list-section">
            <div class="chat-header">
                <button class="back-btn" onclick="window.location.href='friends'"><i class="fas fa-chevron-left"></i></button>
                <div class="chat-title">Verbotube Messages</div>
            </div>
            <div class="chat-list" id="active-chats">
                <p style="text-align:center; color:#555; margin-top:50px;">Your chat history will appear here.</p>
            </div>
        </div>

        <div class="page-section" id="room-section">
            <div class="chat-header">
                <button class="back-btn" onclick="toggleView('list')"><i class="fas fa-chevron-left"></i></button>
                <div class="chat-title" id="chatTitle">Chatting...</div>
            </div>
            <div class="chat-area" id="messages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Write something...">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null, otherUid = null, otherName = null;

        onAuthStateChanged(auth, user => {
            if(user) { 
                myUid = user.uid;
                loadChatHistory();
                const p = new URLSearchParams(window.location.search);
                if(p.get('uid')) { openDirectChat(p.get('uid'), p.get('name')); }
            } else { window.location.href = 'login'; }
        });

        // VIEW TOGGLE LOGIC
        window.toggleView = (view) => {
            const wrapper = document.getElementById('chat-wrapper');
            wrapper.style.transform = view === 'list' ? 'translateX(0)' : 'translateX(-50%)';
        };

        function openDirectChat(uid, name) {
            otherUid = uid; otherName = name;
            document.getElementById('chatTitle').innerText = name || "User";
            toggleView('room');
            loadMessages();
        }

        // VIDEO SHARING LOGIC
        // If a message contains ".mp4" or "videoURL", it renders as a player
        function renderMsg(msg) {
            const isMe = msg.sender === myUid;
            const isVideo = msg.text.includes('.mp4') || msg.text.includes('firebasestorage');
            const date = new Date(msg.time);
            const time = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            let content = msg.text;
            if(isVideo) {
                content = `<div class="video-tag"><i class="fas fa-play"></i> Verbotube Clip</div>
                           <div class="video-shared"><video src="${msg.text}" controls></video></div>`;
            }

            return `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${content}<div class="msg-time">${time}</div></div>`;
        }

        function loadMessages() {
            const chatId = [myUid, otherUid].sort().join("_");
            onValue(ref(db, `chats/${chatId}`), (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                if(!snap.exists()) { div.innerHTML = "<p style='text-align:center; color:#555;'>No messages yet.</p>"; return; }
                snap.forEach(child => { div.innerHTML += renderMsg(child.val()); });
                div.scrollTop = div.scrollHeight;
            });
        }

        function loadChatHistory() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('active-chats');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if(child.key !== myUid) {
                        const div = document.createElement('div');
                        div.className = "chat-item";
                        div.innerHTML = `
                            <img src="${u.photo || 'icon.png'}">
                            <div class="chat-item-info">
                                <div class="chat-item-name">${u.username || 'User'}</div>
                                <div class="chat-item-msg">Tap to start chatting</div>
                            </div>`;
                        div.onclick = () => openDirectChat(child.key, u.username);
                        list.appendChild(div);
                    }
                });
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text || !otherUid) return;
            const chatId = [myUid, otherUid].sort().join("_");
            push(ref(db, `chats/${chatId}`), { text: text, sender: myUid, time: Date.now() });
            input.value = ""; input.focus();
        };

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
