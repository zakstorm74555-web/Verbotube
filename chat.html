<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* HEADER */
        .chat-header { background: #111; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .back-btn { color: white; background: none; border: none; font-size: 22px; cursor: pointer; }
        .chat-title { font-weight: bold; font-size: 18px; flex: 1; text-transform: capitalize; }
        .video-btn { color: #8a2be2; font-size: 22px; cursor: pointer; padding: 10px; }
        
        /* MESSAGES AREA */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-start; background: #333; color: white; border-bottom-left-radius: 4px; }
        
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.6); text-align: right; margin-top: 5px; }

        /* INPUT AREA */
        .input-area { padding: 10px; background: #111; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: none; padding: 15px; border-radius: 30px; color: white; outline: none; font-size: 16px; }
        .send-btn { width: 50px; height: 50px; background: #8a2be2; border-radius: 50%; border: none; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); }
    </style>
</head>
<body>

    <div class="chat-header">
        <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-title" id="chatTitle">User</div>
        <i class="fas fa-video video-btn" onclick="startVideoCall()"></i>
    </div>

    <div class="chat-area" id="messages">
        <p style="text-align:center; color:#555; margin-top:50px;">Loading chat...</p>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUid = null;
        
        // URL se data uthana
        const params = new URLSearchParams(window.location.search);
        const otherUid = params.get('uid');
        const otherName = params.get('name');
        
        // Title Set Karna
        document.getElementById('chatTitle').innerText = otherName || "Chat User";

        onAuthStateChanged(auth, user => {
            if(user) { 
                myUid = user.uid;
                if(!otherUid) {
                    alert("Error: User not found!");
                    window.history.back();
                } else {
                    loadMessages();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // Unique Chat Room ID (Sorted so both users get same ID)
        function getChatId() {
            if (!myUid || !otherUid) return null;
            return [myUid, otherUid].sort().join("_");
        }

        function loadMessages() {
            const chatId = getChatId();
            if(!chatId) return;

            const chatRef = ref(db, `chats/${chatId}`);
            
            onValue(chatRef, (snap) => {
                const div = document.getElementById('messages');
                div.innerHTML = "";
                
                if(snap.exists()) {
                    snap.forEach(child => {
                        const msg = child.val();
                        const isMe = msg.sender === myUid;
                        
                        const bubble = document.createElement('div');
                        bubble.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
                        
                        // Time formatting
                        const date = new Date(msg.time);
                        const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        bubble.innerHTML = `${msg.text} <div class="msg-time">${timeStr}</div>`;
                        div.appendChild(bubble);
                    });
                    // Auto scroll to latest message
                    setTimeout(() => div.scrollTop = div.scrollHeight, 100);
                } else {
                    div.innerHTML = "<p style='text-align:center; color:#555; margin-top:20px;'>No messages yet. Say Hi! 👋</p>";
                }
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            const chatId = getChatId();
            if(!chatId) return alert("Connection Error");

            push(ref(db, `chats/${chatId}`), {
                text: text,
                sender: myUid,
                time: Date.now()
            })
            .then(() => {
                input.value = ""; // Clear input on success
                input.focus();
            })
            .catch((error) => {
                alert("Message Failed: " + error.message);
                console.error(error);
            });
        };

        // Enter Key to Send
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // --- VIDEO CALL FUNCTION ---
        window.startVideoCall = () => {
            const chatId = getChatId();
            if(!chatId) return alert("Wait for connection...");
            
            if(confirm("Start Video Call with " + (otherName || "User") + "?")) {
                // Using Jitsi Meet (Free, Secure, No-Code Server)
                // We create a unique room based on Chat ID
                const roomName = `ParaVideo_Call_${chatId}`;
                const callLink = `https://meet.jit.si/${roomName}`;
                
                // Open in new window (User can return to chat easily)
                window.open(callLink, '_blank');
                
                // Optional: Send a message that you started a call
                push(ref(db, `chats/${chatId}`), {
                    text: "📞 I started a video call. Join me!",
                    sender: myUid,
                    time: Date.now()
                });
            }
        };

    </script>
</body>
</html>
