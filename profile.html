<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 style="color:#FFD700; text-align:center; margin-top:0;">Edit Profile</h2>
        
        <label class="edit-label">Profile Photo (Upload or Paste URL)</label>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="editPhotoURL" class="edit-input" style="margin-bottom:0;" placeholder="Paste Image URL here...">
            <button class="btn" onclick="document.getElementById('fileInput').click()" style="width:50px; margin:0; background:#222; border:1px solid #FFD700;"><i class="fas fa-upload"></i></button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <p id="uploadStatus" style="font-size:11px; color:#FFD700; text-align:center; margin-top:-10px; min-height:15px;"></p>

        <label class="edit-label">Username</label>
        <input type="text" id="editName" class="edit-input" placeholder="Enter Name">

        <label class="edit-label">Bio</label>
        <textarea id="editBio" class="edit-input" style="height:80px; resize:none;" placeholder="Write something..."></textarea>

        <button class="btn btn-follow" id="saveProfileBtn">Save Changes</button>
        <button class="btn" onclick="closeModal()" style="background:transparent; color:#888;">Cancel</button>
    </div>
</div>

<script type="module">
    // ... (Firebase Imports and Config same as before) ...

    // --- SMART SAVE LOGIC ---
    document.getElementById('saveProfileBtn').onclick = async () => {
        const newName = document.getElementById('editName').value;
        const newBio = document.getElementById('editBio').value;
        const manualURL = document.getElementById('editPhotoURL').value;
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('saveProfileBtn');
        const status = document.getElementById('uploadStatus');

        if(!newName.trim()) { alert("Bhai, naam likhna zaroori hai!"); return; }

        btn.disabled = true;
        btn.innerText = "Processing...";
        
        let finalPhoto = userData.photo || "icon.png";

        // SYSTEM LOGIC:
        // 1. Agar user ne File select ki hai, toh wo Priority hai (Chupke se URL banay ga)
        // 2. Agar File nahi hai magar URL likha hai, toh wo use hoga.
        
        if(file) {
            status.innerText = "Creating URL from Image... ☁️";
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', "verbotube"); // Aapka Cloudinary preset

            try {
                const res = await fetch("https://api.cloudinary.com/v1_1/dttv7v7on/image/upload", { 
                    method: 'POST', 
                    body: formData 
                });
                const d = await res.json();
                finalPhoto = d.secure_url; // System ne khud URL bana liya!
                status.innerText = "URL Generated! ✅";
            } catch (e) {
                alert("Upload failed! Using old photo.");
            }
        } else if(manualURL.trim() !== "") {
            finalPhoto = manualURL; // User ne khud URL diya hai
            status.innerText = "Using Manual URL... ✅";
        }

        // Final Save to Firebase Realtime Database
        try {
            status.innerText = "Fixing in Database... 🔥";
            await update(ref(db, 'users/' + myUID), {
                username: newName,
                bio: newBio,
                photo: finalPhoto
            });
            status.innerText = "Profile Fixed! 🎉";
            setTimeout(closeModal, 800);
        } catch(e) { 
            alert("Database Error!"); 
        }

        btn.disabled = false;
        btn.innerText = "Save Changes";
    };

    // Modal open karte waqt puraani details dikhana
    window.openEditModal = () => {
        document.getElementById('editModal').classList.add('active');
        document.getElementById('editName').value = userData.username || "";
        document.getElementById('editBio').value = userData.bio || "";
        document.getElementById('editPhotoURL').value = userData.photo && !userData.photo.includes('cloudinary') ? userData.photo : "";
    }
</script>
