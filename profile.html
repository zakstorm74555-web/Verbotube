<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Paravideo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00e5ff; object-fit: cover; }
        .info { flex: 1; }
        .name { font-size: 22px; font-weight: bold; }
        .bio { color: #aaa; font-size: 14px; margin-top: 5px; }
        
        .stats { display: flex; gap: 20px; margin: 15px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 15px 0; }
        .stat-box { text-align: center; flex: 1; }
        .stat-num { font-size: 18px; font-weight: bold; color: white; display: block; }
        .stat-label { font-size: 12px; color: #00e5ff; }

        .btn { width: 100%; padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .btn-edit { background: #333; color: white; border: 1px solid #555; }
        .btn-follow { background: #00e5ff; color: black; }

        /* VIDEO GRID */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .thumb { aspect-ratio: 9/16; background: #111; position: relative; cursor: pointer; }
        .thumb video { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: red; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; border-radius: 50%; display: none; }

        /* EDIT MODAL */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-box { background: #222; padding: 20px; border: 1px solid #00e5ff; width: 300px; border-radius: 10px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" style="color:#aaa; text-decoration:none;">← Back to Feed</a>
        <br><br>

        <div class="header">
            <img src="" id="pPic" class="pic">
            <div class="info">
                <div class="name" id="pName">Loading...</div>
                <div class="bio" id="pBio">...</div>
            </div>
        </div>

        <button id="actionBtn" class="btn btn-edit">Loading...</button>

        <div class="stats">
            <div class="stat-box"><span class="stat-num" id="sFollowers">0</span><span class="stat-label">Followers</span></div>
            <div class="stat-box"><span class="stat-num" id="sFollowing">0</span><span class="stat-label">Following</span></div>
            <div class="stat-box"><span class="stat-num" id="sVideos">0</span><span class="stat-label">Videos</span></div>
        </div>

        <h3 style="border-bottom: 1px solid #00e5ff; display: inline-block; padding-bottom: 5px;">Videos</h3>
        <div class="grid" id="videoGrid"></div>
    </div>

    <div id="editModal">
        <div class="modal-box">
            <h3 style="color:#00e5ff; margin-top:0;">Edit Profile</h3>
            <input type="text" id="eName" placeholder="Name">
            <input type="text" id="eBio" placeholder="Bio">
            <input type="text" id="ePic" placeholder="Photo URL">
            <button class="btn btn-follow" onclick="saveProfile()">SAVE</button>
            <button class="btn btn-edit" onclick="document.getElementById('editModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, remove, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // SAME CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc",
            authDomain: "paravideo-1ac3b.firebaseapp.com",
            databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com",
            projectId: "paravideo-1ac3b",
            storageBucket: "paravideo-1ac3b.firebasestorage.app",
            messagingSenderId: "384549024202",
            appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33",
            measurementId: "G-QNFHZ1CDLY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUID = null;
        let profileUID = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUID = user.uid;
                const params = new URLSearchParams(window.location.search);
                profileUID = params.get('uid') || user.uid;
                loadProfile();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadProfile() {
            // User Info
            onValue(ref(db, 'users/' + profileUID), (snap) => {
                const u = snap.val() || {};
                document.getElementById('pName').innerText = u.username || "User";
                document.getElementById('pBio').innerText = u.bio || "No bio";
                document.getElementById('pPic').src = u.photo || "https://via.placeholder.com/150";
                
                // Edit Info inputs
                document.getElementById('eName').value = u.username || "";
                document.getElementById('eBio').value = u.bio || "";
                document.getElementById('ePic').value = u.photo || "";
            });

            // Stats
            onValue(ref(db, `users/${profileUID}/followers`), s => document.getElementById('sFollowers').innerText = s.size);
            onValue(ref(db, `users/${profileUID}/following`), s => document.getElementById('sFollowing').innerText = s.size);

            // Button Logic
            const btn = document.getElementById('actionBtn');
            if (myUID === profileUID) {
                btn.innerText = "EDIT PROFILE";
                btn.className = "btn btn-edit";
                btn.onclick = () => document.getElementById('editModal').style.display = 'flex';
            } else {
                checkFollow(btn);
            }

            // Videos
            onValue(ref(db, 'videos'), snap => {
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = "";
                const data = snap.val();
                if(data) {
                    const myVids = Object.entries(data).filter(([k,v]) => v.uid === profileUID).reverse();
                    document.getElementById('sVideos').innerText = myVids.length;
                    
                    myVids.forEach(([k, vid]) => {
                        const div = document.createElement('div');
                        div.className = 'thumb';
                        div.innerHTML = `
                            <video src="${vid.videoUrl}"></video>
                            ${myUID === profileUID ? `<div class="del-btn" onclick="deleteVideo('${k}')" style="display:flex;"><i class="fas fa-trash"></i></div>` : ''}
                        `;
                        grid.appendChild(div);
                    });
                }
            });
        }

        // Follow Logic
        async function checkFollow(btn) {
            const r = ref(db, `users/${profileUID}/followers/${myUID}`);
            onValue(r, s => {
                if (s.exists()) {
                    btn.innerText = "FOLLOWING";
                    btn.className = "btn btn-edit";
                    btn.onclick = () => { remove(ref(db, `users/${profileUID}/followers/${myUID}`)); remove(ref(db, `users/${myUID}/following/${profileUID}`)); };
                } else {
                    btn.innerText = "FOLLOW";
                    btn.className = "btn btn-follow";
                    btn.onclick = () => { set(ref(db, `users/${profileUID}/followers/${myUID}`), true); set(ref(db, `users/${myUID}/following/${profileUID}`), true); };
                }
            });
        }

        // Save Profile
        window.saveProfile = async () => {
            await update(ref(db, 'users/' + myUID), {
                username: document.getElementById('eName').value,
                bio: document.getElementById('eBio').value,
                photo: document.getElementById('ePic').value
            });
            document.getElementById('editModal').style.display = 'none';
        }

        // Delete Video
        window.deleteVideo = async (key) => {
            if(confirm("Delete this video?")) {
                await remove(ref(db, `videos/${key}`));
            }
        }
    </script>
</body>
</html>
