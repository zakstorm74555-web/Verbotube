<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- VERBOTUBE THEME --- */
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 50px; }
        
        .nav-bar { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { color: #FFD700; text-decoration: none; font-size: 20px; margin-right: 15px; } /* Gold Back Arrow */
        .page-title { font-weight: bold; font-size: 18px; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; }

        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; position: relative; z-index: 1; }
        .pic-wrapper { position: relative; width: 80px; height: 80px; flex-shrink: 0; z-index: 5; }
        
        /* Gold Border for Profile Pic */
        .pic { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #FFD700; object-fit: cover; cursor: pointer; position: relative; z-index: 6; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        
        /* BADGE STYLES */
        #badge-display { position: absolute; top: -10px; right: -10px; background: #ff0055; color: white; display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; box-shadow: 0 0 5px rgba(0,0,0,0.8); border: 2px solid #000; z-index: 200; cursor: pointer; pointer-events: auto; }
        .badge-is-image { width: 35px !important; height: 35px !important; border-radius: 50%; padding: 0; overflow: hidden; background: white; }
        .badge-is-image img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .badge-is-text { width: auto; height: auto; padding: 4px 8px; border-radius: 12px; white-space: nowrap; }

        .info { flex: 1; }
        .name { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .bio { color: #aaa; font-size: 14px; margin-top: 5px; }
        
        /* Gold Tick */
        .blue-tick { color: #FFD700; font-size: 16px; margin-left: 5px; text-shadow: 0 0 5px #FFD700; }

        .stats { display: flex; gap: 10px; margin: 15px 0; background: #111; padding: 15px; border-radius: 10px; justify-content: space-around; border: 1px solid #333; }
        .stat-box { text-align: center; }
        .stat-num { font-size: 18px; font-weight: bold; color: white; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        .btn { width: 100%; padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 14px; transition: all 0.2s; }
        
        /* Primary Button */
        .btn-follow { 
            background: linear-gradient(135deg, #FFD700, #FF0000); 
            color: black; 
            border: none; 
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        } 
        
        /* Secondary Button */
        .btn-following { 
            background: #000; 
            color: #FFD700; 
            border: 1px solid #FFD700; 
        } 

        h3 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 20px; color: #FFD700; text-transform: uppercase; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .thumb { aspect-ratio: 9/16; background: #111; position: relative; cursor: pointer; overflow: hidden; }
        .thumb video { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #FF0000; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; border-radius: 50%; z-index:10; border: 1px solid white; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #222; padding: 25px; border: 1px solid #FFD700; width: 85%; max-width: 350px; border-radius: 15px; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: white; margin-bottom: 15px; box-sizing: border-box; border-radius: 5px; }
        input:focus { border-color: #FFD700; outline: none; }
        label { color: #FFD700; font-size: 12px; display: block; margin-bottom: 5px; }

        /* IMAGE VIEWER */
        #viewModal { background: rgba(0,0,0,0.98); z-index: 3000; display: none; }
        .view-content { text-align: center; position: relative; animation: popIn 0.3s ease; display:flex; justify-content:center; align-items:center; height:100%; flex-direction: column; width: 100%; }
        #viewImage { object-fit: contain; box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); max-width: 90%; max-height: 80vh; border: 2px solid #FFD700; }
        #viewBadgeText { font-size: 30px; font-weight: bold; color: white; background: #ff0055; padding: 15px 30px; border-radius: 50px; display: none; box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <a href="index" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="page-title" id="pageTitle">Profile</div>
        </div>

        <div class="header">
            <div class="pic-wrapper">
                <img src="" id="pPic" class="pic" onclick="window.viewItem('pic')">
                <div id="badge-display" onclick="event.stopPropagation(); window.viewItem('badge')"></div>
            </div>
            <div class="info">
                <div class="name" id="pName">Loading...</div>
                <div class="bio" id="pBio">...</div>
            </div>
        </div>

        <button id="actionBtn" class="btn btn-following">Loading...</button>

        <div class="stats">
            <div class="stat-box"><span class="stat-num" id="sFollowers">0</span><span class="stat-label">Followers</span></div>
            <div class="stat-box"><span class="stat-num" id="sFollowing">0</span><span class="stat-label">Following</span></div>
            <div class="stat-box"><span class="stat-num" id="sVideos">0</span><span class="stat-label">Videos</span></div>
        </div>

        <h3>Videos</h3>
        <div class="grid" id="videoGrid">
            <p style="color:#555; grid-column: span 3; text-align: center; margin-top: 20px;">Loading videos...</p>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-box">
            <h3 style="color:#FFD700; margin-top:0;">Edit Profile</h3>
            <label>Username</label>
            <input type="text" id="eName" placeholder="Username">
            <label>Bio</label>
            <input type="text" id="eBio" placeholder="Short Bio">
            <label>Profile Picture</label>
            <input type="file" id="eFile" accept="image/*" style="border: 2px dashed #FFD700; padding: 10px; cursor: pointer;">
            <p id="uploadStatus" style="font-size: 11px; color: #FFD700; display: none;">Uploading photo...</p>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-follow" id="saveBtn" onclick="saveProfile()">SAVE CHANGES</button>
                <button class="btn btn-following" onclick="document.getElementById('editModal').style.display='none'">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal" onclick="document.getElementById('viewModal').style.display='none'">
        <div class="view-content" onclick="event.stopPropagation()">
            <img id="viewImage" src="" style="display:none;">
            <div id="viewBadgeText"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, remove, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let myUID = null, profileUID = null, currentBadgeData = null, currentPhotoURL = "";
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";

        window.viewItem = (type) => {
            const modal = document.getElementById('viewModal'), img = document.getElementById('viewImage'), txt = document.getElementById('viewBadgeText');
            modal.style.display = 'flex'; img.style.display = 'none'; txt.style.display = 'none';
            if(type === 'pic') { img.src = document.getElementById('pPic').src; img.style.display = 'block'; img.style.borderRadius = '50%'; img.style.width = '280px'; img.style.height = '280px'; img.style.border = '4px solid #FFD700'; } 
            else if(type === 'badge' && currentBadgeData) {
                let d = (typeof currentBadgeData === 'object') ? currentBadgeData : { text: currentBadgeData, color: '#ff0055' };
                if(d.image) { img.src = d.image; img.style.display = 'block'; img.style.borderRadius = '50%'; img.style.width = '200px'; img.style.height = '200px'; img.style.border = `4px solid ${d.color || '#ff0055'}`; } 
                else { txt.innerText = d.text || "BADGE"; txt.style.background = d.color || '#ff0055'; txt.style.display = 'block'; }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                myUID = user.uid;
                const params = new URLSearchParams(window.location.search);
                profileUID = params.get('uid') || user.uid;
                loadProfile(user);
            } else { 
                // ✅ CLEAN URL: Redirect to login
                window.location.href = 'login'; 
            }
        });

        async function loadProfile(currentUser) {
            onValue(ref(db, 'users/' + profileUID), (snap) => {
                const u = snap.val() || {};
                let isMe = (myUID === profileUID), isOwner = (isMe ? currentUser.email : (u.email || "")).toLowerCase() === ADMIN_EMAIL;
                let tickHTML = isOwner ? `<i class="fas fa-check-circle blue-tick"></i>` : "";
                const badgeDiv = document.getElementById('badge-display'); currentBadgeData = u.customBadge;
                if(u.customBadge) {
                    badgeDiv.style.display = 'flex';
                    let bd = (typeof u.customBadge === 'object') ? u.customBadge : { text: u.customBadge, color: '#ff0055' };
                    badgeDiv.style.background = bd.color || '#ff0055';
                    if(bd.image) { badgeDiv.className = 'badge-is-image'; badgeDiv.innerHTML = `<img src="${bd.image}">`; } 
                    else { badgeDiv.className = 'badge-is-text'; badgeDiv.innerText = bd.text || ""; }
                } else { badgeDiv.style.display = 'none'; }
                document.getElementById('pName').innerHTML = `${u.username || "User"} ${tickHTML}`;
                document.getElementById('pBio').innerText = u.bio || "No bio";
                document.getElementById('pPic').src = u.photo || "https://via.placeholder.com/150";
                currentPhotoURL = u.photo || "";
                if(isMe) { document.getElementById('eName').value = u.username || ""; document.getElementById('eBio').value = u.bio || ""; }
                onValue(ref(db, `followers/${profileUID}`), s => document.getElementById('sFollowers').innerText = formatNumber(s.exists() ? s.size : 0));
            });
            onValue(ref(db, `following/${profileUID}`), s => document.getElementById('sFollowing').innerText = s.exists() ? s.size : 0);
            const btn = document.getElementById('actionBtn');
            if (myUID === profileUID) { btn.innerText = "EDIT PROFILE"; btn.onclick = () => document.getElementById('editModal').style.display = 'flex'; } 
            else { checkFollow(btn); }
            
            onValue(ref(db, 'gameplay_clips'), snap => { 
                const grid = document.getElementById('videoGrid'); grid.innerHTML = "";
                const data = snap.val();
                if(data) {
                    const myVids = Object.entries(data).filter(([k,v]) => v.uid === profileUID).reverse();
                    document.getElementById('sVideos').innerText = myVids.length;
                    if(myVids.length === 0) { grid.innerHTML = "<p style='color:#555; grid-column: span 3; text-align: center; margin-top:20px;'>No videos yet.</p>"; return; }
                    myVids.forEach(([k, vid]) => {
                        const div = document.createElement('div'); div.className = 'thumb';
                        const delBtn = (myUID === profileUID) ? `<div class="del-btn" onclick="window.deleteVideo(event, '${k}')"><i class="fas fa-trash"></i></div>` : '';
                        
                        div.innerHTML = `<video src="${vid.videoUrl}"></video>${delBtn}`;
                        // ✅ CLEAN URL LINKING
                        div.onclick = () => { window.location.href = `index?video=${k}`; };
                        
                        grid.appendChild(div);
                    });
                } else { grid.innerHTML = "<p style='color:#555; grid-column: span 3; text-align: center;'>No videos yet.</p>"; }
            });
        }

        window.saveProfile = async () => {
            const name = document.getElementById('eName').value;
            const bio = document.getElementById('eBio').value;
            const fileInput = document.getElementById('eFile');
            const saveBtn = document.getElementById('saveBtn');
            const status = document.getElementById('uploadStatus');

            saveBtn.disabled = true;
            let finalPhoto = currentPhotoURL;

            if(fileInput.files[0]) {
                status.style.display = 'block';
                const fd = new FormData();
                fd.append("file", fileInput.files[0]);
                fd.append("upload_preset", UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
                    const data = await res.json();
                    finalPhoto = data.secure_url;
                } catch (e) { alert("Photo upload failed!"); }
            }

            await update(ref(db, 'users/' + myUID), { username: name, bio: bio, photo: finalPhoto, lowercaseName: name.toLowerCase() });
            alert("Profile Updated!");
            location.reload();
        };

        window.deleteVideo = async (event, key) => { 
            event.stopPropagation(); 
            if(confirm("Delete video?")) { await remove(ref(db, `gameplay_clips/${key}`)); alert("Deleted."); } 
        }

        function checkFollow(btn) { const r = ref(db, `followers/${profileUID}/${myUID}`); onValue(r, s => { if (s.exists()) { btn.innerText = "FOLLOWING"; btn.className = "btn btn-following"; btn.onclick = async () => { if(confirm("Unfollow?")) { await remove(ref(db, `followers/${profileUID}/${myUID}`)); await remove(ref(db, `following/${myUID}/${profileUID}`)); } }; } else { btn.innerText = "FOLLOW"; btn.className = "btn btn-follow"; btn.onclick = async () => { await set(ref(db, `followers/${profileUID}/${myUID}`), true); await set(ref(db, `following/${myUID}/${profileUID}`), true); }; } }); }
        function formatNumber(num) { if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M'; if (num >= 1000) return (num / 1000).toFixed(1) + 'k'; return num; }
    </script>
</body>
</html>
