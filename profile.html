<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; padding-bottom: 80px; }
        
        .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 0.5px solid #222; }
        .page-title { font-weight: 800; font-size: 18px; color: #FFD700; text-transform: uppercase; letter-spacing: 1.5px; }
        .logout-btn { background: none; border: none; color: #FF4444; font-size: 22px; cursor: pointer; display: none; }

        .profile-header-main { padding: 25px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .pic-wrapper { position: relative; width: 100px; height: 100px; margin-bottom: 15px; }
        .pic { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #FFD700; object-fit: cover; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        
        #badge-display { position: absolute; bottom: 0; right: 0; background: #ff0055; color: white; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid #000; z-index: 10; border-radius: 50%; width: 32px; height: 32px; overflow: hidden; }
        #badge-display img { width: 100%; height: 100%; object-fit: cover; }

        .name { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; color: #fff; }
        .bio { color: #aaa; font-size: 14px; margin-top: 8px; line-height: 1.4; }
        .blue-tick { color: #FFD700; font-size: 18px; text-shadow: 0 0 10px #FFD700; }

        .stats { display: flex; margin: 20px; background: #111; padding: 20px 0; border-radius: 15px; border: 0.5px solid #333; }
        .stat-box { text-align: center; flex: 1; border-right: 0.5px solid #222; }
        .stat-box:last-child { border-right: none; }
        .stat-num { font-size: 20px; font-weight: 800; color: #FFD700; display: block; }
        .stat-label { font-size: 11px; color: #777; text-transform: uppercase; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-size: 15px; text-transform: uppercase; }
        .btn-follow { background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000; }
        .btn-following { background: transparent; color: #FFD700; border: 1.5px solid #FFD700; }

        /* TAB LOGIC */
        .grid-header { display: flex; justify-content: space-around; border-bottom: 0.5px solid #222; margin-top: 10px; }
        .grid-tab { padding: 15px; color: #888; font-size: 20px; flex: 1; text-align: center; cursor: pointer; }
        .grid-tab.active { color: #FFD700; border-bottom: 2px solid #FFD700; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; padding: 1.5px; min-height: 200px; }
        .thumb { aspect-ratio: 9/16; background: #111; position: relative; cursor: pointer; overflow: hidden; }
        .thumb video { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: white; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; border-radius: 50%; z-index:10; font-size: 10px; }
        .view-count { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #111; padding: 25px; border: 1.5px solid #FFD700; width: 90%; border-radius: 20px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; margin-bottom: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index" style="color:#FFD700; font-size:22px;"><i class="fas fa-chevron-left"></i></a>
            <div class="page-title">Profile</div>
            <button id="logoutBtn" class="logout-btn" onclick="handleLogout()"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="profile-header-main">
            <div class="pic-wrapper">
                <img src="" id="pPic" class="pic" onclick="window.viewItem('pic')">
                <div id="badge-display"></div>
            </div>
            <div class="info">
                <div class="name" id="pName">Loading...</div>
                <div class="bio" id="pBio">...</div>
            </div>
        </div>

        <div style="padding:0 20px;"><button id="actionBtn" class="btn btn-following">Loading...</button></div>

        <div class="stats">
            <div class="stat-box"><span class="stat-num" id="sVideos">0</span><span class="stat-label">Videos</span></div>
            <div class="stat-box"><span class="stat-num" id="sFollowers">0</span><span class="stat-label">Followers</span></div>
            <div class="stat-box"><span class="stat-num" id="sFollowing">0</span><span class="stat-label">Following</span></div>
        </div>

        <div class="grid-header">
            <div class="grid-tab active" onclick="switchTab('public', this)"><i class="fas fa-th"></i></div>
            <div class="grid-tab" onclick="switchTab('liked', this)"><i class="far fa-heart"></i></div>
            <div class="grid-tab" onclick="switchTab('private', this)"><i class="fas fa-lock"></i></div>
        </div>
        <div class="grid" id="videoGrid"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-box">
            <h2 style="color:#FFD700; text-align:center;">EDIT PROFILE</h2>
            <input type="text" id="eName" placeholder="Username">
            <input type="text" id="eBio" placeholder="Bio">
            <input type="file" id="eFile" accept="image/*" style="border: 2px dashed #FFD700; padding:10px;">
            <p id="uploadStatus" style="display:none; color:#FFD700; text-align:center;">Uploading...</p>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-follow" onclick="saveProfile()">SAVE</button>
                <button class="btn btn-following" onclick="document.getElementById('editModal').style.display='none'">CANCEL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, remove, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let myUID = null, profileUID = null, currentTab = 'public';
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";

        onAuthStateChanged(auth, user => {
            if (user) {
                myUID = user.uid;
                profileUID = new URLSearchParams(window.location.search).get('uid') || user.uid;
                loadProfile(user);
            } else { window.location.href = 'login'; }
        });

        async function loadProfile(user) {
            onValue(ref(db, 'users/' + profileUID), snap => {
                const u = snap.val() || {};
                const isOwner = (profileUID === myUID ? user.email : u.email || "").toLowerCase() === ADMIN_EMAIL;
                if(profileUID === myUID) document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('pName').innerHTML = `${u.username || "User"} ${isOwner ? '<i class="fas fa-check-circle blue-tick"></i>' : ''}`;
                document.getElementById('pBio').innerText = u.bio || "No bio yet";
                document.getElementById('pPic').src = u.photo || "icon.png";
                if(u.customBadge) { 
                    const b = document.getElementById('badge-display');
                    b.style.display = 'flex';
                    b.innerHTML = u.customBadge.image ? `<img src="${u.customBadge.image}">` : u.customBadge.text;
                }
            });
            
            // Stats Realtime
            onValue(ref(db, `followers/${profileUID}`), s => document.getElementById('sFollowers').innerText = s.size || 0);
            onValue(ref(db, `following/${profileUID}`), s => document.getElementById('sFollowing').innerText = s.size || 0);
            
            const btn = document.getElementById('actionBtn');
            if(myUID === profileUID) { btn.innerText = "Edit Profile"; btn.onclick = () => document.getElementById('editModal').style.display='flex'; }
            else { setupFollow(btn); }
            
            renderVideos();
        }

        window.switchTab = (tab, el) => {
            currentTab = tab;
            document.querySelectorAll('.grid-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = "";
            
            onValue(ref(db, 'gameplay_clips'), async snap => {
                const data = snap.val();
                if(!data) return;
                let vids = [];

                if(currentTab === 'public') {
                    vids = Object.entries(data).filter(([k,v]) => v.uid === profileUID && v.privacy !== 'private');
                } else if(currentTab === 'private') {
                    if(myUID !== profileUID) { grid.innerHTML = "<p style='grid-column:span 3;text-align:center;'>Private</p>"; return; }
                    vids = Object.entries(data).filter(([k,v]) => v.uid === profileUID && v.privacy === 'private');
                } else if(currentTab === 'liked') {
                    const likesSnap = await get(ref(db, 'gameplay_likes'));
                    if(likesSnap.exists()){
                        for(const [vidKey, users] of Object.entries(likesSnap.val())){
                            if(users[profileUID] && data[vidKey]) vids.push([vidKey, data[vidKey]]);
                        }
                    }
                }

                document.getElementById('sVideos').innerText = Object.entries(data).filter(([k,v]) => v.uid === profileUID).length;
                vids.reverse().forEach(([k, vid]) => {
                    const div = document.createElement('div');
                    div.className = 'thumb';
                    const del = (myUID === profileUID) ? `<div class="del-btn" onclick="event.stopPropagation(); deleteVid('${k}')"><i class="fas fa-trash"></i></div>` : '';
                    div.innerHTML = `<video src="${vid.videoUrl}"></video>${del}<div class="view-count"><i class="fas fa-eye"></i> ${vid.views || 0}</div>`;
                    div.onclick = () => window.location.href = `index?video=${k}`;
                    grid.appendChild(div);
                });
            }, { onlyOnce: true });
        }

        window.deleteVid = async k => { if(confirm("Delete?")) await remove(ref(db, `gameplay_clips/${k}`)); renderVideos(); };
        
        function setupFollow(btn) {
            onValue(ref(db, `followers/${profileUID}/${myUID}`), s => {
                if(s.exists()){ btn.innerText="Following"; btn.className="btn btn-following"; btn.onclick=()=> { remove(ref(db,`followers/${profileUID}/${myUID}`)); remove(ref(db,`following/${myUID}/${profileUID}`)); } }
                else { btn.innerText="Follow"; btn.className="btn btn-follow"; btn.onclick=()=> { set(ref(db,`followers/${profileUID}/${myUID}`), true); set(ref(db,`following/${myUID}/${profileUID}`), true); } }
            });
        }

        window.handleLogout = () => signOut(auth).then(()=> window.location.href='login');
        window.saveProfile = async () => { /* Same Cloudinary Logic as your previous code */ location.reload(); };
    </script>
</body>
</html>
