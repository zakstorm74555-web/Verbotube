<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- VERBOTUBE GOLD PREMIUM THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; padding-bottom: 80px; }
        
        /* Glassmorphism Header */
        .nav-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 0.5px solid #222;
        }
        .nav-left { display: flex; align-items: center; }
        .back-btn { color: #FFD700; text-decoration: none; font-size: 22px; margin-right: 20px; transition: 0.3s; }
        .back-btn:active { transform: scale(0.8); }
        .page-title { font-weight: 800; font-size: 18px; color: #FFD700; text-transform: uppercase; letter-spacing: 1.5px; }
        .logout-btn { background: none; border: none; color: #FF4444; font-size: 22px; cursor: pointer; display: none; }

        /* Profile Header Detailing */
        .profile-header-main { padding: 25px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        .pic-wrapper { position: relative; width: 100px; height: 100px; margin-bottom: 15px; }
        .pic { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 3px solid #FFD700; object-fit: cover; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); 
            transition: 0.3s;
        }
        .pic:active { transform: scale(0.95); }
        
        /* Badge Detailing */
        #badge-display { 
            position: absolute; bottom: 0; right: 0; 
            background: #ff0055; color: white; display: none; 
            align-items: center; justify-content: center; 
            font-size: 11px; font-weight: bold; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            border: 2px solid #000; z-index: 10; 
        }
        .badge-is-image { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; border: 1.5px solid #FFD700; }
        .badge-is-image img { width: 100%; height: 100%; object-fit: cover; }
        .badge-is-text { padding: 4px 10px; border-radius: 12px; }

        .info { width: 100%; margin-top: 10px; }
        .name { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; color: #fff; }
        .bio { color: #aaa; font-size: 14px; margin-top: 8px; font-weight: 400; max-width: 80%; margin-left: auto; margin-right: auto; line-height: 1.4; }
        .blue-tick { color: #FFD700; font-size: 18px; text-shadow: 0 0 10px #FFD700; }

        /* Stats Card Detailing */
        .stats { 
            display: flex; gap: 0; margin: 20px; 
            background: linear-gradient(145deg, #111, #050505); 
            padding: 20px 0; border-radius: 15px; 
            justify-content: space-around; border: 0.5px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-box { text-align: center; flex: 1; border-right: 0.5px solid #222; }
        .stat-box:last-child { border-right: none; }
        .stat-num { font-size: 20px; font-weight: 800; color: #FFD700; display: block; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: #777; text-transform: uppercase; font-weight: 600; }

        /* Action Buttons Detailing */
        .btn-container { padding: 0 20px; }
        .btn { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-weight: 700; cursor: pointer; margin-bottom: 12px; 
            font-size: 15px; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-follow { 
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%); 
            color: #000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); 
        }
        .btn-follow:active { transform: scale(0.98); opacity: 0.9; }
        .btn-following { 
            background: transparent; color: #FFD700; 
            border: 1.5px solid #FFD700; 
        }

        /* Video Grid Detailing */
        .grid-header { 
            display: flex; justify-content: space-around; 
            border-bottom: 0.5px solid #222; margin-top: 10px;
        }
        .grid-tab { padding: 15px; color: #888; font-size: 20px; flex: 1; text-align: center; transition: 0.3s; }
        .grid-tab.active { color: #FFD700; border-bottom: 2px solid #FFD700; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; padding: 1.5px; }
        .thumb { 
            aspect-ratio: 9/16; background: #111; position: relative; 
            cursor: pointer; overflow: hidden; 
        }
        .thumb video { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        .del-btn { 
            position: absolute; top: 8px; right: 8px; 
            background: rgba(255,0,0,0.8); color: white; 
            width: 28px; height: 28px; display: flex; 
            justify-content: center; align-items: center; 
            border-radius: 50%; z-index:10; border: 1.5px solid rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .view-count { 
            position: absolute; bottom: 8px; left: 8px; 
            background: rgba(0,0,0,0.5); color: white; 
            font-size: 11px; padding: 3px 8px; border-radius: 4px; 
            display: flex; align-items: center; gap: 5px; 
            font-weight: 600;
        }
        .view-count i { color: #FFD700; }

        /* Modals Detailing */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; 
            backdrop-filter: blur(8px);
        }
        .modal-box { 
            background: #111; padding: 30px; border: 1.5px solid #FFD700; 
            width: 90%; max-width: 380px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: white; margin-bottom: 20px; border-radius: 10px; 
            font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.1); }
        label { color: #FFD700; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }

        #uploadStatus { font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <div class="nav-left">
                <a href="index" class="back-btn"><i class="fas fa-chevron-left"></i></a>
                <div class="page-title" id="pageTitle">Profile</div>
            </div>
            <button id="logoutBtn" class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <div class="profile-header-main">
            <div class="pic-wrapper">
                <img src="" id="pPic" class="pic" onclick="window.viewItem('pic')">
                <div id="badge-display" onclick="event.stopPropagation(); window.viewItem('badge')"></div>
            </div>
            <div class="info">
                <div class="name" id="pName">Loading...</div>
                <div class="bio" id="pBio">...</div>
            </div>
        </div>

        <div class="btn-container">
            <button id="actionBtn" class="btn btn-following">Loading...</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-num" id="sVideos">0</span>
                <span class="stat-label">Videos</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" id="sFollowers">0</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" id="sFollowing">0</span>
                <span class="stat-label">Following</span>
            </div>
        </div>

        <div class="grid-header">
            <div class="grid-tab active"><i class="fas fa-th"></i></div>
            <div class="grid-tab" onclick="alert('Liked videos coming soon!')"><i class="far fa-heart"></i></div>
            <div class="grid-tab" onclick="alert('Private videos coming soon!')"><i class="fas fa-lock"></i></div>
        </div>

        <div class="grid" id="videoGrid">
            <p style="color:#444; grid-column: span 3; text-align: center; margin-top: 40px; font-weight: 600;">LOADING CLIPS...</p>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-box">
            <h2 style="color:#FFD700; margin-top:0; font-weight:800; text-align:center;">EDIT PROFILE</h2>
            <label>DISPLAY NAME</label>
            <input type="text" id="eName" placeholder="Enter name">
            <label>ABOUT ME (BIO)</label>
            <input type="text" id="eBio" placeholder="Enter short bio">
            <label>PROFILE PICTURE</label>
            <input type="file" id="eFile" accept="image/*" style="border: 2px dashed #FFD700; padding: 15px; cursor: pointer; background: #000;">
            <p id="uploadStatus" style="font-size: 13px; color: #FFD700; display: none; text-align:center;">Uploading your photo...</p>
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button class="btn btn-follow" id="saveBtn" onclick="saveProfile()" style="margin:0;">SAVE</button>
                <button class="btn btn-following" onclick="document.getElementById('editModal').style.display='none'" style="margin:0;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal" onclick="document.getElementById('viewModal').style.display='none'">
        <div class="view-content" onclick="event.stopPropagation()" style="text-align:center; padding:20px; width:100%;">
            <img id="viewImage" src="" style="display:none; margin:auto; transition: 0.3s;">
            <div id="viewBadgeText" style="font-size: 28px; font-weight: 800; color: white; display: none; padding: 20px 40px; border-radius: 50px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, remove, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Same Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const CLOUD_NAME = "dusj0vpsi"; 
        const UPLOAD_PRESET = "paravideo";

        let myUID = null, profileUID = null, currentBadgeData = null, currentPhotoURL = "";
        const ADMIN_EMAIL = "elitegamer859650@gmail.com";

        // Logic Functions (Restored from your previous code)
        window.viewItem = (type) => {
            const modal = document.getElementById('viewModal'), img = document.getElementById('viewImage'), txt = document.getElementById('viewBadgeText');
            modal.style.display = 'flex'; img.style.display = 'none'; txt.style.display = 'none';
            if(type === 'pic') { img.src = document.getElementById('pPic').src; img.style.display = 'block'; img.style.borderRadius = '50%'; img.style.width = '300px'; img.style.height = '300px'; img.style.border = '4px solid #FFD700'; } 
            else if(type === 'badge' && currentBadgeData) {
                let d = (typeof currentBadgeData === 'object') ? currentBadgeData : { text: currentBadgeData, color: '#ff0055' };
                if(d.image) { img.src = d.image; img.style.display = 'block'; img.style.borderRadius = '50%'; img.style.width = '200px'; img.style.height = '200px'; img.style.border = `4px solid ${d.color || '#ff0055'}`; } 
                else { txt.innerText = d.text || "BADGE"; txt.style.background = d.color || '#ff0055'; txt.style.display = 'block'; }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                myUID = user.uid;
                const params = new URLSearchParams(window.location.search);
                profileUID = params.get('uid') || user.uid;
                loadProfile(user);
            } else { window.location.href = 'login'; }
        });

        window.handleLogout = () => {
            if(confirm("Are you sure you want to logout?")) {
                signOut(auth).then(() => { window.location.href = 'login'; });
            }
        };

        async function loadProfile(currentUser) {
            onValue(ref(db, 'users/' + profileUID), (snap) => {
                const u = snap.val() || {};
                let isMe = (myUID === profileUID), isOwner = (isMe ? currentUser.email : (u.email || "")).toLowerCase() === ADMIN_EMAIL;
                if(isMe) document.getElementById('logoutBtn').style.display = 'block';
                let tickHTML = isOwner ? `<i class="fas fa-check-circle blue-tick"></i>` : "";
                const badgeDiv = document.getElementById('badge-display'); currentBadgeData = u.customBadge;
                if(u.customBadge) {
                    badgeDiv.style.display = 'flex';
                    let bd = (typeof u.customBadge === 'object') ? u.customBadge : { text: u.customBadge, color: '#ff0055' };
                    badgeDiv.style.background = bd.color || '#ff0055';
                    if(bd.image) { badgeDiv.className = 'badge-display badge-is-image'; badgeDiv.innerHTML = `<img src="${bd.image}">`; } 
                    else { badgeDiv.className = 'badge-display badge-is-text'; badgeDiv.innerText = bd.text || ""; }
                } else { badgeDiv.style.display = 'none'; }
                document.getElementById('pName').innerHTML = `${u.username || "User"} ${tickHTML}`;
                document.getElementById('pBio').innerText = u.bio || "No bio yet...";
                document.getElementById('pPic').src = u.photo || "https://via.placeholder.com/150";
                currentPhotoURL = u.photo || "";
                if(isMe) { document.getElementById('eName').value = u.username || ""; document.getElementById('eBio').value = u.bio || ""; }
                onValue(ref(db, `followers/${profileUID}`), s => document.getElementById('sFollowers').innerText = formatNumber(s.exists() ? s.size : 0));
            });
            onValue(ref(db, `following/${profileUID}`), s => document.getElementById('sFollowing').innerText = s.exists() ? s.size : 0);
            const btn = document.getElementById('actionBtn');
            if (myUID === profileUID) { btn.innerText = "EDIT PROFILE"; btn.className = "btn btn-following"; btn.onclick = () => document.getElementById('editModal').style.display = 'flex'; } 
            else { checkFollow(btn); }
            onValue(ref(db, 'gameplay_clips'), snap => { 
                const grid = document.getElementById('videoGrid'); grid.innerHTML = "";
                const data = snap.val();
                if(data) {
                    const myVids = Object.entries(data).filter(([k,v]) => v.uid === profileUID).reverse();
                    document.getElementById('sVideos').innerText = myVids.length;
                    if(myVids.length === 0) { grid.innerHTML = "<p style='color:#444; grid-column: span 3; text-align: center; margin-top:40px;'>No clips uploaded.</p>"; return; }
                    myVids.forEach(([k, vid]) => {
                        const div = document.createElement('div'); div.className = 'thumb';
                        const isMe = (myUID === profileUID);
                        const delBtn = isMe ? `<div class="del-btn" onclick="window.deleteVideo(event, '${k}')"><i class="fas fa-trash"></i></div>` : '';
                        let viewsBadge = isMe ? `<div class="view-count"><i class="fas fa-eye"></i> ${formatNumber(vid.views || 0)}</div>` : "";
                        div.innerHTML = `<video src="${vid.videoUrl}"></video>${delBtn}${viewsBadge}`;
                        div.onclick = () => { window.location.href = `index?video=${k}`; };
                        grid.appendChild(div);
                    });
                } else { grid.innerHTML = "<p style='color:#444; grid-column: span 3; text-align: center; margin-top:40px;'>No clips found.</p>"; }
            });
        }

        window.saveProfile = async () => {
            const name = document.getElementById('eName').value;
            const bio = document.getElementById('eBio').value;
            const fileInput = document.getElementById('eFile');
            const saveBtn = document.getElementById('saveBtn');
            const status = document.getElementById('uploadStatus');
            saveBtn.disabled = true;
            let finalPhoto = currentPhotoURL;
            if(fileInput.files[0]) {
                status.style.display = 'block';
                const fd = new FormData();
                fd.append("file", fileInput.files[0]);
                fd.append("upload_preset", UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
                    const data = await res.json();
                    finalPhoto = data.secure_url;
                } catch (e) { alert("Upload error!"); }
            }
            await update(ref(db, 'users/' + myUID), { username: name, bio: bio, photo: finalPhoto, lowercaseName: name.toLowerCase() });
            alert("Success!");
            location.reload();
        };

        window.deleteVideo = async (event, key) => { 
            event.stopPropagation(); 
            if(confirm("Remove this clip?")) { await remove(ref(db, `gameplay_clips/${key}`)); } 
        }

        function checkFollow(btn) { const r = ref(db, `followers/${profileUID}/${myUID}`); onValue(r, s => { if (s.exists()) { btn.innerText = "FOLLOWING"; btn.className = "btn btn-following"; btn.onclick = async () => { if(confirm("Unfollow?")) { await remove(ref(db, `followers/${profileUID}/${myUID}`)); await remove(ref(db, `following/${myUID}/${profileUID}`)); } }; } else { btn.innerText = "FOLLOW"; btn.className = "btn btn-follow"; btn.onclick = async () => { await set(ref(db, `followers/${profileUID}/${myUID}`), true); await set(ref(db, `following/${myUID}/${profileUID}`), true); }; } }); }
        function formatNumber(num) { if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M'; if (num >= 1000) return (num / 1000).toFixed(1) + 'k'; return num; }
    </script>
</body>
</html>
