<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - FatahShaheen OS</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Variables for Light/Dark Themeing */
        :root {
            --bg-color: #f0f2f5;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(0, 0, 0, 0.1);
            --accent: #0078FF;
            --accent-glow: rgba(0, 120, 255, 0.5);
            --secondary-glow: rgba(255, 0, 80, 0.3);
        }

        [data-theme="dark"] {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #b0b3b8;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --accent: #00f2ea;
            --accent-glow: rgba(0, 242, 234, 0.4);
            --secondary-glow: rgba(255, 0, 80, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            height: 100svh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            transition: background-color 0.3s ease;
            position: relative;
        }

        /* Background Glowing Orbs for Glass Effect */
        .bg-shape { position: absolute; filter: blur(70px); z-index: -1; opacity: 0.7; animation: pulse 6s infinite alternate; }
        .shape1 { width: 250px; height: 250px; background: var(--accent); top: -50px; left: -50px; border-radius: 50%; }
        .shape2 { width: 300px; height: 300px; background: var(--secondary-glow); bottom: -100px; right: -50px; border-radius: 50%; animation-delay: -3s; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Top Theme Toggle */
        .theme-toggle-container { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .theme-toggle { font-size: 24px; cursor: pointer; color: var(--text-main); transition: transform 0.2s; }
        .theme-toggle:active { transform: scale(0.8); }

        /* Glassmorphism Login Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px var(--glass-shadow);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo-area { margin-bottom: 30px; animation: float 4s ease-in-out infinite; }
        .logo-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid var(--glass-border); 
            object-fit: cover; 
            box-shadow: 0 0 25px var(--accent-glow); 
        }
        
        h1 { font-size: 26px; margin-bottom: 8px; color: var(--text-main); font-weight: 800; letter-spacing: 1px; }
        p { color: var(--text-muted); margin-bottom: 35px; font-size: 15px; font-weight: 500; }

        /* Premium Buttons */
        .login-btn {
            background: var(--text-main);
            color: var(--bg-color); 
            border: 2px solid transparent; 
            padding: 14px 24px; 
            border-radius: 25px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 20px var(--glass-shadow); 
            transition: 0.3s ease; 
            width: 100%; justify-content: center;
        }
        .login-btn:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .login-btn:active { transform: scale(0.96); }
        
        .skip-btn { 
            margin-top: 25px; background: none; border: none; 
            color: var(--text-muted); cursor: pointer; 
            font-size: 14px; font-weight: 600; transition: 0.2s; 
        }
        .skip-btn:hover { color: var(--text-main); text-decoration: underline; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="theme-toggle-container">
        <i class="fas fa-moon theme-toggle" id="themeBtn" onclick="toggleTheme()"></i>
    </div>

    <div class="glass-card">
        <div class="logo-area">
            <img src="icon.png" class="logo-img" alt="FatahShaheen OS Logo">
        </div>

        <h1>FatahShaheen OS</h1>
        <p>Shorts, Videos & Posts in One Network</p>

        <button class="login-btn" id="googleLoginBtn">
            <i class="fab fa-google" style="font-size: 18px;"></i> Continue with Google
        </button>

        <button class="skip-btn" id="skipLoginBtn">Skip for now</button>
    </div>

    </body>
</html>
