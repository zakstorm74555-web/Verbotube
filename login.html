<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Verbotube</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- VERBOTUBE THEME --- */
        body { 
            background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .logo-area { margin-bottom: 40px; animation: float 3s ease-in-out infinite; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #FFD700; object-fit: cover; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        
        h1 { font-size: 28px; margin-bottom: 10px; color: #FFD700; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 40px; font-size: 14px; }

        .login-btn {
            background: linear-gradient(135deg, #FFD700, #FF0000);
            color: black; border: none; padding: 15px 30px; border-radius: 30px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transition: 0.2s; width: 80%; max-width: 300px; justify-content: center;
        }
        .login-btn:active { transform: scale(0.95); }
        
        .skip-btn { margin-top: 20px; background: none; border: none; color: #555; cursor: pointer; font-size: 14px; text-decoration: underline; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="logo-area">
        <img src="icon.png" class="logo-img">
    </div>

    <h1>Verbotube</h1>
    <p>Watch, Create & Share Viral Moments</p>

    <button class="login-btn" onclick="handleLogin()">
        <i class="fab fa-google"></i> Continue with Google
    </button>

    <button class="skip-btn" onclick="window.location.href='index'">Skip for now</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Agar banda pehle se login hai, to wapis bhej do (Clean URL)
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'index';
        });

        window.handleLogin = () => {
            signInWithPopup(auth, new GoogleAuthProvider())
            .then((result) => {
                const user = result.user;
                // Save User to DB
                const userRef = ref(db, 'users/' + user.uid);
                get(userRef).then((snapshot) => {
                    if (!snapshot.exists()) {
                        set(userRef, {
                            username: user.displayName,
                            email: user.email,
                            photo: user.photoURL,
                            uid: user.uid
                        });
                    }
                });
                window.location.href = 'index'; // ✅ Login Success -> Home (Clean URL)
            })
            .catch((error) => {
                alert("Login Failed: " + error.message);
            });
        };
    </script>
</body>
</html>
