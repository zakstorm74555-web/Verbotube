<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #000; color: white; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- SCREEN 1: UPLOAD --- */
        #uploadScreen { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .start-btn { 
            width: 150px; height: 150px; border-radius: 50%; background: #111; border: 2px solid #333;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .start-btn:active { transform: scale(0.9); border-color: #FFD700; }
        .start-btn i { font-size: 50px; margin-bottom: 10px; color: #FFD700; }
        .start-btn span { font-weight: bold; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }

        /* --- SCREEN 2: EDITOR --- */
        #editorScreen { position: relative; width: 100%; height: 100%; background: black; }
        .preview-area { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .sidebar { position: absolute; right: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; z-index: 20; }
        .tool { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .tool i { font-size: 28px; color: #fff; filter: drop-shadow(0 2px 5px black); }
        .tool span { font-size: 10px; font-weight: bold; text-shadow: 0 1px 3px black; }

        .next-btn { 
            position: absolute; bottom: 40px; right: 20px; z-index: 100;
            background: #FFD700; color: black; padding: 14px 40px; border-radius: 50px; 
            font-weight: 900; border: none; font-size: 16px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4); display: flex; align-items: center; gap: 10px;
        }

        /* Popups */
        .popup { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; border-top: 1px solid #333; padding-bottom: calc(25px + env(safe-area-inset-bottom)); }
        .popup.show { transform: translateY(0); }
        .popup-header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 800; text-transform: uppercase; font-size: 14px; }

        .details-input { width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 18px; font-size: 14px; margin-bottom: 20px; outline: none; resize: none; }
        .vis-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .vis-btn { flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #555; }
        .vis-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255, 215, 0, 0.05); }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .loading-ring { width: 60px; height: 60px; border: 4px solid #222; border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="uploadScreen">
        <h1 style="color:#FFD700; font-family:'Anton'; font-size:50px; letter-spacing:5px; margin:0;">STUDIO</h1>
        <div class="start-btn" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-video"></i>
            <span>Select Clip</span>
        </div>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div id="editorScreen" style="display:none;">
        <div class="preview-area">
            <video id="mainVideo" playsinline loop onclick="togglePlay()"></video>
            
            <div class="sidebar">
                <div class="tool" onclick="alert('B2 Engine processing...')"><i class="fas fa-bolt"></i><span>High-Res</span></div>
                <div class="tool" onclick="alert('Audio sync active')"><i class="fas fa-music"></i><span>Audio</span></div>
            </div>

            <button class="next-btn" onclick="openPopup('details')">
                Continue <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="p-details" class="popup">
        <div class="popup-header">
            <span onclick="closePopup()" style="color:#ff4444">Discard</span>
            <span style="color:#888">Transmission Info</span>
            <span onclick="startUpload()" style="color:#FFD700">Sync & Post</span>
        </div>
        <textarea id="captionInput" class="details-input" rows="3" placeholder="Describe this legendary gameplay... #Garena #Gameloft #Verbotube"></textarea>
        
        <p style="font-size: 11px; color: #777; margin-bottom: 10px; font-weight: bold;">Transmission Privacy</p>
        <div class="vis-row">
            <div id="v-public" class="vis-btn active" onclick="setVis('public')">Broadcast</div>
            <div id="v-private" class="vis-btn" onclick="setVis('private')">Archive</div>
        </div>
    </div>

    <div id="loader">
        <div class="loading-ring"></div>
        <h3 style="margin-top:20px; font-size: 14px; letter-spacing: 3px; color:#FFD700;">SYNCING TO BLACKBLAZE...</h3>
        <p id="progressText" style="color:#555; font-size:12px; margin-top:5px;">Ghost plays is optimizing your gameplay.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref as dbRef, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as stRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Firebase Config (Bridged to Blackblaze B2)
        const firebaseConfig = { 
            apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", 
            authDomain: "paravideo-1ac3b.firebaseapp.com", 
            databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", 
            projectId: "paravideo-1ac3b", 
            storageBucket: "paravideo-1ac3b.firebasestorage.app", // Linked to B2 Bucket 95a4a3b621680bb892ef0e11
            appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let selectedFile = null;
        let videoVisibility = "public";

        window.handleFile = (file) => {
            if(!file) return;
            selectedFile = file;
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('editorScreen').style.display = 'block';
            const vid = document.getElementById('mainVideo');
            vid.src = URL.createObjectURL(file);
            vid.play();
        };

        window.setVis = (v) => {
            videoVisibility = v;
            document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active');
        };

        window.startUpload = async () => {
            const caption = document.getElementById('captionInput').value;
            const loader = document.getElementById('loader');
            const progText = document.getElementById('progressText');
            
            loader.style.display = 'flex';
            
            try {
                const user = auth.currentUser;
                if(!user) throw new Error("No active pilot detected.");

                // Step 1: Upload to Storage (Blackblaze Bridged)
                progText.innerText = "Transmitting data to B2...";
                const fileName = `clips/${user.uid}_${Date.now()}.mp4`;
                const storageRef = stRef(storage, fileName);
                
                const snapshot = await uploadBytes(storageRef, selectedFile);
                const downloadURL = await getDownloadURL(snapshot.ref);

                // Step 2: Fetch Uploader Info
                progText.innerText = "Registering transmission...";
                const uSnap = await get(dbRef(db, 'users/' + user.uid));
                const username = uSnap.exists() ? uSnap.val().username : "Gamer";
                
                // Step 3: Save metadata to RTDB
                await push(dbRef(db, 'gameplay_clips'), {
                    videoUrl: downloadURL,
                    caption: caption || "Legendary Play",
                    privacy: videoVisibility,
                    uploader: username,
                    uid: user.uid,
                    timestamp: Date.now(),
                    likes: 0,
                    views: 0
                });
                
                progText.innerText = "Transmission Synchronized!";
                setTimeout(() => window.location.href = 'index', 1000);

            } catch (err) {
                console.error(err);
                alert("B2 Engine Error: Sync failed. Check connection.");
                loader.style.display = 'none';
            }
        };

        window.openPopup = (id) => document.getElementById('p-'+id).classList.add('show');
        window.closePopup = () => document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
        window.togglePlay = () => { const v = document.getElementById('mainVideo'); v.paused ? v.play() : v.pause(); };
    </script>
</body>
</html>
