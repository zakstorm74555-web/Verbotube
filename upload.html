<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron&family=Pacifico&family=Roboto:wght@900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #333; z-index: 50; }
        .save-btn { background: #FFD700; color: black; padding: 6px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* CANVAS STAGE */
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; background: #050505; position: relative; overflow: hidden; }
        canvas { max-width: 100%; max-height: 70vh; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
        
        /* TIMELINE AREA (TikTok Style) */
        .timeline-area { background: #111; padding: 10px; border-top: 1px solid #333; }
        
        .scrubber-container { position: relative; height: 40px; margin-bottom: 10px; display: flex; align-items: center; }
        /* The Video Strip */
        .frame-strip { width: 100%; height: 40px; background: #222; border-radius: 5px; overflow: hidden; display: flex; opacity: 0.5; }
        .frame-preview { height: 100%; flex: 1; background: #333; border-right: 1px solid #000; }
        
        /* The Slider (Ungli se hilane wala) */
        input[type=range].seeker { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            -webkit-appearance: none; background: transparent; z-index: 10; margin: 0;
        }
        input[type=range].seeker::-webkit-slider-thumb {
            -webkit-appearance: none; height: 50px; width: 4px; background: #FFD700; 
            border: 2px solid white; border-radius: 2px; box-shadow: 0 0 10px white; cursor: pointer;
        }

        .time-display { font-size: 10px; color: #888; display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* CONTROLS */
        .controls { background: #000; height: 220px; display: flex; flex-direction: column; }
        
        .tabs { display: flex; overflow-x: auto; border-bottom: 1px solid #222; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #888; font-size: 13px; cursor: pointer; min-width: 70px; }
        .tab.active { color: #FFD700; border-bottom: 2px solid #FFD700; font-weight: bold; background: #151515; }
        .tab i { font-size: 16px; display: block; margin-bottom: 4px; }

        .panel { display: none; height: 100%; padding: 15px; overflow-y: auto; }
        .panel.active { display: block; }

        /* UI ELEMENTS */
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .tool-btn { background: #222; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-size: 10px; }
        .tool-btn.selected { border-color: #FFD700; color: #FFD700; }

        /* FULL COLOR PICKER */
        .color-wrapper { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #222; padding: 10px; border-radius: 10px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; border-radius: 50%; padding: 0; overflow: hidden; cursor: pointer; }
        
        /* SLIDERS */
        .slider-row { margin-bottom: 15px; }
        .slider-row label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; }
        input[type=range].adjust { width: 100%; accent-color: #FFD700; height: 4px; }

        /* RENDER SCREEN */
        #renderOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 200; display:none; justify-content:center; align-items:center; flex-direction:column; }
        .progress-bar { width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 20px; }
        .progress-fill { height: 100%; background: #FFD700; width: 0%; transition: 0.1s; }

    </style>
</head>
<body>

    <div id="uploadScreen" style="height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div onclick="document.getElementById('fileInput').click()" style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, #FFD700, #FF0000); display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow: 0 0 30px rgba(255, 165, 0, 0.3);">
            <i class="fas fa-plus" style="font-size:40px; color:black;"></i>
        </div>
        <h3 style="margin-top:20px;">New Project</h3>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="initEditor(this.files[0])">
    </div>

    <div id="editorScreen" style="display:none; height:100%; flex-direction:column;">
        <div class="header">
            <i class="fas fa-times" onclick="location.reload()" style="font-size:20px; cursor:pointer; color:#888;"></i>
            <button class="save-btn" onclick="startRendering()">POST</button>
        </div>

        <div class="stage" onclick="togglePlay()">
            <canvas id="mainCanvas"></canvas>
            <i id="playIcon" class="fas fa-play" style="font-size:50px; opacity:0.5; position:absolute; pointer-events:none; display:none;"></i>
            
            <video id="sourceVideo" playsinline crossorigin="anonymous" style="display:none;"></video>
        </div>

        <div class="timeline-area">
            <div class="time-display">
                <span id="currTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
            <div class="scrubber-container">
                <div class="frame-strip" id="frameStrip"></div> <input type="range" class="seeker" id="seekSlider" value="0" min="0" step="0.01" oninput="scrubVideo(this.value)" onchange="endScrub()">
            </div>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:5px;">
                <i class="fas fa-plus-circle" style="color:#FFD700;" onclick="alert('Add Clip Feature coming soon!')"> Add Clip</i>
                <i class="fas fa-cut" style="color:#FFD700;" onclick="alert('Split Feature coming soon!')"> Split</i>
            </div>
        </div>

        <div class="controls">
            <div class="tabs">
                <div class="tab active" onclick="showTab('text', this)"><i class="fas fa-font"></i>Text</div>
                <div class="tab" onclick="showTab('filter', this)"><i class="fas fa-magic"></i>Filters</div>
                <div class="tab" onclick="showTab('speed', this)"><i class="fas fa-tachometer-alt"></i>Speed</div>
                <div class="tab" onclick="showTab('music', this)"><i class="fas fa-music"></i>Music</div>
            </div>

            <div id="p-text" class="panel active">
                <input type="text" id="textInput" placeholder="Enter Text..." style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:5px;" oninput="updateTextObject()">
                
                <div class="color-wrapper">
                    <span style="font-size:12px; color:#aaa;">Color:</span>
                    <input type="color" id="fullColorPicker" value="#ffffff" oninput="textObj.color = this.value">
                    <div style="flex:1;"></div>
                    <button onclick="toggleTextBg()" style="padding:5px 10px; background:#444; border:none; color:white; border-radius:5px; font-size:11px;">BG</button>
                </div>

                <div class="tool-grid" style="margin-top:10px;">
                    <div class="tool-btn selected" onclick="setFont('Roboto', this)" style="font-family:Roboto">Bold</div>
                    <div class="tool-btn" onclick="setFont('Bangers', this)" style="font-family:Bangers">Comic</div>
                    <div class="tool-btn" onclick="setFont('Pacifico', this)" style="font-family:Pacifico">Cursive</div>
                    <div class="tool-btn" onclick="setFont('Orbitron', this)" style="font-family:Orbitron">Sci-Fi</div>
                </div>
            </div>

            <div id="p-filter" class="panel">
                <div class="slider-row"><label>Brightness</label><input class="adjust" type="range" min="0" max="200" value="100" id="brightRange"></div>
                <div class="slider-row"><label>Contrast</label><input class="adjust" type="range" min="0" max="200" value="100" id="contrastRange"></div>
                <div class="slider-row"><label>Saturation</label><input class="adjust" type="range" min="0" max="200" value="100" id="satRange"></div>
                <div class="slider-row"><label>Hue</label><input class="adjust" type="range" min="0" max="360" value="0" id="hueRange"></div>
            </div>

            <div id="p-speed" class="panel">
                <p style="text-align:center; color:#aaa;">Playback Speed</p>
                <div class="tool-grid" style="grid-template-columns: repeat(5, 1fr);">
                    <div class="tool-btn" onclick="setSpeed(0.5, this)">0.5x</div>
                    <div class="tool-btn" onclick="setSpeed(0.75, this)">0.75x</div>
                    <div class="tool-btn selected" onclick="setSpeed(1, this)">1x</div>
                    <div class="tool-btn" onclick="setSpeed(1.5, this)">1.5x</div>
                    <div class="tool-btn" onclick="setSpeed(2, this)">2x</div>
                </div>
            </div>

            <div id="p-music" class="panel">
                <button onclick="document.getElementById('musicInput').click()" style="width:100%; padding:10px; background:#222; border:1px dashed #FFD700; color:#FFD700; border-radius:5px;">
                    <i class="fas fa-plus"></i> Add Music
                </button>
                <input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="loadMusic(this)">
                
                <div class="slider-row" style="margin-top:20px;">
                    <label>Video Volume</label>
                    <input class="adjust" type="range" min="0" max="1" step="0.1" value="1" oninput="video.volume = this.value">
                </div>
                <div class="slider-row">
                    <label>Music Volume</label>
                    <input class="adjust" type="range" min="0" max="1" step="0.1" value="0.5" oninput="if(bgMusicElement) bgMusicElement.volume = this.value">
                </div>
            </div>
        </div>
    </div>

    <div id="renderOverlay">
        <i class="fas fa-circle-notch fa-spin" style="font-size:50px; color:#FFD700;"></i>
        <h3 style="margin-top:20px;">Exporting...</h3>
        <p style="color:#888;">Creating your masterpiece</p>
        <div class="progress-bar"><div class="progress-fill" id="renderBar"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi";

        let currentUser = null;
        let canvas, ctx, video;
        let isPlaying = false;
        let textObj = { text: "", x: 50, y: 50, color: "#ffffff", font: "Roboto", bg: false };
        let bgMusicElement;
        let isScrubbing = false;

        onAuthStateChanged(auth, user => {
            if(user) currentUser = user;
            else window.location.href = 'login';
        });

        // 1. INIT
        window.initEditor = (file) => {
            if(!file) return;
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('editorScreen').style.display = 'flex';
            
            video = document.getElementById('sourceVideo');
            canvas = document.getElementById('mainCanvas');
            ctx = canvas.getContext('2d');
            
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Setup Timeline
                document.getElementById('seekSlider').max = video.duration;
                document.getElementById('totalTime').innerText = formatTime(video.duration);
                
                video.play();
                isPlaying = true;
                drawLoop();
            };

            // Canvas Drag for Text
            setupDrag();
        };

        // 2. RENDER LOOP
        function drawLoop() {
            if(!isScrubbing && !video.paused) {
                document.getElementById('seekSlider').value = video.currentTime;
                document.getElementById('currTime').innerText = formatTime(video.currentTime);
            }

            // Filters
            const b = document.getElementById('brightRange').value;
            const c = document.getElementById('contrastRange').value;
            const s = document.getElementById('satRange').value;
            const h = document.getElementById('hueRange').value;
            ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) hue-rotate(${h}deg)`;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // Text Layer
            if(textObj.text) {
                const size = canvas.width * 0.08;
                ctx.font = `bold ${size}px ${textObj.font}`;
                ctx.textAlign = "center";
                
                const x = (textObj.x / 100) * canvas.width;
                const y = (textObj.y / 100) * canvas.height;

                if(textObj.bg) {
                    const width = ctx.measureText(textObj.text).width;
                    ctx.fillStyle = textObj.color === "#ffffff" ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.8)";
                    ctx.fillRect(x - width/2 - 10, y - size, width + 20, size + 10);
                }

                ctx.fillStyle = textObj.color;
                ctx.lineWidth = 3;
                ctx.strokeStyle = "black";
                ctx.strokeText(textObj.text, x, y);
                ctx.fillText(textObj.text, x, y);
            }

            requestAnimationFrame(drawLoop);
        }

        // 3. TIMELINE & SCRUBBING
        window.scrubVideo = (val) => {
            isScrubbing = true;
            video.currentTime = val;
            document.getElementById('currTime').innerText = formatTime(val);
            if(bgMusicElement) bgMusicElement.currentTime = val;
        };
        
        window.endScrub = () => {
            isScrubbing = false;
            if(isPlaying) {
                video.play();
                if(bgMusicElement) bgMusicElement.play();
            }
        };

        window.togglePlay = () => {
            if(video.paused) {
                video.play();
                if(bgMusicElement) bgMusicElement.play();
                isPlaying = true;
                document.getElementById('playIcon').style.display = 'none';
            } else {
                video.pause();
                if(bgMusicElement) bgMusicElement.pause();
                isPlaying = false;
                document.getElementById('playIcon').style.display = 'block';
            }
        };

        // 4. CONTROLS
        window.showTab = (id, el) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('p-'+id).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateTextObject = () => textObj.text = document.getElementById('textInput').value;
        window.setFont = (f, el) => { textObj.font = f; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); };
        window.toggleTextBg = () => textObj.bg = !textObj.bg;
        
        window.setSpeed = (s, el) => {
            video.playbackRate = s;
            document.querySelectorAll('#p-speed .tool-btn').forEach(b => b.classList.remove('selected')); 
            el.classList.add('selected');
        };

        window.loadMusic = (input) => {
            if(input.files[0]) {
                bgMusicElement = new Audio(URL.createObjectURL(input.files[0]));
                bgMusicElement.loop = true;
                alert("Music Added!");
            }
        };

        // 5. DRAG LOGIC (Canvas Text)
        function setupDrag() {
            let isDragging = false;
            canvas.addEventListener('mousedown', () => isDragging = true);
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    textObj.x = ((e.clientX - rect.left) * scaleX / canvas.width) * 100;
                    textObj.y = ((e.clientY - rect.top) * scaleY / canvas.height) * 100;
                }
            });
            // Touch support
            canvas.addEventListener('touchstart', () => isDragging = true);
            canvas.addEventListener('touchend', () => isDragging = false);
            canvas.addEventListener('touchmove', (e) => {
                if(isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const t = e.touches[0];
                    textObj.x = ((t.clientX - rect.left) * scaleX / canvas.width) * 100;
                    textObj.y = ((t.clientY - rect.top) * scaleY / canvas.height) * 100;
                }
            });
        }

        // 6. EXPORT (CANVAS RECORDING)
        window.startRendering = () => {
            document.getElementById('renderOverlay').style.display = 'flex';
            video.currentTime = 0;
            if(bgMusicElement) bgMusicElement.currentTime = 0;
            video.play();
            if(bgMusicElement) bgMusicElement.play();

            const stream = canvas.captureStream(30);
            
            // Audio Mix
            const ctx = new AudioContext();
            const dest = ctx.createMediaStreamDestination();
            // Connect video audio if not muted
            if(video.volume > 0) {
                const s = ctx.createMediaElementSource(video);
                s.connect(dest);
            }
            // Connect music if exists
            if(bgMusicElement) {
                const s = ctx.createMediaElementSource(bgMusicElement);
                s.connect(dest);
            }
            
            const tracks = [...stream.getVideoTracks(), ...dest.stream.getAudioTracks()];
            const finalStream = new MediaStream(tracks);

            const recorder = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];
            
            recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                uploadFinal(blob);
            };

            recorder.start();

            // Render loop stop logic
            video.onended = () => {
                recorder.stop();
                if(bgMusicElement) bgMusicElement.pause();
            };
            
            // Progress Bar (Fake)
            const duration = video.duration * 1000;
            const start = Date.now();
            const intv = setInterval(() => {
                const p = Math.min(95, ((Date.now() - start) / duration) * 100);
                document.getElementById('renderBar').style.width = p + "%";
                if(p >= 95) clearInterval(intv);
            }, 100);
        };

        async function uploadFinal(blob) {
            const fd = new FormData();
            fd.append("file", blob, "edit.webm");
            fd.append("upload_preset", "paravideo");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            
            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    const uSnap = await get(ref(db, 'users/' + currentUser.uid));
                    const username = uSnap.exists() ? uSnap.val().username : "User";

                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: data.secure_url,
                        caption: textObj.text || "My Edit",
                        uid: currentUser.uid,
                        uploader: username,
                        timestamp: Date.now(),
                        isHD: true
                    });
                    window.location.href = 'profile';
                } else {
                    alert("Upload Error");
                    location.reload();
                }
            };
            xhr.send(fd);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0'+sec : sec}`;
        }

    </script>
</body>
</html>
