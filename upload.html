<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@900&family=Permanent+Marker&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #000; color: white; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- SCREEN 1: UPLOAD --- */
        #uploadScreen { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        .start-btn { 
            width: 140px; height: 140px; border-radius: 40px; background: #111; border: 1px solid #333;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .start-btn i { font-size: 50px; margin-bottom: 15px; color: #FFD700; }
        .start-btn span { font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- SCREEN 2: EDITOR --- */
        #editorScreen { position: relative; width: 100%; height: 100%; background: black; }
        .preview-area { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #textOverlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 30px; font-weight: bold; color: white; text-shadow: 2px 2px 10px black; cursor: grab; 
            display: none; z-index: 10; padding: 10px; border: 2px dashed rgba(255,215,0,0.3);
        }

        /* Sidebar Tools */
        .sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; z-index: 20; }
        .tool { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .tool i { font-size: 26px; filter: drop-shadow(0 2px 4px black); }
        .tool span { font-size: 10px; font-weight: bold; text-shadow: 0 1px 3px black; }

        /* Floating Next Button */
        .next-btn { 
            position: absolute; bottom: 30px; right: 20px; z-index: 100;
            background: #FFD700; color: black; padding: 14px 35px; border-radius: 50px; 
            font-weight: 900; border: none; font-size: 16px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3); display: flex; align-items: center; gap: 10px;
        }

        /* Popups */
        .popup { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; border-top: 1px solid #333; }
        .popup.show { transform: translateY(0); }
        .popup-header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 800; text-transform: uppercase; font-size: 14px; color: #666; }

        /* Custom Inputs */
        .details-input { width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 18px; font-size: 14px; margin-bottom: 20px; outline: none; }
        .vis-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .vis-btn { flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #555; }
        .vis-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255, 215, 0, 0.05); }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="uploadScreen">
        <h1 style="color:#FFD700; font-family:'Anton'; font-size:45px; letter-spacing:3px;">STUDIO</h1>
        <div class="start-btn" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-video"></i>
            <span>Select Video</span>
        </div>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div id="editorScreen" style="display:none;">
        <div class="preview-area" id="previewArea">
            <video id="mainVideo" playsinline loop onclick="togglePlay()"></video>
            <audio id="bgAudio" loop></audio>
            <div id="textOverlay">Double Tap to Edit</div>

            <div class="sidebar">
                <div class="tool" onclick="openPopup('text')"><i class="fas fa-text-height"></i><span>Text</span></div>
                <div class="tool" onclick="openPopup('filter')"><i class="fas fa-fill-drip"></i><span>Filter</span></div>
                <div class="tool" onclick="openPopup('sound')"><i class="fas fa-music"></i><span>Music</span></div>
            </div>

            <button class="next-btn" onclick="openPopup('details')">
                Next <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="p-details" class="popup">
        <div class="popup-header">
            <span onclick="closePopup()" style="color:#ff4444">Back</span>
            <span>Finalize Post</span>
            <span onclick="startUpload()" style="color:#FFD700">Publish</span>
        </div>
        <textarea id="captionInput" class="details-input" rows="3" placeholder="Write a caption... #viral #remix"></textarea>
        
        <p style="font-size: 10px; color: #555; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">Visibility</p>
        <div class="vis-row">
            <div id="v-public" class="vis-btn active" onclick="setVis('public')"><i class="fas fa-globe mr-2"></i> Public</div>
            <div id="v-friends" class="vis-btn" onclick="setVis('friends')"><i class="fas fa-user-friends mr-2"></i> Friends</div>
            <div id="v-private" class="vis-btn" onclick="setVis('private')"><i class="fas fa-lock mr-2"></i> Private</div>
        </div>
    </div>

    <div id="p-text" class="popup">
        <div class="popup-header"><span></span>Edit Text<span style="color:#FFD700" onclick="applyText()">Done</span></div>
        <input type="text" id="textInput" class="details-input" placeholder="Enter overlay text...">
        </div>

    <div id="loader">
        <div style="width: 50px; height: 50px; border: 5px solid #222; border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h3 id="loadText" style="margin-top:20px; font-size: 14px; letter-spacing: 2px;">UPLOADING...</h3>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi";

        let selectedFile = null;
        let videoVisibility = "public";
        let textData = { text: "", font: "Montserrat", color: "#ffffff", x: 50, y: 50 };

        window.handleFile = (file) => {
            if(!file) return;
            selectedFile = file;
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('editorScreen').style.display = 'block';
            const vid = document.getElementById('mainVideo');
            vid.src = URL.createObjectURL(file);
            vid.play();
        };

        window.setVis = (v) => {
            videoVisibility = v;
            document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active');
        };

        window.startUpload = async () => {
            const caption = document.getElementById('captionInput').value;
            document.getElementById('loader').style.display = 'flex';
            
            // Cloudinary Upload Logic
            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("upload_preset", "paravideo");

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: fd });
                const data = await res.json();
                
                if(data.secure_url) {
                    const user = auth.currentUser;
                    const uSnap = await get(ref(db, 'users/' + user.uid));
                    
                    // Save to Firebase
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: data.secure_url,
                        caption: caption || "Verbotube Short",
                        visibility: videoVisibility,
                        uploader: uSnap.exists() ? uSnap.val().username : "Anonymous",
                        uid: user.uid,
                        timestamp: Date.now(),
                        likes: 0,
                        views: 0
                    });
                    
                    window.location.href = 'profile';
                }
            } catch (err) {
                alert("Upload Failed!");
                document.getElementById('loader').style.display = 'none';
            }
        };

        window.openPopup = (id) => document.getElementById('p-'+id).classList.add('show');
        window.closePopup = () => document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
        window.togglePlay = () => { const v = document.getElementById('mainVideo'); v.paused ? v.play() : v.pause(); };
    </script>

    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
