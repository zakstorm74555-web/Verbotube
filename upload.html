<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio - ParaVideo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- STUDIO THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); position: absolute; top: 0; width: 100%; z-index: 50; }
        .close-btn { color: white; background: none; border: none; font-size: 24px; cursor: pointer; }
        .next-btn { background: #8a2be2; color: white; padding: 8px 20px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }

        /* --- PREVIEW AREA --- */
        .preview-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* FILTERS (Must match Index) */
        .f-normal { filter: none; }
        .f-vivid { filter: contrast(1.1) saturate(1.2); }
        .f-mono { filter: grayscale(1); }
        .f-dramatic { filter: contrast(1.2) brightness(0.9); }

        /* Music Badge (Indicator) */
        .music-badge { 
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; 
            font-size: 12px; display: none; align-items: center; gap: 8px; border: 1px solid #8a2be2;
        }

        /* --- EDITOR TOOLS (Bottom) --- */
        .editor-panel { background: #000; padding: 15px; padding-bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 50; border-top: 1px solid #222; }
        
        /* Trimmer */
        .trimmer-box { display: flex; flex-direction: column; gap: 5px; }
        .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
        input[type="range"] { width: 100%; accent-color: #8a2be2; }

        /* Toolbar */
        .toolbar { display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
        .tool-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; color: #ccc; }
        .tool-item.active { color: #8a2be2; }
        .tool-icon { font-size: 22px; background: #222; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }

        /* Filter Selector (Horizontal Scroll) */
        .filter-scroller { display: none; overflow-x: auto; gap: 10px; padding: 10px 0; white-space: nowrap; }
        .filter-option { display: inline-block; text-align: center; cursor: pointer; margin-right: 10px; }
        .filter-img { width: 60px; height: 60px; background: #333; border-radius: 5px; border: 2px solid transparent; object-fit: cover; }
        .filter-option.selected .filter-img { border-color: #8a2be2; }

        /* --- FINAL POST OVERLAY (Bottom Sheet) --- */
        .post-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70vh; 
            background: #111; z-index: 100; border-radius: 20px 20px 0 0; 
            transition: 0.3s; padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .sheet-header { text-align: center; font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        textarea { background: #222; border: none; color: white; padding: 15px; border-radius: 10px; resize: none; height: 100px; width: 100%; font-family: inherit; }
        .final-post-btn { background: #FE2C55; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: auto; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; }
        .sound-list { padding: 20px; overflow-y: auto; }
        .sound-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }
        
        .loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:300; display:none; justify-content:center; align-items:center; flex-direction:column; }

    </style>
</head>
<body>

    <div id="fileSelectScreen" style="height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div onclick="document.getElementById('videoInput').click()" style="width:80px; height:80px; background:#8a2be2; border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; animation: pulse 2s infinite;">
            <i class="fas fa-plus" style="font-size:30px;"></i>
        </div>
        <p style="color:#888; margin-top:20px;">Upload Video</p>
        <input type="file" id="videoInput" accept="video/*" style="display:none" onchange="loadVideo(this)">
    </div>

    <div id="editorScreen" style="display:none; height:100vh; flex-direction:column;">
        
        <div class="header">
            <button class="close-btn" onclick="location.reload()">&times;</button>
            <button class="next-btn" onclick="openPostSheet()">Next</button>
        </div>

        <div class="preview-container">
            <video id="mainVideo" loop playsinline onclick="togglePlay()"></video>
            <audio id="remixAudio" loop></audio>
            
            <div class="music-badge" id="musicBadge">
                <i class="fas fa-music"></i> <span id="soundName">Original Sound</span>
            </div>
        </div>

        <div class="editor-panel">
            
            <div class="trimmer-box">
                <div class="time-labels"><span>Start: <span id="startTimeDisplay">0s</span></span></div>
                <input type="range" id="trimSlider" min="0" value="0" step="0.1" oninput="updateTrim()">
            </div>

            <div class="filter-scroller" id="filterScroller">
                <div class="filter-option selected" onclick="applyFilter('normal', this)">
                    <div class="filter-img" style="background:grey"></div><span>Normal</span>
                </div>
                <div class="filter-option" onclick="applyFilter('vivid', this)">
                    <div class="filter-img" style="background:linear-gradient(45deg, red, blue)"></div><span>Vivid</span>
                </div>
                <div class="filter-option" onclick="applyFilter('mono', this)">
                    <div class="filter-img" style="background:#333"></div><span>Mono</span>
                </div>
                <div class="filter-option" onclick="applyFilter('dramatic', this)">
                    <div class="filter-img" style="background:#000"></div><span>Drama</span>
                </div>
            </div>

            <div class="toolbar">
                <div class="tool-item" onclick="toggleFilters()">
                    <div class="tool-icon"><i class="fas fa-magic"></i></div>
                    <span>Filters</span>
                </div>
                <div class="tool-item" onclick="openSounds()">
                    <div class="tool-icon"><i class="fas fa-music"></i></div>
                    <span>Sound</span>
                </div>
            </div>
        </div>
    </div>

    <div class="post-sheet" id="postSheet">
        <div class="sheet-header">Post Settings</div>
        <textarea id="caption" placeholder="Describe your video... #ParaVideo"></textarea>
        
        <div style="display:flex; justify-content:space-between; padding:10px; background:#222; border-radius:10px;">
            <span>Who can watch?</span>
            <select id="visibility" style="background:none; color:#8a2be2; border:none;">
                <option value="public">Public</option>
                <option value="friends">Friends</option>
            </select>
        </div>

        <button class="final-post-btn" onclick="uploadFinal()">POST NOW</button>
        <p style="text-align:center; color:#555; cursor:pointer;" onclick="closePostSheet()">Cancel</p>
    </div>

    <div class="modal" id="soundModal">
        <div class="header" style="position:relative; background:#111;">
            <h3>Select Sound</h3>
            <button class="close-btn" onclick="document.getElementById('soundModal').style.display='none'">&times;</button>
        </div>
        <div class="sound-list" id="soundList">Loading...</div>
    </div>

    <div class="loading-screen" id="loader">
        <i class="fas fa-circle-notch fa-spin" style="font-size:40px; color:#8a2be2;"></i>
        <p style="margin-top:20px; color:#ccc;" id="loadText">Uploading...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi"; // Cloudinary

        let currentUser = null;
        let selectedFile = null;
        let activeFilter = 'normal';
        let trimTime = 0;
        let selectedRemixUrl = null;

        // Check if sound passed via URL (from Index Remix button)
        const urlParams = new URLSearchParams(window.location.search);
        const preSelectedSound = urlParams.get('sound');

        onAuthStateChanged(auth, user => {
            if (user) { currentUser = user; }
            else window.location.href = 'index.html';
        });

        // 1. LOAD VIDEO
        window.loadVideo = (input) => {
            if(input.files && input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('fileSelectScreen').style.display = 'none';
                document.getElementById('editorScreen').style.display = 'flex';
                
                const vid = document.getElementById('mainVideo');
                vid.src = URL.createObjectURL(selectedFile);
                vid.onloadedmetadata = () => {
                    document.getElementById('trimSlider').max = vid.duration;
                };

                // If sound was passed from Remix button
                if(preSelectedSound) {
                    applySound(decodeURIComponent(preSelectedSound), "Remixed Sound");
                }
            }
        };

        // 2. EDITOR LOGIC
        window.togglePlay = () => {
            const vid = document.getElementById('mainVideo');
            const aud = document.getElementById('remixAudio');
            if(vid.paused) {
                vid.play();
                if(selectedRemixUrl) aud.play();
            } else {
                vid.pause();
                if(selectedRemixUrl) aud.pause();
            }
        };

        window.updateTrim = () => {
            const val = document.getElementById('trimSlider').value;
            trimTime = parseFloat(val);
            document.getElementById('startTimeDisplay').innerText = trimTime + "s";
            document.getElementById('mainVideo').currentTime = trimTime;
            document.getElementById('remixAudio').currentTime = 0; // Reset sound to start
        };

        window.toggleFilters = () => {
            const box = document.getElementById('filterScroller');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        };

        window.applyFilter = (filter, elem) => {
            activeFilter = filter;
            document.getElementById('mainVideo').className = `f-${filter}`;
            
            document.querySelectorAll('.filter-option').forEach(e => e.classList.remove('selected'));
            elem.classList.add('selected');
        };

        // 3. SOUND LOGIC
        window.openSounds = () => {
            document.getElementById('soundModal').style.display = 'flex';
            const list = document.getElementById('soundList');
            list.innerHTML = "Loading...";
            
            onValue(ref(db, 'gameplay_clips'), snap => {
                list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    const d = document.createElement('div');
                    d.className = 'sound-item';
                    d.innerHTML = `<span>${data.caption || 'Sound'}</span> <span style="color:#8a2be2">Use</span>`;
                    d.onclick = () => {
                        applySound(data.remixUrl || data.videoUrl, data.caption);
                        document.getElementById('soundModal').style.display = 'none';
                    };
                    list.appendChild(d);
                });
            });
        };

        function applySound(url, name) {
            selectedRemixUrl = url;
            const aud = document.getElementById('remixAudio');
            aud.src = url;
            
            const vid = document.getElementById('mainVideo');
            vid.muted = true; // MUTE VIDEO
            
            document.getElementById('musicBadge').style.display = 'flex';
            document.getElementById('soundName').innerText = name.substring(0,15) + "...";
            alert("Music Added! Original Video Muted.");
        }

        // 4. POST LOGIC
        window.openPostSheet = () => {
            document.getElementById('mainVideo').pause();
            document.getElementById('remixAudio').pause();
            document.getElementById('postSheet').style.bottom = "0";
        };
        window.closePostSheet = () => document.getElementById('postSheet').style.bottom = "-100%";

        window.uploadFinal = async () => {
            document.getElementById('loader').style.display = 'flex';
            const uSnap = await get(ref(db, 'users/' + currentUser.uid));
            const username = uSnap.exists() ? uSnap.val().username : "User";

            // Upload Video to Cloudinary
            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("upload_preset", "paravideo");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            
            xhr.upload.onprogress = e => {
                const p = Math.round((e.loaded / e.total) * 100);
                document.getElementById('loadText').innerText = `Uploading ${p}%`;
            };

            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    const vidUrl = data.secure_url;

                    // Push Data to Firebase
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: vidUrl,
                        caption: document.getElementById('caption').value,
                        filter: activeFilter,
                        trimStart: trimTime,
                        remixUrl: selectedRemixUrl || "",
                        isHD: true,
                        visibility: document.getElementById('visibility').value,
                        uid: currentUser.uid,
                        uploader: username,
                        timestamp: Date.now()
                    });

                    window.location.href = 'index.html';
                } else {
                    alert("Upload Failed");
                    document.getElementById('loader').style.display = 'none';
                }
            };
            xhr.send(fd);
        };

    </script>
    <style>@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }</style>
</body>
</html>
