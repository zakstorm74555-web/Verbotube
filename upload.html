<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- PRO STUDIO THEME --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #333; z-index: 50; }
        .next-btn { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; padding: 8px 25px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* PREVIEW AREA */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; overflow: hidden; }
        video { max-width: 100%; max-height: 80vh; pointer-events: none; }
        
        /* LAYERS (Text & Stickers) */
        .overlay-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: grab; display: none; z-index: 10; }
        .overlay-layer.active { border: 1px dashed #FFD700; }
        .sticker-img { max-width: 150px; }
        
        /* TEMPLATE BADGE */
        .template-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 11px; display: none; border: 1px solid #00ff00; color: #00ff00; }

        /* CONTROLS AREA */
        .controls { background: #111; padding: 10px; border-top: 1px solid #333; height: 350px; display: flex; flex-direction: column; }
        
        /* TABS */
        .tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .tab { color: #888; font-size: 12px; cursor: pointer; white-space: nowrap; padding: 6px 12px; border-radius: 20px; background: #222; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .tab.active { background: #FFD700; color: black; font-weight: bold; }

        /* PANELS */
        .panel { display: none; height: 100%; overflow-y: auto; }
        .panel.active { display: block; }

        /* TEMPLATE GRID */
        .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tmpl-card { aspect-ratio: 9/16; background: #222; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #333; }
        .tmpl-card img { width: 100%; height: 100%; object-fit: cover; }
        .tmpl-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 5px; background: rgba(0,0,0,0.7); font-size: 10px; text-align: center; }

        /* TOOLS */
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .tool-btn { background: #222; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 11px; color: #ccc; }
        .tool-btn.selected { color: #FFD700; border: 1px solid #FFD700; }
        .tool-btn i { font-size: 18px; }

        /* STICKER SEARCH */
        .giphy-search { width: 100%; padding: 10px; background: #333; border: none; color: white; border-radius: 5px; margin-bottom: 10px; }
        .sticker-results { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .sticker-thumb { width: 60px; height: 60px; object-fit: contain; cursor: pointer; }

        /* SLIDERS */
        input[type=range] { width: 100%; accent-color: #FFD700; margin: 10px 0; }
        .range-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; }

        /* LOADER */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 200; display:none; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="startScreen" style="height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:20px;">
        <div onclick="document.getElementById('fileInput').click()" style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, #111, #000); border:2px dashed #FFD700; display:flex; justify-content:center; align-items:center; cursor:pointer; animation: pulse 2s infinite;">
            <i class="fas fa-plus" style="font-size:40px; color:#FFD700;"></i>
        </div>
        <button onclick="showTemplates()" style="background:#222; color:white; border:1px solid #FFD700; padding:10px 20px; border-radius:20px;">
            <i class="fas fa-layer-group"></i> Use Template
        </button>
        <p style="color:#666; font-size:12px;">Start New or Remix</p>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="loadFile(this)">
    </div>

    <div id="templateScreen" style="display:none; height:100%; flex-direction:column; padding:15px;">
        <div class="header" style="position:relative; margin-bottom:15px; border-bottom:none;">
            <i class="fas fa-arrow-left" onclick="location.reload()"></i>
            <span>Select Template</span>
            <div></div>
        </div>
        <div class="template-grid" id="tmplGrid">Loading...</div>
    </div>

    <div id="editorScreen" style="display:none; height:100%; flex-direction:column;">
        <div class="header">
            <i class="fas fa-times" onclick="location.reload()" style="font-size:20px; cursor:pointer; color:#888;"></i>
            <button class="next-btn" onclick="uploadFinal()">POST</button>
        </div>

        <div class="preview-area" id="previewArea">
            <video id="mainVideo" playsinline loop></video>
            <div id="templateBadge" class="template-badge"><i class="fas fa-check-circle"></i> Using Template</div>
            
            <div id="stickerLayer" class="overlay-layer"><img src="" class="sticker-img" id="stickerImg"></div>
            <div id="textLayer" class="overlay-layer" style="color:white; font-size:24px; font-weight:bold; text-shadow:2px 2px 0 black; font-family:Impact;"></div>
        </div>

        <div class="controls">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('edit')"><i class="fas fa-sliders-h"></i> Edit</div>
                <div class="tab" onclick="switchTab('voice')"><i class="fas fa-microphone-alt"></i> Voice</div>
                <div class="tab" onclick="switchTab('chroma')"><i class="fas fa-user-friends"></i> Chroma</div>
                <div class="tab" onclick="switchTab('sticker')"><i class="fas fa-smile"></i> Sticker</div>
            </div>

            <div id="p-edit" class="panel active">
                <div class="tool-grid">
                    <div class="tool-btn" onclick="setEffect('e_vignette:50', this)"><i class="fas fa-circle"></i>Vignette</div>
                    <div class="tool-btn" onclick="setEffect('e_cartoonify', this)"><i class="fas fa-paint-brush"></i>Cartoon</div>
                    <div class="tool-btn" onclick="setEffect('e_negate', this)"><i class="fas fa-adjust"></i>Invert</div>
                    <div class="tool-btn" onclick="setEffect('e_art:incognito', this)"><i class="fas fa-mask"></i>Mask</div>
                </div>
                <div style="margin-top:20px;">
                    <div class="range-label"><span>Speed</span> <span id="speedVal">1x</span></div>
                    <input type="range" min="0.5" max="2.0" step="0.5" value="1" oninput="setSpeed(this.value)">
                </div>
            </div>

            <div id="p-voice" class="panel">
                <div class="tool-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="tool-btn" onclick="setAudioEffect('e_robot', this)"><i class="fas fa-robot"></i> Robot</div>
                    <div class="tool-btn" onclick="setAudioEffect('e_accelerate:50', this)"><i class="fas fa-paw"></i> Chipmunk</div>
                    <div class="tool-btn" onclick="setAudioEffect('e_volume:mute', this)"><i class="fas fa-volume-mute"></i> Mute</div>
                </div>
            </div>

            <div id="p-chroma" class="panel">
                <p style="font-size:12px; color:#aaa; margin-bottom:10px;">Remove Green Background</p>
                <div class="range-label"><span>Tolerance</span> <span id="chromaVal">0%</span></div>
                <input type="range" min="0" max="50" value="0" oninput="updateChroma(this.value)">
                <button onclick="toggleChroma()" id="chromaBtn" style="width:100%; padding:10px; background:#222; border:1px solid #00ff00; color:#00ff00; border-radius:5px; margin-top:10px;">Apply Green Screen</button>
            </div>

            <div id="p-sticker" class="panel">
                <input type="text" class="giphy-search" placeholder="Search GIPHY..." onkeyup="searchGiphy(this.value)">
                <div class="sticker-results" id="stickerResults"></div>
                <button onclick="addTextOverlay()" style="width:100%; margin-top:10px; padding:10px; background:#333; color:white; border:none; border-radius:5px;"><i class="fas fa-font"></i> Add Text</button>
            </div>
        </div>
        
        <div style="padding:10px; background:#222; display:none;" id="metaBox">
            <input type="text" id="caption" placeholder="Caption..." style="width:100%; padding:10px; background:#111; color:white; border:none;">
            <label style="display:flex; align-items:center; gap:10px; margin-top:10px; font-size:12px; color:#ccc;">
                <input type="checkbox" id="allowRemix" checked> Allow others to use as Template?
            </label>
        </div>
    </div>

    <div id="loader">
        <i class="fas fa-cog fa-spin" style="font-size:40px; color:#FFD700;"></i>
        <p style="margin-top:20px; color:white;">Processing AI Effects...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const CLOUD_NAME = "dusj0vpsi";
        const UPLOAD_PRESET = "paravideo";
        const GIPHY_KEY = "YOUR_GIPHY_KEY_HERE"; // Public Key Works sometimes: 'Dc1s1G2K'

        let selectedFile = null;
        let currentUser = null;
        let isTemplateMode = false;
        let templateData = null;

        // Effect States
        let activeEffect = "";
        let audioEffect = "";
        let playSpeed = 1.0;
        let chromaTolerance = 0;
        let activeStickerUrl = "";
        
        onAuthStateChanged(auth, user => {
            if(user) currentUser = user;
            else window.location.href = 'login';
        });

        // 1. LOAD FILE
        window.loadFile = (input) => {
            if(input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('editorScreen').style.display = 'flex';
                document.getElementById('mainVideo').src = URL.createObjectURL(selectedFile);
                document.getElementById('mainVideo').play();
                initDrag();
            }
        };

        // 2. TEMPLATE SYSTEM
        window.showTemplates = () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('templateScreen').style.display = 'flex';
            const grid = document.getElementById('tmplGrid');
            grid.innerHTML = "Loading...";

            onValue(ref(db, 'gameplay_clips'), snap => {
                grid.innerHTML = "";
                if(snap.exists()) {
                    snap.forEach(c => {
                        const v = c.val();
                        // CHECK PERMISSION
                        if(v.allowTemplate) {
                            const d = document.createElement('div');
                            d.className = 'tmpl-card';
                            // Use thumbnail if available, else standard icon
                            const thumb = v.videoUrl.replace('.mp4', '.jpg');
                            d.innerHTML = `<img src="${thumb}"><div class="tmpl-overlay">${v.caption}</div>`;
                            d.onclick = () => useTemplate(v);
                            grid.appendChild(d);
                        }
                    });
                }
                if(grid.innerHTML === "") grid.innerHTML = "No templates available.";
            });
        };

        window.useTemplate = (data) => {
            isTemplateMode = true;
            templateData = data;
            document.getElementById('templateScreen').style.display = 'none';
            document.getElementById('editorScreen').style.display = 'flex';
            
            const vid = document.getElementById('mainVideo');
            vid.src = data.videoUrl;
            vid.crossOrigin = "anonymous";
            vid.play();
            
            document.getElementById('templateBadge').style.display = 'block';
            
            // Apply Template Effects (Mock)
            if(data.filter) activeEffect = data.filter;
        };

        // 3. EDITOR TABS
        window.switchTab = (id) => {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById('p-'+id).style.display = 'block';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // 4. EFFECTS LOGIC
        window.setEffect = (code, btn) => {
            activeEffect = code;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            // Preview Filter via CSS
            const v = document.getElementById('mainVideo');
            v.style.filter = code.includes('sepia') ? 'sepia(1)' : (code.includes('negate') ? 'invert(1)' : 'none');
        };

        window.setAudioEffect = (code, btn) => {
            audioEffect = code; // Applied on upload
            alert("Voice effect will apply after upload!");
        };

        window.setSpeed = (val) => {
            playSpeed = val;
            document.getElementById('mainVideo').playbackRate = val;
            document.getElementById('speedVal').innerText = val + 'x';
        };

        // 5. CHROMA KEY (Green Screen)
        window.updateChroma = (val) => {
            chromaTolerance = val;
            document.getElementById('chromaVal').innerText = val + "%";
        };
        window.toggleChroma = () => {
            // Chroma is processed on server "e_make_transparent:10"
            alert(`Green screen with ${chromaTolerance}% tolerance will be removed on upload.`);
        };

        // 6. STICKERS & TEXT
        window.searchGiphy = async (q) => {
            if(q.length < 3) return;
            const res = await fetch(`https://api.giphy.com/v1/stickers/search?api_key=Dc1s1G2K&q=${q}&limit=10`);
            const data = await res.json();
            const div = document.getElementById('stickerResults');
            div.innerHTML = "";
            data.data.forEach(gif => {
                const img = document.createElement('img');
                img.className = 'sticker-thumb';
                img.src = gif.images.fixed_height_small.url;
                img.onclick = () => addSticker(gif.images.fixed_height.url);
                div.appendChild(img);
            });
        };

        window.addSticker = (url) => {
            activeStickerUrl = url;
            const layer = document.getElementById('stickerLayer');
            document.getElementById('stickerImg').src = url;
            layer.style.display = 'block';
        };

        window.addTextOverlay = () => {
            const txt = prompt("Enter Text:");
            if(txt) {
                const l = document.getElementById('textLayer');
                l.innerText = txt;
                l.style.display = 'block';
            }
        };

        // Drag Logic
        function initDrag() {
            document.querySelectorAll('.overlay-layer').forEach(el => {
                el.addEventListener('touchmove', (e) => {
                    const t = e.touches[0];
                    const rect = document.getElementById('previewArea').getBoundingClientRect();
                    el.style.left = (t.clientX - rect.left) + 'px';
                    el.style.top = (t.clientY - rect.top) + 'px';
                });
            });
        }

        // 7. FINAL UPLOAD (Cloudinary Magic)
        window.uploadFinal = async () => {
            // Show metadata box first
            const metaBox = document.getElementById('metaBox');
            if(metaBox.style.display === 'none') {
                metaBox.style.display = 'block';
                return;
            }

            document.getElementById('loader').style.display = 'flex';
            
            // If Template Mode: We just save new entry pointing to old video but with modifications
            let finalUrl = "";

            if(isTemplateMode) {
                // Just use existing URL but add new transformations on top
                finalUrl = templateData.videoUrl;
                // Add modifications to URL string logic here...
            } else {
                // Upload New File
                const fd = new FormData();
                fd.append("file", selectedFile);
                fd.append("upload_preset", UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: fd });
                const data = await res.json();
                finalUrl = data.secure_url;
            }

            // --- BUILD TRANSFORM URL ---
            let transforms = [];
            if(activeEffect) transforms.push(activeEffect);
            if(playSpeed !== 1) transforms.push(playSpeed < 1 ? "e_accelerate:-50" : "e_accelerate:50");
            if(chromaTolerance > 0) transforms.push(`e_make_transparent:${chromaTolerance}`);
            if(audioEffect) transforms.push(audioEffect);
            
            if(activeStickerUrl) {
                // Add sticker layer (Complex in raw URL, simplified here)
                // transforms.push(`l_fetch:${btoa(activeStickerUrl)},w_150`);
            }

            transforms.push("q_auto");

            if(transforms.length > 0 && !isTemplateMode) {
                const i = finalUrl.indexOf("/upload/") + 8;
                finalUrl = finalUrl.slice(0, i) + transforms.join(",") + "/" + finalUrl.slice(i);
            }

            // Save to Firebase
            const uSnap = await get(ref(db, 'users/' + currentUser.uid));
            const username = uSnap.exists() ? uSnap.val().username : "User";
            const allowTmpl = document.getElementById('allowRemix').checked;

            await push(ref(db, 'gameplay_clips'), {
                videoUrl: finalUrl,
                caption: document.getElementById('caption').value,
                uid: currentUser.uid,
                uploader: username,
                timestamp: Date.now(),
                isHD: true,
                allowTemplate: allowTmpl, // Permission Flag
                parentTemplateId: isTemplateMode ? templateData.key : null
            });

            window.location.href = 'profile';
        };

    </script>
</body>
</html>
