<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; z-index: 50; }
        .next-btn { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; padding: 8px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* PREVIEW AREA */
        .preview-box { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { max-width: 100%; max-height: 100%; }
        
        /* TEXT OVERLAY */
        #overlayText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; cursor: grab; user-select: none; display: none; }

        /* TOOLBAR */
        .toolbar { background: #111; padding: 10px; overflow-x: auto; display: flex; gap: 20px; border-top: 1px solid #333; }
        .tool { display: flex; flex-direction: column; align-items: center; min-width: 60px; color: #aaa; font-size: 12px; cursor: pointer; }
        .tool i { font-size: 20px; margin-bottom: 5px; }
        .tool.active { color: #FFD700; }

        /* CONTROLS PANEL */
        .controls-panel { background: #1a1a1a; padding: 15px; height: 180px; display: none; flex-direction: column; gap: 15px; overflow-y: auto; border-top: 1px solid #333; }
        
        label { font-size: 12px; color: #888; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; accent-color: #FFD700; }
        
        .speed-opts { display: flex; gap: 10px; justify-content: center; }
        .speed-btn { background: #333; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .speed-btn.active { background: #FFD700; color: black; }

        /* LOADING */
        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 100; display:none; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="fileScreen" style="height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div onclick="document.getElementById('vidInput').click()" style="width:80px; height:80px; background:#222; border-radius:50%; display:flex; justify-content:center; align-items:center; border:2px dashed #FFD700; cursor:pointer;">
            <i class="fas fa-plus" style="font-size:30px; color:#FFD700;"></i>
        </div>
        <p>Select Video</p>
        <input type="file" id="vidInput" accept="video/*" style="display:none" onchange="loadVideo(this)">
    </div>

    <div id="editorUI" style="display:none; height:100%; flex-direction:column;">
        <div class="header">
            <i class="fas fa-times" onclick="location.reload()" style="font-size:20px; cursor:pointer;"></i>
            <button class="next-btn" onclick="uploadVideo()">POST</button>
        </div>

        <div class="preview-box">
            <video id="mainVideo" playsinline loop onclick="this.paused ? this.play() : this.pause()"></video>
            <div id="overlayText">Text Here</div>
        </div>

        <div id="panel-adjust" class="controls-panel">
            <label>Brightness</label><input type="range" min="0" max="200" value="100" oninput="updateFilter()">
            <label>Contrast</label><input type="range" min="0" max="200" value="100" oninput="updateFilter()">
            <label>Saturation</label><input type="range" min="0" max="200" value="100" oninput="updateFilter()">
        </div>

        <div id="panel-speed" class="controls-panel">
            <p style="text-align:center; margin:0 0 10px;">Playback Speed</p>
            <div class="speed-opts">
                <button class="speed-btn" onclick="setSpeed(0.5, this)">0.5x</button>
                <button class="speed-btn active" onclick="setSpeed(1, this)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.5, this)">1.5x</button>
                <button class="speed-btn" onclick="setSpeed(2, this)">2x</button>
            </div>
        </div>

        <div id="panel-text" class="controls-panel">
            <input type="text" id="txtInput" placeholder="Enter text..." style="padding:10px; width:100%; background:#333; border:none; color:white; border-radius:5px;" oninput="updateText()">
            <label>Color <input type="color" oninput="document.getElementById('overlayText').style.color=this.value"></label>
            <button onclick="toggleText(false)" style="margin-top:10px; background:red; border:none; color:white; padding:5px; border-radius:5px;">Remove Text</button>
        </div>

        <div class="toolbar">
            <div class="tool" onclick="showPanel('adjust')"><i class="fas fa-sliders-h"></i>Adjust</div>
            <div class="tool" onclick="showPanel('speed')"><i class="fas fa-tachometer-alt"></i>Speed</div>
            <div class="tool" onclick="showPanel('text')"><i class="fas fa-font"></i>Text</div>
            <div class="tool" onclick="document.getElementById('mainVideo').muted = !document.getElementById('mainVideo').muted"><i class="fas fa-volume-mute"></i>Mute</div>
        </div>
    </div>

    <div class="loader" id="loader">
        <i class="fas fa-circle-notch fa-spin" style="font-size:40px; color:#FFD700;"></i>
        <p id="progressText">Processing...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let selectedFile = null;
        let filters = { brightness: 100, contrast: 100, saturate: 100 };

        onAuthStateChanged(auth, user => {
            if(user) currentUser = user;
            else window.location.href = 'login';
        });

        window.loadVideo = (input) => {
            if(input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('fileScreen').style.display = 'none';
                document.getElementById('editorUI').style.display = 'flex';
                document.getElementById('mainVideo').src = URL.createObjectURL(selectedFile);
            }
        };

        window.showPanel = (id) => {
            document.querySelectorAll('.controls-panel').forEach(p => p.style.display = 'none');
            const panel = document.getElementById('panel-' + id);
            if(panel) panel.style.display = 'flex';
            if(id === 'text') toggleText(true);
        };

        window.updateFilter = () => {
            const inputs = document.querySelectorAll('#panel-adjust input');
            filters.brightness = inputs[0].value;
            filters.contrast = inputs[1].value;
            filters.saturate = inputs[2].value;
            document.getElementById('mainVideo').style.filter = `brightness(${filters.brightness}%) contrast(${filters.contrast}%) saturate(${filters.saturate}%)`;
        };

        window.setSpeed = (speed, btn) => {
            document.getElementById('mainVideo').playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        window.toggleText = (show) => {
            document.getElementById('overlayText').style.display = show ? 'block' : 'none';
        };

        window.updateText = () => {
            document.getElementById('overlayText').innerText = document.getElementById('txtInput').value || "Text Here";
        };

        // DRAG TEXT LOGIC
        const textEl = document.getElementById('overlayText');
        let isDragging = false;

        textEl.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if(isDragging) {
                const rect = document.querySelector('.preview-box').getBoundingClientRect();
                textEl.style.left = (e.clientX - rect.left) + 'px';
                textEl.style.top = (e.clientY - rect.top) + 'px';
                textEl.style.transform = 'translate(-50%, -50%)';
            }
        });

        // DRAG TEXT (TOUCH)
        textEl.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if(isDragging) {
                const touch = e.touches[0];
                const rect = document.querySelector('.preview-box').getBoundingClientRect();
                textEl.style.left = (touch.clientX - rect.left) + 'px';
                textEl.style.top = (touch.clientY - rect.top) + 'px';
            }
        });

        window.uploadVideo = async () => {
            document.getElementById('loader').style.display = 'flex';
            
            // NOTE: Filters are visual only in this browser version.
            // To burn filters into video, backend processing (FFmpeg) is needed.
            // Here we upload raw video but save filter metadata to apply during playback.

            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("upload_preset", "paravideo");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/dusj0vpsi/video/upload`);
            
            xhr.upload.onprogress = e => {
                const p = Math.round((e.loaded / e.total) * 100);
                document.getElementById('progressText').innerText = `Uploading ${p}%`;
            };

            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    
                    const uSnap = await get(ref(db, 'users/' + currentUser.uid));
                    const username = uSnap.exists() ? uSnap.val().username : "User";

                    // Save Metadata including Filters
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: data.secure_url,
                        caption: document.getElementById('txtInput').value || "My Video",
                        cssFilter: `brightness(${filters.brightness}%) contrast(${filters.contrast}%) saturate(${filters.saturate}%)`, // Saved Filter
                        uid: currentUser.uid,
                        uploader: username,
                        timestamp: Date.now(),
                        isHD: true
                    });

                    window.location.href = 'profile';
                } else {
                    alert("Upload Failed");
                    document.getElementById('loader').style.display = 'none';
                }
            };
            xhr.send(fd);
        };
    </script>
</body>
</html>
