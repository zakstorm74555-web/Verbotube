<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lobster&family=Orbitron&family=Roboto:wght@900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #000; color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- 1. START SCREEN --- */
        #uploadScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        .start-btn { 
            width: 120px; height: 120px; border-radius: 20px; background: #1a1a1a; border: 2px solid #333;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .start-btn:active { transform: scale(0.95); border-color: #FFD700; }
        .start-btn i { font-size: 40px; margin-bottom: 10px; color: #FFD700; }

        /* --- 2. CAMERA SCREEN --- */
        #cameraScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; display: none; flex-direction: column; }
        #camPreview { flex: 1; object-fit: cover; transform: scaleX(-1); } /* Mirror Effect */
        .cam-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 40px; }
        .record-btn { width: 70px; height: 70px; background: red; border: 4px solid white; border-radius: 50%; cursor: pointer; }
        .record-btn.recording { animation: pulse 1s infinite; background: white; border-color: red; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- 3. EDITOR SCREEN --- */
        .preview-area { position: relative; flex: 1; background: #111; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #textOverlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px black; cursor: grab; 
            display: none; z-index: 10; padding: 10px; border: 1px dashed rgba(255,255,255,0.3); white-space: nowrap;
        }

        /* Top Bar */
        .top-bar { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .music-pill { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; gap: 5px; }

        /* Sidebar */
        .sidebar { position: absolute; right: 10px; top: 80px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .tool { display: flex; flex-direction: column; align-items: center; gap: 2px; text-shadow: 0 2px 5px black; }
        .tool i { font-size: 24px; }
        .tool span { font-size: 10px; font-weight: 600; }

        /* Bottom Controls */
        .bottom-panel { background: #000; padding: 10px; border-top: 1px solid #222; z-index: 50; }
        .timeline-box { margin-bottom: 10px; padding: 0 10px; }
        input[type=range].seeker { width: 100%; accent-color: #FFD700; height: 40px; }
        .next-btn { background: #FFD700; color: black; padding: 10px 30px; border-radius: 25px; font-weight: bold; border: none; font-size: 14px; margin-left: auto; display: block; }

        /* Popups */
        .popup { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: 0.3s; z-index: 100; max-height: 60vh; overflow-y: auto; }
        .popup.show { transform: translateY(0); }
        .popup-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #ccc; }

        /* UI Elements */
        .font-row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .font-opt { padding: 8px 12px; background: #333; border-radius: 5px; white-space: nowrap; border: 1px solid #444; }
        .font-opt.active { border-color: #FFD700; color: #FFD700; }
        .sound-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; }

        /* Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; display: none; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="uploadScreen">
        <h2 style="color:#FFD700; margin-bottom:30px;">CREATE</h2>
        
        <div style="display:flex; gap:20px;">
            <div class="start-btn" onclick="openCamera()">
                <i class="fas fa-camera"></i>
                <span>Camera</span>
            </div>
            <div class="start-btn" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-image"></i>
                <span>Gallery</span>
            </div>
        </div>
        
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div id="cameraScreen">
        <video id="camPreview" autoplay playsinline muted></video>
        <div class="top-bar">
            <i class="fas fa-times" onclick="closeCamera()" style="font-size:24px;"></i>
        </div>
        <div class="cam-controls">
            <div class="record-btn" id="recBtn" onclick="toggleRecording()"></div>
        </div>
        <div style="position:absolute; top:20px; left:50%; transform:translateX(-50%); color:red; font-weight:bold; display:none;" id="recTimer">Recording...</div>
    </div>

    <div id="editorScreen" style="display:none; height:100%; flex-direction:column;">
        <div class="preview-area" id="previewArea">
            <video id="mainVideo" playsinline loop onclick="togglePlay()"></video>
            <audio id="bgAudio" loop></audio>
            
            <div id="textOverlay">Text</div>

            <div class="top-bar">
                <i class="fas fa-chevron-left close-icon" onclick="location.reload()"></i>
                <div class="music-pill" onclick="openPopup('sound')">
                    <i class="fas fa-music"></i> <span id="soundName">Add Sound</span>
                </div>
            </div>

            <div class="sidebar">
                <div class="tool" onclick="openPopup('text')"><i class="fas fa-font"></i><span>Text</span></div>
                <div class="tool" onclick="openPopup('filter')"><i class="fas fa-magic"></i><span>Effects</span></div>
                <div class="tool" onclick="openPopup('speed')"><i class="fas fa-tachometer-alt"></i><span>Speed</span></div>
                <div class="tool" onclick="toggleMute()"><i class="fas fa-volume-up" id="muteIcon"></i><span>Mute</span></div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="timeline-box">
                <div class="time-labels"><span id="currTime">0:00</span><span id="durTime">0:00</span></div>
                <input type="range" class="seeker" id="timeline" value="0" step="0.01" oninput="scrub(this.value)">
            </div>
            <button class="next-btn" onclick="uploadVideo()">Post Video</button>
        </div>
    </div>

    <div id="p-text" class="popup">
        <div class="popup-header"><span onclick="closePopup()">Cancel</span>Text<span style="color:#FFD700" onclick="applyText()">Done</span></div>
        <input type="text" id="textInput" placeholder="Type something..." style="width:100%; padding:10px; background:#333; border:none; color:white; border-radius:5px; margin-bottom:10px;">
        <div class="font-row">
            <div class="font-opt active" onclick="setFont('Roboto', this)" style="font-family:Roboto">Bold</div>
            <div class="font-opt" onclick="setFont('Bangers', this)" style="font-family:Bangers">Comic</div>
            <div class="font-opt" onclick="setFont('Lobster', this)" style="font-family:Lobster">Cursive</div>
            <div class="font-opt" onclick="setFont('Orbitron', this)" style="font-family:Orbitron">Sci-Fi</div>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="color" id="colorPicker" value="#ffffff" oninput="setTextColor(this.value)" style="width:40px; height:40px; border:none; border-radius:50%;">
            <button onclick="toggleTextBg()" style="padding:10px; background:#444; color:white; border:none; border-radius:5px;">Background</button>
        </div>
    </div>

    <div id="p-sound" class="popup" style="height:70vh;">
        <div class="popup-header"><span onclick="closePopup()">Close</span>Library<span></span></div>
        <div id="soundList">Loading...</div>
    </div>

    <div id="p-filter" class="popup">
        <div class="popup-header"><span onclick="closePopup()">Close</span>Filters<span></span></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button onclick="applyFilter('none')" style="padding:15px; background:#222; color:white; border:1px solid #444;">Normal</button>
            <button onclick="applyFilter('grayscale(1)')" style="padding:15px; background:#222; color:white; border:1px solid #444;">B&W</button>
            <button onclick="applyFilter('sepia(0.8)')" style="padding:15px; background:#332; color:#ebc;">Sepia</button>
            <button onclick="applyFilter('contrast(1.5)')" style="padding:15px; background:#000; color:white;">Drama</button>
        </div>
    </div>

    <div id="p-speed" class="popup">
        <div class="popup-header"><span onclick="closePopup()">Close</span>Speed<span></span></div>
        <div style="display:flex; justify-content:space-between;">
            <button onclick="setSpeed(0.5)" style="padding:10px; background:#222; color:white;">0.5x</button>
            <button onclick="setSpeed(1.0)" style="padding:10px; background:#FFD700; color:black;">1x</button>
            <button onclick="setSpeed(2.0)" style="padding:10px; background:#222; color:white;">2x</button>
        </div>
    </div>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin" style="font-size:50px; color:#FFD700;"></i>
        <p style="margin-top:20px; color:white;">Uploading...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const CLOUD_NAME = "dusj0vpsi";

        let currentUser = null;
        let selectedFile = null;
        let mediaRecorder, recordedChunks = [], camStream;
        
        // Editor State
        let textData = { text: "", font: "Roboto", color: "#ffffff", hasBg: false, x: 50, y: 50 };
        let currentFilter = "";
        let currentSpeed = 1.0;
        let selectedSoundUrl = "";

        onAuthStateChanged(auth, user => {
            if(user) { currentUser = user; loadSounds(); }
            else window.location.href = 'login';
        });

        // 1. FILE HANDLER
        window.handleFile = (file) => {
            if(!file) return;
            selectedFile = file;
            startEditor(URL.createObjectURL(file));
        };

        function startEditor(url) {
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('cameraScreen').style.display = 'none';
            document.getElementById('editorScreen').style.display = 'flex';
            
            const vid = document.getElementById('mainVideo');
            vid.src = url;
            vid.onloadedmetadata = () => {
                document.getElementById('timeline').max = vid.duration;
                document.getElementById('durTime').innerText = formatTime(vid.duration);
            };
            vid.play();
            initDraggableText();
        }

        // 2. CAMERA LOGIC
        window.openCamera = async () => {
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('camPreview').srcObject = camStream;
                document.getElementById('uploadScreen').style.display = 'none';
                document.getElementById('cameraScreen').style.display = 'flex';
            } catch(e) { alert("Camera access failed"); }
        };

        window.closeCamera = () => {
            if(camStream) camStream.getTracks().forEach(t => t.stop());
            document.getElementById('cameraScreen').style.display = 'none';
            document.getElementById('uploadScreen').style.display = 'flex';
        };

        window.toggleRecording = () => {
            const btn = document.getElementById('recBtn');
            if(btn.classList.contains('recording')) {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                document.getElementById('recTimer').style.display = 'none';
            } else {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(camStream);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    selectedFile = new File([blob], "cam.mp4", { type: 'video/mp4' });
                    startEditor(URL.createObjectURL(selectedFile));
                    if(camStream) camStream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                btn.classList.add('recording');
                document.getElementById('recTimer').style.display = 'block';
            }
        };

        // 3. EDITOR FUNCTIONS
        const vid = document.getElementById('mainVideo');
        const aud = document.getElementById('bgAudio');

        vid.ontimeupdate = () => {
            document.getElementById('timeline').value = vid.currentTime;
            document.getElementById('currTime').innerText = formatTime(vid.currentTime);
            // Sync Audio
            if(selectedSoundUrl && Math.abs(aud.currentTime - vid.currentTime) > 0.5) aud.currentTime = vid.currentTime;
        };

        window.scrub = (val) => { vid.currentTime = val; if(selectedSoundUrl) aud.currentTime = val; };
        window.togglePlay = () => {
            if(vid.paused) { vid.play(); if(selectedSoundUrl) aud.play(); }
            else { vid.pause(); if(selectedSoundUrl) aud.pause(); }
        };

        // Text
        window.applyText = () => {
            const txt = document.getElementById('textInput').value;
            const el = document.getElementById('textOverlay');
            if(txt) { textData.text = txt; el.innerText = txt; el.style.display = 'block'; }
            else { textData.text = ""; el.style.display = 'none'; }
            closePopup();
        };
        window.setFont = (f, el) => { textData.font = f; document.getElementById('textOverlay').style.fontFamily = f; document.querySelectorAll('.font-opt').forEach(b => b.classList.remove('active')); el.classList.add('active'); };
        window.setTextColor = (c) => { textData.color = c; document.getElementById('textOverlay').style.color = c; };
        window.toggleTextBg = () => { textData.hasBg = !textData.hasBg; document.getElementById('textOverlay').style.background = textData.hasBg ? "rgba(0,0,0,0.7)" : "transparent"; };

        function initDraggableText() {
            const el = document.getElementById('textOverlay');
            el.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const rect = document.getElementById('previewArea').getBoundingClientRect();
                let x = ((t.clientX - rect.left) / rect.width) * 100;
                let y = ((t.clientY - rect.top) / rect.height) * 100;
                textData.x = Math.max(0, Math.min(100, x));
                textData.y = Math.max(0, Math.min(100, y));
                el.style.left = textData.x + '%'; el.style.top = textData.y + '%';
            });
        }

        // Sounds & Effects
        function loadSounds() {
            onValue(ref(db, 'gameplay_clips'), snap => {
                const list = document.getElementById('soundList');
                list.innerHTML = "";
                snap.forEach(c => {
                    const v = c.val();
                    const url = v.remixUrl || v.videoUrl;
                    const d = document.createElement('div');
                    d.className = 'sound-item';
                    d.innerHTML = `<span>${v.caption ? v.caption.substring(0,20) : 'Sound'}</span> <i class="fas fa-play"></i>`;
                    d.onclick = () => {
                        selectedSoundUrl = url;
                        aud.src = url; aud.load(); aud.play();
                        vid.muted = true; vid.play();
                        document.getElementById('soundName').innerText = v.caption ? v.caption.substring(0,10) : "Sound";
                        closePopup();
                    };
                    list.appendChild(d);
                });
            });
        }

        window.applyFilter = (c) => { currentFilter = c; vid.style.filter = c; closePopup(); };
        window.setSpeed = (s) => { currentSpeed = s; vid.playbackRate = s; closePopup(); };
        window.toggleMute = () => { vid.muted = !vid.muted; document.getElementById('muteIcon').className = vid.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up'; };

        // 4. UPLOAD
        window.uploadVideo = async () => {
            document.getElementById('loader').style.display = 'flex';
            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("upload_preset", "paravideo");

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            
            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    let url = data.secure_url;
                    let transforms = [];

                    if(currentFilter.includes("grayscale")) transforms.push("e_grayscale");
                    if(currentFilter.includes("sepia")) transforms.push("e_sepia:80");
                    if(currentSpeed !== 1.0) transforms.push(currentSpeed > 1 ? "e_accelerate:50" : "e_accelerate:-50");

                    if(textData.text) {
                        const x = Math.round(textData.x); const y = Math.round(textData.y);
                        const txt = encodeURIComponent(textData.text).replace(/%20/g, "%20");
                        const col = textData.color.replace("#", "");
                        transforms.push(`l_text:${textData.font}_50_bold:${txt},co_rgb:${col},g_center,y_${y-50},x_${x-50}`);
                    }
                    transforms.push("q_auto,w_720");

                    if(transforms.length > 0) {
                        const i = url.indexOf("/upload/") + 8;
                        url = url.slice(0, i) + transforms.join(",") + "/" + url.slice(i);
                    }

                    const uSnap = await get(ref(db, 'users/' + currentUser.uid));
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: url,
                        remixUrl: selectedSoundUrl || "",
                        caption: textData.text || "My Edit",
                        uid: currentUser.uid,
                        uploader: uSnap.exists() ? uSnap.val().username : "User",
                        timestamp: Date.now(),
                        isHD: true,
                        views: 0
                    });
                    window.location.href = 'profile';
                } else { alert("Upload Failed"); location.reload(); }
            };
            xhr.send(fd);
        };

        window.openPopup = (id) => document.getElementById('p-'+id).classList.add('show');
        window.closePopup = () => document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0'+sec:sec}`; }

    </script>
</body>
</html>
