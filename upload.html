<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Studio - Verbotube</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #333; z-index: 50; }
        .title { font-weight: bold; color: #FFD700; letter-spacing: 1px; font-size: 18px; }
        .next-btn { background: linear-gradient(135deg, #FFD700, #FF0000); color: black; padding: 8px 25px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* PREVIEW AREA */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; overflow: hidden; }
        video { max-width: 100%; max-height: 80vh; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
        
        /* TEXT OVERLAY PREVIEW */
        #textLayer { 
            position: absolute; color: white; font-weight: bold; font-size: 24px; 
            text-shadow: 2px 2px 4px black; font-family: Impact, sans-serif;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; pointer-events: none; text-align: center;
        }

        /* EDITOR CONTROLS */
        .controls { background: #111; padding: 10px; border-top: 1px solid #333; height: 280px; display: flex; flex-direction: column; }
        
        /* TABS */
        .tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .tab { color: #888; font-size: 13px; cursor: pointer; white-space: nowrap; padding: 5px 10px; border-radius: 15px; background: #222; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .tab.active { background: #FFD700; color: black; font-weight: bold; }
        .tab i { font-size: 14px; }

        /* PANELS */
        .panel { display: none; height: 100%; overflow-y: auto; }
        .panel.active { display: block; }

        /* FILTER GRID */
        .effect-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .effect-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .effect-box { width: 50px; height: 50px; background: #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; border: 2px solid transparent; font-size: 20px; color: #ccc; }
        .effect-item.selected .effect-box { border-color: #FFD700; color: #FFD700; background: #222; }
        .effect-label { font-size: 10px; margin-top: 5px; color: #888; }

        /* RANGE SLIDERS */
        .range-wrap { margin-bottom: 15px; }
        .range-wrap label { display: flex; justify-content: space-between; font-size: 12px; color: #ccc; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: #FFD700; height: 4px; border-radius: 5px; cursor: pointer; }
        input[type=text] { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }

        /* LOADER */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 200; display:none; justify-content:center; align-items:center; flex-direction:column; }
        .loading-bar { width: 200px; height: 5px; background: #333; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        .bar-fill { height: 100%; background: #FFD700; width: 0%; transition: 0.3s; }
        .loader-text { color: #FFD700; margin-top: 10px; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="fileScreen" style="height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div onclick="document.getElementById('fileInput').click()" style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, #111, #000); border:2px dashed #FFD700; display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); animation: float 3s infinite;">
            <i class="fas fa-plus" style="font-size:40px; color:#FFD700;"></i>
        </div>
        <h3 style="margin-top:20px; color:#FFD700; text-transform: uppercase;">Pro Studio</h3>
        <p style="color:#666; font-size:13px;">Create. Edit. Viral.</p>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="loadFile(this)">
    </div>

    <div id="editorScreen" style="display:none; height:100%; flex-direction:column;">
        <div class="header">
            <i class="fas fa-times" onclick="location.reload()" style="font-size:20px; cursor:pointer; color:#888;"></i>
            <div class="title">EDITOR</div>
            <button class="next-btn" onclick="processAndUpload()">POST</button>
        </div>

        <div class="preview-area">
            <video id="mainVideo" playsinline loop onclick="togglePlay()"></video>
            <div id="textLayer"></div>
        </div>

        <div class="controls">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('effects', this)"><i class="fas fa-magic"></i> Effects</div>
                <div class="tab" onclick="switchTab('trim', this)"><i class="fas fa-cut"></i> Trim</div>
                <div class="tab" onclick="switchTab('text', this)"><i class="fas fa-font"></i> Text</div>
                <div class="tab" onclick="switchTab('speed', this)"><i class="fas fa-tachometer-alt"></i> Speed</div>
            </div>

            <div id="p-effects" class="panel active">
                <div class="effect-grid">
                    <div class="effect-item selected" onclick="setEffect('', this)"><div class="effect-box"><i class="fas fa-ban"></i></div><span class="effect-label">None</span></div>
                    <div class="effect-item" onclick="setEffect('e_art:incognito', this)"><div class="effect-box"><i class="fas fa-user-secret"></i></div><span class="effect-label">Incognito</span></div>
                    <div class="effect-item" onclick="setEffect('e_vignette:50', this)"><div class="effect-box"><i class="fas fa-circle"></i></div><span class="effect-label">Vignette</span></div>
                    <div class="effect-item" onclick="setEffect('e_pixelate:10', this)"><div class="effect-box"><i class="fas fa-th"></i></div><span class="effect-label">Pixel</span></div>
                    <div class="effect-item" onclick="setEffect('e_cartoonify', this)"><div class="effect-box"><i class="fas fa-paint-brush"></i></div><span class="effect-label">Cartoon</span></div>
                    <div class="effect-item" onclick="setEffect('e_negate', this)"><div class="effect-box"><i class="fas fa-adjust"></i></div><span class="effect-label">Invert</span></div>
                    <div class="effect-item" onclick="setEffect('e_sepia:80', this)"><div class="effect-box" style="color:#cda434"><i class="fas fa-filter"></i></div><span class="effect-label">Sepia</span></div>
                    <div class="effect-item" onclick="setEffect('e_grayscale', this)"><div class="effect-box"><i class="fas fa-tint-slash"></i></div><span class="effect-label">B&W</span></div>
                </div>
            </div>

            <div id="p-trim" class="panel">
                <div class="range-wrap">
                    <label><span>Start</span> <span id="startVal" style="color:#FFD700">0.0s</span></label>
                    <input type="range" id="startRange" value="0" step="0.1" oninput="updateTrim()">
                </div>
                <div class="range-wrap">
                    <label><span>End</span> <span id="endVal" style="color:#FFD700">End</span></label>
                    <input type="range" id="endRange" value="100" step="0.1" oninput="updateTrim()">
                </div>
                <p style="font-size:12px; color:#555; text-align:center; margin-top:10px;"><i class="fas fa-info-circle"></i> Trim happens on upload.</p>
            </div>

            <div id="p-text" class="panel">
                <input type="text" id="overlayInput" placeholder="Enter text to burn on video..." oninput="updateTextPreview()">
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button onclick="setTextPosition('north')" style="flex:1; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:5px;">Top</button>
                    <button onclick="setTextPosition('center')" style="flex:1; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:5px;">Center</button>
                    <button onclick="setTextPosition('south')" style="flex:1; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:5px;">Bottom</button>
                </div>
                <p style="font-size:11px; color:#666; margin-top:10px;">* Text will be permanently burned into video.</p>
            </div>

            <div id="p-speed" class="panel">
                <div class="effect-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="effect-item" onclick="setSpeed('e_accelerate:-50', 0.5, this)"><div class="effect-box">0.5x</div><span class="effect-label">Slow Mo</span></div>
                    <div class="effect-item selected" onclick="setSpeed('', 1.0, this)"><div class="effect-box">1x</div><span class="effect-label">Normal</span></div>
                    <div class="effect-item" onclick="setSpeed('e_accelerate:50', 1.5, this)"><div class="effect-box">1.5x</div><span class="effect-label">Fast</span></div>
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <button onclick="setReverse(this)" style="background:#222; color:white; border:1px solid #FFD700; padding:10px 20px; border-radius:20px; font-weight:bold;">
                        <i class="fas fa-history"></i> Reverse Video
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loader">
        <div style="position:relative;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:50px; color:#FFD700;"></i>
            <i class="fas fa-video" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:20px; color:white;"></i>
        </div>
        <h3 style="margin-top:20px; color:white;">Rendering Video...</h3>
        <p class="loader-text">Applying Cloud Effects</p>
        <div class="loading-bar"><div class="bar-fill" id="uploadBar"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const CLOUD_NAME = "dusj0vpsi";
        const UPLOAD_PRESET = "paravideo";

        let selectedFile = null;
        let currentUser = null;
        let videoDuration = 0;
        
        // Editor State
        let currentEffect = "";
        let currentSpeed = "";
        let isReverse = false;
        let textOverlay = "";
        let textPos = "center";

        onAuthStateChanged(auth, user => {
            if(user) currentUser = user;
            else window.location.href = 'login';
        });

        window.loadFile = (input) => {
            if(input.files && input.files[0]) {
                selectedFile = input.files[0];
                const vid = document.getElementById('mainVideo');
                vid.src = URL.createObjectURL(selectedFile);
                vid.onloadedmetadata = () => {
                    videoDuration = vid.duration;
                    document.getElementById('startRange').max = videoDuration;
                    document.getElementById('endRange').max = videoDuration;
                    document.getElementById('endRange').value = videoDuration;
                    document.getElementById('endVal').innerText = videoDuration.toFixed(1) + "s";
                };
                document.getElementById('fileScreen').style.display = 'none';
                document.getElementById('editorScreen').style.display = 'flex';
                vid.play();
            }
        };

        window.togglePlay = () => {
            const v = document.getElementById('mainVideo');
            v.paused ? v.play() : v.pause();
        };

        window.switchTab = (name, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('p-'+name).classList.add('active');
        };

        // --- EDITING FUNCTIONS ---
        window.setEffect = (effectCode, el) => {
            currentEffect = effectCode;
            // Visual feedback only (Real effect happens on server)
            document.querySelectorAll('#p-effects .effect-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            
            // Basic preview using CSS (Not perfect but gives idea)
            const v = document.getElementById('mainVideo');
            v.style.filter = "none";
            if(effectCode.includes("sepia")) v.style.filter = "sepia(0.8)";
            if(effectCode.includes("grayscale")) v.style.filter = "grayscale(1)";
            if(effectCode.includes("negate")) v.style.filter = "invert(1)";
        };

        window.setSpeed = (speedCode, playbackRate, el) => {
            currentSpeed = speedCode;
            document.getElementById('mainVideo').playbackRate = playbackRate;
            document.querySelectorAll('#p-speed .effect-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.setReverse = (btn) => {
            isReverse = !isReverse;
            btn.style.background = isReverse ? "#FFD700" : "#222";
            btn.style.color = isReverse ? "black" : "white";
        };

        window.updateTrim = () => {
            const start = parseFloat(document.getElementById('startRange').value);
            const end = parseFloat(document.getElementById('endRange').value);
            document.getElementById('startVal').innerText = start.toFixed(1) + "s";
            document.getElementById('endVal').innerText = end.toFixed(1) + "s";
            
            const v = document.getElementById('mainVideo');
            if(v.currentTime < start || v.currentTime > end) v.currentTime = start;
        };

        window.updateTextPreview = () => {
            textOverlay = document.getElementById('overlayInput').value;
            const layer = document.getElementById('textLayer');
            layer.innerText = textOverlay;
            layer.style.display = textOverlay ? 'block' : 'none';
        };

        window.setTextPosition = (pos) => {
            textPos = pos;
            const layer = document.getElementById('textLayer');
            layer.style.top = (pos === 'north') ? '20%' : (pos === 'south') ? '80%' : '50%';
        };

        // --- UPLOAD & PROCESS LOGIC ---
        window.processAndUpload = async () => {
            document.getElementById('loader').style.display = 'flex';
            
            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("upload_preset", UPLOAD_PRESET);

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);
            
            xhr.upload.onprogress = e => {
                const percent = (e.loaded / e.total) * 100;
                document.getElementById('uploadBar').style.width = percent + "%";
            };

            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    let finalUrl = data.secure_url;

                    // --- CONSTRUCT TRANSFORMATION STRING ---
                    // Cloudinary Chain: Trim -> Speed -> Reverse -> Effect -> Text -> Optimize
                    
                    let transforms = [];
                    const start = document.getElementById('startRange').value;
                    const end = document.getElementById('endRange').value;

                    // 1. Trim
                    if(start > 0) transforms.push(`so_${start}`);
                    if(end < videoDuration) transforms.push(`eo_${end}`);

                    // 2. Speed & Reverse
                    if(currentSpeed) transforms.push(currentSpeed);
                    if(isReverse) transforms.push("e_reverse");

                    // 3. Visual Effects
                    if(currentEffect) transforms.push(currentEffect);

                    // 4. Text Overlay (Burned In)
                    if(textOverlay) {
                        // Safe URL encoding for text
                        const safeText = encodeURIComponent(textOverlay).replace(/%20/g, "%20");
                        transforms.push(`l_text:Impact_50:${safeText},g_${textPos},co_white,bo_2px_solid_black`);
                    }

                    // 5. Optimization (Always last)
                    transforms.push("q_auto,w_720");

                    // Inject into URL
                    if(transforms.length > 0) {
                        const insertionIndex = finalUrl.indexOf("/upload/") + 8;
                        finalUrl = finalUrl.slice(0, insertionIndex) + transforms.join(",") + "/" + finalUrl.slice(insertionIndex);
                    }

                    // Save to Firebase
                    const uSnap = await get(ref(db, 'users/' + currentUser.uid));
                    const username = uSnap.exists() ? uSnap.val().username : "User";

                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: finalUrl,
                        caption: textOverlay || "My Edit",
                        uid: currentUser.uid,
                        uploader: username,
                        timestamp: Date.now(),
                        isHD: true,
                        views: 0
                    });

                    window.location.href = 'profile';
                } else {
                    alert("Upload Failed. Check internet.");
                    document.getElementById('loader').style.display = 'none';
                }
            };
            xhr.send(fd);
        };
    </script>
</body>
</html>
