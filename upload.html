<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload - ParaVideo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 450px; background: #000; padding: 20px; display: flex; flex-direction: column; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 24px; color: white; background: none; border: none; cursor: pointer; margin-right: 15px; }
        h2 { margin: 0; color: #8a2be2; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .active-tab { background: #8a2be2; }
        
        .upload-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px dashed #444; border-radius: 10px; margin-bottom: 20px; position: relative; overflow: hidden; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .placeholder { text-align: center; color: #666; pointer-events: none; }
        .preview-media { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        input[type="text"] { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; background: #8a2be2; border: none; padding: 15px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: auto; }
        .btn-main:disabled { background: #444; }
        
        #progress { width: 100%; height: 5px; background: #333; margin-top: 10px; display: none; }
        #bar { width: 0%; height: 100%; background: #8a2be2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <h2>Create Post</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="switchTab('gallery')">Video 🎥</button>
        <button class="tab-btn" onclick="switchTab('music')">Music 🎵</button>
        <button class="tab-btn" onclick="switchTab('camera')">Camera 🔴</button>
    </div>

    <div class="upload-area" id="uploadBox">
        <video id="vidPreview" class="preview-media" playsinline controls></video>
        <div id="audioPreview" class="preview-media" style="display:none; flex-direction:column; align-items:center; justify-content:center; color:#8a2be2;">
            <i class="fas fa-compact-disc" style="font-size: 50px; animation: spin 2s linear infinite;"></i>
            <p style="margin-top:10px; color:white;">Music Selected</p>
        </div>
        <video id="camPreview" class="preview-media" autoplay muted playsinline></video>
        
        <div class="placeholder" id="placeholderText">
            <i class="fas fa-cloud-upload-alt" style="font-size: 40px; margin-bottom: 10px;"></i><br>
            Tap to Select Video
        </div>
        
        <input type="file" id="videoFile" accept="video/*" onchange="previewFile(this, 'video')">
        <input type="file" id="audioFile" accept="audio/*" style="display:none;" onchange="previewFile(this, 'audio')">
    </div>

    <div id="recBtnContainer" style="display:none; text-align:center; margin-bottom:10px;">
        <button id="recBtn" style="width:60px; height:60px; background:red; border:4px solid white; border-radius:50%; cursor:pointer;" onclick="toggleRecording()"></button>
    </div>

    <input type="text" id="caption" placeholder="Write a caption or Song Name...">
    
    <div id="progress"><div id="bar"></div></div>
    <button class="btn-main" id="postBtn" onclick="uploadContent()">POST</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyA8IpSQ9yy6W09rQjptJAqMePPpR4Zf3Kc", authDomain: "paravideo-1ac3b.firebaseapp.com", databaseURL: "https://paravideo-1ac3b-default-rtdb.firebaseio.com", projectId: "paravideo-1ac3b", storageBucket: "paravideo-1ac3b.firebasestorage.app", messagingSenderId: "384549024202", appId: "1:384549024202:web:6e05fd017b7aa84e7a1f33" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const CLOUD_NAME = "dusj0vpsi", UPLOAD_PRESET = "paravideo";

    let currentUser = null;
    let currentTab = 'gallery';
    let stream, mediaRecorder, chunks = [], camFile = null;

    onAuthStateChanged(auth, user => {
        if (user) currentUser = user;
        else window.location.href = 'index.html'; // Kick back if not logged in
    });

    window.switchTab = async (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        event.target.classList.add('active-tab');

        // Reset UI
        document.getElementById('videoFile').style.display = 'none';
        document.getElementById('audioFile').style.display = 'none';
        document.getElementById('placeholderText').style.display = 'block';
        document.getElementById('vidPreview').style.display = 'none';
        document.getElementById('audioPreview').style.display = 'none';
        document.getElementById('camPreview').style.display = 'none';
        document.getElementById('recBtnContainer').style.display = 'none';

        // Stop Camera if running
        if(stream) stream.getTracks().forEach(t => t.stop());

        if (tab === 'gallery') {
            document.getElementById('videoFile').style.display = 'block';
            document.getElementById('placeholderText').innerHTML = '<i class="fas fa-video"></i><br>Select Video';
        } else if (tab === 'music') {
            document.getElementById('audioFile').style.display = 'block';
            document.getElementById('placeholderText').innerHTML = '<i class="fas fa-music"></i><br>Select MP3';
        } else if (tab === 'camera') {
            document.getElementById('placeholderText').style.display = 'none';
            document.getElementById('camPreview').style.display = 'block';
            document.getElementById('recBtnContainer').style.display = 'block';
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('camPreview').srcObject = stream;
        }
    };

    window.previewFile = (input, type) => {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            document.getElementById('placeholderText').style.display = 'none';
            if(type === 'video') {
                const vid = document.getElementById('vidPreview');
                vid.style.display = 'block';
                vid.src = URL.createObjectURL(file);
            } else {
                document.getElementById('audioPreview').style.display = 'flex';
            }
        }
    };

    window.toggleRecording = () => {
        const btn = document.getElementById('recBtn');
        if(!mediaRecorder || mediaRecorder.state === "inactive") {
            mediaRecorder = new MediaRecorder(stream); chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => { camFile = new File([new Blob(chunks, {type: 'video/mp4'})], "cam.mp4", {type:'video/mp4'}); alert("Recorded! Click POST."); };
            mediaRecorder.start(); 
            btn.style.background = "white";
            btn.style.animation = "pulse 1s infinite";
        } else { 
            mediaRecorder.stop(); 
            btn.style.background = "red";
            btn.style.animation = "none";
        }
    };

    window.uploadContent = async () => {
        let file;
        let isAudio = (currentTab === 'music');

        if (currentTab === 'music') file = document.getElementById('audioFile').files[0];
        else if (currentTab === 'camera') file = camFile;
        else file = document.getElementById('videoFile').files[0];

        if(!file) return alert("Please select a file first!");
        if(file.size > 100000000) return alert("File too large (Max 100MB)");

        const btn = document.getElementById('postBtn');
        const bar = document.getElementById('bar');
        
        btn.disabled = true;
        document.getElementById('progress').style.display = 'block';

        const uSnap = await get(ref(db, 'users/' + currentUser.uid));
        const realName = uSnap.exists() ? uSnap.val().username : "User";
        let isHD = false;

        const performUpload = () => {
            const fd = new FormData();
            fd.append("file", file);
            fd.append("upload_preset", UPLOAD_PRESET);
            if(isAudio) fd.append("resource_type", "video"); // Trick to allow standard upload

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${isAudio ? 'video' : 'video'}/upload`);

            xhr.upload.onprogress = e => {
                const percent = Math.round((e.loaded / e.total) * 100);
                bar.style.width = percent + "%";
                btn.innerText = `Uploading... ${percent}%`;
            };

            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    await push(ref(db, 'gameplay_clips'), {
                        videoUrl: data.secure_url,
                        caption: document.getElementById('caption').value,
                        isHD: isHD,
                        isAudio: isAudio,
                        uploader: realName,
                        uid: currentUser.uid,
                        timestamp: Date.now()
                    });
                    window.location.href = 'index.html'; // Go back to feed
                } else {
                    alert("Upload Failed");
                    btn.disabled = false;
                }
            };
            xhr.send(fd);
        };

        if(!isAudio && currentTab !== 'camera') {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.onloadedmetadata = () => {
                isHD = (v.videoWidth >= 1280 || v.videoHeight >= 720);
                performUpload();
            };
            v.src = URL.createObjectURL(file);
        } else {
            performUpload();
        }
    };
</script>

<style>@keyframes spin { 100% { transform: rotate(360deg); } } @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }</style>
</body>
</html>
